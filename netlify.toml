[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Daily at 8:30 UTC: pull yesterday's Toast sales + tips per store
[functions."toast-sync"]
  schedule = "30 8 * * *"

# Daily at 8:40 UTC: pull yesterday's HQ revenue from QuickBooks
[functions."quickbooks-sync"]
  schedule = "40 8 * * *"

# Daily at 9:00 UTC: generate due recurring expenses
[functions."recurring-cron"]
  schedule = "0 9 * * *"
