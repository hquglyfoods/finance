[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# jimp is a large pure-JS image library; let esbuild ship it from node_modules instead of
# trying to bundle it (safer for its dynamic requires). Used by slack-expense to resize
# large receipt photos down under the Anthropic image size limit.
[functions."slack-expense"]
  external_node_modules = ["jimp"]

# Hourly: Toast store sales + tips (AD/BW/FH)
[functions."toast-sync"]
  schedule = "@hourly"

# Hourly: HQ invoices + Ummas orders from the Inventory app Supabase
[functions."inventory-sync"]
  schedule = "@hourly"

# Daily 9:00 UTC: generate due recurring expenses
[functions."recurring-cron"]
  schedule = "0 9 * * *"

# Daily 12:30 UTC (~8:30am ET): post the daily sales report to #financial
[functions."daily-sales-report"]
  schedule = "30 12 * * *"
