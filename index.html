<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow">
<title>Finance Tool · Ugly Donuts & Corn Dogs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* LIGHT THEME - white background, meaningful color coding */
  --bg:#FFFFFF; --panel:#FFFFFF; --panel2:#F6F5F2; --panel3:#FAFAF8;
  --border:#E7E4DD; --border-soft:#F0EEE9;
  --text:#1A1712; --text2:#5C554A; --text3:#948B7C;
  --gold:#B08A1E; --gold-strong:#8A6D14; --gold-soft:#D4B454; --gold-dim:#FBF6E7;
  --green:#2E7D4F; --green-soft:#4BA972; --green-dim:#E8F3EC;
  --red:#C0392B; --red-soft:#D9614F; --red-dim:#FBEBE9;
  --blue:#3A6EA5; --blue-dim:#EAF1F8;
  --danger:#C0392B;
  --shadow:0 1px 3px rgba(26,23,18,.06), 0 1px 2px rgba(26,23,18,.04);
  --shadow-lg:0 4px 16px rgba(26,23,18,.08);
  --font-d:'Inter',sans-serif; --font-b:'Inter',sans-serif; --font-m:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 11px;outline:none;width:100%}
input:focus,select:textarea:focus,select:focus,textarea:focus{border-color:var(--gold-soft)}
input[type=number]{font-family:var(--font-m)}
::placeholder{color:var(--text3)}
a{color:var(--gold);text-decoration:none}

.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 16px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,0.04);transition:border-color .15s, background .15s, box-shadow .15s}
.btn:hover{border-color:var(--gold-soft);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.btn:active{box-shadow:0 1px 1px rgba(0,0,0,0.06)}
.btn:disabled{opacity:.45;cursor:default;box-shadow:none}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#FFFFFF;font-weight:600;box-shadow:0 1px 3px rgba(176,138,30,0.25)}
.btn-gold:hover{background:var(--gold-strong);border-color:var(--gold-strong)}
.btn-ghost{background:transparent;box-shadow:none}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px}
.btn-danger{color:var(--red);border-color:rgba(196,100,76,.4)}

.eyebrow{font-family:var(--font-m);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.h-display{font-family:var(--font-d);font-weight:700;letter-spacing:-0.01em}
.mono{font-family:var(--font-m)}
.muted{color:var(--text2)} .faint{color:var(--text3)}
.pos{color:var(--green)} .neg{color:var(--red)}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 900px 500px at 50% -10%, var(--gold-dim), transparent)}
.login-box{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:44px 38px}
.login-box h1{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:14px 0 4px}
.login-box .sub{color:var(--text2);font-size:13.5px;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-err{background:var(--red-dim);border:1px solid rgba(196,100,76,.35);color:var(--red);border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:16px}

/* ---------- shell ---------- */
.shell{display:flex;min-height:100vh}
.side{width:218px;flex-shrink:0;background:var(--panel3);border-right:1px solid var(--border);padding:26px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{font-family:var(--font-d);font-size:19px;font-weight:700;letter-spacing:-0.01em;padding:0 10px 4px}
.side .brand em{color:var(--gold);font-style:italic}
.side .brand-sub{font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:26px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;color:var(--text2);font-weight:500;font-size:13.5px;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--panel2)}
.nav-item.on{color:var(--gold);background:var(--gold-dim)}
.nav-item .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.tab-dot{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;padding:0 3px;line-height:1}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;animation:fadein .15s}
.sheet{background:var(--panel);width:100%;border-radius:18px 18px 0 0;padding:8px 14px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--border);animation:slideup .2s}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 14px}
.sheet-item{display:flex;align-items:center;gap:14px;width:100%;padding:15px 12px;border:none;background:none;color:var(--text);font-size:15px;font-weight:500;text-align:left;border-radius:10px}
.sheet-item .ic{font-size:19px;width:24px;text-align:center;color:var(--text2)}
.sheet-item.on{color:var(--gold);background:var(--gold-dim)}
.sheet-item.on .ic{color:var(--gold)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.side .foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border-soft);font-size:12.5px;display:flex;align-items:center;gap:8px}
.bell{position:relative;flex:0 0 auto}
.bell-btn{position:relative;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.bell-btn:hover{background:var(--panel2)}
.bell-ic{font-size:18px;line-height:1;filter:grayscale(.3)}
.bell-badge{position:absolute;top:0;right:0;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.bell-panel{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);width:290px;max-height:60vh;overflow-y:auto;z-index:250}
.bell-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border-soft);font-weight:700;font-size:13.5px;position:sticky;top:0;background:var(--panel)}
.bell-clear{background:none;border:none;color:var(--gold-strong);font-size:12px;font-weight:600;cursor:pointer}
.bell-empty{padding:24px 14px;text-align:center;color:var(--text3);font-size:13px}
.bell-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--border-soft);padding:11px 14px;cursor:pointer}
.bell-item:hover{background:var(--panel2)}
.bell-item.unread{background:var(--gold-dim)}
.bell-item.unread:hover{background:var(--gold-dim)}
.bell-item-t{font-size:13px;font-weight:600;color:var(--text)}
.bell-item-b{font-size:12px;color:var(--text2);margin-top:2px}
.bell-item-time{font-size:11px;color:var(--text3);margin-top:3px}
.acct{position:relative;flex:1;min-width:0}
.acct-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:6px 4px;cursor:pointer;text-align:left;position:relative}
.acct-av{flex:0 0 30px;width:30px;height:30px;border-radius:50%;background:var(--gold-dim);color:var(--gold-strong);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-b)}
.acct-name{flex:1;font-size:13px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-dots{color:var(--text3);font-size:18px;line-height:1}
.acct-badge{position:absolute;top:2px;left:22px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.acct-menu{position:absolute;bottom:calc(100% + 8px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;z-index:250;min-width:210px}
.acct-head{padding:10px 12px 8px}
.acct-head-name{font-weight:700;font-size:14px;color:var(--text)}
.acct-head-role{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.acct-sep{height:1px;background:var(--border-soft);margin:6px 0}
.acct-item{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;font-weight:500}
.acct-item:hover{background:var(--panel2)}
.acct-item.static{cursor:default}
.acct-item.static:hover{background:none}
.acct-item.danger{color:var(--red)}
.acct-item.muted{color:var(--text3)}
.acct-item-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.acct-ok{color:var(--green);font-size:10px}
.side .foot .who{color:var(--text);font-weight:500}
.side .foot .role{font-family:var(--font-m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}

.main{flex:1;min-width:0;padding:30px 36px 80px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.page-head h2{font-family:var(--font-d);font-size:25px;font-weight:700;letter-spacing:-0.02em}
.page-head .sub{color:var(--text2);font-size:13px;margin-top:2px}

/* corp tabs + month picker */
.corp-tabs{display:flex;gap:6px;flex-wrap:wrap}
.settings-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:20px;padding-bottom:4px;scrollbar-width:none}
.settings-tabs::-webkit-scrollbar{display:none}
.settings-tab{flex:0 0 auto;white-space:nowrap;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:600;font-size:13px;cursor:pointer}
.settings-tab.on{background:var(--gold-dim);border-color:var(--gold-soft);color:var(--gold-strong)}
.corp-tab{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:500;font-size:13px;cursor:pointer}
.corp-tab.on{border-color:var(--gold-soft);color:var(--gold-strong);background:var(--gold-dim)}
.viewbar{display:flex;gap:4px;margin-bottom:22px;background:var(--panel2);border-radius:10px;padding:4px;width:fit-content}
.viewtab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer}
.viewtab.on{background:var(--panel);color:var(--gold-strong);box-shadow:var(--shadow)}
.subtabs{display:flex;gap:18px;margin:0 0 16px 2px;border-bottom:1px solid var(--border)}
.subtab{padding:9px 2px;border:none;background:transparent;color:var(--text2);font-weight:500;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.subtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.findings{display:flex;flex-direction:column;gap:11px}
.finding{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:1.45;padding:11px 14px;border-radius:10px}
.finding .fdot{flex:0 0 8px;width:8px;height:8px;border-radius:50%;margin-top:6px}
.finding.good{background:var(--green-dim);color:var(--text)}
.finding.good .fdot{background:var(--green)}
.finding.bad{background:var(--red-dim);color:var(--text)}
.finding.bad .fdot{background:var(--red)}
.finding.info{background:var(--gold-dim);color:var(--text)}
.finding.info .fdot{background:var(--gold)}
.spendlist{display:flex;flex-direction:column;gap:14px}
.spendrow{}
.spendhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px}
.spendname{font-weight:500;font-size:14px}
.spendamt{font-size:14px}
.spendbar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.spendbar-fill{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:4px}
.spendbar-fill.big{background:linear-gradient(90deg,var(--red-soft),var(--red))}
.kpi.accent-green{background:linear-gradient(160deg,var(--green-dim),var(--panel));border-color:#CDE6D6}
.kpi.accent-red{background:linear-gradient(160deg,var(--red-dim),var(--panel));border-color:#F3D3CE}
.kpi.accent-gold{background:linear-gradient(160deg,var(--gold-dim),var(--panel));border-color:#EBDCA8}
.spendmeta{font-size:11.5px;color:var(--text3);margin-top:4px}
.spendtotal{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-weight:600;font-size:15px}
.ie-toggle{display:flex;gap:8px;margin-bottom:14px}
.date-chip{position:relative;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--gold-soft);border-radius:20px;background:var(--gold-dim);color:var(--gold-strong);font-family:var(--font-m);font-size:12.5px;font-weight:600;cursor:pointer}
.date-chip::before{content:'📅';font-size:11px}
.date-chip input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.method-seg{display:flex;gap:6px;margin:4px 0 8px;background:var(--panel2);border-radius:8px;padding:4px;width:fit-content}
.method-opt{padding:7px 16px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer}
.method-opt.on{background:var(--panel);color:var(--gold-strong);box-shadow:var(--shadow)}
.ie-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--panel);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer}
.ie-btn .ie-ic{font-size:16px;font-weight:700;line-height:1}
.ie-btn.income.on{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.ie-btn.expense.on{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.month-pick{display:flex;align-items:center;gap:8px}
.month-pick .lbl{font-family:var(--font-m);font-size:14px;min-width:86px;text-align:center}
.month-pick button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2)}
.month-pick button:hover{color:var(--gold);border-color:var(--gold-soft)}
.mp-sel{font-family:var(--font-m);font-size:13.5px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);width:auto;cursor:pointer}
.mp-sel:hover{border-color:var(--gold-soft)}
.mp-year{min-width:74px}

/* cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.kpis.kpis-3{grid-template-columns:repeat(3,1fr)}
.kpis.kpis-2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi .k-lbl{font-size:11.5px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.kpi .k-val{font-family:var(--font-m);font-size:21px;font-weight:500}
.kpi .k-sub{font-size:12px;color:var(--text2);margin-top:3px}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1000px){.grid2{grid-template-columns:1fr}}

/* tables */
table.t{width:100%;border-collapse:collapse;font-size:13.5px}
table.t th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--border)}
table.t td{padding:8px;border-bottom:1px solid var(--border-soft)}
table.t tr:last-child td{border-bottom:none}
table.t td.num,table.t th.num{text-align:right;font-family:var(--font-m)}
table.t tr.total td{border-top:1px solid var(--border);font-weight:600;color:var(--text)}
.badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;padding:2px 7px;border:1px solid var(--border);color:var(--text3)}
.badge.gold{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-dim)}
.badge.green{color:var(--green);border-color:rgba(127,176,105,.4);background:var(--green-dim)}
.badge.red{color:var(--red);border-color:rgba(196,100,76,.4);background:var(--red-dim)}
.badge.blue{color:var(--blue);border-color:rgba(122,156,198,.4)}

/* cash calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center;padding:4px 0}
.cal .day{min-height:74px;border:1px solid var(--border-soft);border-radius:8px;padding:7px 8px;background:var(--panel2);position:relative}
.cal .day.empty{background:transparent;border-color:transparent}
.cal .day .d{font-family:var(--font-m);font-size:11px;color:var(--text3)}
.cal .day .amt{font-family:var(--font-m);font-size:12.5px;margin-top:6px}
.cal .day.verified{background:var(--gold-dim);border-color:var(--gold-soft)}
.cal .day.verified .d{color:var(--gold)}
.cal .day.verified::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--gold);font-size:11px}
.cal .day.has-cashexp{border-color:var(--red-soft)}
.cal .day.has-cashexp::before{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.cal .day .cashexp{font-family:var(--font-m);font-size:11px;color:var(--red);margin-top:2px}
.cal .day .envelope{font-family:var(--font-m);font-size:11px;color:var(--gold-strong);margin-top:1px;font-weight:600}
.cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--text2);align-items:center}
.cal-legend .lg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.cal-legend .lg-dot.gold{background:var(--gold)}
.cal-legend .lg-dot.red{background:var(--red)}
.pickup-card{padding:0;overflow:hidden;border:1px solid var(--gold-soft)}
.pickup-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--gold-dim);border:none;padding:16px 20px;cursor:pointer;text-align:left}
.pickup-head:hover{background:var(--gold-dim);filter:brightness(0.98)}
.pickup-title{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--gold-strong)}
.pickup-sub{font-size:12.5px;color:var(--text2);margin-top:2px}
.pickup-chev{color:var(--gold-strong);font-size:16px;background:var(--panel);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
.pickup-body{padding:0 20px 20px;border-top:1px solid var(--border-soft)}
.env-table .env-input{width:100%;padding:6px 8px;font-family:var(--font-m);text-align:right;font-size:13px}
.env-table th{font-size:11px}
.env-table td{padding:6px 8px}

  const neg = v < 0; const a = Math.abs(v); const sign = neg?'-$':'$';
  if (a >= 1000000) return sign + (a/1000000).toFixed(2) + 'M';
  if (a >= 10000)   return sign + (a/1000).toFixed(1) + 'K';
  return sign + Math.round(a).toLocaleString('en-US');
};
const fmtPct = v => (v===null||isNaN(v)) ? '-' : (v*100).toFixed(1)+'%';
const fmtDateShort = (iso)=>{ if(!iso) return ''; const [y,m,d]=iso.split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]; return `${mo} ${parseInt(d)}, ${y}`; };

// safe formula evaluator: variables + max/min + arithmetic
function evalExpr(expr, vars){
  try{
    let e = expr.replace(/[A-Za-z_][A-Za-z0-9_]*/g, id => {
      if (id === 'max') return 'Math.max';
      if (id === 'min') return 'Math.min';
      const v = vars[id];
      return String(typeof v === 'number' && isFinite(v) ? v : 0);
    });
    const check = e.replace(/Math\.(max|min)/g,'');
    if (/[^0-9+\-*/(). ,eE]/.test(check)) return 0;
    const r = Function('"use strict";return (' + e + ')')();
    return (typeof r === 'number' && isFinite(r)) ? r : 0;
  }catch(err){ return 0; }
}

async function loadMonthRaw(corpId, y, m){
  const start = `${y}-${pad(m)}-01`, end = `${y}-${pad(m)}-${pad(lastDay(y,m))}`;
  const [rev, exp, inp, rates] = await Promise.all([
    sb.from('daily_revenue').select('*').eq('corporation_id', corpId).gte('date', start).lte('date', end),
    sb.from('expenses').select('*').eq('corporation_id', corpId).gte('date', start).lte('date', end),

    rates: rates.data||[], monthKey: `${y}-${pad(m)}` };
}

// Load a whole year and compute each month's P&L. Returns array of 12 {m, pl}.
// Load the ENTIRE history for a corp and compute each month's P&L, grouped by year.
// Returns { years:[{y, months:[{m,pl}], totals:{s,e,n}}], firstYear, lastYear }.
// Supabase caps a query at 1000 rows. With per-day data a year can exceed that,
// so page through in 1000-row chunks and concatenate.
async function fetchAllRows(build){
  const PAGE=1000; let from=0, all=[];
  for(;;){
    const { data, error } = await build().range(from, from+PAGE-1);
    if(error) throw error;
    const rows = data||[];
    all = all.concat(rows);
    if(rows.length < PAGE) break;
    from += PAGE;
    if(from > 200000) break; // safety
  }
  return all;
}

async function loadAllTimePL(corpId, meta){
  const [rev, exp, inp, rt] = await Promise.all([
    fetchAllRows(()=>sb.from('daily_revenue').select('date,amount,channel_id,source').eq('corporation_id',corpId).order('date')),
    fetchAllRows(()=>sb.from('expenses').select('date,amount,category_id,status,source').eq('corporation_id',corpId).order('date')),
    sb.from('monthly_inputs').select('*').eq('corporation_id',corpId),
    sb.from('rate_schedule').select('rate_type,rate,effective_from').eq('corporation_id',corpId),
  ]);
  const inps=inp.data||[], rates=rt.data||[];
  // find year span from data
  const allDates=[...rev.map(r=>r.date), ...exp.map(e=>e.date)].filter(Boolean);
  if(!allDates.length) return { years:[], firstYear:null, lastYear:null };
  const firstYear=parseInt(allDates.reduce((a,b)=>a<b?a:b).slice(0,4));
  const lastYear=parseInt(allDates.reduce((a,b)=>a>b?a:b).slice(0,4));
  const years=[];
  for(let y=firstYear; y<=lastYear; y++){
    const months=[];
    for(let m=1;m<=12;m++){
      const pref=`${y}-${pad(m)}`;
      const raw={ revenue:rev.filter(r=>r.date.startsWith(pref)),
        expenses:exp.filter(e=>e.date.startsWith(pref)),
        inputs:inps.filter(r=>r.year===y&&r.month===m), rates, monthKey:pref };
      months.push({ m, pl: computePL(meta, raw) });
    }
    const totals=months.reduce((a,x)=>({s:a.s+x.pl.totalSales,e:a.e+x.pl.totalExpenses,n:a.n+x.pl.net}),{s:0,e:0,n:0});
    years.push({ y, months, totals });
  }
  return { years, firstYear, lastYear };
}

async function loadYearPL(corpId, meta, y){
  const start=`${y}-01-01`, end=`${y}-12-31`;
  const [rvData, exData, inp, rt] = await Promise.all([
    fetchAllRows(()=>sb.from('daily_revenue').select('date,amount,channel_id,source').eq('corporation_id',corpId).gte('date',start).lte('date',end).order('date')),
    fetchAllRows(()=>sb.from('expenses').select('date,amount,category_id,status,source').eq('corporation_id',corpId).gte('date',start).lte('date',end).order('date')),
    sb.from('monthly_inputs').select('*').eq('corporation_id',corpId).eq('year',y),
    sb.from('rate_schedule').select('rate_type,rate,effective_from').eq('corporation_id',corpId),
  ]);
  const months=[];
  for(let m=1;m<=12;m++){
    const pref=`${y}-${pad(m)}`;
    const raw={ revenue:rvData.filter(r=>r.date.startsWith(pref)),
      expenses:exData.filter(r=>r.date.startsWith(pref)),
      inputs:(inp.data||[]).filter(r=>r.month===m), rates:(rt.data||[]), monthKey:pref };
    months.push({ m, pl: computePL(meta, raw) });
  }
  return months;
}

// compute a full monthly P&L from raw rows + meta
function computePL(meta, raw){
  const chByCode = {}, chSum = {};
  meta.channels.forEach(c => { chByCode[c.id] = c; chSum[c.code] = 0; });
  // Board precedence is PER-DATE: on any date that has a board-sourced row, only
  // board rows count (live Toast rows for that date are ignored). Dates with no
  // board row use their live rows normally. This makes fully-historical months
  // board-only, while a partial month (e.g. board days 1-5, live days 6+) mixes
  // correctly with no double-counting.
  // A month is BOARD-LOCKED when it has board data and is fully in the past
  // (before the current calendar month). Board-locked months show exactly what was
  // imported from Excel: only board rows count, no auto-rules, and any stray
  // recurring/live rows are ignored so nothing is double-counted. The current month
  // is transitional (per-date precedence + auto-rules) so board days 1-5 and live
  // days 6+ coexist.
  const now = new Date();
  const curKey = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  const monthKey = raw.monthKey || '';
  const hasBoardRevAny = raw.revenue.some(r => r.source === 'board');
  const hasBoardExpAny = raw.expenses.some(e => e.source === 'board' && e.status === 'confirmed');
  const boardLocked = (monthKey < curKey) && (hasBoardRevAny || hasBoardExpAny);

  const boardRevDates = new Set(raw.revenue.filter(r => r.source === 'board').map(r => r.date));
  let totalSales = 0;
  raw.revenue.forEach(r => {
    if (boardLocked && r.source !== 'board') return;                 // locked: board only
    if (!boardLocked && r.source !== 'board' && boardRevDates.has(r.date)) return; // current: per-date
    const c = chByCode[r.channel_id]; if(!c) return;
    chSum[c.code] = (chSum[c.code]||0) + Number(r.amount);
    if (c.counts_in_total) totalSales += Number(r.amount) * Number(c.total_multiplier);
  });
  const catById = {}, catSum = {};
  meta.categories.forEach(c => { catById[c.id] = c; catSum[c.code] = 0; });
  const confExp = raw.expenses.filter(e => e.status === 'confirmed');
  const boardExpDates = new Set(confExp.filter(e => e.source === 'board').map(e => e.date));
  const hasBoard = boardLocked;   // auto-rules off for locked months
  confExp.forEach(e => {
    if (boardLocked && e.source !== 'board') return;                 // locked: board only
    if (!boardLocked && e.source !== 'board' && boardExpDates.has(e.date)) return; // current: per-date
    const c = catById[e.category_id]; if(!c) return;
    catSum[c.code] = (catSum[c.code]||0) + Number(e.amount);
  });
  const vars = { total_sales: totalSales };
  Object.entries(chSum).forEach(([k,v]) => vars['ch_'+k] = v);
  Object.entries(catSum).forEach(([k,v]) => vars['cat_'+k] = v);
  raw.inputs.forEach(i => vars['inp_'+i.key] = Number(i.value));
  // effective rates from rate_schedule (most recent on/before this month).
  // Exposed as royalty_rate / marketing_rate / sales_commission_rate for use in
  // auto-rule expressions. Falls back to defaults when no schedule row exists.
  const rateDefaults = { royalty: 0.03, marketing: 0, sales_commission: 0 };
  const monthEnd = raw.monthKey ? `${raw.monthKey}-31` : null;
  const pickRate = type => {
    const applicable = (raw.rates||[])
      .filter(r => r.rate_type===type && (!monthEnd || r.effective_from <= monthEnd))
      .sort((a,b)=> a.effective_from < b.effective_from ? 1 : -1);
    return applicable.length ? Number(applicable[0].rate) : rateDefaults[type];
  };
  vars['royalty_rate'] = pickRate('royalty');
  vars['marketing_rate'] = pickRate('marketing');
  vars['sales_commission_rate'] = pickRate('sales_commission');
  // auto-rules only for non-board (current/future) months
  const ruleRows = hasBoard ? [] : meta.rules.map(r => {
    const val = evalExpr(r.expr, vars);
    vars[r.code] = val;
    return { code:r.code, name:r.name, amount:val };
  });
  const catExpense = Object.values(catSum).reduce((a,b)=>a+b,0);
  const ruleExpense = ruleRows.reduce((a,r)=>a+r.amount,0);
  const totalExpenses = catExpense + ruleExpense;
  const net = totalSales - totalExpenses;
  const dist = meta.ownership.map(o => ({
    holder:o.holder, pct:Number(o.pct),
    amount: (o.zero_floor && net < 0) ? 0 : net * Number(o.pct)/100
  }));
  return { totalSales, totalExpenses, net, hasBoard,
    margin: totalSales ? net/totalSales : null,
    chSum, catSum, ruleRows, dist,
    channelRows: meta.channels.filter(c => (chSum[c.code]||0) !== 0 || c.active)
      .map(c => ({...c, amount: chSum[c.code]||0})),
    categoryRows: meta.categories.filter(c => (catSum[c.code]||0) !== 0 || c.active)
      .map(c => ({...c, amount: catSum[c.code]||0})),
    payrollPct: totalSales ? (catSum['payroll']||0)/totalSales : null,
    suppliesPct: totalSales ? ((catSum['supplies']||0)+(catSum['supplies_food']||0)+(catSum['supplies_material']||0)+(catSum['hq_supplies']||0))/totalSales : null,
  };
}

// summary snapshot stored on publish (this is exactly what investors see)
function buildSummary(pl){
  // Fold categories that share an investor_group into a single investor-facing
  // line, so internal splits (e.g. HQ Supplies vs store Supplies) are not exposed.
  const grouped = {};
  const order = [];
  pl.categoryRows.filter(c=>c.amount!==0).forEach(c=>{
    const key = c.investor_group || c.name;
    if(!(key in grouped)){ grouped[key]=0; order.push(key); }
    grouped[key] += c.amount;
  });
  const expenses = order.map(k=>({name:k, amount:+grouped[k].toFixed(2)}))
    .concat(pl.ruleRows.filter(r=>r.amount!==0).map(r=>({name:r.name, amount:+r.amount.toFixed(2), auto:true})));
  return {
    total_sales: +pl.totalSales.toFixed(2),
    total_expenses: +pl.totalExpenses.toFixed(2),
    net_profit: +pl.net.toFixed(2),
    net_margin: pl.margin !== null ? +(pl.margin).toFixed(4) : null,
    revenue: pl.channelRows.filter(c=>c.amount!==0).map(c=>({name:c.name, amount:+c.amount.toFixed(2)})),
    expenses,
    // NOTE: profit distribution / shareholder names are intentionally NOT included.
    // Published reports must never contain investor or ownership information.
  };
}

// simple SVG trend chart: bars = sales, line = net profit
function TrendChart({points}){
  if(!points.length) return null;
  const W = Math.max(560, points.length*52), H = 190, padL = 8, padB = 26, padT = 14;
  const plotH = H - padB - padT;
  // Sales bars: scaled to the max sales value (bars always proportional to sales).
  const maxSales = Math.max(1, ...points.map(p=>p.sales));
  const barY = v => padT + plotH * (1 - v/maxSales);        // top of a sales bar
  const baseY = padT + plotH;                                // sales baseline (0)
  // Net line: its own scale so it isn't crushed by the sales magnitude.
  const nets = points.map(p=>p.net);
  const maxNet = Math.max(0, ...nets), minNet = Math.min(0, ...nets);
  const netSpan = (maxNet - minNet) || 1;
  const netY = v => padT + plotH * (1 - (v - minNet)/netSpan);
  const bw = 26, gap = (W - padL*2)/points.length;
  return <div className="chart-wrap">
    <svg width={W} height={H}>
      {/* sales baseline */}
      <line x1={padL} x2={W-padL} y1={baseY} y2={baseY} stroke="#E7E4DD" strokeWidth="1"/>
      {/* net-zero reference line (dashed) if nets go negative */}
      {minNet<0 && <line x1={padL} x2={W-padL} y1={netY(0)} y2={netY(0)} stroke="#D8D3C9" strokeWidth="1" strokeDasharray="3 3"/>}
      {points.map((p,i)=>{
        const x = padL + gap*i + gap/2;
        const h = baseY - barY(p.sales);
        return <g key={i}>
          <rect x={x-bw/2} y={barY(p.sales)} width={bw} height={Math.max(0,h)} fill="#D4B454" rx="3"/>
          <text x={x} y={H-8} fontSize="10" fill="#948B7C" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>
        </g>;
      })}
      <polyline fill="none" stroke="#2E7D4F" strokeWidth="2"
        points={points.map((p,i)=>`${padL+gap*i+gap/2},${netY(p.net)}`).join(' ')}/>
      {points.map((p,i)=><circle key={i} cx={padL+gap*i+gap/2} cy={netY(p.net)} r="3" fill={p.net>=0?'#2E7D4F':'#C0392B'}/>)}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'#D4B454'}}></span>Sales</span>
      <span><span className="sw" style={{background:'#2E7D4F'}}></span>Net profit</span>
    </div>
  </div>;
}

// ratio trend chart: payroll % and supplies % over months
function RatioChart({points}){
  const pts = points.filter(p=>p.payrollPct!==null || p.suppliesPct!==null);
  if(!pts.length) return null;
  const W = Math.max(560, pts.length*52), H = 180, padL=8, padB=26, padT=14;
  const vals = pts.flatMap(p=>[p.payrollPct,p.suppliesPct]).filter(v=>v!==null);
  const maxV = Math.max(0.35, ...vals), minV = 0;
  const yOf = v => padT + (H-padB-padT)*(1-(v-minV)/(maxV-minV));
  const gap = (W-padL*2)/pts.length;
  const line = (key,color)=>{
    const ps = pts.map((p,i)=>p[key]===null?null:`${padL+gap*i+gap/2},${yOf(p[key])}`).filter(Boolean);
    return <polyline fill="none" stroke={color} strokeWidth="2" points={ps.join(' ')}/>;
  };
  return <div className="chart-wrap">
    <svg width={W} height={H}>
      {[0.1,0.2,0.3].map(g=><line key={g} x1={padL} x2={W-padL} y1={yOf(g)} y2={yOf(g)} stroke="#F0EEE9" strokeWidth="1"/>)}
      {[0.1,0.2,0.3].map(g=><text key={'t'+g} x={padL+2} y={yOf(g)-4} fontSize="9" fill="#948B7C" fontFamily="IBM Plex Mono">{g*100}%</text>)}
      {line('payrollPct','#B08A1E')}
      {line('suppliesPct','#3A6EA5')}
      {pts.map((p,i)=><text key={i} x={padL+gap*i+gap/2} y={H-8} fontSize="10" fill="#948B7C" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>)}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'#B08A1E'}}></span>Payroll %</span>
      <span><span className="sw" style={{background:'#3A6EA5'}}></span>Supplies %</span>
    </div>
  </div>;
}

// trend direction vs previous month: cost ratios going up is bad
function TrendArrow({cur, prev, higherIsBad}){
  if(cur===null||prev===null||prev===undefined) return null;
  const d = cur - prev;
  if(Math.abs(d) < 0.002) return <span className="faint"> →</span>;
  const up = d > 0;
  const bad = higherIsBad ? up : !up;
  return <span className={bad?'neg':'pos'}> {up?'▲':'▼'} {(Math.abs(d)*100).toFixed(1)}pt</span>;
}

function YoYDelta({cur, prev}){
  if(prev===null||prev===undefined||Math.abs(prev)<0.01) return <span className="faint">no data last year</span>;
  const d = (cur-prev)/Math.abs(prev);
  return <span className={d>=0?'pos':'neg'}>{d>=0?'+':''}{(d*100).toFixed(1)}% vs last year</span>;
}

function Dashboard({corps, canEditIds, presetCorp}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(editable[0] && editable[0].id);
  const now = new Date();
  const [y, setY] = useState(now.getFullYear());
  const [m, setM] = useState(now.getMonth()+1);
  const [view, setView] = useState('daily');   // daily | month | year | compare | alltime
  const [meta, setMeta] = useState(null);
  const [loading, setLoading] = useState(true);
  // when navigated from a Home store card, focus that store's daily detail
  useEffect(()=>{ if(presetCorp && presetCorp.id){ setCorpId(presetCorp.id); setView('daily'); } },[presetCorp]);

  // shared data holders
  const [pl, setPl] = useState(null);
  const [yoy, setYoy] = useState(null);
  const [trend, setTrend] = useState([]);
  const [dayRows, setDayRows] = useState([]);        // daily view
  const [yearMonths, setYearMonths] = useState([]);  // year view: [{m, pl}]
  const [yearMonthsPrev, setYearMonthsPrev] = useState([]); // compare view
  const [yearMonthsPrev2, setYearMonthsPrev2] = useState([]); // 3-year
  const [allTime, setAllTime] = useState(null); // all-time view

  useEffect(()=>{ if(!corpId) return; let dead=false; setLoading(true);
    (async()=>{
      const mt = await loadCorpMeta(corpId); if(dead) return; setMeta(mt);

      if(view==='month'){
        const [raw, rawLY] = await Promise.all([loadMonthRaw(corpId,y,m), loadMonthRaw(corpId,y-1,m)]);
        if(dead) return;
        setPl(computePL(mt,raw));
        const ply=computePL(mt,rawLY);
        setYoy((ply.totalSales!==0||ply.totalExpenses!==0)?ply:null);
        // 12-month trend ending this month
        const endD=`${y}-${pad(m)}-${pad(lastDay(y,m))}`; let sy=y,sm=m-11; while(sm<1){sm+=12;sy--;}
        const startD=`${sy}-${pad(sm)}-01`;
        const [rvT,exT,rt]=await Promise.all([
          fetchAllRows(()=>sb.from('daily_revenue').select('date,amount,channel_id,source').eq('corporation_id',corpId).gte('date',startD).lte('date',endD).order('date')),
          fetchAllRows(()=>sb.from('expenses').select('date,amount,category_id,status,source').eq('corporation_id',corpId).gte('date',startD).lte('date',endD).order('date')),
          sb.from('rate_schedule').select('rate_type,rate,effective_from').eq('corporation_id',corpId),
        ]);
        if(dead) return;
        const pts=[]; let cy=sy,cm=sm;
        for(let i=0;i<12;i++){ const pref=`${cy}-${pad(cm)}`;
          const raw2={revenue:rvT.filter(r=>r.date.startsWith(pref)),expenses:exT.filter(r=>r.date.startsWith(pref)),inputs:[],rates:(rt.data||[]),monthKey:pref};
          const p=computePL(mt,raw2);
          if(p.totalSales!==0||p.totalExpenses!==0) pts.push({label:pad(cm),sales:p.totalSales,net:p.net,payrollPct:p.payrollPct,suppliesPct:p.suppliesPct});
          cm++; if(cm>12){cm=1;cy++;} }
        setTrend(pts);
      }
      else if(view==='daily'){
        const [raw, rawLY] = await Promise.all([loadMonthRaw(corpId,y,m), loadMonthRaw(corpId,y-1,m)]);
        if(dead) return;
        setPl(computePL(mt,raw));
        const chBy={}; mt.channels.forEach(c=>chBy[c.id]=c);
        const catBy={}; mt.categories.forEach(c=>catBy[c.id]=c);
        const nowD=new Date(); const curK=`${nowD.getFullYear()}-${pad(nowD.getMonth()+1)}`;
        const buildDays=(rawX, yy)=>{
          const nD=lastDay(yy,m); const days={};
          for(let d=1;d<=nD;d++) days[d]={rev:0,exp:0,items:[]};
          const mKey=`${yy}-${pad(m)}`;
          const lockedR=(mKey<curK) && rawX.revenue.some(r=>r.source==='board');
          const lockedE=(mKey<curK) && rawX.expenses.some(e=>e.source==='board'&&e.status==='confirmed');
          const boardRevDates=new Set(rawX.revenue.filter(r=>r.source==='board').map(r=>r.date));
          rawX.revenue.forEach(r=>{ if(lockedR&&r.source!=='board')return; if(!lockedR&&r.source!=='board'&&boardRevDates.has(r.date))return; const ch=chBy[r.channel_id]; if(!ch||!ch.counts_in_total)return;
            const d=parseInt(r.date.slice(8)); if(days[d]) days[d].rev+=Number(r.amount)*Number(ch.total_multiplier||1); });
          const boardExpDates=new Set(rawX.expenses.filter(e=>e.source==='board'&&e.status==='confirmed').map(e=>e.date));
          rawX.expenses.forEach(e=>{ if(e.status!=='confirmed')return; if(lockedE&&e.source!=='board')return; if(!lockedE&&e.source!=='board'&&boardExpDates.has(e.date))return;
            const d=parseInt(e.date.slice(8)); if(days[d]){ days[d].exp+=Number(e.amount);
              days[d].items.push({cat:(catBy[e.category_id]||{}).name||'?', amount:Number(e.amount), payee:e.payee, memo:e.memo, source:e.source, by:e.entered_by, slack_user:e.slack_user}); } });
          return days;
        };
        const cur=buildDays(raw,y), prev=buildDays(rawLY,y-1);
        const nD=lastDay(y,m); const out=[];
        for(let d=1;d<=nD;d++){ const c=cur[d], p=prev[d]||{rev:0,exp:0,items:[]};
          out.push({ d, date:`${y}-${pad(m)}-${pad(d)}`, rev:c.rev, exp:c.exp, items:c.items,
            lyRev:p.rev, lyExp:p.exp }); }
        setDayRows(out);
      }
      else if(view==='year'){
        const yr = await loadYearPL(corpId,mt,y); if(dead) return; setYearMonths(yr);
      }
      else if(view==='compare'){
        const [a,b,c] = await Promise.all([loadYearPL(corpId,mt,y), loadYearPL(corpId,mt,y-1), loadYearPL(corpId,mt,y-2)]);
        if(dead) return; setYearMonths(a); setYearMonthsPrev(b); setYearMonthsPrev2(c);
      }
      else if(view==='alltime'){
        const at = await loadAllTimePL(corpId,mt); if(dead) return; setAllTime(at);
      }
      setLoading(false);
    })();
    return ()=>{dead=true};
  },[corpId,y,m,view]);

  if(!editable.length) return <div className="card">No corporations available for your account.</div>;

  const VIEWS=[['daily','Daily'],['month','Month'],['year','Year'],['compare','3-Year'],['alltime','All-Time']];
  const showPicker = view!=='alltime';
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Insights</div><h2>{view==='daily'?'Daily Breakdown':view==='year'?'Yearly P&L':view==='compare'?'Three-Year Comparison':view==='alltime'?'All-Time':'Monthly P&L'}</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        {showPicker && (view==='year'||view==='compare'
          ? <YearPick y={y} onChange={setY}/>
          : <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>)}
      </div>
    </div>
    <div className="viewbar">
      {VIEWS.map(([id,label])=>
        <button key={id} className={'viewtab'+(view===id?' on':'')} onClick={()=>setView(id)}>{label}</button>)}
    </div>
    {loading ? <Spinner/> :
      view==='month'   ? <MonthView pl={pl} yoy={yoy} trend={trend} y={y} m={m}/> :
      view==='daily'   ? <DailyView rows={dayRows} pl={pl} y={y} m={m}/> :
      view==='year'    ? <YearView months={yearMonths} y={y}/> :
      view==='alltime' ? <AllTimeView data={allTime}/> :
                         <CompareView cur={yearMonths} prev={yearMonthsPrev} prev2={yearMonthsPrev2} y={y}/>}
  </div>;
}

function YearPick({y,onChange}){
  const nowY = new Date().getFullYear();
  const years = []; for(let yr=2022; yr<=nowY+1; yr++) years.push(yr);
  return <div style={{display:'flex',alignItems:'center',gap:8}}>
    <button className="btn btn-sm" onClick={()=>onChange(y-1)}>‹</button>
    <select className="mp-sel mp-year" value={y} onChange={e=>onChange(parseInt(e.target.value))}>
      {years.map(yr=><option key={yr} value={yr}>{yr}</option>)}
    </select>
    <button className="btn btn-sm" onClick={()=>onChange(y+1)}>›</button>
  </div>;
}

// ---- MONTH VIEW (overview + revenue + expense sections) ----
// Generate plain-language findings explaining what changed vs last year.
function analyzeChange(pl, yoy){
  if(!yoy) return [];
  const out=[];
  const pct=(a,b)=> b ? (a-b)/b : null;
  // net profit direction
  const netD=pct(pl.net, yoy.net);
  if(yoy.net!==0){
    if(pl.net>yoy.net) out.push({kind:'good', text:`Net profit up ${fmtPct(Math.abs(netD))} vs last year (${fmt$(yoy.net,0)} → ${fmt$(pl.net,0)}).`});
    else if(pl.net<yoy.net) out.push({kind:'bad', text:`Net profit down ${fmtPct(Math.abs(netD))} vs last year (${fmt$(yoy.net,0)} → ${fmt$(pl.net,0)}).`});
  }
  // margin
  if(pl.margin!=null && yoy.margin!=null){
    const dd=(pl.margin-yoy.margin)*100;
    if(Math.abs(dd)>=0.5) out.push({kind:dd>0?'good':'bad', text:`Net margin ${dd>0?'improved':'fell'} ${Math.abs(dd).toFixed(1)} points (${fmtPct(yoy.margin)} → ${fmtPct(pl.margin)}).`});
  }
  // payroll ratio
  if(pl.payrollPct!=null && yoy.payrollPct!=null){
    const dd=(pl.payrollPct-yoy.payrollPct)*100;
    if(Math.abs(dd)>=1) out.push({kind:dd>0?'bad':'good', text:`Payroll is ${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} as a share of sales (${fmtPct(yoy.payrollPct)} → ${fmtPct(pl.payrollPct)}).`});
  }
  // supplies ratio
  if(pl.suppliesPct!=null && yoy.suppliesPct!=null){
    const dd=(pl.suppliesPct-yoy.suppliesPct)*100;
    if(Math.abs(dd)>=1) out.push({kind:dd>0?'bad':'good', text:`Supplies / food cost is ${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} as a share of sales (${fmtPct(yoy.suppliesPct)} → ${fmtPct(pl.suppliesPct)}).`});
  }
  // channel mix: delivery share and cash share
  const shareOf=(plx, codes)=>{ if(!plx.totalSales) return null;
    const s=plx.channelRows.filter(c=>codes.includes(c.code)).reduce((a,c)=>a+c.amount,0);
    return s/plx.totalSales; };
  const delNow=shareOf(pl,['uber','doordash','grubhub']), delLy=shareOf(yoy,['uber','doordash','grubhub']);
  if(delNow!=null && delLy!=null){ const dd=(delNow-delLy)*100;
    if(Math.abs(dd)>=1.5) out.push({kind:'info', text:`Delivery is ${Math.abs(dd).toFixed(1)} points ${dd>0?'more':'less'} of sales than last year (${fmtPct(delLy)} → ${fmtPct(delNow)}).`}); }
  const cashNow=shareOf(pl,['cash']), cashLy=shareOf(yoy,['cash']);
  if(cashNow!=null && cashLy!=null){ const dd=(cashNow-cashLy)*100;
    if(Math.abs(dd)>=1.5) out.push({kind:'info', text:`Cash is ${Math.abs(dd).toFixed(1)} points ${dd>0?'more':'less'} of sales than last year (${fmtPct(cashLy)} → ${fmtPct(cashNow)}).`}); }
  // biggest expense category movers (by share of sales)
  if(pl.totalSales && yoy.totalSales){
    const lyCat={}; yoy.categoryRows.forEach(c=>lyCat[c.code]=c.amount);
    yoy.ruleRows.forEach(r=>lyCat[r.code]=r.amount);
    const nowRows=[...pl.categoryRows.map(c=>({code:c.code,name:c.name,amount:c.amount})),
                  ...pl.ruleRows.map(r=>({code:r.code,name:r.name,amount:r.amount}))];
    const movers=nowRows.map(c=>{ const lyShare=(lyCat[c.code]||0)/yoy.totalSales; const nowShare=c.amount/pl.totalSales;
      return {name:c.name, dd:(nowShare-lyShare)*100}; })
      .filter(x=>Math.abs(x.dd)>=1 && !['payroll','supplies','supplies_food'].includes(x.name.toLowerCase()))
      .sort((a,b)=>Math.abs(b.dd)-Math.abs(a.dd)).slice(0,2);
    movers.forEach(mv=> out.push({kind:mv.dd>0?'bad':'good',
      text:`${mv.name} is ${Math.abs(mv.dd).toFixed(1)} points ${mv.dd>0?'higher':'lower'} as a share of sales than last year.`}));
  }
  return out;
}

        </tbody></table></>}
    </div>}

}

  return <>
    <div className="kpis kpis-3">

    </div>
    <div className="card"><h3>{y} by Month</h3><TrendChart points={trendPts}/></div>
    <div className="card">

// simple multi-year bar chart (sales by month, grouped)
function MultiYearChart({series}){
  if(!series.length) return <div className="faint">No data.</div>;
  const max=Math.max(1,...series.flatMap(s=>s.months.map(x=>x.pl.totalSales)));
  const H=170, W=760, pad=30, bw=W/12;
  return <div style={{overflowX:'auto'}}>
    <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:'100%',minWidth:640}}>
      {[0.25,0.5,0.75,1].map(f=><line key={f} x1={pad} x2={W} y1={H-H*f} y2={H-H*f} stroke="var(--border)" strokeWidth="0.5"/>)}
      {series[0].months.map((_,i)=>{
        const gw=(bw-8)/series.length;
        return series.map((s,si)=>{
          const v=s.months[i].pl.totalSales; const h=max?v/max*H:0;
          return <rect key={s.label+i} x={pad+i*bw+4+si*gw} y={H-h} width={gw-1} height={h} fill={s.color} rx="1"/>;
        });
      })}
      {MONTHS.map((mn,i)=><text key={i} x={pad+i*bw+bw/2} y={H+14} fill="var(--text2)" fontSize="9" textAnchor="middle">{mn.slice(0,1)}</text>)}
    </svg>
    <div style={{display:'flex',gap:16,marginTop:8,fontSize:12}}>
      {series.map(s=><span key={s.label} style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:12,height:12,background:s.color,borderRadius:2,display:'inline-block'}}></span>{s.label}</span>)}
    </div>
  </div>;
}

// ---- ALL-TIME VIEW (entire history: growth, trajectory, insights) ----
function AllTimeView({data}){
  if(!data || !data.years.length) return <div className="card faint">No history yet.</div>;
  const years=data.years;
  const life=years.reduce((a,yr)=>({s:a.s+yr.totals.s,e:a.e+yr.totals.e,n:a.n+yr.totals.n}),{s:0,e:0,n:0});
  // only "complete-ish" years for growth (have any data)
  const active=years.filter(yr=>yr.totals.s!==0||yr.totals.e!==0);
  // best / worst by net
  const withData=active.slice();
  const bestYear=withData.reduce((a,b)=>b.totals.n>a.totals.n?b:a, withData[0]);
  const bestSalesYear=withData.reduce((a,b)=>b.totals.s>a.totals.s?b:a, withData[0]);
  // year-over-year sales growth (last full transition)
  const insights=allTimeInsights(active);
  // monthly series across all time for the trend line
  const monthlySeries=[];
  years.forEach(yr=>yr.months.forEach(mo=>{
    if(mo.pl.totalSales!==0||mo.pl.totalExpenses!==0)
      monthlySeries.push({label:`${String(yr.y).slice(2)}/${pad(mo.m)}`, sales:mo.pl.totalSales, net:mo.pl.net});
  }));

  return <>
    <div className="kpis">
      <div className="kpi"><div className="k-lbl">Lifetime Sales</div><div className="k-val">{fmt$k(life.s)}</div>
        <div className="k-sub">{data.firstYear}–{data.lastYear}</div></div>
      <div className="kpi"><div className="k-lbl">Lifetime Net</div><div className={'k-val '+(life.n>=0?'pos':'neg')}>{fmt$k(life.n)}</div>
        <div className="k-sub">Margin {fmtPct(life.s?life.n/life.s:null)}</div></div>
      <div className="kpi"><div className="k-lbl">Best Sales Year</div><div className="k-val">{bestSalesYear?bestSalesYear.y:'-'}</div>
        <div className="k-sub">{bestSalesYear?fmt$k(bestSalesYear.totals.s):''}</div></div>
      <div className="kpi"><div className="k-lbl">Best Profit Year</div><div className="k-val">{bestYear?bestYear.y:'-'}</div>
        <div className="k-sub">{bestYear?fmt$k(bestYear.totals.n):''}</div></div>
    </div>

    {insights.length>0 && <div className="card">
      <h3>The Long View</h3>
      <div className="findings">
        {insights.map((f,i)=><div key={i} className={'finding '+f.kind}><span className="fdot"></span><span>{f.text}</span></div>)}
      </div>
    </div>}

    <div className="card"><h3>Sales & Net · Every Month</h3>
      <TrendChart points={monthlySeries}/>
      <div className="hint">Full history since {data.firstYear}. Bars are monthly sales; the line is monthly net profit.</div>
    </div>

    <div className="card">
      <h3>Year by Year</h3>
      <table className="t">
        <thead><tr><th>Year</th><th className="num">Sales</th><th className="num">Growth</th><th className="num">Expenses</th><th className="num">Net</th><th className="num">Margin</th></tr></thead>
        <tbody>
          {active.map((yr,i)=>{ const prev=i>0?active[i-1]:null;
            return <tr key={yr.y}>
              <td>{yr.y}</td>
              <td className="num mono">{fmt$(yr.totals.s,0)}</td>
              <td className="num">{prev?<YoYDelta cur={yr.totals.s} prev={prev.totals.s}/>:<span className="faint">-</span>}</td>
              <td className="num mono">{fmt$(yr.totals.e,0)}</td>
              <td className={'num mono '+(yr.totals.n>=0?'pos':'neg')}>{fmt$(yr.totals.n,0)}</td>
              <td className="num mono faint">{fmtPct(yr.totals.s?yr.totals.n/yr.totals.s:null)}</td>
            </tr>; })}
          <tr className="total"><td>Lifetime</td><td className="num">{fmt$(life.s,0)}</td><td></td>
            <td className="num">{fmt$(life.e,0)}</td><td className={'num '+(life.n>=0?'pos':'neg')}>{fmt$(life.n,0)}</td>
            <td className="num">{fmtPct(life.s?life.n/life.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
  </>;
}

// long-term plain-language insights across all years
function allTimeInsights(active){
  const out=[];
  if(active.length<2) return out;
  const first=active[0], last=active[active.length-1];
  // overall sales trajectory first->last
  if(first.totals.s>0){
    const mult=last.totals.s/first.totals.s;
    if(mult>=1.15) out.push({kind:'good', text:`Sales have grown ${mult.toFixed(1)}x since ${first.y} (${fmt$(first.totals.s,0)} → ${fmt$(last.totals.s,0)}).`});
    else if(mult<=0.85) out.push({kind:'bad', text:`Sales are down since ${first.y} (${fmt$(first.totals.s,0)} → ${fmt$(last.totals.s,0)}).`});
    else out.push({kind:'info', text:`Sales have held roughly steady since ${first.y} (${fmt$(first.totals.s,0)} → ${fmt$(last.totals.s,0)}).`});
  }
  // consecutive growth streak (by sales)
  let streak=0;
  for(let i=active.length-1;i>0;i--){ if(active[i].totals.s>active[i-1].totals.s) streak++; else break; }
  if(streak>=2) out.push({kind:'good', text:`Sales have grown ${streak} years in a row.`});
  // margin trend: compare avg margin of first half vs second half
  const marg=yr=>yr.totals.s?yr.totals.n/yr.totals.s:0;
  const half=Math.floor(active.length/2);
  if(half>=1){
    const early=active.slice(0,half), late=active.slice(half);
    const am=arr=>arr.reduce((a,x)=>a+marg(x),0)/arr.length;
    const dd=(am(late)-am(early))*100;
    if(Math.abs(dd)>=1.5) out.push({kind:dd>0?'good':'bad', text:`Net margin is trending ${dd>0?'up':'down'} over time (${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} in recent years).`});
  }
  // best and worst single years
  const best=active.reduce((a,b)=>b.totals.n>a.totals.n?b:a,active[0]);
  const worst=active.reduce((a,b)=>b.totals.n<a.totals.n?b:a,active[0]);
  if(best.y!==worst.y){
    out.push({kind:'info', text:`Most profitable year was ${best.y} (${fmt$(best.totals.n,0)}); weakest was ${worst.y} (${fmt$(worst.totals.n,0)}).`});
  }
  return out;
}

// ================= ENTRY (Maria) =================
function Entry({corps, canEditIds, profile, presetCorp, presetMode}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(presetCorp || (editable[0] && editable[0].id));
  useEffect(()=>{ if(presetCorp) setCorpId(presetCorp); },[presetCorp]);
  const [date, setDate] = useState(todayStr());
  const [meta, setMeta] = useState(null);
  const [dayRev, setDayRev] = useState({});
  const [dayExp, setDayExp] = useState([]);
  const [pending, setPending] = useState([]);
  const [form, setForm] = useState({category_id:'', amount:'', payee:'', memo:'', method:'card'});
  const [mode, setMode] = useState('income');
  useEffect(()=>{ if(presetMode && presetMode.mode) setMode(presetMode.mode); },[presetMode]);
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    setMeta(mt);
    const [rv, ex, pd] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('date',date),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('date',date).eq('status','confirmed').order('created_at',{ascending:false}),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('status','pending').order('date',{ascending:false}),
    ]);
    const map={}; (rv.data||[]).forEach(r=>map[r.channel_id]=r);
    setDayRev(map); setDayExp(ex.data||[]); setPending(pd.data||[]);
  },[corpId,date]);
  useEffect(()=>{ reload(); },[reload]);

  const saveRev = async (ch, val) => {
    const amount = parseFloat(val)||0;
    const ex = dayRev[ch.id];
    if(ex && Number(ex.amount)===amount) return;
    const { error } = await sb.from('daily_revenue').upsert(
      { corporation_id:corpId, channel_id:ch.id, date, amount, source:'manual', updated_by:profile.id, updated_at:new Date().toISOString() },
      { onConflict:'corporation_id,channel_id,date' });
    if(error) showToast('Save failed: '+error.message); else { showToast(ch.name+' saved'); reload(); }
  };

  const addExp = async () => {
    if(!form.category_id){ showToast('Select a category'); return; }
    if(!form.memo || !form.memo.trim()){ showToast('Enter details for this expense'); return; }
    if(!form.amount || isNaN(parseFloat(form.amount))){ showToast('Enter an amount'); return; }
    setBusy(true);
    const { error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:form.category_id, date,
      amount:parseFloat(form.amount), payee:form.payee||null, memo:form.memo.trim(),
      method:form.method||'card',
      source:'manual', entered_by:profile.id });
    setBusy(false);
    if(error) showToast('Save failed: '+error.message);
    else { setForm({category_id:'',amount:'',payee:'',memo:'',method:form.method}); showToast('Expense saved'); reload(); }
  };
  const delExp = async id => {
    if(!confirm('Delete this expense?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',id);
    if(error) showToast('Delete failed: '+error.message); else reload();
  };
  const [pendCat, setPendCat] = useState({});
  const approvePending = async (p, ok) => {
    if(ok){ const upd = {status:'confirmed'};
      if(pendCat[p.id]) upd.category_id = pendCat[p.id];
      const { error } = await sb.from('expenses').update(upd).eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    else { const { error } = await sb.from('expenses').delete().eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    showToast(ok?'Approved':'Rejected'); reload();
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Daily Entry</div><h2>Daily Entry</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
      </div>
    </div>

    <div className="ie-toggle">
      <button className={'ie-btn income'+(mode==='income'?' on':'')} onClick={()=>setMode('income')}>
        <span className="ie-ic">＋</span> Income
      </button>
      <button className={'ie-btn expense'+(mode==='expense'?' on':'')} onClick={()=>setMode('expense')}>
        <span className="ie-ic">－</span> Expense
      </button>
    </div>

    {pending.length>0 && <div className="card">
      <h3>Slack Pending Approval <span className="badge red">{pending.length}</span></h3>
      {pending.map(p=><div className="pend" key={p.id}>
        <div className="grow">
          <div><span className="mono">{p.date}</span> · {catName(p.category_id)} · <b className="mono">{fmt$(Number(p.amount))}</b></div>
          <div className="faint" style={{fontSize:12.5}}>{p.memo} {p.slack_user && '· @'+p.slack_user}</div>
        </div>
        <select className="btn-sm" style={{width:150,padding:'5px 8px'}} value={pendCat[p.id]||p.category_id}
          onChange={e=>setPendCat({...pendCat,[p.id]:e.target.value})}>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button className="btn btn-sm btn-gold" onClick={()=>approvePending(p,true)}>Approve</button>
        <button className="btn btn-sm btn-danger" onClick={()=>approvePending(p,false)}>Reject</button>
      </div>)}
    </div>}

    {mode==='income' &&
      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Revenue
          <label className="date-chip">{fmtDateShort(date)}
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </label>
        </h3>
        <table className="t rev-entry"><tbody>
          {(meta?meta.channels.filter(c=>c.active):[]).map(c=>{
            const row = dayRev[c.id];
            const auto = row && row.source!=='manual' && row.source!=='import';
            const badgeLabel = row ? (
              row.source==='toast_live' ? 'Toast · live' :

            return <tr key={c.id}>

              <td className="num" style={{width:130}}>

        <div className="big-total"><span className="bt-l">Sales today</span>
          <span className="bt-v">{fmt$((meta?meta.channels:[]).reduce((a,c)=>{
            const r=dayRev[c.id]; if(!r||!c.counts_in_total) return a;
            return a+Number(r.amount)*Number(c.total_multiplier);},0))}</span></div>
        <div className="hint">Amounts save when you click outside the field. Includes Other Income for grants or catering.</div>
