function Approvals({corps, canEditIds, profile, isOwner}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const ids = editable.map(c=>c.id);
  const [items, setItems] = useState(null);
  const [metaByCorp, setMetaByCorp] = useState({});
  const [edit, setEdit] = useState({}); // id -> {category_id, amount}
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!ids.length){ setItems([]); return; }
    const { data } = await sb.from('expenses').select('*')
      .in('corporation_id', ids).eq('status','pending').order('date',{ascending:false});
    // load category lists per corp present
    const need = [...new Set((data||[]).map(e=>e.corporation_id))];
    const mm = {...metaByCorp};
    for(const cid of need){ if(!mm[cid]){
      const { data:cats } = await sb.from('expense_categories').select('id,code,name')
        .eq('corporation_id',cid).eq('active',true).order('display_order');
      mm[cid]=cats||[];
    }}
    setMetaByCorp(mm); setItems(data||[]);
  },[ids.join(',')]);
  useEffect(()=>{ reload(); },[reload]);

  const corpCode = id => { const c=corps.find(x=>x.id===id); return c?c.code:'?'; };
  const catsFor = id => metaByCorp[id]||[];
  const catName = (cid,catId) => { const c=catsFor(cid).find(x=>x.id===catId); return c?c.name:'?'; };

  const approve = async (e) => {
    const ed = edit[e.id]||{};
    const finalCat = ed.category_id || e.category_id;
    const finalAmt = ed.amount!==undefined ? parseFloat(ed.amount) : Number(e.amount);
    const upd = { status:'confirmed', category_id:finalCat, amount:finalAmt };
    const { error } = await sb.from('expenses').update(upd).eq('id',e.id);
    if(error){ showToast(error.message); return; }
    // learn: if this came from slack, record the signal -> chosen category
    if(e.source==='slack' && e.memo){
      const cat = catsFor(e.corporation_id).find(x=>x.id===finalCat);
      const signal = e.memo.toLowerCase().replace(/\[.*?\]|\(.*?\)/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim().slice(0,80);
      if(cat && signal.length>2){
        await sb.from('slack_learnings').insert({
          corporation_id:e.corporation_id, signal, category_code:cat.code,
          category_name:cat.name, approved_by:profile.id });
      }
    }
    showToast('Approved'); reload();
  };
  const reject = async (e) => {
    if(!confirm('Reject and delete this item?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',e.id);
    if(error){ showToast(error.message); return; } reload();
  };

  if(items===null) return <div><div className="page-head"><div><div className="eyebrow">Approvals</div><h2>Approval Center</h2></div></div><Spinner/></div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Approvals</div><h2>Approval Center</h2>
        <div className="sub">Items captured from Slack and other sources, waiting to be confirmed. Approving teaches the AI to classify better next time.</div></div>
      {items.length>0 && <span className="badge red" style={{fontSize:12}}>{items.length} pending</span>}
    </div>
    {items.length===0 ? <div className="card faint">Nothing waiting for approval. You're all caught up.</div> :
      <div className="card">
        {items.map(e=>{
          const ed = edit[e.id]||{};
          return <div className="pend approve-row" key={e.id} style={{alignItems:'flex-start',flexWrap:'wrap'}}>
            <div className="grow" style={{minWidth:180}}>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <span className="badge gold">{corpCode(e.corporation_id)}</span>
                <span className="mono">{e.date}</span>
                {e.source==='slack' && <span className="badge blue">Slack</span>}
                {e.slack_user && <span className="faint" style={{fontSize:12}}>@{e.slack_user}</span>}
              </div>
              <div style={{marginTop:5}}>{e.memo||<span className="faint">(no description)</span>}</div>
            </div>
            <div className="ar-fields">
              <div style={{width:120}}>
                <label className="faint" style={{fontSize:11}}>Amount</label>
                <input type="number" step="0.01" defaultValue={Number(e.amount)}
                  onChange={ev=>setEdit({...edit,[e.id]:{...ed,amount:ev.target.value}})} style={{textAlign:'right'}}/>
              </div>
              <div style={{width:180}}>
                <label className="faint" style={{fontSize:11}}>Category</label>
                <select value={ed.category_id||e.category_id}
                  onChange={ev=>setEdit({...edit,[e.id]:{...ed,category_id:ev.target.value}})}>
                  {catsFor(e.corporation_id).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            </div>
            <div className="ar-actions" style={{display:'flex',gap:6,alignItems:'flex-end',paddingTop:16}}>
              <button className="btn btn-sm btn-gold" onClick={()=>approve(e)}>Approve</button>
              <button className="btn btn-sm btn-danger" onClick={()=>reject(e)}>Reject</button>
            </div>
          </div>;
        })}
      </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= PWA: INSTALL + NOTIFICATIONS =================
function urlB64ToUint8(base64) {
  const pad = '='.repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

function PwaCard({profile}){
  const [installable, setInstallable] = useState(!!window._pwaPrompt);
  const [standalone] = useState(isStandalone());
  const [notifState, setNotifState] = useState('checking'); // checking/unsupported/ios-needs-install/denied/on/off
  const [busy, setBusy] = useState(false);
  const [toast, showToast] = useToast();

  useEffect(()=>{
    const onReady = ()=>setInstallable(true);
    window.addEventListener('pwa-ready', onReady);
    return ()=>window.removeEventListener('pwa-ready', onReady);
  },[]);

  useEffect(()=>{ (async()=>{
    if(!('serviceWorker' in navigator) || !('PushManager' in window)){
      if(isIOS() && !standalone) setNotifState('ios-needs-install');
      else setNotifState('unsupported');
      return;
    }
    if(isIOS() && !standalone){ setNotifState('ios-needs-install'); return; }
    if(Notification.permission === 'denied'){ setNotifState('denied'); return; }
    try{
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      setNotifState(sub ? 'on' : 'off');
    }catch(e){ setNotifState('off'); }
  })(); },[standalone]);

  const install = async ()=>{
    const p = window._pwaPrompt; if(!p) return;
    p.prompt(); await p.userChoice; window._pwaPrompt = null; setInstallable(false);
  };

  const enableNotif = async ()=>{
    setBusy(true);
    try{
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ setNotifState(perm === 'denied' ? 'denied' : 'off'); setBusy(false); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(window.__VAPID_PUBLIC__),
      });
      const json = sub.toJSON();
      const { error } = await sb.from('push_subscriptions').upsert({
        endpoint: json.endpoint, profile_id: profile.id, role: profile.role, subscription: json,
      }, { onConflict: 'endpoint' });
      if(error){ showToast('Could not save: '+error.message); setBusy(false); return; }
      setNotifState('on'); showToast('Notifications enabled');
    }catch(e){ showToast('Failed: '+e.message); }
    setBusy(false);
  };

  const disableNotif = async ()=>{
    setBusy(true);
    try{
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if(sub){ const ep = sub.endpoint; await sub.unsubscribe();
        await sb.from('push_subscriptions').delete().eq('endpoint', ep); }
      setNotifState('off'); showToast('Notifications disabled');
    }catch(e){ showToast('Failed: '+e.message); }
    setBusy(false);
  };

  return <div className="grid2">
    <div className="card">
      <h3>Install as an app</h3>
      {standalone
        ? <div className="pos" style={{fontSize:14}}>✓ Running as an installed app</div>
        : installable
          ? <><div className="muted" style={{marginBottom:12,fontSize:13.5}}>Install Ugly Finance on this device for a full-screen app with its own icon.</div>
              <button className="btn btn-gold" onClick={install}>Install</button></>
          : isIOS()
            ? <div className="muted" style={{fontSize:13.5}}>On iPhone/iPad: tap Share (⬆︎) in Safari, then <b>Add to Home Screen</b>.</div>
            : <div className="muted" style={{fontSize:13.5}}>Open this site in Chrome (Android or desktop) to see an install option.</div>}
    </div>
    <div className="card">
      <h3>Notifications</h3>
      {notifState==='checking' && <div className="faint">Checking...</div>}
      {notifState==='unsupported' && <div className="muted" style={{fontSize:13.5}}>This browser does not support push notifications.</div>}
      {notifState==='ios-needs-install' && <div className="muted" style={{fontSize:13.5}}>Install the app first (see left), then enable notifications from the installed app. Requires iOS 16.4 or later.</div>}
      {notifState==='denied' && <div className="muted" style={{fontSize:13.5}}>Notifications are blocked. Enable them in your device settings for this app, then reload.</div>}
      {notifState==='off' && <><div className="muted" style={{marginBottom:12,fontSize:13.5}}>
        {profile.role==='investor' ? 'Get notified when a new monthly report is published.' : 'Get notified when an expense needs approval.'}</div>
        <button className="btn btn-gold" disabled={busy} onClick={enableNotif}>Enable notifications</button></>}
      {notifState==='on' && <><div className="pos" style={{marginBottom:12,fontSize:14}}>✓ Notifications on</div>
        <button className="btn" disabled={busy} onClick={disableNotif}>Turn off</button></>}
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= TOAST DIAGNOSTICS (owner) =================
function ToastDiag({session}){
  const [store, setStore] = useState('AD');
  const [date, setDate] = useState(()=>{ const d=new Date(); d.setDate(d.getDate()-1);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; });
  const [res, setRes] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const run = async ()=>{
    setBusy(true); setErr(''); setRes(null);
    try{
      const ymd = date.replace(/-/g,'');
      const r = await fetch(`/.netlify/functions/toast-diag?store=${store}&date=${ymd}`, {
        headers: { Authorization: 'Bearer ' + session.access_token },
      });
      const j = await r.json();
      if(j.error){ setErr(j.error); } else { setRes(j); }
    }catch(e){ setErr(e.message); }
    setBusy(false);
  };

  return <div>
    <div className="card">
      <h3>Toast Data Check</h3>
      <div className="hint" style={{marginTop:0,marginBottom:12}}>Pull one business day straight from Toast and compare it against your Toast dashboard. Use this to confirm delivery and all payments are coming through.</div>
      <div className="form-row">
        <div><label className="hint" style={{marginTop:0}}>Store</label>
          <select value={store} onChange={e=>setStore(e.target.value)}>
            <option value="AD">AD</option><option value="BW">BW</option><option value="FH">FH</option>
          </select></div>
        <div><label className="hint" style={{marginTop:0}}>Business date</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div style={{display:'flex',alignItems:'flex-end'}}>
          <button className="btn btn-gold" disabled={busy} onClick={run}>{busy?'Loading...':'Run check'}</button></div>
      </div>
      {err && <div className="neg" style={{marginTop:10}}>Error: {err}</div>}
    </div>

    {res && <>
      <div className="card">
        <h3>Totals</h3>
        <table className="t"><tbody>
          <tr><td>Orders returned</td><td className="num mono">{res.ordersReturned}</td></tr>
          <tr><td>Pages walked</td><td className="num mono">{res.pagesWalked}</td></tr>
          <tr><td>Sales (excl. tips)</td><td className="num mono">{fmt$(res.salesExTips)}</td></tr>
          <tr><td>Tips</td><td className="num mono">{fmt$(res.tips)}</td></tr>
          <tr><td>Refunds</td><td className="num mono">{fmt$(res.refunds)}</td></tr>
          <tr><td>Voided</td><td className="num mono">{fmt$(res.voided)}</td></tr>
        </tbody></table>
        <div className="hint" style={{marginTop:8}}>Compare "Sales (excl. tips)" with your Toast dashboard Net Sales for the same day. If they differ, some orders are not being pulled.</div>
      </div>

      <div className="grid2">
        <div className="card">
          <h3>By payment channel</h3>
          <table className="t"><tbody>
            <tr><td>Cash</td><td className="num mono">{fmt$(res.channels.cash)}</td></tr>
            <tr><td>Card (credit)</td><td className="num mono">{fmt$(res.channels.credit)}</td></tr>
            <tr><td>Other (online/3rd-party)</td><td className="num mono">{fmt$(res.channels.other)}</td></tr>
          </tbody></table>
        </div>
        <div className="card">
          <h3>Other payment breakdown</h3>
          {Object.keys(res.otherPaymentBreakdown||{}).length===0
            ? <div className="faint">None</div>
            : <table className="t"><tbody>
                {Object.entries(res.otherPaymentBreakdown).map(([k,v])=>
                  <tr key={k}><td>{k}</td><td className="num mono">{fmt$(v)}</td></tr>)}
              </tbody></table>}
          <div className="hint" style={{marginTop:8}}>Delivery platforms (Uber, DoorDash, GrubHub) should appear here if Toast tags them. If they show as blank/OTHER, Toast is not labeling the platform.</div>
        </div>
      </div>

      <div className="grid2">
        <div className="card">
          <h3>By order source</h3>
          <table className="t"><tbody>
            {Object.entries(res.byOrderSource||{}).map(([k,v])=>
              <tr key={k}><td>{k}</td><td className="num mono">{v.count} · {fmt$(v.amount)}</td></tr>)}
          </tbody></table>
          <div className="hint" style={{marginTop:8}}>Delivery orders usually show a source like "Uber Eats" or "DoorDash" here. If you only see Kiosk and API, delivery is not reaching the orders API.</div>
        </div>
        <div className="card">
          <h3>By payment type</h3>
          <table className="t"><tbody>
            {Object.entries(res.byPaymentType||{}).map(([k,v])=>
              <tr key={k}><td>{k}</td><td className="num mono">{v.count} · {fmt$(v.amount)}{v.tip?` (tip ${fmt$(v.tip)})`:''}</td></tr>)}
          </tbody></table>
        </div>
      </div>

      <div className="grid2">
        <div className="card">
          <h3>By dining option (delivery lives here)</h3>
          {Object.keys(res.byDiningOptionName||{}).length===0
            ? <div className="faint">None</div>
            : <table className="t"><tbody>
                {Object.entries(res.byDiningOptionName).map(([k,v])=>
                  <tr key={k}><td>{k}</td><td className="num mono">{fmt$(v)}</td></tr>)}
              </tbody></table>}
          <div className="hint" style={{marginTop:8}}>This is where Toast tags Grubhub / Uber Eats / DoorDash. If everything says "null", the orders API is not returning dining options and delivery cannot be split out.</div>
        </div>
        <div className="card">
          <h3>Business date check</h3>
          <table className="t"><tbody>
            <tr><td>Orders with a different business date</td><td className="num mono">{res.ordersWithWrongBusinessDate}</td></tr>
            {Object.entries(res.byBusinessDate||{}).map(([k,v])=>
              <tr key={k}><td>businessDate {k}</td><td className="num mono">{v} orders</td></tr>)}
          </tbody></table>
          <div className="hint" style={{marginTop:8}}>If orders from more than one business date appear here, we are mixing days and the daily total will not match Toast.</div>
        </div>
      </div>
    </>}
  </div>;
}

// ================= HOME (TODAY) =================
function Home({corps, canEditIds, profile, isOwner, goEntry, goClose, goApprovals}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const ids = editable.map(c=>c.id);
  const [data, setData] = useState(null);
  const date = todayStr();
  const now = new Date();
  const prev = now.getMonth()===0 ? {y:now.getFullYear()-1,m:12} : {y:now.getFullYear(),m:now.getMonth()};

  useEffect(()=>{ if(!ids.length){ setData({}); return; } let dead=false;
    (async()=>{
      const monthStart = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
      const [chAll, revToday, expToday, pend, revMonth, closes] = await Promise.all([
        sb.from('revenue_channels').select('id,corporation_id,code,counts_in_total,total_multiplier').in('corporation_id',ids),
        sb.from('daily_revenue').select('corporation_id,channel_id,amount,source').in('corporation_id',ids).eq('date',date),
        sb.from('expenses').select('corporation_id').in('corporation_id',ids).eq('date',date).eq('status','confirmed'),
        sb.from('expenses').select('corporation_id').in('corporation_id',ids).eq('status','pending'),
        sb.from('daily_revenue').select('corporation_id,date,amount').in('corporation_id',ids).gte('date',monthStart).lte('date',date).gt('amount',0),
        isOwner ? sb.from('monthly_close').select('corporation_id,status').in('corporation_id',ids).eq('year',prev.y).eq('month',prev.m) : Promise.resolve({data:[]}),
      ]);
      if(dead) return;
      const chBy = {}; (chAll.data||[]).forEach(c=>chBy[c.id]=c);
      const per = {};
      editable.forEach(c=>per[c.id]={sales:0,revRows:0,synced:false,exp:0,pending:0,daysDone:new Set(),closed:false});
      (revToday.data||[]).forEach(r=>{
        const p=per[r.corporation_id]; if(!p) return;
        const ch=chBy[r.channel_id];
        if(ch && ch.counts_in_total) p.sales += Number(r.amount)*Number(ch.total_multiplier);
        if(Number(r.amount)>0) p.revRows++;
        if(r.source!=='manual' && r.source!=='import') p.synced=true;
      });
      (expToday.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].exp++; });
      (pend.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].pending++; });
      (revMonth.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].daysDone.add(r.date); });
      (closes.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].closed = r.status==='published'; });
      setData(per);
    })();
    return ()=>{dead=true};
  },[ids.join(',')]);

  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  if(!data) return <Spinner/>;
  const dayOfMonth = now.getDate();
  const totalPending = ids.reduce((a,id)=>a+(data[id]?data[id].pending:0),0);
  const unclosed = isOwner ? editable.filter(c=>data[c.id] && !data[c.id].closed) : [];
  const firstName = (profile.full_name||'').split(' ')[0] || 'there';

  return <div>
    <div className="greet">Good {now.getHours()<12?'morning':now.getHours()<18?'afternoon':'evening'}, {firstName}.</div>
    <div className="greet-sub">{MONTHS[now.getMonth()]} {now.getDate()} · Tap a store to enter today's numbers.</div>

    {totalPending>0 && <div style={{marginBottom:20}}>
      <div className="quest">
        <div className="q-ico">!</div>
        <div className="grow"><div className="q-t">{totalPending} item{totalPending>1?'s':''} waiting for approval</div>
          <div className="q-s">Review and confirm in the Approval Center</div></div>
        <button className="btn btn-sm btn-gold" onClick={goApprovals}>Review</button>
      </div>
    </div>}

    <div className="home-grid">
      {editable.map(c=>{
        const p = data[c.id] || {sales:0,revRows:0,synced:false,exp:0,pending:0,daysDone:new Set(),closed:false};
        const done = p.revRows>0;
        const pct = Math.min(100, Math.round(p.daysDone.size/dayOfMonth*100));
        return <div key={c.id} className={'home-card'+(done?' done':'')} onClick={()=>goEntry(c.id)}>
          {done && <div className="hc-check">✓</div>}
          <div className="hc-code">{c.code}</div>
          <div className="hc-name">{c.name}</div>
          <div className="hc-amt"><span className="cur">$</span>{p.sales.toLocaleString('en-US',{maximumFractionDigits:0})}<span className="cur"> today</span></div>
          <div className="hc-status">
            <span><span className={'dot'+(done?' ok':'')}></span>Revenue</span>
            <span><span className={'dot'+(p.exp>0?' ok':'')}></span>{p.exp} expense{p.exp===1?'':'s'}</span>
            {p.pending>0 && <span><span className="dot warn"></span>{p.pending} pending</span>}
          </div>
          <div className="progress"><div className="fill" style={{width:pct+'%'}}></div></div>
          <div className="progress-lbl">{p.daysDone.size} of {dayOfMonth} days entered this month</div>
        </div>;
      })}
    </div>
  </div>;
}

// ================= APP SHELL =================
function Login({onDone}){
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [err,setErr] = useState(null);
  const [busy,setBusy] = useState(false);
  const go = async e=>{
    e && e.preventDefault();
    setBusy(true); setErr(null);
    const { error } = await sb.auth.signInWithPassword({email, password:pw});
    setBusy(false);
    if(error) setErr('Sign in failed. Check your email and password.');
    else onDone();
  };
  return <div className="login-wrap">
    <div className="login-box">
      <div className="eyebrow">Ugly Donuts & Corn Dogs</div>
      <h1>Finance <em style={{color:'var(--gold)'}}>Tool</em></h1>
      <div className="sub">HQ financial management & investor reporting</div>
      {err && <div className="login-err">{err}</div>}
      <form onSubmit={go}>
        <div className="field"><label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/></div>
        <div className="field"><label>Password</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)}/></div>
        <button type="submit" className="btn btn-gold" style={{width:'100%',padding:'11px'}} disabled={busy}>
          {busy?'Signing in...':'Sign In'}</button>
      </form>
    </div>
  </div>;
}

const NAV = [
  {id:'home',      label:'Home',    full:'Home',            ic:'⌂', roles:['owner','assistant']},
  {id:'entry',     label:'Entry',   full:'Daily Entry',     ic:'✎', roles:['owner','assistant']},
  {id:'approvals', label:'Approve', full:'Approvals',       ic:'✓', roles:['owner','assistant']},
  {id:'insights',  label:'Insights',full:'Insights',        ic:'≈', roles:['owner','assistant']},
  {id:'cash',      label:'Cash',    full:'Cash',            ic:'▤', roles:['owner','assistant']},
  {id:'close',     label:'Close',   full:'Close & Publish', ic:'◆', roles:['owner']},
  {id:'investor',  label:'Reports', full:'Reports',         ic:'▦', roles:['owner','investor']},
  {id:'settings',  label:'Settings',full:'Settings',        ic:'⚙', roles:['owner']},
  {id:'alerts',    label:'App',     full:'App & Alerts',    ic:'⚙', roles:['assistant','investor']},
];

function App(){
  const [session,setSession] = useState(undefined);
  const [profile,setProfile] = useState(null);
  const [corps,setCorps] = useState([]);
  const [perms,setPerms] = useState([]);
  const [tab,setTab] = useState(localStorage.getItem('ft_tab')||'home');
  const [entryCorp,setEntryCorp] = useState(null);
  const [closePreset,setClosePreset] = useState(null);
  const goEntry = (corpId)=>{ setEntryCorp(corpId); setTab('entry'); };
  const goClose = (corpId,y,m)=>{ setClosePreset({corpId,y,m}); setTab('close'); };
  const goApprovals = ()=>setTab('approvals');
  const [fatal,setFatal] = useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session||null));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{ if(!session){ setProfile(null); return; } let dead=false;
    (async()=>{
      const p = await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
      if(dead) return;
      if(!p.data || !p.data.active){ setFatal('This account does not have access to Finance Tool.'); return; }
      setProfile(p.data);
      const [c, pm] = await Promise.all([
        sb.from('corporations').select('*').order('display_order'),
        sb.from('permissions').select('*').eq('profile_id',session.user.id),
      ]);
      if(dead) return;
      setCorps(c.data||[]); setPerms(pm.data||[]);
    })();
    return ()=>{dead=true};
  },[session]);

  useEffect(()=>{ localStorage.setItem('ft_tab',tab); },[tab]);

  // app icon badge: pending approvals (owner/assistant) or published reports (investor)
  useEffect(()=>{ if(!profile) return; let dead=false;
    (async()=>{
      if(!('setAppBadge' in navigator)) return;
      try{
        let n = 0;
        if(profile.role==='investor'){
          const { count } = await sb.from('monthly_close').select('id',{count:'exact',head:true}).eq('status','published');
          n = count||0;
        } else {
          const { count } = await sb.from('expenses').select('id',{count:'exact',head:true}).eq('status','pending');
          n = count||0;
        }
        if(dead) return;
        if(n>0) navigator.setAppBadge(n).catch(()=>{}); else navigator.clearAppBadge().catch(()=>{});
      }catch(e){}
    })();
    return ()=>{dead=true};
  },[profile, tab]);

  if(session===undefined) return null;
  if(!session) return <Login onDone={()=>{}}/>;
  if(fatal) return <div className="login-wrap"><div className="login-box">
    <div className="login-err">{fatal}</div>
    <button className="btn" onClick={()=>{setFatal(null);sb.auth.signOut();}}>Sign Out</button></div></div>;
  if(!profile) return <div className="login-wrap"><Spinner/></div>;

  const isOwner = profile.role==='owner';
  const canEditIds = new Set(isOwner ? corps.map(c=>c.id) : perms.filter(p=>p.can_edit).map(p=>p.corporation_id));
  const canViewIds = new Set(isOwner ? corps.map(c=>c.id) : perms.filter(p=>p.can_view).map(p=>p.corporation_id));
  const viewCorps = corps.filter(c=>canViewIds.has(c.id));
  const nav = NAV.filter(n=>n.roles.includes(profile.role));
  const effTab = nav.some(n=>n.id===tab) ? tab : nav[0].id;

  const page = {
    home:      <Home corps={corps} canEditIds={canEditIds} profile={profile} isOwner={isOwner} goEntry={goEntry} goClose={goClose} goApprovals={goApprovals}/>,
    approvals: <Approvals corps={corps} canEditIds={canEditIds} profile={profile} isOwner={isOwner}/>,
    entry:     <Entry corps={corps} canEditIds={canEditIds} profile={profile} presetCorp={entryCorp}/>,
    insights:  <Dashboard corps={corps} canEditIds={canEditIds}/>,
    cash:      <CashPage corps={corps} canEditIds={canEditIds} profile={profile} isOwner={isOwner}/>,
    close:     <ClosePage corps={corps} canEditIds={canEditIds} profile={profile} isOwner={isOwner} preset={closePreset}/>,
    investor:  <InvestorPortal corps={isOwner?corps:viewCorps}/>,
    settings:  <Settings corps={corps} canEditIds={canEditIds} profile={profile} isOwner={isOwner} session={session}/>,
    alerts:    <div><div className="page-head"><div><div className="eyebrow">App & Alerts</div><h2>App & Alerts</h2></div></div><PwaCard profile={profile}/></div>,
  }[effTab];

  return <div className="shell">
    <div className="side">
      <div className="brand">Ugly <em>Finance</em></div>
      <div className="brand-sub">Finance Tool</div>
      {nav.map(n=><button key={n.id} className={'nav-item'+(effTab===n.id?' on':'')} onClick={()=>setTab(n.id)}>{n.full||n.label}</button>)}
      <div className="foot">
        <div className="who">{profile.full_name||profile.email}</div>
        <div className="role">{profile.role}</div>
        <button className="btn btn-sm btn-ghost" style={{marginTop:8,padding:'4px 0',color:'var(--text3)'}}
          onClick={()=>sb.auth.signOut()}>Sign Out</button>
      </div>
    </div>
    <div className="main">{page}</div>
    <nav className="tabbar">
      {nav.map(n=><button key={n.id} className={effTab===n.id?'on':''} onClick={()=>setTab(n.id)}>
        <span className="ic">{n.ic}</span>{n.label}</button>)}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
