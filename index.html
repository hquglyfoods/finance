<style>
:root{
  --bg:#0C0B09; --panel:#14120F; --panel2:#1B1814; --border:#2A251E; --border-soft:#211D17;
  --text:#EDE7DC; --text2:#A89F8F; --text3:#6E675B;
  --gold:#C9A227; --gold-soft:#8A7119; --gold-dim:rgba(201,162,39,.12);
  --green:#7FB069; --green-dim:rgba(127,176,105,.14);
  --red:#C4644C; --red-dim:rgba(196,100,76,.12);
  --blue:#7A9CC6;
  --font-d:'Playfair Display',serif; --font-b:'Inter',sans-serif; --font-m:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 11px;outline:none;width:100%}
input:focus,select:textarea:focus,select:focus,textarea:focus{border-color:var(--gold-soft)}
input[type=number]{font-family:var(--font-m)}
::placeholder{color:var(--text3)}
a{color:var(--gold);text-decoration:none}

.btn{border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:6px;padding:9px 16px;font-weight:500;font-size:13.5px;transition:border-color .15s, background .15s}
.btn:hover{border-color:var(--gold-soft)}
.btn:disabled{opacity:.45;cursor:default}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#141109;font-weight:600}
.btn-gold:hover{background:#D8B341;border-color:#D8B341}
.btn-ghost{background:transparent}
.btn-sm{padding:5px 10px;font-size:12.5px;border-radius:5px}
.btn-danger{color:var(--red);border-color:rgba(196,100,76,.4)}

.eyebrow{font-family:var(--font-m);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.h-display{font-family:var(--font-d);font-weight:500}
.mono{font-family:var(--font-m)}
.muted{color:var(--text2)} .faint{color:var(--text3)}
.pos{color:var(--green)} .neg{color:var(--red)}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(201,162,39,.06), transparent)}
.login-box{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:44px 38px}
.login-box h1{font-family:var(--font-d);font-size:30px;font-weight:500;margin:14px 0 4px}
.login-box .sub{color:var(--text2);font-size:13.5px;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-err{background:var(--red-dim);border:1px solid rgba(196,100,76,.35);color:var(--red);border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:16px}

/* ---------- shell ---------- */
.shell{display:flex;min-height:100vh}
.side{width:218px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border-soft);padding:26px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{font-family:var(--font-d);font-size:19px;padding:0 10px 4px}
.side .brand em{color:var(--gold);font-style:italic}
.side .brand-sub{font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:26px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;color:var(--text2);font-weight:500;font-size:13.5px;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--panel2)}
.nav-item.on{color:var(--gold);background:var(--gold-dim)}
.side .foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border-soft);font-size:12.5px}
.side .foot .who{color:var(--text);font-weight:500}
.side .foot .role{font-family:var(--font-m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}

.main{flex:1;min-width:0;padding:30px 36px 80px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.page-head h2{font-family:var(--font-d);font-size:27px;font-weight:500}
.page-head .sub{color:var(--text2);font-size:13px;margin-top:2px}

/* corp tabs + month picker */
.corp-tabs{display:flex;gap:6px;flex-wrap:wrap}
.corp-tab{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:500;font-size:13px}
.corp-tab.on{border-color:var(--gold-soft);color:var(--gold);background:var(--gold-dim)}
.month-pick{display:flex;align-items:center;gap:8px}
.month-pick .lbl{font-family:var(--font-m);font-size:14px;min-width:86px;text-align:center}
.month-pick button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2)}
.month-pick button:hover{color:var(--gold);border-color:var(--gold-soft)}

/* cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:16px 18px}
.kpi .k-lbl{font-size:11.5px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.kpi .k-val{font-family:var(--font-m);font-size:21px;font-weight:500}
.kpi .k-sub{font-size:12px;color:var(--text2);margin-top:3px}

.card{background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:20px 22px;margin-bottom:18px}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1000px){.grid2{grid-template-columns:1fr}}

/* tables */
table.t{width:100%;border-collapse:collapse;font-size:13.5px}
table.t th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--border)}
table.t td{padding:8px;border-bottom:1px solid var(--border-soft)}
table.t tr:last-child td{border-bottom:none}
table.t td.num,table.t th.num{text-align:right;font-family:var(--font-m)}
table.t tr.total td{border-top:1px solid var(--border);font-weight:600;color:var(--text)}
.badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;padding:2px 7px;border:1px solid var(--border);color:var(--text3)}
.badge.gold{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-dim)}
.badge.green{color:var(--green);border-color:rgba(127,176,105,.4);background:var(--green-dim)}
.badge.red{color:var(--red);border-color:rgba(196,100,76,.4);background:var(--red-dim)}
.badge.blue{color:var(--blue);border-color:rgba(122,156,198,.4)}

/* cash calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center;padding:4px 0}
.cal .day{min-height:64px;border:1px solid var(--border-soft);border-radius:8px;padding:7px 8px;background:var(--panel2);position:relative}
.cal .day.empty{background:transparent;border-color:transparent}
.cal .day .d{font-family:var(--font-m);font-size:11px;color:var(--text3)}
.cal .day .amt{font-family:var(--font-m);font-size:12.5px;margin-top:6px}
.cal .day.verified{background:var(--gold-dim);border-color:var(--gold-soft)}
.cal .day.verified .d{color:var(--gold)}
.cal .day.verified::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--gold);font-size:11px}

/* forms */
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-row>*{flex:1;min-width:130px}
.form-row .w-sm{flex:0 0 130px}
.hint{font-size:12px;color:var(--text3);margin-top:6px}
.divider{border:none;border-top:1px solid var(--border-soft);margin:18px 0}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold-soft);color:var(--text);border-radius:8px;padding:11px 20px;font-size:13.5px;z-index:120;box-shadow:0 8px 30px rgba(0,0,0,.5);pointer-events:none;max-width:calc(100vw - 32px);text-align:center}

/* pending queue */
.pend{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--border-soft);border-radius:8px;margin-bottom:8px;background:var(--panel2)}
.pend .grow{flex:1;min-width:0}
@media(max-width:820px){
  .approve-row{flex-direction:column;align-items:stretch !important;gap:10px}
  .approve-row .ar-fields{display:flex;gap:8px}
  .approve-row .ar-fields>div{flex:1}
  .approve-row .ar-actions{display:flex;gap:8px}
  .approve-row .ar-actions button{flex:1}
}

/* investor */
.inv-report{border:1px solid var(--border-soft);border-radius:10px;padding:20px 22px;margin-bottom:14px;background:var(--panel)}
.inv-report .rh{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.inv-report .rh .m{font-family:var(--font-d);font-size:20px}
.notes-block{background:var(--panel2);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;padding:12px 14px;color:var(--text2);font-size:13.5px;white-space:pre-wrap;margin:12px 0}

/* chart */
.chart-wrap{overflow-x:auto}
.legend{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-top:8px}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:-1px}

@media(max-width:820px){
  .shell{flex-direction:column}
  /* top bar: brand + sign out only */
  .side{width:100%;height:auto;position:sticky;top:0;z-index:20;flex-direction:row;align-items:center;
    gap:10px;padding:12px 16px;border-right:none;border-bottom:1px solid var(--border-soft)}
  .side .brand{display:block;font-size:17px;padding:0}
  .side .brand-sub{display:none}
  .side .nav-item{display:none}
  .side .foot{display:flex;align-items:center;gap:10px;margin:0 0 0 auto;padding:0;border:none}
  .side .foot .role{display:none}
  .side .foot .who{font-size:12.5px}
  .side .foot button{margin-top:0 !important}
  /* bottom tab bar */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:var(--panel);
    border-top:1px solid var(--border);padding:6px 4px 8px;justify-content:space-around}
  .tabbar button{flex:1;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;letter-spacing:.02em}
  .tabbar button .ic{font-size:17px;line-height:1}
  .tabbar button.on{color:var(--gold)}
  .main{padding:18px 14px 84px}
  .page-head{margin-bottom:18px}
  .page-head h2{font-size:23px}
  /* headers: stack controls full width */
  .page-head>div:last-child{width:100%}
  .corp-tabs{width:100%}
  .corp-tab{flex:1;text-align:center;padding:8px 6px}
  .month-pick{width:100%;justify-content:space-between}
  .month-pick .lbl{flex:1}
  /* KPIs: 2-up instead of 1-up */
  .kpis{grid-template-columns:1fr 1fr;gap:8px}
  .kpi{padding:12px 13px}
  .kpi .k-val{font-size:18px}
  .greet{font-size:22px}
  /* forms stack */
  .form-row>*{flex:1 1 100%;min-width:0}
  .form-row .w-sm{flex:1 1 100%}
  /* cash calendar tighter */
  .cal{gap:3px}
  .cal .day{min-height:52px;padding:5px 5px}
  .cal .day .amt{font-size:11px}
  .toast{bottom:92px}
}
.tabbar{display:none}
@media(max-width:820px){.tabbar{display:flex}}

/* ---------- home (today) ---------- */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:22px}
.home-card{background:var(--panel);border:1px solid var(--border-soft);border-radius:12px;padding:20px;cursor:pointer;transition:border-color .15s, transform .1s;position:relative}
.home-card:hover{border-color:var(--gold-soft);transform:translateY(-1px)}
.home-card.done{border-color:var(--gold-soft);background:linear-gradient(180deg, rgba(201,162,39,.07), var(--panel))}
.home-card .hc-code{font-family:var(--font-m);font-size:11px;letter-spacing:.14em;color:var(--gold)}
.home-card .hc-name{font-family:var(--font-d);font-size:18px;margin:4px 0 12px}
.home-card .hc-amt{font-family:var(--font-m);font-size:24px;margin-bottom:12px}
.home-card .hc-amt .cur{font-size:14px;color:var(--text3)}
.home-card .hc-status{display:flex;gap:14px;font-size:12.5px;color:var(--text2);margin-bottom:14px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--border);margin-right:6px;vertical-align:0}
.dot.ok{background:var(--green)} .dot.warn{background:var(--gold)}
.hc-check{position:absolute;top:16px;right:16px;color:var(--gold);font-size:16px}
.progress{height:5px;border-radius:3px;background:var(--border-soft);overflow:hidden;margin-bottom:8px}
.progress .fill{height:100%;background:var(--gold);border-radius:3px;transition:width .3s}
.progress-lbl{font-size:11.5px;color:var(--text3)}
.quest{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1px solid var(--border-soft);border-radius:10px;background:var(--panel2);margin-bottom:8px}
.quest .q-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--gold-dim);color:var(--gold);flex-shrink:0}
.quest .grow{flex:1;min-width:0}
.quest .q-t{font-weight:600;font-size:13.5px}
.quest .q-s{font-size:12px;color:var(--text3)}
.big-total{display:flex;justify-content:space-between;align-items:baseline;background:var(--panel2);border:1px solid var(--border-soft);border-radius:8px;padding:12px 16px;margin-top:12px}
.big-total .bt-l{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.big-total .bt-v{font-family:var(--font-m);font-size:20px;color:var(--gold)}
.step-tag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--gold-dim);color:var(--gold);font-family:var(--font-m);font-size:11px;margin-right:9px}
.greet{font-family:var(--font-d);font-size:26px;margin-bottom:2px}
.greet-sub{color:var(--text2);font-size:13.5px;margin-bottom:24px}
</style>

<body>
<div id="root"></div>

<script type="text/app-jsx">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ================= CONFIG =================
const SUPABASE_URL = 'https://zysfmeoopbtiselvdtnk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yB8d3pf-ZqUiMiSKIGl69A_FZQgQbF1';
const FN_BASE = '/.netlify/functions';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= HELPERS =================
const pad = n => String(n).padStart(2,'0');
const fmt$ = (v, dec=2) => {
  if (v === null || v === undefined || isNaN(v)) return '-';
  const neg = v < -0.004;
  const s = Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:dec, maximumFractionDigits:dec});
  return (neg?'-$':'$') + s;
};
const fmtPct = v => (v===null||isNaN(v)) ? '-' : (v*100).toFixed(1)+'%';
const monthLabel = (y,m) => `${y}. ${pad(m)}`;
const lastDay = (y,m) => new Date(y, m, 0).getDate();
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// safe formula evaluator: variables + max/min + arithmetic
function evalExpr(expr, vars){
  try{
    let e = expr.replace(/[A-Za-z_][A-Za-z0-9_]*/g, id => {
      if (id === 'max') return 'Math.max';
      if (id === 'min') return 'Math.min';
      const v = vars[id];
      return String(typeof v === 'number' && isFinite(v) ? v : 0);
    });
    const check = e.replace(/Math\.(max|min)/g,'');
    if (/[^0-9+\-*/(). ,eE]/.test(check)) return 0;
    const r = Function('"use strict";return (' + e + ')')();
    return (typeof r === 'number' && isFinite(r)) ? r : 0;
  }catch(err){ return 0; }
}

function useToast(){
  const [msg, setMsg] = useState(null);
  const show = useCallback(t => { setMsg(t); setTimeout(()=>setMsg(null), 2600); },[]);
  return [msg, show];
}

// ================= DATA LAYER =================
async function loadCorpMeta(corpId){
  const [ch, cat, rules, own] = await Promise.all([
    sb.from('revenue_channels').select('*').eq('corporation_id', corpId).order('display_order'),
    sb.from('expense_categories').select('*').eq('corporation_id', corpId).order('display_order'),
    sb.from('auto_expense_rules').select('*').eq('corporation_id', corpId).eq('active', true).order('display_order'),
    sb.from('ownership').select('*').eq('corporation_id', corpId).order('display_order'),
  ]);
  return { channels: ch.data||[], categories: cat.data||[], rules: rules.data||[], ownership: own.data||[] };
}

async function loadMonthRaw(corpId, y, m){
  const start = `${y}-${pad(m)}-01`, end = `${y}-${pad(m)}-${pad(lastDay(y,m))}`;
  const [rev, exp, inp] = await Promise.all([
    sb.from('daily_revenue').select('*').eq('corporation_id', corpId).gte('date', start).lte('date', end),
    sb.from('expenses').select('*').eq('corporation_id', corpId).gte('date', start).lte('date', end),
    sb.from('monthly_inputs').select('*').eq('corporation_id', corpId).eq('year', y).eq('month', m),
  ]);
  return { revenue: rev.data||[], expenses: exp.data||[], inputs: inp.data||[] };
}

// compute a full monthly P&L from raw rows + meta
function computePL(meta, raw){
  const chByCode = {}, chSum = {};
  meta.channels.forEach(c => { chByCode[c.id] = c; chSum[c.code] = 0; });
  let totalSales = 0;
  raw.revenue.forEach(r => {
    const c = chByCode[r.channel_id]; if(!c) return;
    chSum[c.code] = (chSum[c.code]||0) + Number(r.amount);
    if (c.counts_in_total) totalSales += Number(r.amount) * Number(c.total_multiplier);
  });
  const catById = {}, catSum = {};
  meta.categories.forEach(c => { catById[c.id] = c; catSum[c.code] = 0; });
  // "board" months: recorded straight from Excel. If any board-sourced expense
  // exists, this month is historical -> use recorded values only, no auto-rules.
  const hasBoard = raw.expenses.some(e => e.source === 'board' && e.status === 'confirmed');
  raw.expenses.forEach(e => {
    if (e.status !== 'confirmed') return;
    if (hasBoard && e.source !== 'board') return; // ignore non-board rows in a board month
    const c = catById[e.category_id]; if(!c) return;
    catSum[c.code] = (catSum[c.code]||0) + Number(e.amount);
  });
  const vars = { total_sales: totalSales };
  Object.entries(chSum).forEach(([k,v]) => vars['ch_'+k] = v);
  Object.entries(catSum).forEach(([k,v]) => vars['cat_'+k] = v);
  raw.inputs.forEach(i => vars['inp_'+i.key] = Number(i.value));
  // auto-rules only for non-board (current/future) months
  const ruleRows = hasBoard ? [] : meta.rules.map(r => {
    const val = evalExpr(r.expr, vars);
    vars[r.code] = val;
    return { code:r.code, name:r.name, amount:val };
  });
  const catExpense = Object.values(catSum).reduce((a,b)=>a+b,0);
  const ruleExpense = ruleRows.reduce((a,r)=>a+r.amount,0);
  const totalExpenses = catExpense + ruleExpense;
  const net = totalSales - totalExpenses;
  const dist = meta.ownership.map(o => ({
    holder:o.holder, pct:Number(o.pct),
    amount: (o.zero_floor && net < 0) ? 0 : net * Number(o.pct)/100
  }));
  return { totalSales, totalExpenses, net, hasBoard,
    margin: totalSales ? net/totalSales : null,
    chSum, catSum, ruleRows, dist,
    channelRows: meta.channels.filter(c => (chSum[c.code]||0) !== 0 || c.active)
      .map(c => ({...c, amount: chSum[c.code]||0})),
    categoryRows: meta.categories.filter(c => (catSum[c.code]||0) !== 0 || c.active)
      .map(c => ({...c, amount: catSum[c.code]||0})),
    payrollPct: totalSales ? (catSum['payroll']||0)/totalSales : null,
    suppliesPct: totalSales ? ((catSum['supplies']||0)+(catSum['supplies_food']||0)+(catSum['supplies_material']||0)+(catSum['hq_supplies']||0))/totalSales : null,
  };
}

// summary snapshot stored on publish (this is exactly what investors see)
function buildSummary(pl){
  // Fold categories that share an investor_group into a single investor-facing
  // line, so internal splits (e.g. HQ Supplies vs store Supplies) are not exposed.
  const grouped = {};
  const order = [];
  pl.categoryRows.filter(c=>c.amount!==0).forEach(c=>{
    const key = c.investor_group || c.name;
    if(!(key in grouped)){ grouped[key]=0; order.push(key); }
    grouped[key] += c.amount;
  });
  const expenses = order.map(k=>({name:k, amount:+grouped[k].toFixed(2)}))
    .concat(pl.ruleRows.filter(r=>r.amount!==0).map(r=>({name:r.name, amount:+r.amount.toFixed(2), auto:true})));
  return {
    total_sales: +pl.totalSales.toFixed(2),
    total_expenses: +pl.totalExpenses.toFixed(2),
    net_profit: +pl.net.toFixed(2),
    net_margin: pl.margin !== null ? +(pl.margin).toFixed(4) : null,
    revenue: pl.channelRows.filter(c=>c.amount!==0).map(c=>({name:c.name, amount:+c.amount.toFixed(2)})),
    expenses,
    distribution: pl.dist.map(d=>({holder:d.holder, pct:d.pct, amount:+d.amount.toFixed(2)})),
  };
}

function Spinner(){ return <div className="faint" style={{padding:'30px 0',textAlign:'center'}}>Loading...</div>; }

// simple SVG trend chart: bars = sales, line = net profit
function TrendChart({points}){
  if(!points.length) return null;
  const W = Math.max(560, points.length*52), H = 190, padL = 8, padB = 26, padT = 14;
  const maxV = Math.max(1, ...points.map(p=>p.sales));
  const minN = Math.min(0, ...points.map(p=>p.net));
  const span = maxV - minN;
  const yOf = v => padT + (H-padB-padT) * (1 - (v - minN)/span);
  const bw = 26, gap = (W - padL*2)/points.length;
  return <div className="chart-wrap">
    <svg width={W} height={H}>
      <line x1={padL} x2={W-padL} y1={yOf(0)} y2={yOf(0)} stroke="#2A251E" strokeWidth="1"/>
      {points.map((p,i)=>{
        const x = padL + gap*i + gap/2;
        return <g key={i}>
          <rect x={x-bw/2} y={Math.min(yOf(0),yOf(p.sales))} width={bw} height={Math.abs(yOf(p.sales)-yOf(0))} fill="rgba(201,162,39,.35)" rx="3"/>
          <text x={x} y={H-8} fontSize="10" fill="#6E675B" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>
        </g>;
      })}
      <polyline fill="none" stroke="#7FB069" strokeWidth="2"
        points={points.map((p,i)=>`${padL+gap*i+gap/2},${yOf(p.net)}`).join(' ')}/>
      {points.map((p,i)=><circle key={i} cx={padL+gap*i+gap/2} cy={yOf(p.net)} r="3" fill={p.net>=0?'#7FB069':'#C4644C'}/>)}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'rgba(201,162,39,.5)'}}></span>Sales</span>
      <span><span className="sw" style={{background:'#7FB069'}}></span>Net profit</span>
    </div>
  </div>;
}

// ratio trend chart: payroll % and supplies % over months
function RatioChart({points}){
  const pts = points.filter(p=>p.payrollPct!==null || p.suppliesPct!==null);
  if(!pts.length) return null;
  const W = Math.max(560, pts.length*52), H = 180, padL=8, padB=26, padT=14;
  const vals = pts.flatMap(p=>[p.payrollPct,p.suppliesPct]).filter(v=>v!==null);
  const maxV = Math.max(0.35, ...vals), minV = 0;
  const yOf = v => padT + (H-padB-padT)*(1-(v-minV)/(maxV-minV));
  const gap = (W-padL*2)/pts.length;
  const line = (key,color)=>{
    const ps = pts.map((p,i)=>p[key]===null?null:`${padL+gap*i+gap/2},${yOf(p[key])}`).filter(Boolean);
    return <polyline fill="none" stroke={color} strokeWidth="2" points={ps.join(' ')}/>;
  };
  return <div className="chart-wrap">
    <svg width={W} height={H}>
      {[0.1,0.2,0.3].map(g=><line key={g} x1={padL} x2={W-padL} y1={yOf(g)} y2={yOf(g)} stroke="#211D17" strokeWidth="1"/>)}
      {[0.1,0.2,0.3].map(g=><text key={'t'+g} x={padL+2} y={yOf(g)-4} fontSize="9" fill="#6E675B" fontFamily="IBM Plex Mono">{g*100}%</text>)}
      {line('payrollPct','#C9A227')}
      {line('suppliesPct','#7A9CC6')}
      {pts.map((p,i)=><text key={i} x={padL+gap*i+gap/2} y={H-8} fontSize="10" fill="#6E675B" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>)}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'#C9A227'}}></span>Payroll %</span>
      <span><span className="sw" style={{background:'#7A9CC6'}}></span>Supplies %</span>
    </div>
  </div>;
}

// trend direction vs previous month: cost ratios going up is bad
function TrendArrow({cur, prev, higherIsBad}){
  if(cur===null||prev===null||prev===undefined) return null;
  const d = cur - prev;
  if(Math.abs(d) < 0.002) return <span className="faint"> →</span>;
  const up = d > 0;
  const bad = higherIsBad ? up : !up;
  return <span className={bad?'neg':'pos'}> {up?'▲':'▼'} {(Math.abs(d)*100).toFixed(1)}pt</span>;
}

function YoYDelta({cur, prev}){
  if(prev===null||prev===undefined||Math.abs(prev)<0.01) return <span className="faint">no data last year</span>;
  const d = (cur-prev)/Math.abs(prev);
  return <span className={d>=0?'pos':'neg'}>{d>=0?'+':''}{(d*100).toFixed(1)}% vs last year</span>;
}

function Dashboard({corps, canEditIds}){
  const editable = corps.filter(c=>canEditIds.has(c.id));

  const now = new Date();
  const [y, setY] = useState(now.getFullYear());
  const [m, setM] = useState(now.getMonth()+1);
  const [meta, setMeta] = useState(null);
  const [pl, setPl] = useState(null);
  const [yoy, setYoy] = useState(null);
  const [trend, setTrend] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ if(!corpId) return; let dead=false;
    (async()=>{
      setLoading(true);
      const mt = await loadCorpMeta(corpId);
      const [raw, rawLY] = await Promise.all([loadMonthRaw(corpId, y, m), loadMonthRaw(corpId, y-1, m)]);
      if(dead) return;
      setMeta(mt); setPl(computePL(mt, raw));
      const ply = computePL(mt, rawLY);
      setYoy((ply.totalSales!==0 || ply.totalExpenses!==0) ? ply : null);
      // 12-month trend
      const endD = `${y}-${pad(m)}-${pad(lastDay(y,m))}`;
      let sy=y, sm=m-11; while(sm<1){sm+=12;sy--;}
      const startD = `${sy}-${pad(sm)}-01`;
      const [rv, ex] = await Promise.all([
        sb.from('daily_revenue').select('date,amount,channel_id').eq('corporation_id',corpId).gte('date',startD).lte('date',endD),
        sb.from('expenses').select('date,amount,category_id,status').eq('corporation_id',corpId).gte('date',startD).lte('date',endD),
      ]);
      if(dead) return;
      const pts=[]; let cy=sy, cm=sm;
      for(let i=0;i<12;i++){
        const pref = `${cy}-${pad(cm)}`;
        const raw2 = { revenue:(rv.data||[]).filter(r=>r.date.startsWith(pref)),
                       expenses:(ex.data||[]).filter(r=>r.date.startsWith(pref)), inputs:[] };
        const p = computePL(mt, raw2);
        if(p.totalSales!==0 || p.totalExpenses!==0) pts.push({label:`${pad(cm)}`, sales:p.totalSales, net:p.net, payrollPct:p.payrollPct, suppliesPct:p.suppliesPct});
        cm++; if(cm>12){cm=1;cy++;}
      }
      setTrend(pts); setLoading(false);
    })();
    return ()=>{dead=true};
  },[corpId,y,m]);

  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Insights</div><h2>Monthly P&L</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
      </div>
    </div>
    {loading || !pl ? <Spinner/> : <>
      <div className="kpis">
        <div className="kpi"><div className="k-lbl">Total Sales</div><div className="k-val">{fmt$(pl.totalSales)}</div>
          <div className="k-sub"><YoYDelta cur={pl.totalSales} prev={yoy&&yoy.totalSales}/></div></div>
        <div className="kpi"><div className="k-lbl">Total Expenses</div><div className="k-val">{fmt$(pl.totalExpenses)}</div>
          <div className="k-sub"><YoYDelta cur={pl.totalExpenses} prev={yoy&&yoy.totalExpenses}/></div></div>
        <div className="kpi"><div className="k-lbl">Net Profit</div><div className={'k-val '+(pl.net>=0?'pos':'neg')}>{fmt$(pl.net)}</div>
          <div className="k-sub">Margin {fmtPct(pl.margin)} · <YoYDelta cur={pl.net} prev={yoy&&yoy.net}/></div></div>
        <div className="kpi"><div className="k-lbl">Payroll %</div><div className="k-val">{fmtPct(pl.payrollPct)}
          <TrendArrow cur={pl.payrollPct} prev={trend.length>1?trend[trend.length-2].payrollPct:null} higherIsBad={true}/></div>
          {yoy && <div className="k-sub">Last year {fmtPct(yoy.payrollPct)}</div>}</div>
        <div className="kpi"><div className="k-lbl">Supplies %</div><div className="k-val">{fmtPct(pl.suppliesPct)}
          <TrendArrow cur={pl.suppliesPct} prev={trend.length>1?trend[trend.length-2].suppliesPct:null} higherIsBad={true}/></div>
          {yoy && <div className="k-sub">Last year {fmtPct(yoy.suppliesPct)}</div>}</div>
      </div>
      <div className="card"><h3>12-Month Trend</h3><TrendChart points={trend}/></div>
      <div className="grid2">
        <div className="card"><h3>Cost Ratios · 12 Months</h3><RatioChart points={trend}/>
          <div className="hint">Payroll and supplies as a share of sales. Rising lines mean costs are growing faster than sales.</div></div>
        <div className="card"><h3>vs. {MONTHS[m-1]} {y-1}</h3>
          {!yoy ? <div className="faint">No data for {MONTHS[m-1]} {y-1}.</div> :
          <table className="t">
            <thead><tr><th></th><th className="num">{y}</th><th className="num">{y-1}</th><th className="num">Change</th></tr></thead>
            <tbody>
              <tr><td>Sales</td><td className="num">{fmt$(pl.totalSales,0)}</td><td className="num">{fmt$(yoy.totalSales,0)}</td>

                <td className="num"><YoYDelta cur={pl.totalExpenses} prev={yoy.totalExpenses}/></td></tr>
              <tr><td>Net Profit</td><td className={'num '+(pl.net>=0?'pos':'neg')}>{fmt$(pl.net,0)}</td>
                <td className={'num '+(yoy.net>=0?'pos':'neg')}>{fmt$(yoy.net,0)}</td>
                <td className="num"><YoYDelta cur={pl.net} prev={yoy.net}/></td></tr>
              <tr><td>Payroll %</td><td className="num">{fmtPct(pl.payrollPct)}</td><td className="num">{fmtPct(yoy.payrollPct)}</td>

              <tr><td>Supplies %</td><td className="num">{fmtPct(pl.suppliesPct)}</td><td className="num">{fmtPct(yoy.suppliesPct)}</td>
                <td className="num"><TrendArrow cur={pl.suppliesPct} prev={yoy.suppliesPct} higherIsBad={true}/></td></tr>

          <h3>Expenses</h3>

            <tr className="total"><td>Total Expenses</td><td className="num">{fmt$(pl.totalExpenses)}</td></tr>
            <tr className="total"><td>Net Profit</td><td className={'num '+(pl.net>=0?'pos':'neg')}>{fmt$(pl.net)}</td></tr>
          </tbody></table>

            <table className="t"><tbody>
              {pl.dist.map(d=><tr key={d.holder}><td>{d.holder} <span className="faint">({d.pct}%)</span></td><td className="num">{fmt$(d.amount)}</td></tr>)}

    </>}

}

function Entry({corps, canEditIds, profile, presetCorp}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(presetCorp || (editable[0] && editable[0].id));
  useEffect(()=>{ if(presetCorp) setCorpId(presetCorp); },[presetCorp]);
  const [date, setDate] = useState(todayStr());
  const [meta, setMeta] = useState(null);
  const [dayRev, setDayRev] = useState({});
  const [dayExp, setDayExp] = useState([]);
  const [pending, setPending] = useState([]);
  const [form, setForm] = useState({category_id:'', amount:'', payee:'', memo:''});
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    setMeta(mt);
    const [rv, ex, pd] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('date',date),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('date',date).eq('status','confirmed').order('created_at',{ascending:false}),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('status','pending').order('date',{ascending:false}),
    ]);
    const map={}; (rv.data||[]).forEach(r=>map[r.channel_id]=r);
    setDayRev(map); setDayExp(ex.data||[]); setPending(pd.data||[]);
  },[corpId,date]);
  useEffect(()=>{ reload(); },[reload]);

  const saveRev = async (ch, val) => {
    const amount = parseFloat(val)||0;
    const ex = dayRev[ch.id];
    if(ex && Number(ex.amount)===amount) return;
    const { error } = await sb.from('daily_revenue').upsert(
      { corporation_id:corpId, channel_id:ch.id, date, amount, source:'manual', updated_by:profile.id, updated_at:new Date().toISOString() },
      { onConflict:'corporation_id,channel_id,date' });
    if(error) showToast('Save failed: '+error.message); else { showToast(ch.name+' saved'); reload(); }
  };

  const addExp = async () => {
    if(!form.category_id || !form.amount){ showToast('Select a category and enter an amount'); return; }
    setBusy(true);
    const { error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:form.category_id, date,
      amount:parseFloat(form.amount), payee:form.payee||null, memo:form.memo||null,
      source:'manual', entered_by:profile.id });
    setBusy(false);
    if(error) showToast('Save failed: '+error.message);
    else { setForm({category_id:'',amount:'',payee:'',memo:''}); showToast('Expense saved'); reload(); }
  };
  const delExp = async id => {
    if(!confirm('Delete this expense?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',id);
    if(error) showToast('Delete failed: '+error.message); else reload();
  };
  const [pendCat, setPendCat] = useState({});
  const approvePending = async (p, ok) => {
    if(ok){ const upd = {status:'confirmed'};
      if(pendCat[p.id]) upd.category_id = pendCat[p.id];
      const { error } = await sb.from('expenses').update(upd).eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    else { const { error } = await sb.from('expenses').delete().eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    showToast(ok?'Approved':'Rejected'); reload();
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Daily Entry</div><h2>Daily Entry</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:160}}/>
      </div>
    </div>

    {pending.length>0 && <div className="card">
      <h3>Slack Pending Approval <span className="badge red">{pending.length}</span></h3>
      {pending.map(p=><div className="pend" key={p.id}>
        <div className="grow">
          <div><span className="mono">{p.date}</span> · {catName(p.category_id)} · <b className="mono">{fmt$(Number(p.amount))}</b></div>
          <div className="faint" style={{fontSize:12.5}}>{p.memo} {p.slack_user && '· @'+p.slack_user}</div>
        </div>
        <select className="btn-sm" style={{width:150,padding:'5px 8px'}} value={pendCat[p.id]||p.category_id}
          onChange={e=>setPendCat({...pendCat,[p.id]:e.target.value})}>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button className="btn btn-sm btn-gold" onClick={()=>approvePending(p,true)}>Approve</button>
        <button className="btn btn-sm btn-danger" onClick={()=>approvePending(p,false)}>Reject</button>
      </div>)}
    </div>}

    <div className="grid2">
      <div className="card">
        <h3><span className="step-tag">1</span>Revenue <span className="faint" style={{fontWeight:400}}>{date}</span></h3>
        <table className="t"><tbody>
          {(meta?meta.channels.filter(c=>c.active):[]).map(c=>{
            const row = dayRev[c.id];
            const auto = row && row.source!=='manual' && row.source!=='import';
            return <tr key={c.id}>
              <td>{c.name} {auto && <span className="badge green">{row.source}</span>}
                {row && row.verified && <span className="badge gold">Verified</span>}</td>
              <td className="num" style={{width:150}}>
                <input type="number" step="0.01" defaultValue={row?Number(row.amount):''} placeholder="0.00"
                  key={c.id+date+(row?row.amount:'')}
                  onBlur={e=>saveRev(c,e.target.value)} style={{textAlign:'right'}}/>
              </td></tr>;
          })}
        </tbody></table>
        <div className="big-total"><span className="bt-l">Sales today</span>
          <span className="bt-v">{fmt$((meta?meta.channels:[]).reduce((a,c)=>{
            const r=dayRev[c.id]; if(!r||!c.counts_in_total) return a;
            return a+Number(r.amount)*Number(c.total_multiplier);},0))}</span></div>
        <div className="hint">Amounts save when you click outside the field.</div>
      </div>

      <div className="card">
        <h3><span className="step-tag">2</span>Add Expense</h3>
        <div className="form-row">
          <select value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})}>
            <option value="">Category</option>
            {(meta?meta.categories.filter(c=>c.active):[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <input className="w-sm" type="number" step="0.01" placeholder="Amount" value={form.amount}
            onChange={e=>setForm({...form,amount:e.target.value})}/>
        </div>
        <div className="form-row">
          <input placeholder="Payee (optional)" value={form.payee} onChange={e=>setForm({...form,payee:e.target.value})}/>
          <input placeholder="Memo (optional)" value={form.memo} onChange={e=>setForm({...form,memo:e.target.value})}/>
        </div>
        <button className="btn btn-gold" disabled={busy} onClick={addExp}>Save Expense</button>
        <hr className="divider"/>
        <h3>Expenses on This Date {dayExp.length>0 && <span className="faint" style={{fontWeight:400}}>{fmt$(dayExp.reduce((a,e)=>a+Number(e.amount),0))}</span>}</h3>
        {dayExp.length===0 ? <div className="faint">No expenses entered.</div> :
          <table className="t"><tbody>
            {dayExp.map(e=><tr key={e.id}>
              <td>{catName(e.category_id)}
                {e.source==='recurring' && <span className="badge blue">Recurring</span>}
                {e.source==='toast' && <span className="badge green">Toast</span>}
                {e.source==='quickbooks' && <span className="badge green">QuickBooks</span>}
                {e.source==='inventory' && <span className="badge green">Inventory</span>}
                {e.source==='slack' && <span className="badge blue">Slack</span>}
                {e.adjustment && <span className="badge gold">Adjustment</span>}
                {e.payee && <span className="faint"> · {e.payee}</span>}
                {e.memo && <div className="faint" style={{fontSize:12}}>{e.memo}</div>}</td>
              <td className="num">{fmt$(Number(e.amount))}</td>
              <td style={{width:36,textAlign:'right'}}><button className="btn btn-sm btn-ghost btn-danger" onClick={()=>delExp(e.id)}>✕</button></td>
            </tr>)}
          </tbody></table>}
      </div>
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= CASH VERIFICATION =================
function CashPage({corps, canEditIds, profile, isOwner}){
  const stores = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(stores[0] && stores[0].id);
  const now = new Date();
  const [y,setY] = useState(now.getFullYear());
  const [m,setM] = useState(now.getMonth()+1);
  const [days, setDays] = useState({});
  const [pickups, setPickups] = useState([]);
  const [pk, setPk] = useState({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''});
  const [toast, showToast] = useToast();
  const [cashChId, setCashChId] = useState(null);

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const ch = await sb.from('revenue_channels').select('id,code').eq('corporation_id',corpId).eq('code','cash').maybeSingle();
    if(!ch.data){ setCashChId(null); setDays({}); return; }
    setCashChId(ch.data.id);
    const start=`${y}-${pad(m)}-01`, end=`${y}-${pad(m)}-${pad(lastDay(y,m))}`;
    const [rv, pks] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('channel_id',ch.data.id).gte('date',start).lte('date',end),
      sb.from('cash_pickups').select('*').eq('corporation_id',corpId).order('pickup_date',{ascending:false}).limit(10),
    ]);
    const map={}; (rv.data||[]).forEach(r=>map[r.date]=r);
    setDays(map); setPickups(pks.data||[]);
  },[corpId,y,m]);
  useEffect(()=>{ reload(); },[reload]);

  const savePickup = async()=>{
    if(!pk.period_start || !pk.period_end){ showToast('Enter the pickup period'); return; }
    const { data, error } = await sb.from('cash_pickups').insert({
      corporation_id:corpId, pickup_date:pk.pickup_date, period_start:pk.period_start,
      period_end:pk.period_end, counted_amount: pk.counted_amount ? parseFloat(pk.counted_amount) : null, note:pk.note||null,
      created_by:profile.id }).select().single();
    if(error){ showToast('Save failed: '+error.message); return; }
    const { error: e2 } = await sb.from('daily_revenue').update({
      verified:true, pickup_id:data.id, verified_by:profile.id, verified_at:new Date().toISOString() })
      .eq('corporation_id',corpId).eq('channel_id',cashChId)
      .gte('date',pk.period_start).lte('date',pk.period_end);
    if(e2){ showToast('Verification failed: '+e2.message); return; }
    showToast('Pickup recorded, period verified');
    setPk({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''});
    reload();
  };

  const first = new Date(y, m-1, 1).getDay();
  const nDays = lastDay(y,m);
  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=nDays;d++) cells.push(d);

  const recordedFor = (s,e) => Object.values(days)
    .filter(r=>r.date>=s && r.date<=e).reduce((a,r)=>a+Number(r.amount),0);

  if(!stores.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Cash</div><h2>Cash Verification</h2>
        <div className="sub">When you record an envelope pickup, the covered period is marked verified in gold on the calendar.</div></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={stores} sel={corpId} onSel={setCorpId}/>
        <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
      </div>
    </div>
    <div className="grid2">
      <div className="card">
        <h3>Cash Calendar</h3>
        <div className="cal">
          {DOW.map(d=><div key={d} className="dow">{d}</div>)}
          {cells.map((d,i)=>{
            if(d===null) return <div key={'e'+i} className="day empty"></div>;
            const date=`${y}-${pad(m)}-${pad(d)}`;
            const r = days[date];
            return <div key={date} className={'day'+(r&&r.verified?' verified':'')}>
              <div className="d">{d}</div>
              {r && Number(r.amount)!==0 && <div className="amt">{fmt$(Number(r.amount),0)}</div>}
            </div>;
          })}
        </div>
      </div>
      <div>
        {isOwner && <div className="card">
          <h3>Record Envelope Pickup</h3>
          <div className="hint" style={{marginTop:0,marginBottom:12}}>Recording a pickup marks that period's cash days as collected (gold on the calendar). Counted amount is optional, since envelopes are picked up sealed.</div>
          <div className="form-row">
            <div><label className="hint" style={{marginTop:0}}>Pickup date</label>
              <input type="date" value={pk.pickup_date} onChange={e=>setPk({...pk,pickup_date:e.target.value})}/></div>
            <div><label className="hint" style={{marginTop:0}}>Counted amount (optional)</label>
              <input type="number" step="0.01" placeholder="Leave blank if unopened" value={pk.counted_amount}
                onChange={e=>setPk({...pk,counted_amount:e.target.value})}/></div>
          </div>
          <div className="form-row">
            <div><label className="hint" style={{marginTop:0}}>Period start</label>
              <input type="date" value={pk.period_start} onChange={e=>setPk({...pk,period_start:e.target.value})}/></div>
            <div><label className="hint" style={{marginTop:0}}>Period end</label>
              <input type="date" value={pk.period_end} onChange={e=>setPk({...pk,period_end:e.target.value})}/></div>
          </div>
          <input placeholder="Memo (optional)" value={pk.note} onChange={e=>setPk({...pk,note:e.target.value})} style={{marginBottom:12}}/>
          {pk.period_start && pk.period_end && <div className="hint" style={{marginBottom:12}}>
            Recorded cash in period: <b className="mono">{fmt$(recordedFor(pk.period_start,pk.period_end))}</b>
            {pk.counted_amount && <> · Difference: <b className={'mono '+(Math.abs(recordedFor(pk.period_start,pk.period_end)-parseFloat(pk.counted_amount))<0.01?'pos':'neg')}>
              {fmt$(parseFloat(pk.counted_amount)-recordedFor(pk.period_start,pk.period_end))}</b></>}
          </div>}
          <button className="btn btn-gold" onClick={savePickup}>Save Pickup + Verify Period</button>
        </div>}
        <div className="card">
          <h3>Recent Pickups</h3>
          {pickups.length===0 ? <div className="faint">No records</div> :
          <table className="t"><thead><tr><th>Pickup</th><th>Period</th><th className="num">Counted</th></tr></thead><tbody>
            {pickups.map(p=><tr key={p.id}>
              <td className="mono">{p.pickup_date}</td>
              <td className="mono" style={{fontSize:12}}>{p.period_start} ~ {p.period_end}</td>
              <td className="num">{fmt$(Number(p.counted_amount))}</td></tr>)}
          </tbody></table>}
        </div>
      </div>
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= RECURRING =================
function Recurring({corps, canEditIds, profile, isOwner, embedded}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(editable[0] && editable[0].id);
  const [meta, setMeta] = useState(null);
  const [rows, setRows] = useState([]);
  const [f, setF] = useState({name:'', category_id:'', amount:'', frequency:'weekly', day_of_week:'5', day_of_month:'1', payee:''});
  const [newCat, setNewCat] = useState('');
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId); setMeta(mt);
    const r = await sb.from('recurring_expenses').select('*').eq('corporation_id',corpId).order('created_at');
    setRows(r.data||[]);
  },[corpId]);
  useEffect(()=>{ reload(); },[reload]);

  const add = async()=>{
    if(!f.name||!f.category_id||!f.amount){ showToast('Enter a name, category, and amount'); return; }
    const { error } = await sb.from('recurring_expenses').insert({
      corporation_id:corpId, category_id:f.category_id, name:f.name, payee:f.payee||null,
      amount:parseFloat(f.amount), frequency:f.frequency,
      day_of_week: f.frequency==='weekly'?parseInt(f.day_of_week):null,
      day_of_month: f.frequency==='monthly'?parseInt(f.day_of_month):null });
    if(error){ showToast('Save failed: '+error.message); return; }
    setF({name:'',category_id:'',amount:'',frequency:'weekly',day_of_week:'5',day_of_month:'1',payee:''});
    showToast('Recurring expense added'); reload();
  };
  const toggle = async r=>{
    await sb.from('recurring_expenses').update({active:!r.active}).eq('id',r.id); reload();
  };

  const addCategory = async()=>{
    const name = newCat.trim();
    if(!name){ showToast('Enter a category name'); return; }
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || ('cat_'+Date.now());
    const maxOrd = Math.max(0, ...(meta?meta.categories:[]).map(c=>c.display_order||0));
    const { error } = await sb.from('expense_categories').insert({
      corporation_id:corpId, code:slug, name, display_order:maxOrd+1 });
    if(error){ showToast(error.code==='23505' ? 'A category with this name already exists' : 'Add failed: '+error.message); return; }
    setNewCat(''); showToast('Category added: '+name); reload();
  };

  // materialize due entries for the current month up to today
  const generate = async()=>{
    const t = new Date(); const y=t.getFullYear(), m=t.getMonth()+1;
    const start=`${y}-${pad(m)}-01`, today=todayStr();
    const existing = await sb.from('expenses').select('recurring_id,date')
      .eq('corporation_id',corpId).not('recurring_id','is',null).gte('date',start).lte('date',today);
    const have = new Set((existing.data||[]).map(e=>e.recurring_id+'|'+e.date));
    const inserts=[];
    rows.filter(r=>r.active).forEach(r=>{
      for(let d=1; d<=t.getDate(); d++){
        const date=`${y}-${pad(m)}-${pad(d)}`;
        if(r.start_date && date<r.start_date) continue;
        if(r.end_date && date>r.end_date) continue;
        const dow=new Date(y,m-1,d).getDay();
        const due = r.frequency==='weekly' ? dow===r.day_of_week
          : d===Math.min(r.day_of_month, lastDay(y,m));
        if(due && !have.has(r.id+'|'+date))
          inserts.push({corporation_id:corpId, category_id:r.category_id, date,
            amount:Number(r.amount), payee:r.payee||null, memo:r.name,
            source:'recurring', recurring_id:r.id, entered_by:profile.id});
      }
    });
    if(!inserts.length){ showToast('Nothing to generate (already up to date)'); return; }
    const { error } = await sb.from('expenses').insert(inserts);
    if(error) showToast('Generate failed: '+error.message);
    else showToast(inserts.length+' entries generated');
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head" style={embedded?{marginBottom:14}:{}}>
      <div>{!embedded && <><div className="eyebrow">Recurring</div><h2>Recurring Expenses</h2></>}
        <div className="sub">Fixed costs like rent, loans, and owner weekly pay, set per corporation. Entries are generated automatically every day.</div></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        <button className="btn" onClick={generate}>Generate This Month</button>
      </div>
    </div>
    {isOwner && <div className="card">
      <h3>Add Expense Category</h3>
      <div className="hint" style={{marginTop:0,marginBottom:10}}>Create a category for anything you want as its own line on the P&L, like Accounting, Toast Fee, or Trash Removal.</div>
      <div className="form-row">
        <input placeholder="Category name (e.g. Accounting, Toast Fee, Trash Removal)" value={newCat} onChange={e=>setNewCat(e.target.value)}/>
        <button className="btn" style={{flex:'0 0 auto'}} onClick={addCategory}>Add Category</button>
      </div>
    </div>}
    {isOwner && <div className="card">
      <h3>New Recurring Expense</h3>
      <div className="form-row">
        <input placeholder="Name (e.g. John weekly pay, AD rent)" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <select value={f.category_id} onChange={e=>setF({...f,category_id:e.target.value})}>
          <option value="">Category</option>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input className="w-sm" type="number" step="0.01" placeholder="Amount" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})}/>
      </div>
      <div className="form-row">
        <select className="w-sm" value={f.frequency} onChange={e=>setF({...f,frequency:e.target.value})}>
          <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
        </select>
        {f.frequency==='weekly'
          ? <select className="w-sm" value={f.day_of_week} onChange={e=>setF({...f,day_of_week:e.target.value})}>
              {DOW.map((d,i)=><option key={i} value={i}>{d}</option>)}
            </select>
          : <select className="w-sm" value={f.day_of_month} onChange={e=>setF({...f,day_of_month:e.target.value})}>
              {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>Day {i+1}</option>)}
            </select>}
        <input placeholder="Payee (optional)" value={f.payee} onChange={e=>setF({...f,payee:e.target.value})}/>
        <button className="btn btn-gold" style={{flex:'0 0 auto'}} onClick={add}>Add</button>
      </div>
    </div>}
    <div className="card">
      <h3>Registered Recurring Expenses</h3>
      {rows.length===0 ? <div className="faint">None</div> :
      <table className="t">
        <thead><tr><th>Name</th><th>Category</th><th>Schedule</th><th className="num">Amount</th><th></th></tr></thead>
        <tbody>{rows.map(r=><tr key={r.id} style={{opacity:r.active?1:.45}}>
          <td>{r.name}{r.payee && <span className="faint"> · {r.payee}</span>}</td>
          <td>{catName(r.category_id)}</td>
          <td>{r.frequency==='weekly' ? 'Weekly · '+DOW[r.day_of_week] : 'Monthly · Day '+r.day_of_month}</td>
          <td className="num">{fmt$(Number(r.amount))}</td>
          <td style={{textAlign:'right'}}>{isOwner && <button className="btn btn-sm" onClick={()=>toggle(r)}>{r.active?'Pause':'Resume'}</button>}</td>
        </tr>)}</tbody>
      </table>}
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= MONTHLY CLOSE =================
function ClosePage({corps, canEditIds, profile, isOwner, preset}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState((preset&&preset.corpId) || (editable[0] && editable[0].id));
  const now = new Date();
  const prevM = now.getMonth()===0 ? {y:now.getFullYear()-1,m:12} : {y:now.getFullYear(),m:now.getMonth()};
  const [y,setY] = useState((preset&&preset.y)||prevM.y);
  const [m,setM] = useState((preset&&preset.m)||prevM.m);
  useEffect(()=>{ if(preset){ setCorpId(preset.corpId); setY(preset.y); setM(preset.m); } },[preset]);
  const [meta,setMeta] = useState(null);
  const [pl,setPl] = useState(null);
  const [close,setClose] = useState(null);
  const [files,setFiles] = useState([]);
  const [notes,setNotes] = useState('');
  const [adj,setAdj] = useState({category_id:'', amount:'', memo:'', reverse:true});
  const [toast,showToast] = useToast();
  const [busy,setBusy] = useState(false);
  const fileRef = useRef();

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    const raw = await loadMonthRaw(corpId,y,m);
    setMeta(mt); setPl(computePL(mt,raw));
    const mc = await sb.from('monthly_close').select('*').eq('corporation_id',corpId).eq('year',y).eq('month',m).maybeSingle();
    setClose(mc.data||null); setNotes(mc.data?(mc.data.notes||''):'');
    if(mc.data){
      const fl = await sb.from('report_files').select('*').eq('monthly_close_id',mc.data.id);
      setFiles(fl.data||[]);
    } else setFiles([]);
  },[corpId,y,m]);
  useEffect(()=>{ reload(); },[reload]);

  const addAdjustment = async()=>{
    if(!adj.category_id||!adj.amount){ showToast('Select a category and enter an amount'); return; }
    const dateEnd = `${y}-${pad(m)}-${pad(lastDay(y,m))}`;
    const { data, error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:adj.category_id, date:dateEnd,
      amount:parseFloat(adj.amount), memo:adj.memo||'Month-end adjustment', adjustment:true,
      source:'manual', entered_by:profile.id }).select().single();
    if(error){ showToast('Failed: '+error.message); return; }
    if(adj.reverse){
      let ny=y, nm=m+1; if(nm>12){nm=1;ny++;}
      const { error:e2 } = await sb.from('expenses').insert({
        corporation_id:corpId, category_id:adj.category_id, date:`${ny}-${pad(nm)}-01`,
        amount:-parseFloat(adj.amount), memo:(adj.memo||'Month-end adjustment')+' auto reversal',
        adjustment:true, reversal_of:data.id, source:'manual', entered_by:profile.id });
      if(e2){ showToast('Reversal failed: '+e2.message); return; }
    }
    setAdj({category_id:'',amount:'',memo:'',reverse:true});
    showToast('Adjustment added'+(adj.reverse?' (with next-month reversal)':''));
    reload();
  };

  const saveClose = async (publish)=>{
    setBusy(true);
    const payload = {
      corporation_id:corpId, year:y, month:m,
      summary: Object.assign({}, close?close.summary:{}, buildSummary(pl)),
      notes: notes||null, updated_at:new Date().toISOString(),
      status: publish?'published':(close?close.status:'draft'),
    };
    if(publish){ payload.published_at=new Date().toISOString(); payload.published_by=profile.id; }
    const { error } = await sb.from('monthly_close').upsert(payload,{onConflict:'corporation_id,year,month'});
    setBusy(false);
    if(error){ showToast('Failed: '+error.message); return; }
    showToast(publish?'Published. Now visible to investors.':'Draft saved'); reload();
  };
  const unpublish = async()=>{
    if(!confirm('Unpublish this report? Investors will no longer see it.')) return;
    await sb.from('monthly_close').update({status:'draft'}).eq('id',close.id);
    showToast('Unpublished'); reload();
  };

  const upload = async e=>{
    const file = e.target.files[0]; if(!file) return;
    if(!close){ showToast('Save a draft first'); return; }
    setBusy(true);
    const path = crypto.randomUUID()+'/'+file.name;
    const { error } = await sb.storage.from('reports').upload(path, file);
    if(error){ setBusy(false); showToast('Upload failed: '+error.message); return; }
    await sb.from('report_files').insert({monthly_close_id:close.id, name:file.name, storage_path:path, uploaded_by:profile.id});
    setBusy(false); if(fileRef.current) fileRef.current.value='';
    showToast('Attached'); reload();
  };
  const removeFile = async f=>{
    if(!confirm('Delete this attachment?')) return;
    await sb.storage.from('reports').remove([f.storage_path]);
    await sb.from('report_files').delete().eq('id',f.id);
    reload();
  };

  const legacy = close && close.summary && close.summary.legacy;
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Monthly Close</div><h2>Monthly Close & Publish</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
      </div>
    </div>
    {!pl ? <Spinner/> : <div className="grid2">
      <div>
        <div className="card">
          <h3>{monthLabel(y,m)} P&L (live)
            {close && <span className={'badge '+(close.status==='published'?'green':'')}>{close.status==='published'?'Published':'Draft'}</span>}</h3>
          <table className="t"><tbody>
            <tr><td>Total Sales</td><td className="num">{fmt$(pl.totalSales)}</td></tr>
            <tr><td>Total Expenses</td><td className="num">{fmt$(pl.totalExpenses)}</td></tr>

function Admin({corps, session, embedded}){

  const [nfPerms, setNfPerms] = useState({});
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);

  const reload = useCallback(async()=>{
    const [p, pm] = await Promise.all([
      sb.from('profiles').select('*').order('created_at'),
      sb.from('permissions').select('*'),
    ]);
    setProfiles(p.data||[]); setPerms(pm.data||[]);
  },[]);
  useEffect(()=>{ reload(); },[reload]);

  const permOf = (pid,cid) => perms.find(x=>x.profile_id===pid && x.corporation_id===cid);
  const togglePerm = async (pid,cid,field)=>{
    const ex = permOf(pid,cid);
    if(ex){
      const upd = {}; upd[field] = !ex[field];
      const { error } = await sb.from('permissions').update(upd).eq('id',ex.id);
      if(error) showToast(error.message);
    } else {
      const ins = {profile_id:pid, corporation_id:cid, can_view:false, can_edit:false};
      ins[field]=true;
      const { error } = await sb.from('permissions').insert(ins);
      if(error) showToast(error.message);
    }
    reload();
  };
  const toggleActive = async p=>{
    await sb.from('profiles').update({active:!p.active}).eq('id',p.id); reload();
  };

  const createAccount = async()=>{
    if(!nf.email||!nf.password||!nf.full_name){ showToast('Fill in all fields'); return; }
    setBusy(true);
    try{
      const res = await fetch(FN_BASE+'/create-account',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
        body:JSON.stringify({...nf, permissions:Object.entries(nfPerms)
          .filter(([,v])=>v.can_view||v.can_edit)
          .map(([cid,v])=>({corporation_id:cid, can_view:!!v.can_view, can_edit:!!v.can_edit}))})
      });
      const j = await res.json();
      if(!res.ok) throw new Error(j.error||'Create failed');
      showToast('Account created: '+nf.email);
      setNf({email:'',password:'',full_name:'',role:'investor'}); setNfPerms({});
      reload();
    }catch(e){ showToast(e.message); }
    setBusy(false);
  };

  return <div>
    {!embedded && <div className="page-head"><div><div className="eyebrow">Admin</div><h2>Accounts & Permissions</h2></div></div>}
    <div className="card">
      <h3>Create Account</h3>
      <div className="form-row">
        <input placeholder="Email" value={nf.email} onChange={e=>setNf({...nf,email:e.target.value})}/>
        <input placeholder="Temporary password" type="text" value={nf.password} onChange={e=>setNf({...nf,password:e.target.value})}/>
        <input placeholder="Full name" value={nf.full_name} onChange={e=>setNf({...nf,full_name:e.target.value})}/>
        <select className="w-sm" value={nf.role} onChange={e=>setNf({...nf,role:e.target.value})}>
          <option value="investor">Investor</option>
          <option value="assistant">Assistant</option>
          <option value="owner">Owner</option>
        </select>
      </div>
      {nf.role!=='owner' && <table className="t" style={{marginBottom:12}}>
        <thead><tr><th>Corporation</th><th>View (investor)</th><th>Edit (assistant)</th></tr></thead>
        <tbody>{corps.map(c=>{
          const v = nfPerms[c.id]||{};
          return <tr key={c.id}><td>{c.name}</td>
            <td><input type="checkbox" style={{width:'auto'}} checked={!!v.can_view}
              onChange={e=>setNfPerms({...nfPerms,[c.id]:{...v,can_view:e.target.checked}})}/></td>
            <td><input type="checkbox" style={{width:'auto'}} checked={!!v.can_edit}
              onChange={e=>setNfPerms({...nfPerms,[c.id]:{...v,can_edit:e.target.checked}})}/></td>
          </tr>;})}
        </tbody></table>}
      <button className="btn btn-gold" disabled={busy} onClick={createAccount}>Create Account</button>

        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>

          <tbody>{corps.map(c=>{
