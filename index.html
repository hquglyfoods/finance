function Approvals({corps, canEditIds, profile, isOwner}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const ids = editable.map(c=>c.id);
  const [items, setItems] = useState(null);
  const [metaByCorp, setMetaByCorp] = useState({});
  const [edit, setEdit] = useState({}); // id -> {category_id, amount}
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!ids.length){ setItems([]); return; }
    const { data } = await sb.from('expenses').select('*')
      .in('corporation_id', ids).eq('status','pending').order('date',{ascending:false});
    // load category lists per corp present
    const need = [...new Set((data||[]).map(e=>e.corporation_id))];
    const mm = {...metaByCorp};
    for(const cid of need){ if(!mm[cid]){
      const { data:cats } = await sb.from('expense_categories').select('id,code,name')
        .eq('corporation_id',cid).eq('active',true).order('display_order');
      mm[cid]=cats||[];
    }}
    setMetaByCorp(mm); setItems(data||[]);
  },[ids.join(',')]);
  useEffect(()=>{ reload(); },[reload]);

  const corpCode = id => { const c=corps.find(x=>x.id===id); return c?c.code:'?'; };
  const catsFor = id => metaByCorp[id]||[];
  const catName = (cid,catId) => { const c=catsFor(cid).find(x=>x.id===catId); return c?c.name:'?'; };

  const approve = async (e) => {
    const ed = edit[e.id]||{};
    const finalCat = ed.category_id || e.category_id;
    const finalAmt = ed.amount!==undefined ? parseFloat(ed.amount) : Number(e.amount);
    const upd = { status:'confirmed', category_id:finalCat, amount:finalAmt };
    const { error } = await sb.from('expenses').update(upd).eq('id',e.id);
    if(error){ showToast(error.message); return; }
    // learn: if this came from slack, record the signal -> chosen category
    if(e.source==='slack' && e.memo){
      const cat = catsFor(e.corporation_id).find(x=>x.id===finalCat);
      const signal = e.memo.toLowerCase().replace(/\[.*?\]|\(.*?\)/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim().slice(0,80);
      if(cat && signal.length>2){
        await sb.from('slack_learnings').insert({
          corporation_id:e.corporation_id, signal, category_code:cat.code,
          category_name:cat.name, approved_by:profile.id });
      }
    }
    showToast('Approved'); reload();
  };
  const reject = async (e) => {
    if(!confirm('Reject and delete this item?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',e.id);
    if(error){ showToast(error.message); return; } reload();
  };

  if(items===null) return <div><div className="page-head"><div><div className="eyebrow">Approvals</div><h2>Approval Center</h2></div></div><Spinner/></div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Approvals</div><h2>Approval Center</h2>
        <div className="sub sec-desc">Items captured from Slack and other sources, waiting to be confirmed. Approving teaches the AI to classify better next time.</div></div>
      {items.length>0 && <span className="badge red" style={{fontSize:12}}>{items.length} pending</span>}
    </div>
    {items.length===0 ? <div className="card faint">Nothing waiting for approval. You're all caught up.</div> :
      <div className="card">
        {items.map(e=>{
          const ed = edit[e.id]||{};
          return <div className="pend approve-row" key={e.id} style={{alignItems:'flex-start',flexWrap:'wrap'}}>
            <div className="grow" style={{minWidth:180}}>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <span className="badge gold">{corpCode(e.corporation_id)}</span>
                <span className="mono">{e.date}</span>
                {e.source==='slack' && <span className="badge blue">Slack</span>}
                {e.source==='payroll_bot' && <span className="badge gold">Payroll · ADP</span>}
                {e.slack_user && <span className="faint" style={{fontSize:12}}>@{e.slack_user}</span>}
              </div>
              <div style={{marginTop:5}}>{e.memo||<span className="faint">(no description)</span>}</div>
            </div>
            <div className="ar-fields">
              <div style={{width:120}}>
                <label className="faint" style={{fontSize:11}}>Amount</label>
                <div className="amt-input">
                  <span className="amt-prefix">$</span>
                  <input type="number" step="0.01" defaultValue={Number(e.amount)}
                    onChange={ev=>setEdit({...edit,[e.id]:{...ed,amount:ev.target.value}})} style={{textAlign:'right'}}/>
                </div>
              </div>
              <div style={{width:180}}>
                <label className="faint" style={{fontSize:11}}>Category</label>
                <select value={ed.category_id||e.category_id}
                  onChange={ev=>setEdit({...edit,[e.id]:{...ed,category_id:ev.target.value}})}>
                  {catsFor(e.corporation_id).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            </div>
            <div className="ar-actions" style={{display:'flex',gap:6,alignItems:'flex-end',paddingTop:16}}>
              <button className="btn btn-sm btn-gold" onClick={()=>approve(e)}>Approve</button>
              <button className="btn btn-sm btn-danger" onClick={()=>reject(e)}>Reject</button>
            </div>
          </div>;
        })}
      </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= PWA: INSTALL + NOTIFICATIONS =================
function urlB64ToUint8(base64) {
  const pad = '='.repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

function PwaCard({profile}){
  const [installable, setInstallable] = useState(!!window._pwaPrompt);
  const [standalone] = useState(isStandalone());
  const [notifState, setNotifState] = useState('checking'); // checking/unsupported/ios-needs-install/denied/on/off
  const [busy, setBusy] = useState(false);
  const [toast, showToast] = useToast();
  const [testing, setTesting] = useState(false);
  const [testRes, setTestRes] = useState(null);
  const isOwner = profile.role==='owner';

  const sendTestPush = async ()=>{
    setTesting(true); setTestRes(null);
    try{
      const res = await fetch('/.netlify/functions/push-test', {
        method:'POST',
        headers: await authHeaders(),
      });
      const j = await res.json();
      setTestRes(j);
    }catch(e){ setTestRes({ ok:false, error:String(e.message||e) }); }
    setTesting(false);
  };

  useEffect(()=>{
    const onReady = ()=>setInstallable(true);
    window.addEventListener('pwa-ready', onReady);
    return ()=>window.removeEventListener('pwa-ready', onReady);
  },[]);

  useEffect(()=>{ (async()=>{
    if(!('serviceWorker' in navigator) || !('PushManager' in window)){
      if(isIOS() && !standalone) setNotifState('ios-needs-install');
      else setNotifState('unsupported');
      return;
    }
    if(isIOS() && !standalone){ setNotifState('ios-needs-install'); return; }
    if(Notification.permission === 'denied'){ setNotifState('denied'); return; }
    try{
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      setNotifState(sub ? 'on' : 'off');
    }catch(e){ setNotifState('off'); }
  })(); },[standalone]);

  const install = async ()=>{
    const p = window._pwaPrompt; if(!p) return;
    p.prompt(); await p.userChoice; window._pwaPrompt = null; setInstallable(false);
  };

  const enableNotif = async ()=>{
    setBusy(true);
    try{
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ setNotifState(perm === 'denied' ? 'denied' : 'off'); setBusy(false); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(window.__VAPID_PUBLIC__),
      });
      const json = sub.toJSON();
      const { error } = await sb.from('push_subscriptions').upsert({
        endpoint: json.endpoint, profile_id: profile.id, role: profile.role, subscription: json,
      }, { onConflict: 'endpoint' });
      if(error){ showToast('Could not save: '+error.message); setBusy(false); return; }
      setNotifState('on'); showToast('Notifications enabled');
    }catch(e){ showToast('Failed: '+e.message); }
    setBusy(false);
  };

  const disableNotif = async ()=>{
    setBusy(true);
    try{
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if(sub){ const ep = sub.endpoint; await sub.unsubscribe();
        await sb.from('push_subscriptions').delete().eq('endpoint', ep); }
      setNotifState('off'); showToast('Notifications disabled');
    }catch(e){ showToast('Failed: '+e.message); }
    setBusy(false);
  };

  return <div className="grid2">
    <div className="card">
      <h3>Install as an app</h3>
      {standalone
        ? <div className="pos" style={{fontSize:14}}>✓ Running as an installed app</div>
        : installable
          ? <><div className="muted" style={{marginBottom:12,fontSize:13.5}}>Install Ugly Finance on this device for a full-screen app with its own icon.</div>
              <button className="btn btn-gold" onClick={install}>Install app</button></>
          : isIOS()
            ? <div>
                <div className="muted" style={{marginBottom:12,fontSize:13.5}}>To install on your iPhone or iPad (Safari):</div>
                <ol className="install-steps">
                  <li>Tap the <b>Share</b> button <span className="ios-ic">⬆︎</span> at the bottom of Safari.</li>
                  <li>Scroll down and tap <b>Add to Home Screen</b> <span className="ios-ic">⊕</span>.</li>
                  <li>Tap <b>Add</b>, then open <b>Ugly Finance</b> from your home screen.</li>
                  <li>Come back here and turn on notifications.</li>
                </ol>
              </div>
            : <div className="muted" style={{fontSize:13.5}}>Open this site in Chrome (Android or desktop) to see an install option.</div>}
    </div>
    <div className="card">
      <h3>Notifications</h3>
      {notifState==='checking' && <div className="faint">Checking...</div>}
      {notifState==='unsupported' && <div className="muted" style={{fontSize:13.5}}>This browser does not support push notifications.</div>}
      {notifState==='ios-needs-install' && <div className="muted" style={{fontSize:13.5}}>Install the app first (see left/above), then open Ugly Finance from your home screen and enable notifications from there. Requires iOS 16.4 or later.</div>}
      {notifState==='denied' && <div className="muted" style={{fontSize:13.5}}>Notifications are blocked. Turn them on for Ugly Finance in your device Settings, then reload.</div>}
      {notifState==='off' && <><div className="muted" style={{marginBottom:12,fontSize:13.5}}>
        {profile.role==='investor' ? 'Get notified when a new monthly report is published.' : 'Get notified when an expense needs approval or a cash count is off.'}</div>
        <button className="btn btn-gold" disabled={busy} onClick={enableNotif}>{busy?'...':'Turn on notifications'}</button></>}
      {notifState==='on' && <><div className="pos" style={{marginBottom:12,fontSize:14}}>✓ Notifications are on</div>
        <button className="btn" disabled={busy} onClick={disableNotif}>Turn off</button></>}
      {isOwner && (notifState==='on'||notifState==='off') && <>
        <hr className="divider"/>
        <h3 style={{fontSize:14,marginBottom:4}}>Diagnostics</h3>
        <div className="muted" style={{fontSize:13,marginBottom:10}}>Fire a real test push to this device and see each step's result (env keys, key loading, send status).</div>
        <button className="btn" disabled={testing} onClick={sendTestPush}>{testing?'Sending...':'Send test push'}</button>
        {testRes && <div className="push-diag" style={{marginTop:12}}>
          <div className={testRes.ok?'pos':'neg'} style={{fontWeight:700,marginBottom:6,fontSize:13.5}}>
            {testRes.ok ? '✓ ok: sent successfully' : '✕ ok: false'+(testRes.reason?' — '+testRes.reason:'')+(testRes.error?' — '+testRes.error:'')}</div>
          {testRes.steps && <table className="t" style={{fontSize:12.5}}><tbody>
            <tr><td>VAPID_PUBLIC_KEY</td><td className="num mono">{testRes.steps.envPublic}</td></tr>
            <tr><td>VAPID_PRIVATE_KEY</td><td className="num mono">{testRes.steps.envPrivate}</td></tr>
            <tr><td>Key format</td><td className="num mono">{testRes.steps.keyFormat}</td></tr>
            <tr><td>Key loads (EC)</td><td className="num mono">{String(testRes.steps.keyLoads)}{testRes.steps.keyType?` (${testRes.steps.keyType})`:''}</td></tr>
            {testRes.steps.keyError && <tr><td>Key error</td><td className="num mono neg">{testRes.steps.keyError}</td></tr>}
            <tr><td>Subscriptions</td><td className="num mono">{testRes.steps.subscriptions}</td></tr>
            {testRes.steps.sent!=null && <tr><td>Sent</td><td className="num mono">{testRes.steps.sent}</td></tr>}
            {testRes.steps.gone>0 && <tr><td>Expired removed</td><td className="num mono">{testRes.steps.gone}</td></tr>}
          </tbody></table>}
          {testRes.steps && testRes.steps.results && testRes.steps.results.length>0 && <div className="hint" style={{marginTop:8}}>
            {testRes.steps.results.map((r,i)=><div key={i} className="mono" style={{fontSize:11.5}}>
              {r.error ? `✕ ${r.error}` : r.gone ? '⌫ expired (removed)' : `status ${r.status} ${r.ok?'✓':''}`}</div>)}
          </div>}
        </div>}
      </>}
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

      </div>
    </>}
  </div>;
}

// ================= RATES (royalty / marketing, effective-from) =================
function RatesManager({corps, canEditIds, activeCorp, onCorp}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useCorpSelection(editable, activeCorp, onCorp);
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [f, setF] = useState({rate_type:'royalty', pct:'', effective_from:todayStr()});
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!corpId) return; setLoading(true);
    const { data } = await sb.from('rate_schedule').select('*')
      .eq('corporation_id',corpId).order('rate_type').order('effective_from',{ascending:false});
    setRows(data||[]); setLoading(false);
  },[corpId]);
  useEffect(()=>{ reload(); },[reload]);

  const add = async()=>{
    const pct = parseFloat(f.pct);
    if(isNaN(pct)){ showToast('Enter a rate percentage'); return; }
    if(!f.effective_from){ showToast('Choose an effective-from date'); return; }
    const { error } = await sb.from('rate_schedule').insert({
      corporation_id:corpId, rate_type:f.rate_type, rate:pct/100, effective_from:f.effective_from });
    if(error){ showToast('Save failed: '+error.message); return; }
    setF({rate_type:f.rate_type, pct:'', effective_from:todayStr()});
    showToast('Rate added'); reload();
  };
  const del = async(r)=>{
    if(!confirm(`Remove this ${r.rate_type} rate effective ${r.effective_from}?`)) return;
    const { error } = await sb.from('rate_schedule').delete().eq('id',r.id);
    if(error){ showToast('Delete failed: '+error.message); return; }
    reload();
  };

  const RATE_LABEL = {royalty:'Royalty', marketing:'Marketing Fee'};
  if(!editable.length) return <div className="card">No corporations available.</div>;
  const byType={}; rows.forEach(r=>{ (byType[r.rate_type]=byType[r.rate_type]||[]).push(r); });

  return <div>
    <div className="page-head" style={{marginBottom:14}}>
      <div><div className="sub sec-desc">Royalty and marketing rates with an effective-from date. When a rate changes (e.g. 5% to 6%), add a new row with the start date. The most recent rate on or before a month is used for that month's automatic calculation.</div></div>
      <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
    </div>
    <div className="card">
      <h3>Add / Change a Rate</h3>
      <div className="form-row">
        <div style={{flex:1}}>
          <label className="hint" style={{marginTop:0}}>Type</label>
          <select value={f.rate_type} onChange={e=>setF({...f,rate_type:e.target.value})}>
            <option value="royalty">Royalty</option>
            <option value="marketing">Marketing Fee</option>
          </select>
        </div>
        <div style={{flex:1}}>
          <label className="hint" style={{marginTop:0}}>Rate (%)</label>
          <input type="number" step="0.01" placeholder="e.g. 6" value={f.pct} onChange={e=>setF({...f,pct:e.target.value})}/>
        </div>
        <div style={{flex:1}}>
          <label className="hint" style={{marginTop:0}}>Effective from</label>
          <input type="date" value={f.effective_from} onChange={e=>setF({...f,effective_from:e.target.value})}/>
        </div>
      </div>
      <button className="btn btn-gold" onClick={add} style={{marginTop:12}}>Add Rate</button>
    </div>
    {loading ? <Spinner/> : Object.keys(byType).length===0
      ? <div className="card faint">No rates set yet. Royalty uses the database default until you add one here.</div>
      : Object.keys(byType).map(type=>(
        <div className="card" key={type}>
          <h3>{RATE_LABEL[type]||type} history</h3>
          <table className="t"><tbody>
            {byType[type].map((r,i)=><tr key={r.id}>
              <td>{i===0 && <span className="badge gold">Current</span>} From {r.effective_from}</td>
              <td className="num mono">{(Number(r.rate)*100).toFixed(2)}%</td>
              <td style={{textAlign:'right'}}><button className="btn btn-sm btn-danger" onClick={()=>del(r)}>Remove</button></td>
            </tr>)}
          </tbody></table>
        </div>
      ))}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

function OwnersManager({corps, canEditIds, activeCorp, onCorp}){
  const editable = corps.filter(c=>canEditIds.has(c.id) && c.corp_type!=='franchisee');
  const [corpId, setCorpId] = useCorpSelection(editable, activeCorp, onCorp);
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [nf, setNf] = useState({holder:'', pct:''});
  const [namePop, setNamePop] = useState(null); // holder id whose full name is shown
  useEffect(()=>{
    if(!namePop) return;
    const close = ()=>setNamePop(null);
    const t = setTimeout(()=>document.addEventListener('click', close), 0);
    return ()=>{ clearTimeout(t); document.removeEventListener('click', close); };
  },[namePop]);
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!corpId) return; setLoading(true);
    const { data } = await sb.from('ownership').select('*').eq('corporation_id',corpId).order('display_order');
    setRows(data||[]); setLoading(false);
  },[corpId]);
  useEffect(()=>{ reload(); },[reload]);

  const total = rows.reduce((a,r)=>a+Number(r.pct||0),0);

  const add = async()=>{
    const holder=nf.holder.trim(); const pct=parseFloat(nf.pct);
    if(!holder){ showToast('Enter a holder name'); return; }
    if(isNaN(pct)){ showToast('Enter a percentage'); return; }
    const maxOrd=Math.max(0,...rows.map(r=>r.display_order||0));
    const { error } = await sb.from('ownership').insert({ corporation_id:corpId, holder, pct, display_order:maxOrd+1 });
    if(error){ showToast('Add failed: '+error.message); return; }
    setNf({holder:'',pct:''}); showToast('Added'); reload();
  };
  const updatePct = async(r,val)=>{
    const pct=parseFloat(val); if(isNaN(pct)) return;
    const { error } = await sb.from('ownership').update({pct}).eq('id',r.id);
    if(error){ showToast('Update failed: '+error.message); return; } reload();
  };
  const rename = async(r)=>{
    const holder=(prompt('Holder name', r.holder)||'').trim();
    if(!holder||holder===r.holder) return;
    await sb.from('ownership').update({holder}).eq('id',r.id); reload();
  };
  const remove = async(r)=>{
    if(!confirm(`Remove ${r.holder}?`)) return;
    await sb.from('ownership').delete().eq('id',r.id); reload();
  };

  if(!editable.length) return <div className="card">No corporations available.</div>;

  return <div>
    <div className="page-head" style={{marginBottom:14}}>
      <div><div className="sub sec-desc">Profit distribution per store. Holders and percentages can change over time (a store's investors may differ or be replaced). This is owner-only and never appears in published reports.</div></div>
      <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
    </div>
    <div className="card">
      <h3>Shareholders / Profit Split</h3>
      {loading ? <Spinner/> : <>
        <table className="t own-table"><thead><tr><th>Holder</th><th className="num">Share %</th><th></th></tr></thead>
          <tbody>
            {rows.map(r=><tr key={r.id}>
              <td className="own-name-cell">
                <span className="own-name" onClick={()=>setNamePop(namePop===r.id?null:r.id)}>{r.holder}</span>
                {namePop===r.id && <span className="own-name-pop" onClick={()=>setNamePop(null)}>{r.holder}</span>}
              </td>
              <td className="num own-pct-cell">
                <input type="number" step="0.01" defaultValue={Number(r.pct)} key={r.id+r.pct}
                  onBlur={e=>updatePct(r,e.target.value)} className="own-pct"/>
              </td>
              <td className="own-acts-cell">
                <button className="btn btn-sm" onClick={()=>rename(r)}>Rename</button>
                <button className="btn btn-sm btn-danger" style={{marginLeft:6}} onClick={()=>remove(r)}>Remove</button>
              </td></tr>)}
            <tr className="total"><td>Total</td>
              <td className={'num '+(Math.abs(total-100)<0.01?'pos':'neg')}>{total.toFixed(2)}%</td><td></td></tr>
          </tbody>
        </table>
        {Math.abs(total-100)>=0.01 && <div className="hint" style={{color:'var(--danger)'}}>Shares add up to {total.toFixed(2)}%, not 100%.</div>}
        <hr className="divider"/>
        <div className="form-row">
          <input placeholder="Holder name (e.g. AD TREE, LALIC, HQ)" value={nf.holder} onChange={e=>setNf({...nf,holder:e.target.value})}/>
          <input type="number" step="0.01" placeholder="Share %" className="w-sm" value={nf.pct} onChange={e=>setNf({...nf,pct:e.target.value})}/>
          <button className="btn" style={{flex:'0 0 auto'}} onClick={add}>Add Holder</button>
        </div>
      </>}
    </div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ============ SLACK RECEIPT AUTO-APPROVAL (owner-controlled) ============
// Reads/writes app_settings.slack_autoapprove_mode. The Netlify slack-expense function
// reads the same value at capture time to decide pending vs auto-confirmed.
function SlackAutoApprove({profile}){
  const isOwner = profile.role==='owner';
  const [mode,setMode] = useState(null);
  const [busy,setBusy] = useState(false);
  const [err,setErr]   = useState('');
  useEffect(()=>{ let live=true; (async()=>{
    const { data } = await sb.from('app_settings').select('value').eq('key','slack_autoapprove_mode').maybeSingle();
    if(live) setMode((data&&data.value)||'off');
  })(); return ()=>{ live=false; }; },[]);
  const save = async (m)=>{
    if(!isOwner || busy || m===mode) return;
    setBusy(true); setErr('');
    const { error } = await sb.from('app_settings').upsert(
      { key:'slack_autoapprove_mode', value:m, updated_at:new Date().toISOString(), updated_by:profile.id },
      { onConflict:'key' });
    if(error) setErr(error.message||'Could not save.'); else setMode(m);
    setBusy(false);
  };
  const OPTIONS = [
    ['off','Off','Every Slack receipt goes to Approvals as pending. Nothing is auto-confirmed. Use this while you are still checking the capture.'],
    ['semi','Semi','Auto-confirm only receipts that match a kind of expense you have approved before. Anything new or unfamiliar stays pending.'],
    ['full','Full','Auto-confirm every receipt Claude reads with confidence. Only unreadable or low-confidence ones stay pending.'],
  ];
  return <div className="card">
    <h3>Slack receipt auto-approval</h3>
    <div className="sub" style={{marginBottom:12}}>What happens when a receipt is posted in the Slack expense channels. Applies to all stores.</div>
    {mode===null ? <div className="sub">Loading...</div> :
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {OPTIONS.map(([id,label,desc])=>
          <button key={id} type="button" disabled={!isOwner||busy}
            className={'autoapprove-opt'+(mode===id?' on':'')} onClick={()=>save(id)}>
            <div className="aa-row"><span className="aa-label">{label}</span>{mode===id && <span className="aa-current">Current</span>}</div>
            <div className="aa-desc">{desc}</div>
          </button>)}
      </div>}
    {!isOwner && <div className="hint" style={{marginTop:10}}>Only the Owner can change this.</div>}
    {err && <div className="hint" style={{marginTop:10,color:'var(--red)'}}>{err}</div>}
  </div>;
}

// ================= SETTINGS =================
// Lets the owner rename franchise stores (Toast names are all identical, so a friendly
// display name is set here) and hide/show them. Auto-created stores appear here as they
// come in from the Toast sync.
function FranchisesManager({franchiseCorps}){
  const [rows, setRows] = useState(()=>franchiseCorps.map(c=>({...c})));
  const [savingId, setSavingId] = useState(null);
  const [msg, setMsg] = useState('');
  const save = async (id, patch) => {
    setSavingId(id);
    const { error } = await sb.from('corporations').update(patch).eq('id', id);
    setSavingId(null);
    if(error){ setMsg('Could not save: '+error.message); return; }
    setRows(rs=>rs.map(r=>r.id===id?{...r, ...patch}:r));
    setMsg('Saved.');
    setTimeout(()=>setMsg(''), 1500);
  };
  if(!rows.length) return <div className="card">No franchise stores yet. They appear here automatically once Toast syncs them.</div>;
  return <div className="card">
    <h3>Franchise stores</h3>
    <div className="hint" style={{marginTop:4,marginBottom:12}}>Rename a store for display, or hide one that has closed. These are revenue-only on our books.</div>
    <table className="t"><thead><tr>
      <th>Display name</th><th>Code</th><th>Timezone</th><th className="num">Visible</th>
    </tr></thead><tbody>
      {rows.map(c=><tr key={c.id}>
        <td>
          <input className="fr-name-input" defaultValue={c.display_name || c.name || ''}
            onBlur={e=>{ const v=e.target.value.trim(); if(v && v!==(c.display_name||c.name)) save(c.id,{display_name:v}); }}/>
        </td>
        <td className="mono faint">{c.code}</td>
        <td className="faint" style={{fontSize:12}}>{c.timezone || '—'}</td>
        <td className="num">
          <button className={'fr-vis-btn'+(c.hidden?'':' on')} disabled={savingId===c.id}
            onClick={()=>save(c.id,{hidden:!c.hidden})}>
            {c.hidden ? 'Hidden' : 'Shown'}
          </button>
        </td>
      </tr>)}
    </tbody></table>
    {msg && <div className="hint" style={{marginTop:10}}>{msg}</div>}
  </div>;
}

// ================= HOME (TODAY) =================
function Home({corps, franchiseCorps=[], allStoreCorps=[], canEditIds, profile, isOwner, readOnly, goEntry, goInsights, goClose, goApprovals}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  // Franchise stores are revenue-only; still load their sales so Home can show them in
  // their own section and roll them into the system-wide total. Their expense figures
  // come back as 0 (we don't hold their costs), which is correct.
  const franchises = franchiseCorps;
  const loadCorps = [...editable, ...franchises];
  const ids = loadCorps.map(c=>c.id);
  const [data, setData] = useState(null);
  const [detail, setDetail] = useState(null);   // {corp, store-data} for the day-breakdown popup
  const [date, setDate] = useState(todayStr()); // the day the cards are showing
  const isToday = date === todayStr();
  const realNow = new Date();
  // All windows (month-to-date, 7-day trend, last week's same day) are anchored to the
  // selected day, so stepping back a day shows what that day actually looked like.
  const now = new Date(date + 'T12:00');
  const shiftDay = n => {
    const d = new Date(date + 'T12:00');
    d.setDate(d.getDate() + n);
    const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (s <= todayStr()) setDate(s);
  };
  const prev = now.getMonth()===0 ? {y:now.getFullYear()-1,m:12} : {y:now.getFullYear(),m:now.getMonth()};

  // Live refresh: while the live day is on screen, re-pull every 60s so the cards
  // follow the syncs (Toast every 10 min, inventory every minute) without a manual
  // reload. Past days are static, so they are fetched once.
  const [tick, setTick] = useState(0);
  useEffect(()=>{
    if(!isToday) return;
    const iv = setInterval(()=>{
      if(document.visibilityState === 'visible') setTick(t=>t+1);   // no polling in the background
    }, 60000);
    const onShow = ()=>{ if(document.visibilityState === 'visible') setTick(t=>t+1); };
    document.addEventListener('visibilitychange', onShow);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange', onShow); };
  },[isToday]);

  useEffect(()=>{ if(!ids.length){ setData({}); return; } let dead=false;
    (async()=>{
      const monthStart = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
      // 14-day window: last 7 days for the mini trend + the same weekday last week
      const win = new Date(now); win.setDate(win.getDate()-13);
      const winStart = `${win.getFullYear()}-${pad(win.getMonth()+1)}-${pad(win.getDate())}`;
      // last week same weekday, for the same-time-of-day snapshot comparison
      const lwD = new Date(now); lwD.setDate(lwD.getDate()-7);
      const lwIso = `${lwD.getFullYear()}-${pad(lwD.getMonth()+1)}-${pad(lwD.getDate())}`;
      // store-local time of day in minutes (all stores run on Eastern time)
      const _tp = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'numeric',hourCycle:'h23'}).formatToParts(new Date());
      const _g = t => Number((_tp.find(x=>x.type===t)||{}).value||0);
      const nowMin = _g('hour')*60 + _g('minute');
      const [chAll, revToday, expToday, pend, revMonth, closes, rev14, snaps] = await Promise.all([
        sb.from('revenue_channels').select('id,corporation_id,code,name,counts_in_total,total_multiplier').in('corporation_id',ids),
        sb.from('daily_revenue').select('corporation_id,channel_id,amount,source').in('corporation_id',ids).eq('date',date),
        sb.from('expenses').select('corporation_id').in('corporation_id',ids).eq('date',date).eq('status','confirmed'),
        sb.from('expenses').select('corporation_id').in('corporation_id',ids).eq('status','pending'),
        // Month-to-date: only need WHICH DAYS have revenue (for the "days entered" count).
        // The server returns one row per (store, day) instead of every revenue row.
        sb.rpc('home_days_with_revenue', { p_corp_ids: ids, p_start: monthStart, p_end: date }),
        isOwner ? sb.from('monthly_close').select('corporation_id,status').in('corporation_id',ids).eq('year',prev.y).eq('month',prev.m) : Promise.resolve({data:[]}),
        // 14-day window: the server returns each store's per-day counted-in total (channel
        // multiplier and counts_in_total already applied), not the raw rows.
        sb.rpc('home_daily_sales', { p_corp_ids: ids, p_start: winStart, p_end: date }),
        // hourly snapshots of last week's same day; missing table or rows just
        // falls back to the full-day comparison, so errors are ignored
        sb.from('revenue_snapshots').select('corporation_id,hour,minute,amount').in('corporation_id',ids).eq('date',lwIso).then(r=>r, ()=>({data:[]})),
      ]);
      if(dead) return;
      const chBy = {}; (chAll.data||[]).forEach(c=>chBy[c.id]=c);
      const per = {};
      editable.forEach(c=>per[c.id]={sales:0,revRows:0,synced:false,exp:0,pending:0,daysDone:new Set(),closed:false,week:[],lastSameDay:null,channels:[]});
      const chTot = {}; ids.forEach(id=>chTot[id]={});
      (revToday.data||[]).forEach(r=>{
        const p=per[r.corporation_id]; if(!p) return;
        const ch=chBy[r.channel_id];
        if(ch && ch.counts_in_total) p.sales += Number(r.amount)*Number(ch.total_multiplier);
        if(Number(r.amount)>0) p.revRows++;
        if(r.source!=='manual' && r.source!=='import') p.synced=true;
        // accumulate per-channel for today's breakdown popup
        if(ch){ const t=chTot[r.corporation_id]; if(t){ t[ch.id]=t[ch.id]||{name:ch.name||ch.code,ch,amount:0}; t[ch.id].amount+=Number(r.amount)*Number(ch.total_multiplier||1); } }
      });
      (expToday.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].exp++; });
      (pend.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].pending++; });
      ((revMonth&&revMonth.data)||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].daysDone.add(r.date); });
      (closes.data||[]).forEach(r=>{ if(per[r.corporation_id]) per[r.corporation_id].closed = r.status==='published'; });
      // per-day totals over the 14-day window. The server already applied counts_in_total
      // and the channel multiplier, so each row is a store's finished daily total.
      const dayTot = {}; ids.forEach(id=>dayTot[id]={});
      ((rev14&&rev14.data)||[]).forEach(r=>{ const t=dayTot[r.corporation_id]; if(!t) return;
        t[r.date]=(t[r.date]||0)+Number(r.total); });
      const dstr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      editable.forEach(c=>{ const t=dayTot[c.id]||{};
        const week=[]; for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i);
          const ds=dstr(d); week.push({date:ds, dow:d.getDay(), amount:t[ds]||0}); }
        per[c.id].week=week;
        const lw=new Date(now); lw.setDate(lw.getDate()-7);
        per[c.id].lastSameDay = t[dstr(lw)]!=null ? t[dstr(lw)] : null;   // same weekday last week
        // same weekday last week, as of the same hour of day (snapshot with the
        // greatest hour <= now). Null when no snapshot history exists yet.
        const mins = s => s.hour*60 + (s.minute||0);
        const snapRows = ((snaps&&snaps.data)||[]).filter(s=>s.corporation_id===c.id && mins(s) <= nowMin);
        if(snapRows.length){
          const best = snapRows.reduce((a,s)=> mins(s)>mins(a) ? s : a);
          per[c.id].lastSameTime = Number(best.amount);
        } else { per[c.id].lastSameTime = null; }
        // today's per-channel breakdown, largest first, only channels with revenue
        per[c.id].channels = Object.values(chTot[c.id]||{})
          .filter(x=>x.ch.counts_in_total && Number(x.amount)>0)
          .sort((a,b)=>b.amount-a.amount)
          .map(x=>({name:x.name, amount:x.amount}));
      });
      setData(per);
    })();
    return ()=>{dead=true};
  },[ids.join(','), date, tick]);

  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  if(!data) return <Spinner/>;
  const dayOfMonth = now.getDate();
  const totalPending = ids.reduce((a,id)=>a+(data[id]?data[id].pending:0),0);
  const unclosed = isOwner ? editable.filter(c=>data[c.id] && !data[c.id].closed) : [];
  const firstName = (profile.full_name||'').split(' ')[0] || 'there';

  // Renders a set of store cards. For franchise stores (isFr=true) the card is
  // revenue-only: no pending badge, no Income/Expense buttons (we don't book their costs).
  const renderStoreCards = (list, isFr) => list.map(c=>{
    const p = data[c.id] || {sales:0,revRows:0,synced:false,exp:0,pending:0,daysDone:new Set(),closed:false,week:[],lastSameDay:null};
    const done = p.revRows>0;
    const lsd = p.lastSameDay;
    const lst = isToday ? p.lastSameTime : null;
    const base = lst!=null ? lst : lsd;
    const delta = (base!=null && base>0) ? (p.sales-base)/base : null;
    const week = p.week||[];
    const dowLbl = DOW[week.length?week[week.length-1].dow:now.getDay()];
    const wkMax = Math.max(1, ...week.map(d=>d.amount));
    const label = c.display_name || c.code;
    return <div key={c.id} className={'home-card'+(done?' done':'')+(isFr?' home-card-fr':'')} onClick={()=>setDetail({corp:c, p, isFr})}>
      {done && <div className="hc-check">✓</div>}
      {!isFr && p.pending>0 && <div className="hc-pend-badge" style={{right:done?38:14}}><span className="dot warn"></span>{p.pending} pending</div>}
      <div className="hc-code hc-code-big">{label}</div>
      <div className="hc-amt"><span className="cur">$</span>{p.sales.toLocaleString('en-US',{maximumFractionDigits:0})}<span className="cur"> {isToday ? 'today' : `${MONTHS[now.getMonth()].slice(0,3)} ${now.getDate()}`}</span></div>
      <div className="hc-cmp">
        {lst!=null && delta!=null
          ? <><span className={delta>=0?'pos':'neg'}>{delta>=0?'▲':'▼'} {Math.abs(delta*100).toFixed(0)}%</span> <span className="faint">vs last {dowLbl} same time ({fmt$k(lst)})</span></>
          : lst!=null
          ? <span className="faint">Last {dowLbl} same time: {fmt$k(lst)}</span>
          : lsd!=null && delta!=null
          ? <><span className={delta>=0?'pos':'neg'}>{delta>=0?'▲':'▼'} {Math.abs(delta*100).toFixed(0)}%</span> <span className="faint">vs last {dowLbl} ({fmt$k(lsd)}{isToday?' full day':''})</span></>
          : lsd!=null
          ? <span className="faint">Last {DOW[now.getDay()]}: {fmt$k(lsd)}</span>
          : <span className="faint">No sales last {dowLbl}</span>}
      </div>
      <div className="hc-spark" title="Last 7 days">
        {week.length>0
          ? week.map((d,i)=><div key={i} className={'hc-spark-bar'+(i===week.length-1?' today':'')}
              style={{height:Math.max(8,Math.round(d.amount/wkMax*100))+'%'}} title={`${DOW[d.dow]} ${fmt$k(d.amount)}`}></div>)
          : null}
      </div>
      {!isFr && !readOnly && <div className="hc-actions">
        <button className="hc-btn income" onClick={e=>{e.stopPropagation(); goEntry(c.id,'income');}}>Income</button>
        <button className="hc-btn expense" onClick={e=>{e.stopPropagation(); goEntry(c.id,'expense');}}>Expense</button>
      </div>}
    </div>;
  });

  return <div>
    <div className="greet">Good {realNow.getHours()<12?'morning':realNow.getHours()<18?'afternoon':'evening'}, {firstName}.</div>
    <div className="greet-sub">{isToday ? 'Tap a store to see its sales detail.' : 'Viewing a past day. Tap a store to see its sales detail.'}</div>

    <div className="day-nav">
      <button className="btn btn-sm" onClick={()=>shiftDay(-1)} aria-label="Previous day">‹</button>
      <div className="day-nav-label">
        <b>{MONTHS[now.getMonth()]} {now.getDate()}</b>
        <span className="faint">{isToday ? 'Today' : DOW[now.getDay()]}</span>
      </div>
      <button className="btn btn-sm" disabled={isToday} onClick={()=>shiftDay(1)} aria-label="Next day">›</button>
      {!isToday && <button className="btn btn-sm btn-gold day-nav-today" onClick={()=>setDate(todayStr())}>Today</button>}
    </div>

    {totalPending>0 && !readOnly && <div style={{marginBottom:20}}>
      <div className="quest">
        <div className="q-ico">!</div>
        <div className="grow"><div className="q-t">{totalPending} item{totalPending>1?'s':''} waiting for approval</div>
          <div className="q-s">Review and confirm in the Approval Center</div></div>
        <button className="btn btn-sm btn-gold" onClick={goApprovals}>Review</button>
      </div>
    </div>}

    {(()=>{
      // System-wide rollup: today's sales across every operating store (corporate +
      // franchise), so John can see how the whole Ugly Donuts system is doing. HQ/UMMA
      // are not stores and are already excluded from allStoreCorps.
      const allIds = new Set(allStoreCorps.map(c=>c.id));
      let sysToday = 0, sysStores = 0;
      loadCorps.forEach(c=>{ if(!allIds.has(c.id)) return; const p=data[c.id]; if(p){ sysToday+=Number(p.sales||0); sysStores++; } });
      if(allStoreCorps.length<=1) return null;
      return <div className="card allstores-card" onClick={goInsights} style={{cursor:'pointer',marginBottom:16}}>
        <div className="as-row">

            <div className="as-sub faint">{sysStores} store{sysStores!==1?'s':''} · system-wide sales</div>
          </div>
          <div className="as-amt"><span className="cur">$</span>{sysToday.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
        </div>
      </div>;
    })()}

    <div className="home-grid">
      {renderStoreCards(editable)}
    </div>

    {franchises.length>0 && <>
      <div className="home-section-head">Franchise stores <span className="faint">· revenue only</span></div>
      <div className="home-grid">
        {renderStoreCards(franchises, true)}
      </div>
    </>}

    {detail && (()=>{
      const p = detail.p||{}; const chans = p.channels||[];
      const chTotal = chans.reduce((a,c)=>a+Number(c.amount),0);
      return <div className="modal-overlay" onClick={()=>setDetail(null)}>
        <div className="store-detail" onClick={e=>e.stopPropagation()}>
          <div className="sd-head">
            <div>
              <div className="sd-code">{detail.corp.display_name || detail.corp.code}</div>
              <div className="sd-name">{detail.isFr ? 'Franchise store · revenue only' : detail.corp.name}</div>
            </div>
            <button className="sd-close" onClick={()=>setDetail(null)} aria-label="Close">✕</button>
          </div>
          <div className="sd-total-lbl">{MONTHS[now.getMonth()]} {now.getDate()} · {isToday ? 'Sales today' : 'Sales'}</div>
          <div className="sd-total">{fmt$(p.sales||0)}</div>
          {chans.length===0
            ? <div className="sd-empty">{isToday ? 'No sales recorded yet today.' : 'No sales recorded on this day.'}</div>
            : <div className="sd-channels">
                {chans.map((c,i)=>{ const pct=chTotal?Number(c.amount)/chTotal*100:0;
                  return <div key={i} className="rev-row">
                    <div className="rev-row-top"><span className="rev-name">{c.name}</span><span className="rev-amt">{fmt$(Number(c.amount))}</span></div>
                    <div className="rev-bar-wrap"><div className="rev-bar" style={{width:pct+'%'}}></div></div>
                    <div className="rev-pct">{pct.toFixed(1)}%</div>
                  </div>; })}
              </div>}
          <button className="btn btn-gold sd-more" onClick={()=>{ const id=detail.corp.id; setDetail(null); goInsights(id); }}>Open full breakdown</button>
        </div>
      </div>;
    })()}
  </div>;
}

function NotificationBell({profile, onNavigate, currentTab}){
  const [open,setOpen]=useState(false);
  const [items,setItems]=useState([]);
  const [reads,setReads]=useState(new Set());
  const ref=React.useRef(null);
  const load=useCallback(async()=>{
    const [nt, rd]=await Promise.all([
      sb.from('notifications').select('*').order('created_at',{ascending:false}).limit(50),
      sb.from('notification_reads').select('notification_id').eq('user_id',profile.id),
    ]);
    let list=(nt.data||[]).filter(n=>{
      if(!n.target_role) return true;
      if(n.target_role==='staff') return profile.role==='owner'||profile.role==='assistant';
      return n.target_role===profile.role;
    });
    setItems(list);
    setReads(new Set((rd.data||[]).map(r=>r.notification_id)));
  },[profile.id, profile.role]);
  useEffect(()=>{ load(); const iv=setInterval(load,60000); return ()=>clearInterval(iv); },[load]);
  useEffect(()=>{
    // Re-sync the badge when the app regains focus (e.g. after acting on an item elsewhere,
    // or reads made on another device), so the count doesn't go stale.
    const r=()=>{ if(document.visibilityState==='visible') load(); };
    document.addEventListener('visibilitychange', r);
    window.addEventListener('focus', r);
    return ()=>{ document.removeEventListener('visibilitychange', r); window.removeEventListener('focus', r); };
  },[load]);
  useEffect(()=>{
    const h=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    if(open) document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[open]);
  const unread=items.filter(n=>!reads.has(n.id)).length;
  const markRead=async(id)=>{
    if(reads.has(id)) return;
    setReads(prev=>new Set([...prev, id]));   // update badge immediately
    try{ await sb.from('notification_reads').upsert({user_id:profile.id, notification_id:id},{onConflict:'user_id,notification_id'}); }catch(e){}
  };
  // Viewing the tab a notification points to counts as reading it: e.g. opening Approvals
  // (to approve an expense) clears the pending-approval alerts; opening Reports clears
  // published-report alerts. This keeps the badge in sync even when items are resolved
  // without opening the bell.
  useEffect(()=>{
    if(!currentTab || !items.length) return;
    const toMark = items.filter(n=>!reads.has(n.id) && n.link_tab===currentTab).map(n=>n.id);
    if(!toMark.length) return;
    setReads(prev=>new Set([...prev, ...toMark]));
    sb.from('notification_reads').upsert(toMark.map(id=>({user_id:profile.id, notification_id:id})),{onConflict:'user_id,notification_id'}).then(()=>{},()=>{});
  },[currentTab, items, reads, profile.id]);
  const markAll=async()=>{
    const unreadIds=items.filter(n=>!reads.has(n.id)).map(n=>n.id);
    if(!unreadIds.length) return;
    setReads(new Set([...reads, ...unreadIds]));
    try{ await sb.from('notification_reads').upsert(unreadIds.map(id=>({user_id:profile.id, notification_id:id})),{onConflict:'user_id,notification_id'}); }catch(e){}
  };
  const openPanel=()=>{ setOpen(o=>{ const n=!o; if(n) setTimeout(markAll,1200); return n; }); };
  const timeAgo=(ts)=>{ const s=(Date.now()-new Date(ts))/1000; if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; };
  return <div className="bell" ref={ref}>
    <button className="bell-btn" onClick={openPanel} aria-label="Notifications">
      <span className="bell-ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.5a5.5 5.5 0 0 0-5.5 5.5c0 4-1.5 5.5-2.5 6.5h16c-1-1-2.5-2.5-2.5-6.5A5.5 5.5 0 0 0 12 2.5z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/>
          <path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/>
        </svg>
      </span>
      {unread>0 && <span className="bell-badge">{unread>9?'9+':unread}</span>}
    </button>
    {open && <div className="bell-panel">
      <div className="bell-head"><span>Notifications</span>{unread>0 && <button className="bell-clear" onClick={markAll}>Mark all read</button>}</div>
      {items.length===0 ? <div className="bell-empty">No notifications yet.</div> :
        items.map(n=><button key={n.id} className={'bell-item'+(reads.has(n.id)?'':' unread')}
          onClick={()=>{ markRead(n.id); if(n.link_tab && onNavigate) onNavigate(n.link_tab); setOpen(false); }}>
          <div className="bell-item-t">{n.title}</div>
          {n.body && <div className="bell-item-b">{n.body}</div>}
          <div className="bell-item-time">{timeAgo(n.created_at)}</div>
        </button>)}
    </div>}
  </div>;
}

function AccountMenu({profile, pendingCount, onNotifications, onInstall}){
  const [open,setOpen]=useState(false);
  const [notif,setNotif]=useState('idle'); // idle|on|off|denied|unsupported
  const ref=React.useRef(null);
  useEffect(()=>{
    if(!('Notification' in window)){ setNotif('unsupported'); return; }
    if(Notification.permission==='denied'){ setNotif('denied'); return; }
    setNotif(Notification.permission==='granted'?'on':'off');
  },[]);
  useEffect(()=>{
    const h=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    if(open) document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[open]);
  const enableNotif=async()=>{
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){ setNotif(perm==='denied'?'denied':'off'); return; }
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(window.__VAPID_PUBLIC__)});
      const raw=sub.toJSON();
      await sb.from('push_subscriptions').upsert({
        user_id:profile.id, endpoint:raw.endpoint,
        p256dh:raw.keys.p256dh, auth:raw.keys.auth, role:profile.role },{onConflict:'endpoint'});
      setNotif('on');
    }catch(e){ setNotif('off'); }
  };
  const name=profile.full_name||displayLogin(profile.email);
  const initial=(name||'?').trim()[0].toUpperCase();
  return <div className="acct" ref={ref}>
    <button className="acct-btn" onClick={()=>setOpen(o=>!o)} aria-label="Account menu">
      <span className="acct-av">{initial}</span>
      <span className="acct-name">{name}</span>
      <span className="acct-dots">⋮</span>
    </button>
    {open && <div className="acct-menu">
      <div className="acct-head">
        <div className="acct-head-name">{name}</div>
        <div className="acct-head-role">{profile.role}</div>
      </div>
      <button className="acct-item" onClick={()=>{ onNotifications(); setOpen(false); }}>
        <span>Notifications</span>
      </button>
      {notif==='off' && <button className="acct-item" onClick={enableNotif}><span>Enable push alerts</span></button>}
      {notif==='on' && <div className="acct-item static"><span>Push alerts on</span><span className="acct-ok">●</span></div>}
      {notif==='denied' && <div className="acct-item static muted"><span>Push blocked in browser</span></div>}
      {onInstall && <button className="acct-item" onClick={()=>{ onInstall(); setOpen(false); }}>
        <span>Install App</span>
      </button>}
      <div className="acct-sep"></div>
      <button className="acct-item danger" onClick={()=>sb.auth.signOut()}><span>Sign Out</span></button>
    </div>}
  </div>;
}

function Login({onDone}){
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [err,setErr] = useState(null);
  const [busy,setBusy] = useState(false);
  const go = async e=>{
    e && e.preventDefault();
    setBusy(true); setErr(null);
    let { error } = await sb.auth.signInWithPassword({email: toAuthEmail(email), password:pw});
    // An account made by an earlier build may sit under the old internal domain; try that too.
    if(error && !isEmailLike(email)){
      for(const d of LEGACY_ID_DOMAINS){
        const r = await sb.auth.signInWithPassword({email: `${normalizeLoginId(email)}@${d}`, password:pw});
        if(!r.error){ error = null; break; }
      }
    }
    setBusy(false);
    if(error) setErr('Sign in failed. Check your ID and password.');
    else onDone();
  };
  return <div className="login-wrap">
    <div className="login-box">
      <div className="eyebrow">Ugly Donuts & Corn Dogs</div>
      <h1>Finance <em style={{color:'var(--gold)'}}>Tool</em></h1>
      <div className="sub">HQ financial management & investor reporting</div>
      {err && <div className="login-err">{err}</div>}
      <form onSubmit={go}>
        <div className="field"><label>ID or Email</label>
          <input type="text" autoCapitalize="none" autoCorrect="off" spellCheck="false"
            value={email} onChange={e=>setEmail(e.target.value)} autoFocus/></div>
        <div className="field"><label>Password</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)}/></div>
        <button type="submit" className="btn btn-gold" style={{width:'100%',padding:'11px'}} disabled={busy}>
          {busy?'Signing in...':'Sign In'}</button>
      </form>
    </div>
  </div>;
}

const NAV = [
  {id:'home',      label:'Home',    full:'Home',            ic:'⌂', roles:['owner','assistant','viewer']},
  {id:'entry',     label:'Entry',   full:'Daily Entry',     ic:'✎', roles:['owner','assistant']},
  {id:'approvals', label:'Approve', full:'Approvals',       ic:'✓', roles:['owner','assistant']},
  {id:'insights',  label:'Insights',full:'Insights',        ic:'≈', roles:['owner','assistant','viewer']},
  {id:'cash',      label:'Cash',    full:'Cash',            ic:'▤', roles:['owner','assistant']},
  {id:'close',     label:'Close',   full:'Close & Publish', ic:'◆', roles:['owner']},
  {id:'investor',  label:'Reports', full:'Reports',         ic:'▦', roles:['owner','investor','viewer']},
  {id:'cashledger',label:'Cash Mgmt',full:'Cash Ledger',     ic:'▥', roles:['owner']},
  {id:'settings',  label:'Settings',full:'Settings',        ic:'⚙', roles:['owner']},
  {id:'alerts',    label:'Install', full:'Install App',     ic:'⬇', roles:['owner','assistant','investor','viewer']},
];

function App(){
  const [session,setSession] = useState(undefined);
  const [profile,setProfile] = useState(null);
  const [corps,setCorps] = useState([]);
  const [perms,setPerms] = useState([]);
  const [tab,setTab] = useState(()=>{
    try{ const u=new URLSearchParams(location.search).get('tab'); if(u) return u; }catch(e){}
    return localStorage.getItem('ft_tab')||'home';
  });
  // A push notification opens the app at /?tab=<dest>; consume it, then clean the URL so a
  // later refresh doesn't re-force that tab.
  useEffect(()=>{
    try{ const sp=new URLSearchParams(location.search); if(sp.has('tab')||sp.has('n')) history.replaceState(null,'',location.pathname); }catch(e){}
  },[]);
  const [entryCorp,setEntryCorp] = useState(null);
  const [entryMode,setEntryMode] = useState(null);
  const [insightsCorp,setInsightsCorp] = useState(null);
  const [closePreset,setClosePreset] = useState(null);
  const [moreOpen,setMoreOpen] = useState(false);
  const [pendingCount,setPendingCount] = useState(0);
  // The store you pick is shared by every tab, so moving from Entry to Insights keeps you on
  // the same store instead of silently snapping back to the first one. Kept across reloads.
  const [activeCorp,setActiveCorpRaw] = useState(()=>{
    try{ return localStorage.getItem('ft_corp')||null; }catch(e){ return null; }
  });
  const setActiveCorp = React.useCallback(id=>{
    setActiveCorpRaw(id);
    try{ if(id) localStorage.setItem('ft_corp',id); }catch(e){}
  },[]);
  const goEntry = (corpId, mode)=>{ if(corpId) setActiveCorp(corpId); setEntryCorp(corpId); setEntryMode(mode?{mode,t:Date.now()}:null); setTab('entry'); };
  const goInsights = (corpId)=>{ if(corpId) setActiveCorp(corpId); setInsightsCorp({id:corpId, t:Date.now()}); setTab('insights'); };
  const goClose = (corpId,y,m)=>{ if(corpId) setActiveCorp(corpId); setClosePreset({corpId,y,m}); setTab('close'); };
  const goApprovals = ()=>setTab('approvals');
  const [fatal,setFatal] = useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session||null));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{ if(!session){ setProfile(null); return; } let dead=false;
    (async()=>{
      const p = await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
      if(dead) return;
      if(!p.data || !p.data.active){ setFatal('This account does not have access to Finance Tool.'); return; }
      setProfile(p.data);
      const [c, pm] = await Promise.all([
        sb.from('corporations').select('*').order('display_order'),
        sb.from('permissions').select('*').eq('profile_id',session.user.id),
      ]);
      if(dead) return;
      setCorps(c.data||[]); setPerms(pm.data||[]);
    })();
    return ()=>{dead=true};
  },[session]);

  useEffect(()=>{ localStorage.setItem('ft_tab',tab); },[tab]);

  // app icon badge + in-app nav badge: pending approvals (owner/assistant)
  useEffect(()=>{ if(!profile) return; let dead=false;
    const check = async()=>{
      try{
        let n = 0;
        if(profile.role==='viewer'){
          n = 0;
        } else if(profile.role==='investor'){
          const { count } = await sb.from('monthly_close').select('id',{count:'exact',head:true}).eq('status','published');
          n = count||0;
        } else {
          const { count } = await sb.from('expenses').select('id',{count:'exact',head:true}).eq('status','pending');
          n = count||0;
        }
        if(dead) return;
        if(profile.role!=='investor' && profile.role!=='viewer') setPendingCount(n);
        if('setAppBadge' in navigator){
          if(n>0) navigator.setAppBadge(n).catch(()=>{}); else navigator.clearAppBadge().catch(()=>{});
        }
      }catch(e){}
    };
    check();
    const iv = setInterval(check, 60000); // refresh every minute
    return ()=>{dead=true; clearInterval(iv);};
  },[profile, tab]);

  if(session===undefined) return <div className="boot-splash">
    <div className="boot-logo">Ugly <span>Finance</span></div>
    <div className="boot-bar"><div className="boot-bar-fill"></div></div>
    <div className="boot-msg">Loading your finances...</div>
  </div>;
  if(!session) return <Login onDone={()=>{}}/>;
  if(fatal) return <div className="login-wrap"><div className="login-box">
    <div className="login-err">{fatal}</div>
    <button className="btn" onClick={()=>{setFatal(null);sb.auth.signOut();}}>Sign Out</button></div></div>;
  if(!profile) return <div className="login-wrap"><Spinner/></div>;

  const isOwner = profile.role==='owner';
  const isViewer = profile.role==='viewer';   // read-only observer: sees all HQ views, edits nothing
  const canEditIds = new Set(isOwner ? corps.map(c=>c.id) : perms.filter(p=>p.can_edit).map(p=>p.corporation_id));
  const canViewIds = new Set(isOwner ? corps.map(c=>c.id) : perms.filter(p=>p.can_view).map(p=>p.corporation_id));
  const viewCorps = corps.filter(c=>canViewIds.has(c.id));
  // informational tabs display by view access; a viewer has no edit ids, so edits stay off
  const displayIds = isViewer ? canViewIds : canEditIds;
  // corporate (directly-operated) stores: shown as buttons, full detail (revenue + expenses)
  const storeCorps = corps.filter(c=>c.corp_type!=='franchisee');
  // franchisee stores: revenue-only, shown in a searchable dropdown on Home/Insights.
  // hidden (closed) ones are left out. auto-created by the Toast sync.
  const franchiseCorps = corps.filter(c=>c.corp_type==='franchisee' && !c.hidden);
  // "All Ugly Donuts stores" = every operating store (corporate + franchise), excluding
  // HQ and UMMA which are not retail locations. Used for the system-wide rollup card.
  const allStoreCorps = corps.filter(c=>
    (c.corp_type==='corporate' || c.corp_type==='franchisee') && !c.hidden);
  const nav = NAV.filter(n=>n.roles.includes(profile.role));
  const effTab = nav.some(n=>n.id===tab) ? tab : nav[0].id;

  const page = {
    home:      <Home corps={storeCorps} franchiseCorps={franchiseCorps} allStoreCorps={allStoreCorps} canEditIds={displayIds} readOnly={isViewer} profile={profile} isOwner={isOwner} goEntry={goEntry} goInsights={goInsights} goClose={goClose} goApprovals={goApprovals}/>,
    approvals: <Approvals corps={storeCorps} canEditIds={canEditIds} profile={profile} isOwner={isOwner}/>,
    entry:     <Entry corps={storeCorps} canEditIds={canEditIds} profile={profile} presetCorp={entryCorp} presetMode={entryMode} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    insights:  <Dashboard corps={storeCorps} franchiseCorps={franchiseCorps} allStoreCorps={allStoreCorps} canEditIds={displayIds} presetCorp={insightsCorp} isOwner={isOwner} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    cash:      <CashPage corps={storeCorps} canEditIds={displayIds} profile={profile} isOwner={isOwner} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    close:     <ClosePage corps={storeCorps} canEditIds={canEditIds} profile={profile} isOwner={isOwner} preset={closePreset} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    investor:  <InvestorPortal corps={isOwner?storeCorps:viewCorps} isOwner={isOwner} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    cashledger:<div><div className="page-head"><div><div className="eyebrow">Cash</div><h2>Cash Management</h2></div></div><CashLedger corps={storeCorps} canEditIds={canEditIds} profile={profile}/></div>,
    settings:  <Settings corps={storeCorps} franchiseCorps={franchiseCorps} canEditIds={canEditIds} profile={profile} isOwner={isOwner} session={session} activeCorp={activeCorp} onCorp={setActiveCorp}/>,
    alerts:    <div><div className="page-head"><div><div className="eyebrow">Install</div><h2>Install App & Notifications</h2></div></div><PwaCard profile={profile}/></div>,
  }[effTab];

  // core tabs shown in the mobile bottom bar; the rest go under "More"
  // The bottom bar comfortably fits about four tabs plus the overflow button. Roles with a
  // short nav (e.g. viewer: Home, Insights, Reports) get all of theirs on the bar; roles with
  // a long nav (owner) keep the curated core set and the rest go under the overflow menu.
  const CORE = ['home','entry','approvals','insights','cash'];
  const mainNav = nav.filter(n=>n.id!=='alerts');
  const coreNav = mainNav.length<=4 ? mainNav : nav.filter(n=>CORE.includes(n.id));
  const moreNav = nav.filter(n=>!coreNav.some(c=>c.id===n.id));

  return <div className={'shell'+(coreNav.length<=1?' solo-nav':'')}>
    <div className="side">
      <div className="brand">Ugly <em>Finance</em></div>
      <div className="brand-sub">Finance Tool</div>
      {nav.filter(n=>n.id!=='alerts').map(n=><button key={n.id} className={'nav-item'+(effTab===n.id?' on':'')} onClick={()=>setTab(n.id)}>
        {n.full||n.label}
        {n.id==='approvals' && pendingCount>0 && <span className="nav-badge">{pendingCount}</span>}
      </button>)}
      <div className="foot">
        <NotificationBell profile={profile} onNavigate={(t)=>setTab(t)} currentTab={effTab}/>
        <AccountMenu profile={profile} pendingCount={pendingCount}
          onNotifications={()=>setTab(nav.some(n=>n.id==='alerts')?'alerts':'settings')}
          onInstall={nav.some(n=>n.id==='alerts')?()=>setTab('alerts'):null}/>
        {/* With only one main tab there is no bottom bar, so the overflow menu lives up here. */}
        {coreNav.length<=1 && moreNav.length>0 && <button className="top-more" onClick={()=>setMoreOpen(true)} aria-label="More">⋮</button>}
      </div>
    </div>
    <div className="main">{page}</div>
    <nav className="tabbar">
      {coreNav.map(n=><button key={n.id} className={effTab===n.id?'on':''} onClick={()=>setTab(n.id)}>
        <span className="ic">{n.ic}{n.id==='approvals' && pendingCount>0 && <span className="tab-dot">{pendingCount>9?'9+':pendingCount}</span>}</span>{n.label}</button>)}
      {moreNav.length>0 && <button className={'more-btn '+(moreNav.some(n=>n.id===effTab)?'on':'')} onClick={()=>setMoreOpen(true)} aria-label="More">
        <span className="ic">⋮</span><span style={{visibility:'hidden'}}>More</span></button>}
    </nav>
    {moreOpen && <div className="sheet-backdrop" onClick={()=>setMoreOpen(false)}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"></div>
        {moreNav.map(n=><button key={n.id} className={'sheet-item'+(effTab===n.id?' on':'')}
          onClick={()=>{setTab(n.id); setMoreOpen(false);}}>
          <span className="ic">{n.ic}</span>{n.full||n.label}</button>)}
        <button className="sheet-item" onClick={()=>{sb.auth.signOut(); setMoreOpen(false);}}>
          <span className="ic">⏻</span>Sign Out</button>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  const out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
  const s = document.createElement('script');
  s.textContent = out;
  document.body.appendChild(s);
})();
</script>
</body>
