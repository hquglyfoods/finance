<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow">
<title>Finance Tool · Ugly Donuts & Corn Dogs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* boot splash: shown immediately (plain HTML/CSS) until React mounts, so the app
   never looks like a frozen blank white page while scripts load */
.boot-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#FAF9F6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;z-index:9999}
.boot-logo{font-size:26px;font-weight:800;color:#1A1712;letter-spacing:-0.01em}
.boot-logo span{color:#B08A1E;font-style:italic}
.boot-bar{width:180px;height:4px;border-radius:4px;background:#ECE8DF;overflow:hidden}
.boot-bar-fill{width:40%;height:100%;border-radius:4px;background:#B08A1E;animation:boot-slide 1.1s ease-in-out infinite}
@keyframes boot-slide{0%{margin-left:-40%}100%{margin-left:100%}}
.boot-msg{font-size:13px;color:#948B7C}
:root{
  /* LIGHT THEME - white background, meaningful color coding */
  --bg:#FFFFFF; --panel:#FFFFFF; --panel2:#F6F5F2; --panel3:#FAFAF8;
  --border:#E7E4DD; --border-soft:#F0EEE9;
  --text:#1A1712; --text2:#5C554A; --text3:#948B7C;
  --gold:#B08A1E; --gold-strong:#8A6D14; --gold-soft:#D4B454; --gold-dim:#FBF6E7;
  --green:#2E7D4F; --green-soft:#4BA972; --green-dim:#E8F3EC;
  --red:#C0392B; --red-soft:#D9614F; --red-dim:#FBEBE9;
  --blue:#3A6EA5; --blue-dim:#EAF1F8;
  --danger:#C0392B;
  --shadow:0 1px 3px rgba(26,23,18,.06), 0 1px 2px rgba(26,23,18,.04);
  --shadow-lg:0 4px 16px rgba(26,23,18,.08);
  --font-d:'Inter',sans-serif; --font-b:'Inter',sans-serif; --font-m:'IBM Plex Mono',monospace; --font-n:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:var(--text)}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 11px;outline:none;width:100%;box-sizing:border-box}
input[type=checkbox],input[type=radio]{width:auto;padding:0;margin:0;flex:0 0 auto;accent-color:var(--gold)}
input[type=date],input[type=month],input[type=time],input[type=datetime-local]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%}
input:focus,select:textarea:focus,select:focus,textarea:focus{border-color:var(--gold-soft)}
input[type=number]{font-family:var(--font-n)}
::placeholder{color:var(--text3)}
a{color:var(--gold);text-decoration:none}

.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 16px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,0.04);transition:border-color .15s, background .15s, box-shadow .15s}
.btn:hover{border-color:var(--gold-soft);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.btn:active{box-shadow:0 1px 1px rgba(0,0,0,0.06)}
.btn:disabled{opacity:.45;cursor:default;box-shadow:none}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#FFFFFF;font-weight:600;box-shadow:0 1px 3px rgba(176,138,30,0.25)}
.btn-gold:hover{background:var(--gold-strong);border-color:var(--gold-strong)}
.btn-ghost{background:transparent;box-shadow:none}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px}
.btn-danger{color:var(--red);border-color:rgba(196,100,76,.4)}

.eyebrow{font-family:var(--font-m);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.h-display{font-family:var(--font-d);font-weight:700;letter-spacing:-0.01em}
.mono{font-family:var(--font-n);font-variant-numeric:tabular-nums}
.muted{color:var(--text2)} .faint{color:var(--text3)}
.pos{color:var(--green)} .neg{color:var(--red)}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 900px 500px at 50% -10%, var(--gold-dim), transparent)}
.login-box{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:44px 38px}
.login-box h1{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:14px 0 4px}
.login-box .sub{color:var(--text2);font-size:13.5px;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-err{background:var(--red-dim);border:1px solid rgba(196,100,76,.35);color:var(--red);border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:16px}

/* ---------- shell ---------- */
.shell{display:flex;min-height:100vh}
.side{width:218px;flex-shrink:0;background:var(--panel3);border-right:1px solid var(--border);padding:26px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{font-family:var(--font-d);font-size:19px;font-weight:700;letter-spacing:-0.01em;padding:0 10px 4px}
.side .brand em{color:var(--gold);font-style:italic}
.side .brand-sub{font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:26px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;color:var(--text2);font-weight:500;font-size:13.5px;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--panel2)}
.nav-item.on{color:var(--gold);background:var(--gold-dim)}
.nav-item .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.tab-dot{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;padding:0 3px;line-height:1}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;animation:fadein .15s}
.sheet{background:var(--panel);width:100%;border-radius:18px 18px 0 0;padding:8px 14px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--border);animation:slideup .2s}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 14px}
.sheet-item{display:flex;align-items:center;gap:14px;width:100%;padding:15px 12px;border:none;background:none;color:var(--text);font-size:15px;font-weight:500;text-align:left;border-radius:10px}
.sheet-item .ic{font-size:19px;width:24px;text-align:center;color:var(--text2)}
.sheet-item.on{color:var(--gold);background:var(--gold-dim)}
.sheet-item.on .ic{color:var(--gold)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.side .foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border-soft);font-size:12.5px;display:flex;align-items:center;gap:8px}
.bell{position:relative;flex:0 0 auto}
.bell-btn{position:relative;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.bell-btn:hover{background:var(--panel2)}
.bell-ic{display:flex;align-items:center;justify-content:center;line-height:1;color:var(--text2)}
.bell-badge{position:absolute;top:0;right:0;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.bell-panel{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);width:290px;max-height:60vh;overflow-y:auto;z-index:250}
.bell-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border-soft);font-weight:700;font-size:13.5px;position:sticky;top:0;background:var(--panel)}
.bell-clear{background:none;border:none;color:var(--gold-strong);font-size:12px;font-weight:600;cursor:pointer}
.bell-empty{padding:24px 14px;text-align:center;color:var(--text3);font-size:13px}
.bell-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--border-soft);padding:11px 14px;cursor:pointer}
.bell-item:hover{background:var(--panel2)}
.bell-item.unread{background:var(--gold-dim)}
.bell-item.unread:hover{background:var(--gold-dim)}
.bell-item-t{font-size:13px;font-weight:600;color:var(--text)}
.bell-item-b{font-size:12px;color:var(--text2);margin-top:2px}
.bell-item-time{font-size:11px;color:var(--text3);margin-top:3px}
.acct{position:relative;flex:1;min-width:0}
.acct-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:6px 4px;cursor:pointer;text-align:left;position:relative}
.acct-av{flex:0 0 30px;width:30px;height:30px;border-radius:50%;background:var(--gold-dim);color:var(--gold-strong);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-b)}
.acct-name{flex:1;font-size:13px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-dots{color:var(--text3);font-size:18px;line-height:1}
.acct-badge{position:absolute;top:2px;left:22px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.acct-menu{position:absolute;bottom:calc(100% + 8px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;z-index:250;min-width:210px}
.acct-head{padding:10px 12px 8px}
.acct-head-name{font-weight:700;font-size:14px;color:var(--text)}
.acct-head-role{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.acct-sep{height:1px;background:var(--border-soft);margin:6px 0}
.acct-item{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;font-weight:500}
.acct-item:hover{background:var(--panel2)}
.acct-item.static{cursor:default}
.acct-item.static:hover{background:none}
.acct-item.danger{color:var(--red)}
.acct-item.muted{color:var(--text3)}
.acct-item-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.acct-ok{color:var(--green);font-size:10px}
.side .foot .who{color:var(--text);font-weight:500}
.side .foot .role{font-family:var(--font-m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}

.main{flex:1;min-width:0;padding:30px 36px 80px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.page-head h2{font-family:var(--font-d);font-size:25px;font-weight:700;letter-spacing:-0.02em}
.page-head .sub{color:var(--text2);font-size:13px;margin-top:2px}

/* corp tabs + month picker */
.corp-tabs{display:flex;gap:6px;flex-wrap:wrap}
.settings-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:20px;padding-bottom:4px;scrollbar-width:none}
.settings-tabs::-webkit-scrollbar{display:none}
.settings-tab{flex:0 0 auto;white-space:nowrap;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:600;font-size:13px;cursor:pointer}
.autoapprove-opt{display:block;width:100%;text-align:left;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer}
.autoapprove-opt:hover:not(:disabled){border-color:var(--gold)}
.autoapprove-opt:disabled{cursor:default;opacity:.7}
.autoapprove-opt.on{border-color:var(--gold);background:var(--gold-dim)}
.autoapprove-opt .aa-row{display:flex;align-items:center;gap:8px}
.autoapprove-opt .aa-label{font-weight:700;font-size:14px}
.autoapprove-opt .aa-current{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.autoapprove-opt .aa-desc{margin-top:4px;font-size:12.5px;color:var(--text2);line-height:1.45}
.cash-bal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px}
.cash-bal{border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--panel);min-width:0}
.cash-bal-name{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.cash-bal-amt{font-size:16px;font-weight:700;font-family:var(--font-n);margin-top:2px;white-space:nowrap;font-variant-numeric:tabular-nums;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis}
/* Cash Ledger action buttons: colour-coded so the group reads distinctly from the filters */
.cl-actions{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 12px}
.cl-in{background:var(--green-dim);border-color:rgba(127,176,105,.5);color:var(--green)}
.cl-out{background:var(--red-dim);border-color:rgba(196,100,76,.5);color:var(--red)}
.cl-xfer{background:rgba(122,156,198,.14);border-color:rgba(122,156,198,.5);color:var(--blue)}
.cl-open{background:var(--panel2)}
/* segmented filter groups (Store / Show / Period), each boxed with a distinct left accent */
.cl-seg{display:flex;gap:4px;flex-wrap:wrap;align-items:center;background:var(--panel2);border:1px solid var(--border-soft);border-left:3px solid var(--gold-soft);border-radius:10px;padding:6px 10px;margin-bottom:8px}
.cl-seg .seg-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-right:4px}
.cl-seg>button{border:1px solid transparent;background:none;padding:5px 11px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap}
.cl-seg>button.on{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-soft)}
.cl-seg-show{border-left-color:#9bb0c9}
.cl-seg-period{border-left-color:#b39ddb}
.cl-seg input{width:auto;padding:5px 8px;font-size:13px}
.cash-lending{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;background:var(--panel2)}
.cash-lend-row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;font-size:13px}
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.cal-nav{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:18px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.cal-nav:hover{border-color:var(--gold);color:var(--gold)}
.settings-tab.on{background:var(--gold-dim);border-color:var(--gold-soft);color:var(--gold-strong)}
.corp-tab{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:500;font-size:13px;cursor:pointer}
.fr-picker{position:relative;display:inline-block}
.as-tab{border-color:var(--gold);color:var(--gold-strong);font-weight:600}
.as-tab.on{background:var(--gold-dim)}
.fr-toggle{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--panel);color:var(--text2);font-weight:500;font-size:13px;cursor:pointer}
.fr-toggle.on{border-color:var(--gold);color:var(--gold-strong);background:var(--gold-dim)}
.fr-toggle-ic{font-size:13px;line-height:1}
.fr-caret{font-size:9px;opacity:.7}
.fr-menu{position:absolute;top:calc(100% + 4px);right:0;z-index:50;width:240px;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,.14);padding:8px}
.fr-search{width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--border-soft);
  border-radius:7px;font-size:13px;margin-bottom:6px;background:var(--panel2);color:var(--text)}
.fr-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.fr-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;
  padding:8px 10px;border:none;background:transparent;border-radius:7px;cursor:pointer;text-align:left}
.fr-item:hover{background:var(--panel2)}
.fr-item.on{background:var(--gold-dim)}
.fr-item-name{font-size:13px;color:var(--text);font-weight:500}
.fr-item-code{font-size:11px;color:var(--text3);font-family:var(--font-n)}
.fr-empty{padding:10px;font-size:12px;color:var(--text3);text-align:center}
.corp-tab.on{border-color:var(--gold-soft);color:var(--gold-strong);background:var(--gold-dim)}
.viewbar{display:flex;gap:4px;margin-bottom:22px;background:var(--panel2);border-radius:10px;padding:4px;width:fit-content}
.viewtab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer}
.viewtab.on{background:var(--panel);color:var(--gold-strong);box-shadow:var(--shadow)}
.subtabs{display:flex;gap:18px;margin:0 0 16px 2px;border-bottom:1px solid var(--border)}
.subtab{padding:9px 2px;border:none;background:transparent;color:var(--text2);font-weight:500;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.subtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.findings{display:flex;flex-direction:column;gap:11px}
.finding{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:1.45;padding:11px 14px;border-radius:10px}
.finding .fdot{flex:0 0 8px;width:8px;height:8px;border-radius:50%;margin-top:6px}
.finding.good{background:var(--green-dim);color:var(--text)}
.finding.good .fdot{background:var(--green)}
.finding.bad{background:var(--red-dim);color:var(--text)}
.finding.bad .fdot{background:var(--red)}
.finding.info{background:var(--gold-dim);color:var(--text)}
.finding.info .fdot{background:var(--gold)}
.spendlist{display:flex;flex-direction:column;gap:14px}
.spendrow{}
.spendhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px}
.spendname{font-weight:500;font-size:14px}
.spendamt{font-size:14px}
.spendbar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
/* A channel holding several entries shows their total on its line; the entries
   themselves are listed below, like expenses. */
.rev-multi-total{display:inline-block;padding:8px 2px;font-size:14px}
.spin-ring{width:26px;height:26px;margin:0 auto;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--gold);animation:spin-rot .8s linear infinite}
@keyframes spin-rot{to{transform:rotate(360deg)}}
.spendbar-fill{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:4px}
.spendbar-fill.big{background:linear-gradient(90deg,var(--red-soft),var(--red))}
/* income bars read as money coming IN, so they are green, never red */
.spendbar-fill.income{background:linear-gradient(90deg,var(--green-soft),var(--green))}
.spendbar-fill.income.big{background:linear-gradient(90deg,var(--green-soft),var(--green))}
.kpi.accent-green{background:linear-gradient(160deg,var(--green-dim),var(--panel));border-color:#CDE6D6}
.kpi.accent-red{background:linear-gradient(160deg,var(--red-dim),var(--panel));border-color:#F3D3CE}
.kpi.accent-gold{background:linear-gradient(160deg,var(--gold-dim),var(--panel));border-color:#EBDCA8}
.spendmeta{font-size:11.5px;color:var(--text3);margin-top:4px}
.spendtotal{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-weight:600;font-size:15px}
.ie-toggle{display:flex;gap:8px;margin-bottom:14px}
.date-chip{position:relative;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--gold-soft);border-radius:20px;background:var(--gold-dim);color:var(--gold-strong);font-family:var(--font-n);font-size:12.5px;font-weight:600;cursor:pointer}
.date-chip::before{content:'📅';font-size:11px}
.date-chip input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.method-seg{display:flex;gap:6px;margin:4px 0 8px;background:var(--panel2);border-radius:8px;padding:4px;width:fit-content}
.method-opt{padding:7px 16px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap}
@media(max-width:820px){
  .method-seg{width:100%;gap:4px}
  .method-opt{flex:1 1 0;padding:8px 4px;font-size:12.5px;text-align:center}
}
.method-opt.on{background:var(--panel);color:var(--gold-strong);box-shadow:var(--shadow)}
.ie-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--panel);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer}
.ie-btn .ie-ic{font-size:16px;font-weight:700;line-height:1}
.ie-btn.income.on{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.ie-btn.expense.on{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.month-pick{display:flex;align-items:center;gap:8px}
.month-pick .lbl{font-family:var(--font-n);font-size:14px;min-width:86px;text-align:center}
.month-pick button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2)}
.month-pick button:hover{color:var(--gold);border-color:var(--gold-soft)}
.mp-sel{font-family:var(--font-n);font-size:13.5px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);width:auto;cursor:pointer}
.mp-sel:hover{border-color:var(--gold-soft)}
.mp-year{min-width:74px}

/* cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.kpis.kpis-3{grid-template-columns:repeat(3,1fr)}
.kpis.kpis-1{grid-template-columns:minmax(220px,340px)}
.rev-break{padding:0;overflow:hidden}
.rev-break-h{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;padding:16px 18px;font-size:15px;font-weight:600;color:var(--text);text-align:left}
.rev-break-h:hover{background:var(--panel2)}
.rev-break-tot{font-family:var(--font-n);font-size:14px;color:var(--text2);display:flex;align-items:center;gap:8px}
.rev-caret{display:inline-block;transition:transform .18s;font-size:15px;color:var(--text3)}
.rev-caret.up{transform:rotate(180deg)}
.rev-break-body{padding:4px 18px 16px;border-top:1px solid var(--border-soft)}
.rev-row{padding:9px 0}
.rev-row+.rev-row{border-top:1px solid var(--border-soft)}
.rev-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.rev-name{font-size:13.5px;font-weight:500;color:var(--text)}
.rev-amt{font-family:var(--font-n);font-size:13.5px;font-weight:600}
.rev-bar-wrap{height:6px;background:var(--panel3);border-radius:4px;overflow:hidden}
.rev-bar{height:100%;background:var(--gold);border-radius:4px;min-width:2px}
.rev-pct{font-size:11px;color:var(--text3);font-family:var(--font-n);margin-top:3px;text-align:right}
.cell-margin{display:none}
.chev-td{width:40px;text-align:right}
/* Amt: default (desktop) shows the exact value; the rounded version is hidden. Mobile
   daily table flips this to save width. */
.amt-round{display:none}
.amt-exact{display:inline}
/* small last-year revenue shown under the Sales figure on mobile (e.g. '25 $44,080);
   desktop shows last-year revenue in its own column instead */
.ly-under{display:none;font-size:9.5px;color:var(--text3);font-family:var(--font-n);margin-top:1px;line-height:1}
/* expanded expense list: each line is name (ellipsis, tap for badge+note) + amount +
   a ⋯ edit button, always contained on screen. Editing happens in a popup so the row
   width never changes. */
.exp-detail{background:var(--panel2)}
/* Entry expense/income lists: one consistent size for every store, amount pinned to
   the right, long descriptions clipped to one line and expanded on tap. */
table.t.li-table{table-layout:fixed}
.t.li-table{width:100%}
.t.li-table td.li-cell{overflow:hidden;word-break:break-word}
.t.li-table td.li-amt{width:96px}
.t.li-table td.li-act{width:72px}
.t td.li-amt{font-size:13.5px;font-weight:600;white-space:nowrap;text-align:right;vertical-align:top;padding-left:8px}
.t td.li-act{width:76px;text-align:right;white-space:nowrap;vertical-align:top}
.li-name{font-size:13.5px;color:var(--text);line-height:1.3;display:flex;align-items:center;
  gap:6px;flex-wrap:wrap}
.li-memo{display:block;width:100%;font-size:12px;color:var(--text3);margin-top:3px;
  line-height:1.35;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  contain:inline-size}
.li-memo.open{white-space:normal;overflow:visible;color:var(--text2);
  background:var(--panel2);border-radius:6px;padding:6px 8px;margin-top:5px}
.exp-line{display:flex;align-items:center;gap:10px;padding:11px 14px 11px 20px;border-bottom:1px solid var(--border-soft)}
.exp-line:last-child{border-bottom:none}
.exp-line-main{flex:1;min-width:0}
.exp-line-name{font-size:13.5px;color:var(--text);line-height:1.3;display:flex;align-items:center;gap:7px;cursor:pointer;min-width:0}
.exp-line-name .exp-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.exp-src{flex-shrink:0;background:var(--panel) !important;font-size:10px}
.exp-line-memo{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-line-amt{font-size:13.5px;font-weight:600;white-space:nowrap;text-align:right;flex-shrink:0}
.exp-edit-btn{flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:7px;width:30px;height:30px;font-size:16px;line-height:1;color:var(--text2);cursor:pointer;padding:0}
.exp-edit-btn:hover{border-color:var(--gold);color:var(--gold-strong)}
/* store comparison */
.cmp-chips{display:flex;gap:8px;flex-wrap:wrap}
.cmp-period{display:inline-flex;gap:2px;background:var(--panel2);border-radius:9px;padding:3px;margin-bottom:12px}
.cmp-per-tab{background:none;border:none;border-radius:7px;padding:6px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer}
.cmp-per-tab.on{background:var(--panel);color:var(--gold-strong);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.cmp-toggle{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1.5px solid var(--gold);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--gold-strong);cursor:pointer;white-space:nowrap;transition:all .15s}
.cmp-toggle:hover{background:var(--gold-dim)}
.cmp-toggle.on{background:var(--gold-strong);border-color:var(--gold-strong);color:#fff;box-shadow:0 2px 8px rgba(176,138,30,0.3)}
.cmp-toggle-ic{font-size:15px;line-height:1;font-weight:400}
.cmp-chip{font-family:var(--font-n);font-weight:700;font-size:14px;letter-spacing:.04em;padding:9px 16px;border-radius:9px;border:1.5px solid var(--border);background:var(--panel);color:var(--text2);cursor:pointer;transition:all .12s}
.cmp-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-strong)}
.cmp-chip.disabled{opacity:.4;cursor:not-allowed}
.cmp-tick{margin-right:5px}
.cmp-cards{display:grid;gap:12px;margin-bottom:16px}
.cmp-cards.cmp-n1{grid-template-columns:1fr}
.cmp-cards.cmp-n2{grid-template-columns:1fr 1fr}
.cmp-cards.cmp-n3{grid-template-columns:1fr 1fr 1fr}
.cmp-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 16px 14px;box-shadow:var(--shadow)}
.cmp-card-code{font-family:var(--font-d);font-weight:800;font-size:22px;color:var(--gold-strong);margin-bottom:10px}
.cmp-net-val{font-family:var(--font-n);font-weight:700;font-size:22px}
.cmp-net-lbl{font-size:11.5px;color:var(--text3);margin-top:2px}
.cmp-bar-wrap{height:7px;background:var(--panel2);border-radius:4px;margin:12px 0 6px;overflow:hidden}
.cmp-bar{height:100%;background:var(--gold);border-radius:4px}
.cmp-card-sales{font-family:var(--font-n);font-size:13px;color:var(--text2)}
.cmp-table{width:100%;border-collapse:collapse;min-width:340px}
.cmp-table th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:700;padding:6px 10px 10px;text-align:right}
.cmp-table th:first-child{text-align:left}
.cmp-table td{padding:11px 10px;font-size:14px;border-bottom:1px solid var(--border-soft)}
.cmp-table td.num{font-family:var(--font-n);text-align:right;white-space:nowrap}
.cmp-mlabel{color:var(--text2)}
.cmp-table tr.cmp-strong td{font-weight:700;font-size:15px;background:var(--gold-dim)}
.cmp-best{color:var(--green);font-weight:700}
.cmp-star{margin-left:4px;font-size:11px;color:var(--gold)}
.cmp-combo-h{color:var(--gold-strong)!important;border-left:2px solid var(--gold-dim)}
.cmp-combo{font-family:var(--font-n);text-align:right;color:var(--gold-strong);font-weight:600;border-left:2px solid var(--gold-dim);background:var(--gold-dim)}
.kpis.kpis-2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi .k-lbl{font-size:11.5px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.kpi .k-val{font-family:var(--font-n);font-size:21px;font-weight:600;font-variant-numeric:tabular-nums}
.kval-wrap{position:relative;display:inline-block}
.kval-abbr{display:none}
.kval-pop{display:none}
.kpi .k-sub{font-size:12px;color:var(--text2);margin-top:3px}
.k-cmp{display:block;color:var(--text3)}
.insight-card{margin-bottom:22px}
.insight-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.insight-list li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:var(--text);line-height:1.4}
.insight-ic{flex:0 0 auto;width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--panel2);margin-top:1px}
.insight-ic.pos{color:var(--green)}
.insight-ic.neg{color:var(--red)}
.insight-ic.faint{color:var(--text3)}
.day-star{margin-left:3px;font-size:11px;vertical-align:middle;font-weight:700;line-height:1}
.daily-monthnav{display:none;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px}
.daily-monthnav .dmn-label{font-weight:700;font-size:14px}
.day-star.best{color:var(--green)}
.day-star.best::before{content:'\2605'} /* filled star */
.day-star.best{font-size:0}
.day-star.best::before{font-size:11px}
.day-star.slow{color:var(--red)}
.day-star.slow::before{content:'\2605'} /* filled star */
.day-star.slow{font-size:0}
.day-star.slow::before{font-size:11px}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1000px){.grid2{grid-template-columns:1fr}}

/* tables */
table.t{width:100%;border-collapse:collapse;font-size:13.5px}
table.t th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--border)}
table.t td{padding:8px;border-bottom:1px solid var(--border-soft)}
table.t tr:last-child td{border-bottom:none}
table.t td.num,table.t th.num{text-align:right;font-family:var(--font-n)}
table.t tr.total td{border-top:1px solid var(--border);font-weight:600;color:var(--text)}
.badge{display:inline-block;font-family:var(--font-n);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;padding:2px 7px;border:1px solid var(--border);color:var(--text3)}
.badge.gold{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-dim)}
.badge.green{color:var(--green);border-color:rgba(127,176,105,.4);background:var(--green-dim)}
.badge.red{color:var(--red);border-color:rgba(196,100,76,.4);background:var(--red-dim)}
.badge.blue{color:var(--blue);border-color:rgba(122,156,198,.4)}

/* cash calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:96px;gap:6px}
.cal .dow{font-family:var(--font-n);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center;padding:4px 0}
.cal .day{height:134px;border:1px solid var(--border-soft);border-radius:8px;padding:6px 7px;background:var(--panel2);position:relative;overflow:hidden;box-sizing:border-box}
.cal .day.empty{background:transparent;border-color:transparent}
.cal .day .d{font-family:var(--font-n);font-size:11px;color:var(--text3)}
.cal .day{overflow:hidden}
.cal .day .amt{font-family:var(--font-n);font-size:12px;margin-top:2px;line-height:1.25;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal .day.verified{background:var(--gold-dim);border-color:var(--gold-soft)}
.cal .day.verified .d{color:var(--gold)}
.cal .day.verified::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--gold);font-size:11px}
.cal .day.has-cashexp{border-color:var(--red-soft)}
.cal .day.has-cashexp::before{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.cal .day .cashexp{font-family:var(--font-n);font-size:10px;color:var(--red);margin-top:1px;line-height:1.2}
.cal .day .envelope{font-family:var(--font-n);font-size:10px;color:var(--gold-strong);margin-top:0;font-weight:600;line-height:1.2}
/* tiny cash pickup status by the day number: Picked (collected) vs Store (still in store).
   It sits on its own line under the number so a narrow cell never overflows. */
.cal .day .pick-tag{display:inline-block;max-width:100%;font-family:var(--font-n);font-size:8px;
  font-weight:700;line-height:1;padding:1px 3px;margin-top:0;border-radius:3px;
  letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:clip;box-sizing:border-box}
.cal .day .pick-tag.picked{background:var(--gold-dim);color:var(--gold-strong)}
.cal .day .pick-tag.instore{background:var(--panel2);color:var(--text3);border:1px solid var(--border-soft)}
.cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--text2);align-items:center}
.cal-legend .lg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.cal-legend .lg-dot.gold{background:var(--gold)}
.cal-legend .lg-dot.red{background:var(--red)}
.pickup-card{padding:0;overflow:hidden;border:1px solid var(--gold-soft)}
.pickup-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--gold-dim);border:none;padding:16px 20px;cursor:pointer;text-align:left}
.pickup-head:hover{background:var(--gold-dim);filter:brightness(0.98)}
.pickup-title{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--gold-strong)}
.pickup-sub{font-size:12.5px;color:var(--text2);margin-top:2px}
.pickup-chev{color:var(--gold-strong);font-size:16px;background:var(--panel);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
.pickup-body{padding:0 20px 20px;border-top:1px solid var(--border-soft)}
.env-table .env-locked{font-size:12px;color:var(--text3);font-style:italic;white-space:nowrap}
.env-input-disabled{background:var(--panel2);color:var(--text3);cursor:not-allowed;opacity:.65}
.env-locked-box{font-size:13px;color:var(--text2);line-height:1.5;background:var(--panel2);
  border:1px solid var(--border-soft);border-radius:8px;padding:11px 13px;margin-top:2px}
.env-input{width:100%;padding:6px 8px;font-family:var(--font-n);text-align:right;font-size:13px}
.env-diff{font-size:10.5px;font-weight:700;text-align:right;margin-top:3px}
.env-diff.pos{color:var(--green)}
.env-diff.neg{color:var(--red)}
.env-table th{font-size:11px}
.env-day .env-day-d{display:block;line-height:1.3}
/* pickup status under the day. Every row has one (Picked up / In store) so labelled
   and unlabelled rows keep the same height and the columns stay aligned. */
.env-pick{display:block;width:fit-content;font-family:var(--font-n);margin-top:3px;font-size:9.5px;font-weight:700;line-height:1;
  padding:2px 5px;border-radius:4px;letter-spacing:.02em;white-space:nowrap;font-family:var(--font-n)}
.env-pick.picked{background:var(--gold-dim);color:var(--gold-strong)}
.env-pick.instore{background:var(--panel2);color:var(--text3);border:1px solid var(--border-soft)}
.env-table td{padding:6px 8px}
.rev-entry td{padding:4px 4px;vertical-align:middle}
.rev-entry td.rev-amt{width:140px}
.rev-entry td:first-child{font-size:13px;font-weight:500}
.rev-entry input{padding:6px 9px;font-size:14px !important;text-align:right}
.env-check{color:var(--green);font-weight:700}
.env-x{color:var(--red);font-weight:700}
.env-table tr.env-ok td{background:var(--green-dim,rgba(46,125,79,0.08))}
.env-table tr.env-short td{background:rgba(196,100,76,0.07)}
.env-note-row td{padding:0 8px 8px !important;background:rgba(196,100,76,0.07)}
.env-note{width:100%;padding:7px 10px;font-size:13px;border:1px solid rgba(196,100,76,.35);border-radius:6px;background:var(--panel)}
.env-note::placeholder{color:var(--text3);font-size:12px}
.cal .day.tappable{cursor:pointer}
.cal .day.tappable:hover{border-color:var(--gold);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.cal .day .note-dot{position:absolute;bottom:3px;right:4px;font-size:10px;color:var(--red)}
.day-memo{background:rgba(196,57,43,0.08);border:1px solid var(--red-soft);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--text);line-height:1.4}
.day-memo-lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--red);font-weight:700;margin-bottom:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(30,26,20,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--panel);border-radius:16px;padding:20px;width:min(400px,100%);box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto}
.store-detail{background:var(--panel);border-radius:18px;width:min(420px,100%);box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:88vh;overflow-y:auto;padding:22px}
.sd-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.sd-code{font-family:var(--font-n);font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--gold-strong)}
.sd-name{font-family:var(--font-d);font-size:20px;font-weight:700;letter-spacing:-0.01em;margin-top:2px}
.sd-close{background:var(--panel2);border:none;width:32px;height:32px;border-radius:8px;font-size:15px;color:var(--text2);cursor:pointer;flex-shrink:0}
.sd-close:hover{background:var(--panel3);color:var(--text)}
.sd-total-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px}
.sd-total{font-family:var(--font-d);font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:18px}
.sd-channels{margin-bottom:18px}
.sd-empty{color:var(--text3);font-size:14px;padding:8px 0 18px}
.sd-more{width:100%;padding:12px;border-radius:10px;font-size:14px}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-title{font-family:var(--font-d);font-size:19px;font-weight:700}
.modal-x{background:var(--panel2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--text2);font-size:14px}
.modal-rows{background:var(--panel2);border-radius:10px;padding:6px 14px;margin-bottom:6px}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid var(--border-soft)}
.modal-row:last-child{border-bottom:none}
.modal-row.modal-exp{font-size:15px}
.modal-diff{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:600;text-align:center}
.modal-diff.pos{background:var(--green-dim,rgba(46,125,79,0.1));color:var(--green)}
.modal-diff.neg{background:rgba(196,100,76,0.1);color:var(--red)}
.install-steps{margin:0;padding-left:20px;font-size:13.5px;color:var(--text2);line-height:1.5}
.install-steps li{margin-bottom:8px}
.ios-ic{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 4px;border-radius:5px;background:var(--gold-dim);color:var(--gold-strong);font-size:12px;vertical-align:middle;margin:0 1px}
.cal .day.count-ok{border-color:var(--green);background:rgba(46,125,79,0.06)}
.cal .day.count-bad{border-color:var(--red);background:rgba(196,57,43,0.12)}
.cal .day.count-bad .d{color:var(--red)}
.cal .day .day-check{color:var(--green);font-weight:700;margin-left:3px;font-size:11px}
.cal .day .day-x{color:var(--red);font-weight:700;margin-left:3px;font-size:11px}
.cal .day .counted-lbl{font-family:var(--font-n);font-size:8.5px;color:var(--green);margin-top:0;line-height:1.15}
.cal-legend .lg-dot.green{background:var(--green)}
.wc-card{padding:0;overflow:hidden;border:1px solid var(--gold-soft)}
.wc-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--gold-dim);border:none;padding:12px 18px;cursor:pointer;text-align:left}
.wc-head:hover{filter:brightness(0.98)}
.wc-title{font-family:var(--font-d);font-size:14.5px;font-weight:700;color:var(--gold-strong)}
.wc-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--panel);color:var(--gold-strong);font-family:var(--font-n);font-size:12px;margin-left:8px;vertical-align:1px}
.wc-chev{color:var(--gold-strong);font-size:14px;background:var(--panel);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
.wc-findings{padding:14px 18px 16px}

/* forms */
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
/* Investors (owners) table: name truncates with a tap popover, % box is compact, and the
   Rename/Remove actions stay pinned to the right regardless of name length. */
.own-table{table-layout:fixed;width:100%}
.own-table th{white-space:nowrap}
.own-table th:nth-child(2){width:88px}
.own-table th:nth-child(3){width:150px}
.own-name-cell{position:relative;overflow:visible}
.own-name{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom;cursor:pointer}
.own-name-pop{position:absolute;left:0;top:100%;margin-top:4px;background:var(--text);color:var(--panel);font-size:13px;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:60;box-shadow:0 6px 18px rgba(0,0,0,.28);max-width:80vw;overflow:hidden;text-overflow:ellipsis}
.own-pct-cell{text-align:right}
.own-pct{text-align:right;width:100%;font-size:13px}
.own-acts-cell{text-align:right;white-space:nowrap}
.form-row>*{flex:1;min-width:130px}
.form-row .w-sm{flex:0 0 130px}
.form-row .fr-col{flex:1;min-width:130px}
.hint{font-size:12px;color:var(--text3);margin-top:6px}
.divider{border:none;border-top:1px solid var(--border-soft);margin:18px 0}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold-soft);color:var(--text);border-radius:8px;padding:11px 20px;font-size:13.5px;z-index:120;box-shadow:0 8px 30px rgba(0,0,0,.5);pointer-events:none;max-width:calc(100vw - 32px);text-align:center}

/* pending queue */
.pend{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--border-soft);border-radius:8px;margin-bottom:8px;background:var(--panel2)}
.pend .grow{flex:1;min-width:0}
.daily-t tr.is-weekend td:first-child{box-shadow:inset 3px 0 0 var(--red)}
.daily-t tr.is-weekend .dow{color:var(--red);font-weight:700}
/* Daily view: give the date column left breathing room, and mark today with a gold outline. */
.daily-t td:first-child,.daily-t th:first-child{padding-left:14px}
.daily-t tr.is-today td{box-shadow:inset 0 2px 0 var(--gold),inset 0 -2px 0 var(--gold)}
.daily-t tr.is-today td:first-child{box-shadow:inset 0 2px 0 var(--gold),inset 0 -2px 0 var(--gold),inset 2px 0 0 var(--gold);font-weight:700}
.daily-t tr.is-today td:last-child{box-shadow:inset 0 2px 0 var(--gold),inset 0 -2px 0 var(--gold),inset -2px 0 0 var(--gold)}
/* When today IS a weekend, draw both: the gold outline plus the red weekend bar just
   inside it, so neither marker is lost. */
.daily-t tr.is-today.is-weekend td:first-child{box-shadow:inset 0 2px 0 var(--gold),inset 0 -2px 0 var(--gold),inset 2px 0 0 var(--gold),inset 6px 0 0 -2px var(--red)}
.amt-input{position:relative;display:flex;align-items:center}
.amt-input .amt-prefix{position:absolute;left:9px;color:var(--text3);font-family:var(--font-n);font-size:14px;pointer-events:none}
.amt-input input{padding-left:20px !important;width:100%}
@media(max-width:820px){
  .approve-row{flex-direction:column;align-items:stretch !important;gap:10px}
  .approve-row .ar-fields{display:flex;gap:8px}
  .approve-row .ar-fields>div{flex:1}
  .approve-row .ar-actions{display:flex;gap:8px}
  .approve-row .ar-actions button{flex:1}
}

/* investor */
.inv-report{border:1px solid var(--border-soft);border-radius:10px;padding:20px 22px;margin-bottom:14px;background:var(--panel)}
.inv-report .rh{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.inv-report .rh .m{font-family:var(--font-d);font-size:19px;font-weight:700;letter-spacing:-0.01em}
.notes-block{background:var(--panel2);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;padding:12px 14px;color:var(--text2);font-size:13.5px;white-space:pre-wrap;margin:12px 0}
/* professional monthly statement */
.stmt{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden}
.stmt-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;padding:22px 26px 18px;border-bottom:2px solid var(--gold)}
.stmt-corp{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.stmt-period{font-size:13px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-top:4px}
.stmt-badge{font-size:11px;color:var(--text3);font-family:var(--font-n);white-space:nowrap;padding-top:4px}
.stmt-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border-soft)}
.stmt-sum-item{background:var(--panel);padding:18px 26px}
.stmt-sum-item.accent{background:var(--gold-dim)}
.ss-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ss-val{font-family:var(--font-n);font-size:22px;font-weight:500;color:var(--text)}
.ss-margin{font-size:12px;color:var(--gold-strong);margin-top:3px;font-weight:600}
.stmt-notes{margin:18px 26px 0;background:var(--panel2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;font-size:13.5px;color:var(--text2);white-space:pre-wrap}
.stmt-notes-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-strong);font-weight:700;margin-bottom:5px}
.stmt-cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;padding:22px 26px 8px}
.stmt-block-h{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:700;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.stmt-table{width:100%;border-collapse:collapse}
.stmt-table td{padding:8px 0;font-size:13.5px;color:var(--text);border-bottom:1px solid var(--border-soft)}
.stmt-table td.num{font-family:var(--font-n);text-align:right;white-space:nowrap}
.stmt-table .stmt-tot td{font-weight:700;border-bottom:none;border-top:2px solid var(--border);padding-top:10px}
.stmt-auto{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--panel2);border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:1px}
.stmt-net{display:flex;justify-content:space-between;align-items:center;margin:14px 26px 0;padding:16px 20px;background:var(--panel2);border-radius:10px;font-family:var(--font-d);font-weight:700;font-size:16px}
.stmt-net .pos{font-family:var(--font-n)} .stmt-net .neg{font-family:var(--font-n)}
.stmt-files{display:flex;gap:8px;flex-wrap:wrap;padding:16px 26px 22px}

/* chart */
.chart-wrap{overflow-x:auto}
.legend{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-top:8px}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:-1px}

@media(max-width:820px){
  .shell{flex-direction:column}
  /* prevent any accidental horizontal page scroll */
  html,body{max-width:100%;overflow-x:hidden}
  .main{max-width:100vw;overflow-x:hidden}
  /* wide tables scroll inside their card instead of stretching the page */
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:15px 16px;margin-bottom:12px}
  table.t{min-width:max-content}
  /* Entry expense/income lists clip instead of stretching the page */
  table.t.li-table{min-width:0;width:100%;table-layout:fixed}
  /* Settings lists (expense categories, recurring) are dense on mobile: smaller text,
     tighter padding, and hidden categories fully suppressed. */
  table.t-settings{font-size:11.5px;min-width:0}
  table.t-settings td{padding:6px 6px}
  table.t-settings .btn-sm{padding:4px 7px;font-size:11px}
  .cat-inactive{display:none}
  .cat-hidden-toggle{display:none}
  /* Cash Ledger on mobile: hide the description, use a predictable 3-column balance grid
     with a smaller (non-wrapping) amount, and tighten the segmented filter buttons. */
  .cash-ledger-desc{display:none}
  .cash-bal-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .cash-bal{padding:8px 9px}
  .cash-bal-name{font-size:10px}
  .cash-bal-amt{font-size:13.5px}
  .cl-actions{gap:6px}
  .cl-actions .btn{font-size:12px;padding:7px 9px}
  .cl-seg{padding:6px 8px}
  .cl-seg>button{padding:5px 9px;font-size:12px}
  /* Investors table on mobile: give the actions column room and shrink its buttons so
     Rename/Remove never spill outside the card. */
  .own-table th:nth-child(1){width:34%}
  .own-table th:nth-child(2){width:64px}
  .own-table th:nth-child(3){width:auto}
  .own-pct{font-size:12px;padding:5px 6px}
  .own-acts-cell .btn{padding:5px 7px;font-size:11.5px}
  .own-acts-cell .btn+.btn{margin-left:4px !important}
  .modal-2col{flex-direction:column;gap:8px}
  .modal-2col>div{width:100%}
  /* Expense Categories: fixed layout so the name truncates with an ellipsis and the
     controls/action buttons always stay on screen (no horizontal scroll). */
  /* Expense Categories on mobile: stack so the name truncates on its own line and the
     reorder arrows + Rename/Delete sit on a second line (no overlap, no horizontal scroll).
     The drag handle is hidden since touch drag is not supported. */
  table.cat-list,table.cat-list tbody{display:block;min-width:0}
  table.cat-list tr{display:flex;flex-wrap:wrap;align-items:center;padding:8px 2px;border-bottom:1px solid var(--border-soft)}
  table.cat-list td{display:block;border:none;padding:0;width:auto !important}
  table.cat-list td.nm{order:1;flex:1 1 100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:13px;margin-bottom:6px}
  table.cat-list td.ctrl-td{order:2;white-space:nowrap}
  table.cat-list .cat-drag{display:none}
  table.cat-list td.act-td{order:3;margin-left:auto;white-space:normal !important;text-align:right}
  table.cat-list td.act-td .btn-sm{margin:0 0 0 6px}
  table.cat-list .inv-note{display:none}
  /* Automatic P&L Rules on mobile: stack name over its formula, formula wraps. */
  table.rules-list,table.rules-list tbody,table.rules-list tr,table.rules-list td{display:block;width:auto;min-width:0}
  table.rules-list tr{border-bottom:1px solid var(--border-soft);padding:8px 2px}
  table.rules-list td{border:none;padding:1px 0}
  table.rules-list td.rule-nm{font-weight:600;font-size:12.5px}
  table.rules-list td.rule-expr{white-space:normal;word-break:break-word}
  /* Registered Recurring Expenses: stack each row so long names/memos truncate and the
     action buttons wrap below instead of pushing the row off screen. */
  table.rec-list,table.rec-list tbody,table.rec-list tr,table.rec-list td{display:block;width:auto}
  table.rec-list thead{display:none}
  table.rec-list tr{border-bottom:1px solid var(--border-soft);padding:8px 2px}
  table.rec-list td{border:none;padding:1px 0}
  table.rec-list td.rec-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px}
  table.rec-list td.rec-cat,table.rec-list td.rec-sched{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.rec-list td.rec-sched .faint{white-space:normal}
  table.rec-list td.rec-amt{text-align:left !important;font-weight:600;font-size:12.5px}
  table.rec-list td.rec-act{text-align:left !important;white-space:normal !important;margin-top:4px}
  table.rec-list td.rec-act .btn-sm{margin:4px 6px 0 0}
  /* Daily table on mobile: hide the last-year revenue column (shown instead as a small
     '25 $xxx line under the Sales figure) so the row fits the screen. */
  .daily-t .ly-col{display:none}
  .ly-under{display:block}
  /* tighten the daily table so a row fits the screen without side-scrolling:
     smaller type, tighter padding, whole-dollar display (cents hidden, math unchanged),
     narrower expand-chevron column */
  table.t.daily-t{font-size:11px;min-width:0;width:100%;table-layout:fixed}
  table.t.daily-t td,table.t.daily-t th{padding:8px 2px;overflow:hidden}
  table.t.daily-t td.mono,table.t.daily-t th{white-space:nowrap}
  table.t.daily-t td:first-child,table.t.daily-t th:first-child{padding-left:9px}
  /* fixed column widths so numbers fit and the expanded detail can't stretch the table */
  .daily-t th:nth-child(1){width:28%}
  .daily-t th:nth-child(2){width:25%}
  .daily-t th:nth-child(3){width:0;padding:0}
  .daily-t th:nth-child(4){width:22%}
  .daily-t th:nth-child(5){width:25%}
  .daily-t th:nth-child(6){width:42px}
  table.t.daily-t td.num{font-size:11.5px}
  table.t.daily-t td,table.t.daily-t th{padding-left:2px;padding-right:2px}
  .daily-t .chev-td{text-align:center;padding-left:2px;padding-right:2px}
  .daily-t tr.is-today td:last-child{padding-right:2px}
  /* expanded expense detail wraps within the row (no side-scroll) */
  table.t.daily-t td[colspan] .exp-detail{max-width:100%;overflow:hidden}
  table.t.daily-t .exp-line-amt{white-space:nowrap}
  .auto-hint{display:none}
  .daily-monthnav{display:flex;position:sticky;top:47px;z-index:15;background:var(--panel);margin:0 -10px 8px;padding:8px 10px;border-bottom:1px solid var(--border-soft)}
  .daily-t td.num,.daily-t td.mono{font-variant-numeric:tabular-nums}
  /* the daily card gets slimmer side padding so the 4-column table fits comfortably */
  .daily-card{padding-left:10px;padding-right:10px}
  .daily-t .amt-exact{display:none}
  .daily-t .amt-round{display:inline}
  .daily-t .chev-td{width:42px}
  table.t.daily-t .chev-td .btn{padding:3px 6px;font-size:11px;box-shadow:none}
  /* expanded expense lines on mobile: tighter padding; name ellipsis keeps it on screen */
  .exp-line{padding:10px 12px 10px 16px;gap:8px}
  .exp-line-name{font-size:12.5px}
  .exp-line-amt{font-size:12.5px}
  /* Monthly P&L table: margin column tucks under Net */
  .ypl-t .margin-col{display:none}
  .cell-margin{display:block;font-size:9.5px;color:var(--text3);font-family:var(--font-n);margin-top:1px;line-height:1}
  /* view tabs: all five must fit the screen. They share the width equally and the
     padding shrinks, so nothing scrolls sideways. */
  .viewbar{width:100%;overflow-x:visible;flex-wrap:nowrap;gap:2px;padding:3px}
  .viewtab{white-space:nowrap;flex:1 1 0;min-width:0;padding:8px 4px;font-size:12px;text-align:center}
  /* top bar: brand + sign out only */
  .side{width:100%;height:auto;position:sticky;top:0;z-index:20;flex-direction:row;align-items:center;
    gap:10px;padding:12px 16px;border-right:none;border-bottom:1px solid var(--border-soft)}
  .side .brand{display:block;font-size:17px;padding:0}
  .side .brand-sub{display:none}
  .side .nav-item{display:none}
  .side .foot{display:flex;align-items:center;gap:6px;margin:0 0 0 auto;padding:0;border:none}
  .side .foot .role{display:none}
  .side .foot .who{font-size:12.5px}
  .side .foot button{margin-top:0 !important}
  .acct{width:auto}
  .acct-btn{padding:4px}
  .acct-name{display:none}
  .acct-dots{display:none}
  .acct-menu{bottom:auto;top:calc(100% + 8px);left:auto;right:0;min-width:220px}
  .bell-panel{bottom:auto;top:calc(100% + 8px);left:auto;right:0;width:min(290px,calc(100vw - 32px))}
  /* bottom tab bar (~10% larger, ⋮ takes minimal room) */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:var(--panel);
    border-top:1px solid var(--border);padding:11px 2px calc(17px + env(safe-area-inset-bottom));justify-content:space-around;align-items:flex-start}
  .tabbar button{flex:1;background:none;border:none;color:var(--text3);font-size:11px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:5px;padding:2px;letter-spacing:.01em}
  .tabbar button .ic{font-size:28px;line-height:1;position:relative}
  .tabbar button.on{color:var(--gold)}
  /* the ⋮ button is thin, so give it minimal width and let the others breathe */
  .tabbar button.more-btn{flex:0 0 30px;justify-content:center;align-self:center;padding-bottom:15px}
  .tabbar button.more-btn .ic{font-size:24px;letter-spacing:2px;color:var(--text3)}
  .tabbar button.more-btn.on .ic{color:var(--gold)}
  .tabbar button.more-btn > span:last-child{display:none}
  .main{padding:18px 14px calc(108px + env(safe-area-inset-bottom))}
  .page-head{margin-bottom:18px}
  .page-head h2{font-size:23px}
  /* headers: stack controls full width */
  .page-head>div:last-child{width:100%}
  .cmp-toggle{width:100%;justify-content:center;padding:10px 16px;font-size:14px}
  .corp-tabs{width:100%}
  .corp-tab{flex:1;text-align:center;padding:8px 6px}
  .month-pick{width:100%;justify-content:space-between}
  .month-pick .lbl{flex:1}
  /* KPIs: 2-up instead of 1-up */
  .kpis{grid-template-columns:1fr 1fr;gap:8px}
  .kpi{padding:12px 13px}
  .kpi .k-val{font-size:18px}
  /* 3-card rows (Daily, Year, etc.): 3 across, compact, and guaranteed to fit the
     screen. Values use compact currency ($1.95M) so they never overflow. */
  .kpis.kpis-3{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
  .cmp-cards.cmp-n2{grid-template-columns:1fr 1fr}
  .cmp-cards.cmp-n3{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
  .cmp-cards.cmp-n3 .cmp-card{padding:11px 8px 10px}
  .cmp-cards.cmp-n3 .cmp-card-code{font-size:16px;margin-bottom:5px}
  .cmp-cards.cmp-n3 .cmp-net-val{font-size:15px}
  .cmp-cards.cmp-n3 .cmp-card-net{font-size:10.5px}
  .cmp-cards.cmp-n3 .cmp-card-sales{font-size:10.5px}
  .cmp-cards.cmp-n3 .cmp-net-lbl{font-size:9px;margin-top:1px;line-height:1.2}
  .cmp-card{padding:12px 12px 11px}
  .cmp-card-code{font-size:18px;margin-bottom:6px}
  .cmp-net-val{font-size:18px}
  .cmp-card-sales{font-size:12px}
  .cmp-table td{padding:10px 6px;font-size:13px}
  .cmp-table th{padding:5px 6px 8px;font-size:11px}
  .cmp-chip{font-size:13px;padding:8px 13px}
  .kpis.kpis-3 .kpi{padding:11px 10px;min-width:0}
  .kpis.kpis-3 .k-lbl{font-size:9px;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpis.kpis-3 .k-val{font-size:16px;white-space:nowrap}

    if(!corpId || !list.some(c=>c.id===corpId)) setCorpIdRaw(want);
    else if(activeCorp && activeCorp!==corpId && list.some(c=>c.id===activeCorp)) setCorpIdRaw(activeCorp);
  },[list.map(c=>c.id).join(','), activeCorp]);
  const setCorpId = id=>{ setCorpIdRaw(id); if(onCorp) onCorp(id); };
  return [corpId, setCorpId];
}

const pad = n => String(n).padStart(2,'0');

// Sign-in identity. Supabase Auth always stores an email address, but not everyone has (or
// wants to use) one, so an account can also be created with a simple ID such as "hq-mike".
// An ID is turned into an internal address that Supabase accepts; the person never sees it
// and just types their ID. Anything containing "@" is treated as a real email and used as-is.
const ID_DOMAIN = 'id.uglydonutsncorndogs.com';
// An earlier build used a .local address, which Supabase rejects as invalid. Any account that
// did get created under it still logs in with the same ID.
const LEGACY_ID_DOMAINS = ['id.uglyfinance.local'];
const isEmailLike = v => String(v||'').includes('@');
const normalizeLoginId = v => String(v||'').trim().toLowerCase();
// what we hand to Supabase
const toAuthEmail = v => {
  const s = normalizeLoginId(v);
  return isEmailLike(s) ? s : `${s}@${ID_DOMAIN}`;
};
// what we show back to a person (hide the internal domain)
const displayLogin = v => {
  const s = String(v||'');
  for(const d of [ID_DOMAIN, ...LEGACY_ID_DOMAINS]){
    if(s.endsWith('@'+d)) return s.slice(0, -('@'+d).length);
  }
  return s;
};
// IDs must be safe to put in front of an @
const isValidLoginId = v => {
  const s = normalizeLoginId(v);
  if(isEmailLike(s)) return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
  return /^[a-z0-9][a-z0-9._-]{2,}$/.test(s);   // at least 3 chars, letters/digits/._-
};
const fmt$ = (v, dec=2) => {
  if (v === null || v === undefined || isNaN(v)) return '-';
  const neg = v < -0.004;
  const s = Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:dec, maximumFractionDigits:dec});
  return (neg?'-$':'$') + s;
};
// Amount split so tight mobile tables can hide the cents via CSS (.cents) while desktop
// keeps full precision. The visible part is the ROUNDED whole dollars (so $23.50 reads as
// $24, not $23, when cents are hidden); the hidden .cents span carries the exact decimals
// and, when shown, overrides the rounded dollars with the true value. Display only; all
// math stays exact.
function Amt({v}){
  const exact = fmt$(v);                 // e.g. "$23.50" (true value, shown on desktop)
  const rounded = fmt$m(v);             // whole dollars, but $1.23M once it reaches a million
  return <><span className="amt-round">{rounded}</span><span className="amt-exact">{exact}</span></>;
}
// compact currency for tight KPI cards: $1.95M, $226.3K, $980
const fmt$k = (v) => {
  if (v === null || v === undefined || isNaN(v)) return '-';
  const neg = v < 0; const a = Math.abs(v); const sign = neg?'-$':'$';
  if (a >= 1000000) return sign + (a/1000000).toFixed(2) + 'M';
  if (a >= 10000)   return sign + (a/1000).toFixed(1) + 'K';
  return sign + Math.round(a).toLocaleString('en-US');
};
// like fmt$ but abbreviates only at/above 1M (keeps six-figure amounts full): $234,152 / $1.23M
const fmt$m = (v) => {
  if (v === null || v === undefined || isNaN(v)) return '-';
  const neg = v < -0.004; const a = Math.abs(v);
  if (a >= 1000000) return (neg?'-$':'$') + (a/1000000).toFixed(2) + 'M';
  return fmt$(v, 0);
};
const fmtPct = v => (v===null||isNaN(v)) ? '-' : (v*100).toFixed(1)+'%';
const fmtDateShort = (iso)=>{ if(!iso) return ''; const [y,m,d]=iso.split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]; return `${mo} ${parseInt(d)}, ${y}`; };
const monthLabel = (y,m) => `${y}. ${pad(m)}`;
const lastDay = (y,m) => new Date(y, m, 0).getDate();
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// safe formula evaluator: variables + max/min + arithmetic
function evalExpr(expr, vars){
  try{
    let e = expr.replace(/[A-Za-z_][A-Za-z0-9_]*/g, id => {
      if (id === 'max') return 'Math.max';
      if (id === 'min') return 'Math.min';
      const v = vars[id];
      return String(typeof v === 'number' && isFinite(v) ? v : 0);
    });
    const check = e.replace(/Math\.(max|min)/g,'');
    if (/[^0-9+\-*/(). ,eE]/.test(check)) return 0;
    const r = Function('"use strict";return (' + e + ')')();
    return (typeof r === 'number' && isFinite(r)) ? r : 0;
  }catch(err){ return 0; }
}

// Amount fields accept a "+"-separated sum so a batch of receipts can be entered at once,
// e.g. "12+15+16.5". Returns the cent-rounded total, or NaN if the text isn't a valid
// additive expression. No limit on how many terms are added.
function sumExpr(str){
  if(str==null) return NaN;
  const s = String(str).trim();
  if(s==='') return NaN;
  const parts = s.split('+').map(p=>p.trim());
  if(parts.some(p=>!/^\d+(\.\d+)?$/.test(p))) return NaN;
  let total = 0;
  for(const p of parts) total += parseFloat(p);
  return Math.round(total*100)/100;
}

// When a day has the Excel "board" final import, that import supersedes the
// AUTO-ESTIMATED sources for that day (Slack expense bot, Toast POS, inventory sync),
// because those are rough real-time captures the Excel figures replace. It must NOT
// hide things that are never in the Excel: payroll (ADP bot), recurring bills, manual
// entries, and Card Tips (which come from Toast but are an independent line the Excel
// board never includes). isBoardSuperseded returns true only for auto sources that the
// board actually replaces.
const AUTO_SOURCES = new Set(['slack','toast','inventory','recurring']);
// Revenue rows created by a sync rather than typed in by a person.
const AUTO_REV_SOURCES = new Set(['toast','toast_live','inventory','quickbooks','board']);
// Which channels can hold SEVERAL entries on one day, each with its own note?
// Stores take a single figure per channel per day (the POS gives one number), so only
// Other Income repeats there. HQ and UMMA book individual payments (royalties, invoices,
// profit shares), so every channel repeats for them.
const MULTI_REV_CORPS = new Set(['HQ','UMMA']);
const multiRevAllowed = (corpCode, chCode) =>
  MULTI_REV_CORPS.has(corpCode) || chCode === 'other_income';
// Which non-board rows does the Excel board replace?
//   * slack / toast / inventory are auto-captured estimates: the Excel always supersedes them.
//   * recurring rows are auto-posted by the cron (rent, utilities, founder payroll). The
//     Excel closing already carries those fixed costs, so counting recurring on top of a
//     board month double-counts them (proven in the July 2026 audit). The Excel supersedes.
//   * payroll_bot (ADP) posts both Payroll and Payroll Tax. It is superseded ONLY when the
//     Excel actually carries payroll for that month, because the sheet's payroll figure is the
//     all-in cost. Stores whose sheet has no payroll keep the ADP figures.
//   * Card Tips never appear in the Excel, so they always count.
// boardHasPayroll = true when that month's board rows include a payroll line.
function isBoardSuperseded(e, catCode, boardHasPayroll){
  if(catCode==='tips') return false;   // tips are never in the Excel board; always show
  if(AUTO_SOURCES.has(e.source)) return true;
  if(e.source==='payroll_bot') return !!boardHasPayroll;
  return false;
}

// Compute a single day's P&L (sales/expenses/net + payroll/supplies dollars) for one
// corp, so specific dates (July 4th, a snow day, Christmas) can be compared across
// stores. Board-per-date precedence: if a date has board rows, only those count.
async function loadDayPL(corpId, meta, date){
  const [rev, exp] = await Promise.all([
    sb.from('daily_revenue').select('amount,channel_id,source').eq('corporation_id',corpId).eq('date',date),
    sb.from('expenses').select('amount,category_id,status,source').eq('corporation_id',corpId).eq('date',date),
  ]);
  const chBy={}; meta.channels.forEach(c=>chBy[c.id]=c);
  const catBy={}; meta.categories.forEach(c=>catBy[c.id]=c);
  const revRows=rev.data||[], expRows=(exp.data||[]).filter(e=>e.status==='confirmed');
  const hasBoardRev=revRows.some(r=>r.source==='board');
  const hasBoardExp=expRows.some(e=>e.source==='board');
  let totalSales=0;
  revRows.forEach(r=>{ if(hasBoardRev && r.source!=='board') return; const ch=chBy[r.channel_id];
    if(ch && ch.counts_in_total) totalSales += Number(r.amount)*Number(ch.total_multiplier||1); });
  const catSum={};
  expRows.forEach(e=>{ const c=catBy[e.category_id]; if(hasBoardExp && e.source!=='board' && isBoardSuperseded(e, c&&c.code)) return; if(!c) return;
    catSum[c.code]=(catSum[c.code]||0)+Number(e.amount); });
  const totalExpenses=Object.values(catSum).reduce((a,b)=>a+b,0);
  const net=totalSales-totalExpenses;
  const pay=catSum['payroll']||0;
  const sup=(catSum['supplies']||0)+(catSum['supplies_food']||0)+(catSum['supplies_material']||0)+(catSum['hq_supplies']||0);
  return { totalSales, totalExpenses, net, catSum,
    margin: totalSales? net/totalSales : null,
    payrollPct: totalSales? pay/totalSales : null,
    suppliesPct: totalSales? sup/totalSales : null };
}
