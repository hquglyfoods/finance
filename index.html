      </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= CASH VERIFICATION =================
// ============ CASH LEDGER (owner / HQ only) ============
// Physical cash on hand per corporation, independent of the P&L revenue ledger. Cash in =
// counted cash / transfers / other. Cash out = deposits, owner draws, bonuses, reimburse,
// transfers, other. An out entry can optionally also post to the P&L as a cash expense with
// a chosen category. Inter-corp transfers just move cash between boxes (paired rows).
const CL_OUT_KINDS = [['bank_deposit','Bank deposit'],['owner_draw','Owner draw / distribution'],['bonus','Cash bonus'],['reimburse','Reimburse owner'],['other','Other']];
const CL_IN_KINDS = [['counted_cash','Counted cash'],['other','Other']];
const CL_ALL_KINDS = [...CL_OUT_KINDS, ...CL_IN_KINDS, ['transfer_out','Transfer'],['transfer_in','Transfer'],['opening_balance','Opening balance']];
const clKindLabel = k => { const f = CL_ALL_KINDS.find(x=>x[0]===k); return f ? f[1] : k; };

function CashLedger({corps, canEditIds, profile}){
  const ledgerCorps = corps.filter(c=>canEditIds.has(c.id));
  const corpName = id => { const c = corps.find(x=>x.id===id); return c ? (c.code||c.name) : '?'; };
  const [rows, setRows] = useState(null);
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);
  const [modal, setModal] = useState(null);      // {mode,...}
  const [filter, setFilter] = useState('all');    // 'all' | 'transfers' | corpId
  const [catsByCorp, setCatsByCorp] = useState({});

  const reload = useCallback(async()=>{
    const ids = ledgerCorps.map(c=>c.id);
    if(!ids.length){ setRows([]); return; }
    const { data } = await sb.from('cash_ledger').select('*').in('corporation_id', ids)
      .order('date',{ascending:false}).order('created_at',{ascending:false});
    setRows(data||[]);
  },[corps]);
  useEffect(()=>{ reload(); },[reload]);

  const balances = {};
  ledgerCorps.forEach(c=>balances[c.id]=0);
  (rows||[]).forEach(r=>{ if(balances[r.corporation_id]!=null) balances[r.corporation_id] += (r.direction==='in'?1:-1)*Number(r.amount); });

  const loadCats = async(corpId)=>{
    if(!corpId || catsByCorp[corpId]) return;
    const { data } = await sb.from('expense_categories').select('id,name,active').eq('corporation_id',corpId).eq('active',true).order('display_order');
    setCatsByCorp(prev=>({...prev,[corpId]:data||[]}));
  };

  const openModal = (mode)=>{
    const first = ledgerCorps[0] && ledgerCorps[0].id;
    const base = { mode, corp:first, date:todayStr(), amount:'', memo:'' };
    if(mode==='in') base.kind='counted_cash';
    if(mode==='out'){ base.kind='bank_deposit'; base.includePL=false; base.category_id=''; loadCats(first); }
    if(mode==='transfer'){ base.from=first; base.to=(ledgerCorps[1]&&ledgerCorps[1].id)||first; }
    if(mode==='opening') base.kind='opening_balance';
    setModal(base);
  };

  const save = async()=>{
    const m = modal, amt = sumExpr(m.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter an amount'); return; }
    setBusy(true);
    try{
      if(m.mode==='transfer'){
        if(m.from===m.to){ showToast('Pick two different corporations'); setBusy(false); return; }
        const grp = (typeof crypto!=='undefined' && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now())+Math.random();
        const { error } = await sb.from('cash_ledger').insert([
          { corporation_id:m.from, date:m.date, direction:'out', kind:'transfer_out', amount:amt, counterparty_corp_id:m.to, transfer_group:grp, memo:m.memo||null, created_by:profile.id },
          { corporation_id:m.to, date:m.date, direction:'in', kind:'transfer_in', amount:amt, counterparty_corp_id:m.from, transfer_group:grp, memo:m.memo||null, created_by:profile.id },
        ]);
        if(error) throw error;
      } else if(m.mode==='out'){
        let expense_id = null;
        if(m.includePL){
          if(!m.category_id){ showToast('Pick a P&L category'); setBusy(false); return; }
          const { data:exp, error:e1 } = await sb.from('expenses').insert({
            corporation_id:m.corp, category_id:m.category_id, date:m.date, amount:amt,
            memo:(m.memo||clKindLabel(m.kind)), method:'cash', source:'cash_ledger', status:'confirmed', entered_by:profile.id,
          }).select('id').maybeSingle();
          if(e1) throw e1; expense_id = exp && exp.id;
        }
        const { error } = await sb.from('cash_ledger').insert({ corporation_id:m.corp, date:m.date, direction:'out', kind:m.kind, amount:amt, memo:m.memo||null, expense_id, created_by:profile.id });
        if(error) throw error;
      } else { // in or opening
        const { error } = await sb.from('cash_ledger').insert({ corporation_id:m.corp, date:m.date, direction:'in', kind:m.kind, amount:amt, memo:m.memo||null, created_by:profile.id });
        if(error) throw error;
      }
      setModal(null); showToast('Saved'); reload();
    }catch(e){ showToast('Save failed: '+(e.message||e)); }
    setBusy(false);
  };

  const del = async(r)=>{
    if(!confirm('Delete this cash entry?')) return;
    setBusy(true);
    try{
      if(r.transfer_group){ await sb.from('cash_ledger').delete().eq('transfer_group', r.transfer_group); }
      else { if(r.expense_id) await sb.from('expenses').delete().eq('id', r.expense_id); await sb.from('cash_ledger').delete().eq('id', r.id); }
      showToast('Deleted'); reload();
    }catch(e){ showToast('Delete failed: '+(e.message||e)); }
    setBusy(false);
  };

  // Net inter-corp lending (transfers only), collapsing reciprocals.
  const lending = ()=>{
    const net = {};
    (rows||[]).filter(r=>r.transfer_group && r.direction==='out' && r.counterparty_corp_id).forEach(r=>{
      const key = r.corporation_id+'>'+r.counterparty_corp_id;
      net[key] = (net[key]||0) + Number(r.amount);
    });
    const seen = new Set(), out = [];
    Object.keys(net).forEach(k=>{
      const [a,b] = k.split('>'); const rev = b+'>'+a;
      if(seen.has(k)||seen.has(rev)) return; seen.add(k); seen.add(rev);
      const n = (net[k]||0) - (net[rev]||0);
      if(Math.abs(n)>=0.005){ if(n>0) out.push({from:a,to:b,amt:n}); else out.push({from:b,to:a,amt:-n}); }
    });
    return out;
  };

  const visRows = (rows||[]).filter(r=> filter==='all' ? true : filter==='transfers' ? !!r.transfer_group : r.corporation_id===filter);
  if(rows===null) return <div className="card"><div className="sub">Loading cash ledger...</div></div>;

  return <div className="card">
    <h3>Cash Ledger <span className="badge gold">Owner</span></h3>
    <div className="sub" style={{marginBottom:12}}>Physical cash on hand per corporation. Separate from the P&L: only "cash out" entries you mark are also booked as expenses. Transfers just move cash between boxes.</div>

    <div className="cash-bal-grid">
      {ledgerCorps.map(c=><div key={c.id} className="cash-bal">
        <div className="cash-bal-name">{c.code||c.name}</div>
        <div className="cash-bal-amt" style={{color:(balances[c.id]||0)<0?'var(--red)':'var(--text)'}}>{fmt$(balances[c.id]||0)}</div>
      </div>)}
    </div>

    <div style={{display:'flex',gap:8,flexWrap:'wrap',margin:'14px 0 10px'}}>
      <button className="btn btn-sm btn-gold" onClick={()=>openModal('in')}>+ Cash in</button>
      <button className="btn btn-sm" onClick={()=>openModal('out')}>&minus; Cash out</button>
      <button className="btn btn-sm" onClick={()=>openModal('transfer')}>&#8646; Transfer</button>
      <button className="btn btn-sm" onClick={()=>openModal('opening')}>Set opening balance</button>
    </div>

    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8,alignItems:'center'}}>
      <span className="hint" style={{marginTop:0}}>Filter:</span>
      <button className={'btn btn-sm'+(filter==='all'?' btn-gold':'')} onClick={()=>setFilter('all')}>All</button>
      <button className={'btn btn-sm'+(filter==='transfers'?' btn-gold':'')} onClick={()=>setFilter('transfers')}>Transfers / lending</button>
      {ledgerCorps.map(c=><button key={c.id} className={'btn btn-sm'+(filter===c.id?' btn-gold':'')} onClick={()=>setFilter(c.id)}>{c.code||c.name}</button>)}
    </div>

    {filter==='transfers' && <div className="cash-lending">
      {lending().length===0 ? <div className="faint">No outstanding inter-corp balances.</div>
        : lending().map((l,i)=><div key={i} className="cash-lend-row"><span>{corpName(l.from)} lent {corpName(l.to)}</span><span className="mono">{fmt$(l.amt)}</span></div>)}
    </div>}

    {visRows.length===0 ? <div className="faint">No entries yet.</div> :
      <table className="t rec-list"><tbody>
        {visRows.map(r=><tr key={r.id}>
          <td className="rec-name">{corpName(r.corporation_id)} &middot; {clKindLabel(r.kind)}
            {r.counterparty_corp_id && <span className="faint"> ({r.direction==='out'?'to ':'from '}{corpName(r.counterparty_corp_id)})</span>}
            {r.expense_id && <span className="badge gold" style={{marginLeft:6}}>P&amp;L</span>}
            {r.memo && <div className="faint" style={{fontSize:11}}>{r.memo}</div>}
          </td>
          <td className="rec-cat">{r.date}</td>
          <td className="num rec-amt" style={{color:r.direction==='in'?'var(--green)':'var(--red)'}}>{r.direction==='in'?'+':'\u2212'}{fmt$(Number(r.amount))}</td>
          <td className="rec-act" style={{textAlign:'right'}}><button className="btn btn-sm btn-danger" disabled={busy} onClick={()=>del(r)}>&#10005;</button></td>
        </tr>)}
      </tbody></table>}

    {modal && <div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{modal.mode==='in'?'Cash in':modal.mode==='out'?'Cash out':modal.mode==='transfer'?'Transfer cash':'Set opening balance'}</div>
          <button className="modal-x" onClick={()=>setModal(null)}>✕</button>
        </div>
        {modal.mode==='transfer' ? <>
          <label className="hint">From</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.from} onChange={e=>setModal({...modal,from:e.target.value})}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
          <label className="hint">To</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.to} onChange={e=>setModal({...modal,to:e.target.value})}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
        </> : <>
          <label className="hint">Corporation</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.corp} onChange={e=>{ const v=e.target.value; setModal({...modal,corp:v}); if(modal.mode==='out') loadCats(v); }}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
        </>}
        {modal.mode==='in' && <><label className="hint">Type</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.kind} onChange={e=>setModal({...modal,kind:e.target.value})}>{CL_IN_KINDS.map(k=><option key={k[0]} value={k[0]}>{k[1]}</option>)}</select></>}
        {modal.mode==='out' && <><label className="hint">Type</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.kind} onChange={e=>setModal({...modal,kind:e.target.value})}>{CL_OUT_KINDS.map(k=><option key={k[0]} value={k[0]}>{k[1]}</option>)}</select></>}
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <div style={{flex:1}}><label className="hint">Amount</label>
            <input type="text" inputMode="text" style={{width:'100%'}} placeholder="0.00" value={modal.amount} onChange={e=>setModal({...modal,amount:e.target.value})}/></div>
          <div style={{flex:1}}><label className="hint">Date</label>
            <input type="date" style={{width:'100%'}} value={modal.date} onChange={e=>setModal({...modal,date:e.target.value})}/></div>
        </div>
        {modal.mode==='out' && <div style={{marginBottom:8}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type="checkbox" checked={!!modal.includePL} onChange={e=>setModal({...modal,includePL:e.target.checked})}/>
            <span className="hint" style={{marginTop:0}}>Also record as a P&amp;L expense</span>
          </label>
          {modal.includePL && <select style={{width:'100%',marginTop:6}} value={modal.category_id} onChange={e=>setModal({...modal,category_id:e.target.value})}>
            <option value="">Select category...</option>
            {(catsByCorp[modal.corp]||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>}
        </div>}
        <label className="hint">Note (optional)</label>
        <input style={{width:'100%',marginBottom:14}} value={modal.memo} onChange={e=>setModal({...modal,memo:e.target.value})} placeholder="Optional note"/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={save}>Save</button>
          <button className="btn" onClick={()=>setModal(null)}>Cancel</button>
        </div>
      </div>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

function CashPage({corps, canEditIds, profile, isOwner}){
  const stores = corps.filter(c=>canEditIds.has(c.id));
  // Coins (anything under a dollar) stay in the register, so a count that's short by less
  // than $1 is treated as fine. Only a shortfall of $1 or more counts as "short".
  const SHORT_TOL = 1;
  const [corpId, setCorpId] = useState(stores[0] && stores[0].id);
  const now = new Date();
  const [y,setY] = useState(now.getFullYear());
  const [m,setM] = useState(now.getMonth()+1);
  const [days, setDays] = useState({});
  const [pickups, setPickups] = useState([]);
  const [pk, setPk] = useState({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''});
  const [toast, showToast] = useToast();
  const [cashChId, setCashChId] = useState(null);
  const [cashExp, setCashExp] = useState({});
  const [pickupOpen, setPickupOpen] = useState(false);
  const [counts, setCounts] = useState({});   // date -> actual counted amount string
  const [cnotes, setCnotes] = useState({});   // date -> note explaining a shortage
  const [editingId, setEditingId] = useState(null);
  const [dayModal, setDayModal] = useState(null);   // {date} when a calendar day is tapped

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const ch = await sb.from('revenue_channels').select('id,code').eq('corporation_id',corpId).eq('code','cash').maybeSingle();
    if(!ch.data){ setCashChId(null); setDays({}); return; }
    setCashChId(ch.data.id);
    const start=`${y}-${pad(m)}-01`, end=`${y}-${pad(m)}-${pad(lastDay(y,m))}`;
    const [rv, pks, cex] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('channel_id',ch.data.id).gte('date',start).lte('date',end),
      sb.from('cash_pickups').select('*').eq('corporation_id',corpId).order('pickup_date',{ascending:false}).limit(10),
      sb.from('expenses').select('date,amount,memo,method,status').eq('corporation_id',corpId).eq('method','cash').eq('status','confirmed').gte('date',start).lte('date',end),
    ]);
    const map={}; (rv.data||[]).forEach(r=>map[r.date]=r);
    // cash expenses grouped by day
    const cexMap={}; (cex.data||[]).forEach(e=>{ (cexMap[e.date]=cexMap[e.date]||{total:0,items:[]}); cexMap[e.date].total+=Number(e.amount); cexMap[e.date].items.push(e); });
    // load any previously-counted amounts so the check persists across reloads
    const savedCounts={}; (rv.data||[]).forEach(r=>{ if(r.counted_amount!=null) savedCounts[r.date]=String(r.counted_amount); });
    const savedNotes={}; (rv.data||[]).forEach(r=>{ if(r.count_note) savedNotes[r.date]=r.count_note; });
    setDays(map); setPickups(pks.data||[]); setCashExp(cexMap);
    setCounts(prev=>({...savedCounts, ...prev}));
    setCnotes(prev=>({...savedNotes, ...prev}));
  },[corpId,y,m]);
  useEffect(()=>{ reload(); },[reload]);

  const savePickup = async()=>{
    if(!pk.period_start || !pk.period_end){ showToast('Enter the pickup period'); return; }
    // sum of per-envelope counted amounts (if any were entered), else the single field
    const envDates = Object.keys(counts).filter(d=>d>=pk.period_start && d<=pk.period_end && counts[d]!=='' && counts[d]!=null);
    const envSum = envDates.reduce((a,d)=>a+parseFloat(counts[d]||0),0);
    const countedTotal = envDates.length ? envSum : (pk.counted_amount ? parseFloat(pk.counted_amount) : null);
    const noteBits = [];
    if(pk.note) noteBits.push(pk.note);
    if(envDates.length) noteBits.push('Counted per envelope: '+envDates.sort().map(d=>`${d.slice(8)}=$${parseFloat(counts[d]).toFixed(0)}`).join(', '));
    let pickupId = editingId;
    if(editingId){
      // editing: clear the old verified flags for this pickup, then update the row
      await sb.from('daily_revenue').update({verified:false, pickup_id:null, verified_by:null, verified_at:null}).eq('pickup_id',editingId);
      const { error } = await sb.from('cash_pickups').update({
        pickup_date:pk.pickup_date, period_start:pk.period_start, period_end:pk.period_end,
        counted_amount:countedTotal, note:noteBits.join(' | ')||null }).eq('id',editingId);
      if(error){ showToast('Update failed: '+error.message); return; }
    } else {
      const { data, error } = await sb.from('cash_pickups').insert({
        corporation_id:corpId, pickup_date:pk.pickup_date, period_start:pk.period_start,
        period_end:pk.period_end, counted_amount: countedTotal, note:noteBits.join(' | ')||null,
        created_by:profile.id }).select().single();
      if(error){ showToast('Save failed: '+error.message); return; }
      pickupId = data.id;
    }
    const { error: e2 } = await sb.from('daily_revenue').update({
      verified:true, pickup_id:pickupId, verified_by:profile.id, verified_at:new Date().toISOString() })
      .eq('corporation_id',corpId).eq('channel_id',cashChId)
      .gte('date',pk.period_start).lte('date',pk.period_end);
    if(e2){ showToast('Verification failed: '+e2.message); return; }
    showToast(editingId?'Pickup updated':'Pickup recorded, period verified');
    setPk({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''});
    setCounts({}); setPickupOpen(false); setEditingId(null);
    reload();
  };

  // persist a single day's counted cash immediately (so the check survives reloads)
  const saveCount = async(date, val)=>{
    if(!cashChId) return;
    const num = (val===''||val==null) ? null : parseFloat(val);
    await sb.from('daily_revenue').update({counted_amount:num})
      .eq('corporation_id',corpId).eq('channel_id',cashChId).eq('date',date);
  };
  // note explaining a shortage (e.g. "bill stuck in register")
  const saveNote = async(date, val)=>{
    if(!cashChId) return;
    await sb.from('daily_revenue').update({count_note: val||null})
      .eq('corporation_id',corpId).eq('channel_id',cashChId).eq('date',date);
  };

  const editPickup = (p)=>{    setEditingId(p.id);
    setPk({pickup_date:p.pickup_date, period_start:p.period_start, period_end:p.period_end,
      counted_amount:p.counted_amount!=null?String(p.counted_amount):'', note:''});
    // move the calendar to the pickup's month so its cash days load
    const [py,pm]=p.period_start.split('-'); setY(parseInt(py)); setM(parseInt(pm));
    setCounts({}); setPickupOpen(true);
    window.scrollTo({top:0, behavior:'smooth'});
  };
  const deletePickup = async (p)=>{
    if(!confirm(`Delete this pickup (${p.period_start} ~ ${p.period_end})? The days will no longer show as verified.`)) return;
    await sb.from('daily_revenue').update({verified:false, pickup_id:null, verified_by:null, verified_at:null}).eq('pickup_id',p.id);
    await sb.from('cash_pickups').delete().eq('id',p.id);
    if(editingId===p.id){ setEditingId(null); setPk({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''}); }
    showToast('Pickup deleted'); reload();
  };

  // per-day envelopes within the chosen pickup period: expected = cash sales - cash spent
  const envelopeDays = (()=>{
    if(!pk.period_start || !pk.period_end) return [];
    const out=[];
    Object.keys(days).sort().forEach(date=>{
      if(date<pk.period_start || date>pk.period_end) return;
      const sales=Number(days[date].amount)||0;
      const spent=cashExp[date]?cashExp[date].total:0;
      if(sales===0 && spent===0) return;
      out.push({date, sales, spent, expected:sales-spent});
    });
    return out;
  })();
  const envExpectedTotal = envelopeDays.reduce((a,e)=>a+e.expected,0);
  const envCountedTotal = envelopeDays.reduce((a,e)=>a+(counts[e.date]!==''&&counts[e.date]!=null?parseFloat(counts[e.date]||0):0),0);

  const first = new Date(y, m-1, 1).getDay();
  const nDays = lastDay(y,m);
  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=nDays;d++) cells.push(d);

  const recordedFor = (s,e) => Object.values(days)
    .filter(r=>r.date>=s && r.date<=e).reduce((a,r)=>a+Number(r.amount),0);

  // every cash day in the visible month (for the always-on counting list)
  const monthEnvelopes = (()=>{
    const out=[];
    Object.keys(days).sort().forEach(date=>{
      const sales=Number(days[date].amount)||0;
      const spent=cashExp[date]?cashExp[date].total:0;
      if(sales===0 && spent===0) return;
      out.push({date, sales, spent, expected:sales-spent});
    });
    return out;
  })();

  if(!stores.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Cash</div><h2>Cash Verification</h2>
        <div className="sub">Count each day's envelope; a ✓ shows when your count matches the expected cash.</div></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={stores} sel={corpId} onSel={setCorpId}/>
        <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
      </div>
    </div>
    {isOwner && <div className="card pickup-card">
      <button className="pickup-head" onClick={()=>{
        const opening=!pickupOpen;
        if(opening && !pk.period_start){
          const cashDates=Object.keys(days).filter(dt=>Number(days[dt].amount)>0 && !days[dt].verified).sort();
          if(cashDates.length){
            setPk({...pk, period_start:cashDates[0], period_end:cashDates[cashDates.length-1]});
          }
        }
        setPickupOpen(opening);
      }}>
        <div>
          <div className="pickup-title">{editingId?'Edit Pickup':'Record Envelope Pickup'}</div>
          <div className="pickup-sub">Mark a date range as picked up (verified gold on the calendar).</div>
        </div>
        <span className="pickup-chev">{pickupOpen?'▲':'▾'}</span>
      </button>
      {pickupOpen && <div className="pickup-body">
        <div className="form-row">
          <div><label className="hint" style={{marginTop:0}}>Pickup date</label>
            <input type="date" value={pk.pickup_date} onChange={e=>setPk({...pk,pickup_date:e.target.value})}/></div>
          <div><label className="hint" style={{marginTop:0}}>Period start</label>
            <input type="date" value={pk.period_start} onChange={e=>setPk({...pk,period_start:e.target.value})}/></div>
          <div><label className="hint" style={{marginTop:0}}>Period end</label>
            <input type="date" value={pk.period_end} onChange={e=>setPk({...pk,period_end:e.target.value})}/></div>
        </div>
        {pk.period_start && pk.period_end && envelopeDays.length>0 &&
          <div className="hint" style={{marginTop:6}}>{envelopeDays.length} cash day{envelopeDays.length===1?'':'s'} in this period · expected {fmt$(envExpectedTotal,0)}. Count each day above in "Count Envelopes".</div>}
        {pk.period_start && pk.period_end && envelopeDays.length===0 &&
          <div className="hint">No cash days in this period.</div>}
        <input placeholder="Memo (optional)" value={pk.note} onChange={e=>setPk({...pk,note:e.target.value})} style={{margin:'10px 0'}}/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" onClick={savePickup}>{editingId?'Update Pickup':'Save Pickup + Verify Period'}</button>
          {editingId && <button className="btn" onClick={()=>{ setEditingId(null); setPk({pickup_date:todayStr(),period_start:'',period_end:'',counted_amount:'',note:''}); setCounts({}); }}>Cancel edit</button>}
        </div>
      </div>}
    </div>}
    <div className="grid2">
      <div className="card">
        <div className="cal-head">
          <button type="button" className="cal-nav" aria-label="Previous month"
            onClick={()=>{ if(m===1){ setY(y-1); setM(12); } else setM(m-1); }}>&#8249;</button>
          <h3 style={{margin:0}}>Cash Calendar &middot; {MONTHS[m-1]} {y}</h3>
          <button type="button" className="cal-nav" aria-label="Next month"
            onClick={()=>{ if(m===12){ setY(y+1); setM(1); } else setM(m+1); }}>&#8250;</button>
        </div>
        <div className="cal">
          {DOW.map(d=><div key={d} className="dow">{d}</div>)}
          {cells.map((d,i)=>{
            if(d===null) return <div key={'e'+i} className="day empty"></div>;
            const date=`${y}-${pad(m)}-${pad(d)}`;
            const r = days[date];
            const ce = cashExp[date];
            const sales = r ? Number(r.amount) : 0;
            const expd = ce ? ce.total : 0;
            const envelope = sales - expd;   // what should physically be in the envelope
            // prefer the live edit in state so the calendar updates as you type in
            // "Count Envelopes"; fall back to the saved value on the row.
            const liveCnt = counts[date];
            const liveNum = (liveCnt!==''&&liveCnt!=null) ? parseFloat(liveCnt) : null;
            const counted = (liveNum!=null && !isNaN(liveNum)) ? liveNum
              : (r && r.counted_amount!=null ? Number(r.counted_amount) : null);
            // we always expect a little MORE than sales-minus-spent (coin change is
            // kept as bills), so counted >= expected is good; short is the problem.
            // Sub-dollar shortfalls are coins left in the register, so they're fine.
            const countOk = counted!=null && counted >= envelope - SHORT_TOL + 0.001;
            const countBad = counted!=null && counted < envelope - SHORT_TOL + 0.001;
            const hasCash = sales!==0 || expd!==0;
            return <div key={date} onClick={()=>{ if(hasCash && isOwner) setDayModal({date}); }}
              className={'day'+(r&&r.verified?' verified':'')+(ce?' has-cashexp':'')+(countOk?' count-ok':'')+(countBad?' count-bad':'')+(hasCash&&isOwner?' tappable':'')}>
              <div className="d">{d}{countOk && <span className="day-check">✓</span>}{countBad && <span className="day-x">✕</span>}</div>
              {r && sales!==0 && <div className="amt">{fmt$(sales,0)}</div>}
              {ce && <div className="cashexp" title={ce.items.map(x=>x.memo).filter(Boolean).join(', ')}>-{fmt$(expd,0)}</div>}
              {ce && sales!==0 && <div className="envelope">={fmt$(envelope,0)}</div>}
              {counted!=null && <div className="counted-lbl">cnt {fmt$(counted,0)}</div>}
              {countBad && cnotes[date] && <div className="note-dot" title={cnotes[date]}>✎</div>}
            </div>;
          })}
        </div>
        <div className="cal-legend">
          <span><span className="lg-dot gold"></span>Verified (picked up)</span>
          <span><span className="lg-dot green"></span>Counted ✓ (enough)</span>
          <span><span className="lg-dot red"></span>Cash expense day</span>
          <span className="faint">Tap a cash day to count it or fix a shortage.</span>
        </div>
      </div>
      <div>
        <div className="card">
          <h3>Recent Pickups</h3>
          {pickups.length===0 ? <div className="faint">No records</div> :
          <table className="t"><thead><tr><th>Pickup</th><th>Period</th><th className="num">Counted</th><th></th></tr></thead><tbody>
            {pickups.map(p=><tr key={p.id}>

              <td className="mono" style={{fontSize:12}}>{p.period_start} ~ {p.period_end}</td>

              </td></tr>)}
          </tbody></table>}
        </div>
      </div>
    </div>
    {isOwner && <div className="card">
      <h3>Count Envelopes · {MONTHS[m-1]} {y}</h3>
      {monthEnvelopes.length===0 ? <div className="faint">No cash days this month yet.</div> :
      <table className="t env-table"><thead><tr>
        <th>Day</th><th className="num">Sales</th><th className="num">Spent</th><th className="num">Expected</th><th className="num">Counted</th>
      </tr></thead><tbody>
        {monthEnvelopes.map(e=>{ const cnt=counts[e.date]; const has=cnt!==''&&cnt!=null; const diff=has?parseFloat(cnt||0)-e.expected:null;
          const ok=diff!==null && diff> -SHORT_TOL; const short=diff!==null && diff<=-SHORT_TOL;
          const note=cnotes[e.date]||''; const showNote=short||note;
          return <React.Fragment key={e.date}>
            <tr className={ok?'env-ok':(short?'env-short':'')}>
            <td className="mono env-day">{e.date.slice(8)} {DOW[new Date(e.date+'T00:00').getDay()]}</td>
            <td className="num mono">{fmt$(e.sales,0)}</td>
            <td className="num mono" style={{color:e.spent?'var(--red)':'var(--text3)'}}>{e.spent?'-'+fmt$(e.spent,0):'-'}</td>
            <td className="num mono"><b>{fmt$(e.expected,0)}</b></td>
            <td className="num env-cnt">
              <input type="number" step="0.01" className="env-input" placeholder={fmt$(e.expected,0)}
                value={cnt||''} onChange={ev=>setCounts({...counts,[e.date]:ev.target.value})}
                onBlur={ev=>saveCount(e.date, ev.target.value)}/>
              {diff!==null && <div className={'env-diff '+(ok?'pos':'neg')}>{ok?'✓ ':'✕ '}{(diff>0?'+':'')+fmt$(diff,0)}</div>}
            </td>
            </tr>
            {showNote && <tr className="env-note-row">
              <td colSpan={5}>
                <input className="env-note" placeholder="Why was it short? (e.g. bill stuck in register, found next day)"
                  value={note} onChange={ev=>setCnotes({...cnotes,[e.date]:ev.target.value})}
                  onBlur={ev=>saveNote(e.date, ev.target.value)}/>
              </td>
            </tr>}
          </React.Fragment>; })}
        <tr className="total"><td>Total</td>
          <td className="num mono">{fmt$(monthEnvelopes.reduce((a,e)=>a+e.sales,0),0)}</td>
          <td className="num mono">{fmt$(monthEnvelopes.reduce((a,e)=>a+e.spent,0),0)}</td>
          <td className="num mono">{fmt$(monthEnvelopes.reduce((a,e)=>a+e.expected,0),0)}</td>
          <td className="num mono">{fmt$(monthEnvelopes.reduce((a,e)=>a+(counts[e.date]!==''&&counts[e.date]!=null?parseFloat(counts[e.date]||0):0),0),0)}</td></tr>
      </tbody></table>}
    </div>}
    {dayModal && (()=>{
      const date=dayModal.date;
      const r=days[date]; const ce=cashExp[date];
      const sales=r?Number(r.amount):0; const spent=ce?ce.total:0; const expected=sales-spent;
      const cnt=counts[date]; const has=cnt!==''&&cnt!=null; const diff=has?parseFloat(cnt||0)-expected:null;
      const ok=diff!==null&&diff> -SHORT_TOL; const short=diff!==null&&diff<=-SHORT_TOL;
      return <div className="modal-overlay" onClick={()=>setDayModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <div><div className="modal-title">{fmtDateShort(date)}</div>
              <div className="faint" style={{fontSize:12.5}}>Count this envelope</div></div>
            <button className="modal-x" onClick={()=>setDayModal(null)}>✕</button>
          </div>
          <div className="modal-rows">
            <div className="modal-row"><span>Cash sales</span><span className="mono">{fmt$(sales,0)}</span></div>
            <div className="modal-row"><span>Cash spent</span><span className="mono" style={{color:spent?'var(--red)':'var(--text3)'}}>{spent?'-'+fmt$(spent,0):'-'}</span></div>
            <div className="modal-row modal-exp"><span>Expected in envelope</span><span className="mono"><b>{fmt$(expected,0)}</b></span></div>
          </div>
          {cnotes[date] && <div className="day-memo"><span className="day-memo-lbl">Note</span>{cnotes[date]}</div>}
          <label className="hint" style={{marginTop:8}}>Counted (what was actually in the envelope)</label>
          <input type="number" step="0.01" className="env-input" style={{width:'100%',fontSize:16}} placeholder={fmt$(expected,0)}
            value={cnt||''} onChange={ev=>setCounts({...counts,[date]:ev.target.value})}
            onBlur={ev=>saveCount(date, ev.target.value)}/>
          {diff!==null && <div className={'modal-diff '+(ok?'pos':'neg')}>
            {ok ? <>✓ Envelope has enough{diff>0?` (+${fmt$(diff,0)} over)`:''}</> : <>✕ Short by {fmt$(Math.abs(diff),0)}</>}
          </div>}
          {(short||cnotes[date]) && <>
            <label className="hint" style={{marginTop:10}}>Note (why was it short? update later if you find the cause)</label>
            <input className="env-note" style={{width:'100%'}} placeholder="e.g. bill stuck in register, found next day"
              value={cnotes[date]||''} onChange={ev=>setCnotes({...cnotes,[date]:ev.target.value})}
              onBlur={ev=>saveNote(date, ev.target.value)}/>
          </>}
          <button className="btn btn-gold" style={{width:'100%',marginTop:14}} onClick={()=>{ setDayModal(null); showToast('Saved'); }}>Done</button>
        </div>
      </div>;
    })()}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}
function Recurring({corps, canEditIds, profile, isOwner, embedded}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(editable[0] && editable[0].id);
  const [meta, setMeta] = useState(null);
  const [rows, setRows] = useState([]);
  const [f, setF] = useState({name:'', category_id:'', amount:'', frequency:'monthly', day_of_week:'5', day_of_month:'1', payee:''});
  const [inst, setInst] = useState({name:'', category_id:'', amount:'', day_of_month:'1', months:'3', start:todayStr(), payee:''});
  const [sched, setSched] = useState(null);
  const [edit, setEdit] = useState(null);   // full-edit an existing recurring row
  const [catOpen, setCatOpen] = useState(false);   // Expense Categories folded by default
  const [showHidden, setShowHidden] = useState(false); // hide inactive categories by default
  const [rulesOpen, setRulesOpen] = useState(false); // Automatic P&L rules panel folded by default
  const [dragId, setDragId] = useState(null); // category being dragged
  const [newCat, setNewCat] = useState('');
  const [toast, showToast] = useToast();

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId, true); setMeta(mt);
    const r = await sb.from('recurring_expenses').select('*').eq('corporation_id',corpId).order('created_at');
    setRows(r.data||[]);
  },[corpId]);
  useEffect(()=>{ reload(); },[reload]);

  const add = async()=>{
    if(!f.name||!f.category_id||!f.amount){ showToast('Enter a name, category, and amount'); return; }
    const { error } = await sb.from('recurring_expenses').insert({
      corporation_id:corpId, category_id:f.category_id, name:f.name, payee:f.payee||null,
      amount:parseFloat(f.amount), frequency:f.frequency,
      day_of_week: f.frequency==='weekly'?parseInt(f.day_of_week):null,
      day_of_month: f.frequency==='monthly'?parseInt(f.day_of_month):null });
    if(error){ showToast('Save failed: '+error.message); return; }
    setF({name:'',category_id:'',amount:'',frequency:'monthly',day_of_week:'5',day_of_month:'1',payee:''});
    showToast('Recurring expense added'); reload();
  };
  // installment: a finite monthly charge over N months (e.g. equipment over 3 months)
  const addInstallment = async()=>{
    if(!inst.name||!inst.category_id||!inst.amount||!inst.months){ showToast('Enter a name, category, amount, and number of months'); return; }
    const n = parseInt(inst.months); if(!(n>=1)){ showToast('Months must be 1 or more'); return; }
    const dom = parseInt(inst.day_of_month);
    const sd = new Date(inst.start+'T00:00');
    // first charge = the day-of-month on or after the start date. If that day has
    // already passed in the start month, the first payment is next month.
    const domIn = (y,mo)=> dom===99 ? lastDay(y,mo) : Math.min(dom, lastDay(y,mo));
    let fy=sd.getFullYear(), fmo=sd.getMonth()+1;         // 1-based month
    if(sd.getDate() > domIn(fy,fmo)){ fmo++; if(fmo>12){fmo=1;fy++;} }
    const firstDom = domIn(fy,fmo);
    const first = `${fy}-${pad(fmo)}-${pad(firstDom)}`;
    // last charge = (n-1) months after the first charge
    const lm = new Date(fy, (fmo-1)+(n-1), 1);
    const ly=lm.getFullYear(), lmo=lm.getMonth()+1;
    const last = `${ly}-${pad(lmo)}-${pad(domIn(ly,lmo))}`;
    const { error } = await sb.from('recurring_expenses').insert({
      corporation_id:corpId, category_id:inst.category_id, name:inst.name, payee:inst.payee||null,
      amount:parseFloat(inst.amount), frequency:'monthly', day_of_month:dom,
      start_date:first, end_date:last, installment_total:n });
    if(error){ showToast('Save failed: '+error.message); return; }
    setInst({name:'',category_id:'',amount:'',day_of_month:'1',months:'3',start:todayStr(),payee:''});
    showToast(`Installment added: ${n} payment${n>1?'s':''}, first on ${first}`); reload();
  };
  const toggle = async r=>{
    await sb.from('recurring_expenses').update({active:!r.active}).eq('id',r.id); reload();
  };
  const saveSched = async()=>{
    if(!sched.amount || !sched.from){ showToast('Enter the new amount and effective date'); return; }
    const { error } = await sb.from('recurring_expenses').update({
      next_amount: parseFloat(sched.amount), next_amount_from: sched.from }).eq('id',sched.id);
    if(error){ showToast('Save failed: '+error.message); return; }
    setSched(null); showToast('Scheduled change saved'); reload();
  };
  const clearSched = async(id)=>{
    await sb.from('recurring_expenses').update({next_amount:null, next_amount_from:null}).eq('id',id);
    setSched(null); showToast('Scheduled change removed'); reload();
  };
  // full edit of an existing recurring row (fix a wrong schedule, amount, name, etc.)
  const updateRec = async()=>{
    if(!edit.name||!edit.category_id||!edit.amount){ showToast('Enter a name, category, and amount'); return; }
    const { error } = await sb.from('recurring_expenses').update({
      category_id:edit.category_id, name:edit.name, payee:edit.payee||null,
      amount:parseFloat(edit.amount), frequency:edit.frequency,
      day_of_week: edit.frequency==='weekly'?parseInt(edit.day_of_week):null,
      day_of_month: edit.frequency==='monthly'?parseInt(edit.day_of_month):null }).eq('id',edit.id);
    if(error){ showToast('Update failed: '+error.message); return; }
    setEdit(null); showToast('Recurring expense updated'); reload();
  };
  const deleteRec = async(r)=>{
    if(!confirm(`Delete "${r.name}"? This stops it from generating. Past entries are kept.`)) return;
    const { error } = await sb.from('recurring_expenses').delete().eq('id',r.id);
    if(error){ showToast('Delete failed: '+error.message); return; }
    setEdit(null); showToast('Recurring expense deleted'); reload();
  };

  const addCategory = async()=>{
    const name = newCat.trim();
    if(!name){ showToast('Enter a category name'); return; }
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || ('cat_'+Date.now());
    const maxOrd = Math.max(0, ...(meta?meta.categories:[]).map(c=>c.display_order||0));
    const { error } = await sb.from('expense_categories').insert({
      corporation_id:corpId, code:slug, name, display_order:maxOrd+1 });
    if(error){ showToast(error.code==='23505' ? 'A category with this name already exists' : 'Add failed: '+error.message); return; }
    setNewCat(''); showToast('Category added: '+name); reload();
  };
  const renameCategory = async(cat)=>{
    const name = (prompt('Rename category', cat.name)||'').trim();
    if(!name || name===cat.name) return;
    const { error } = await sb.from('expense_categories').update({name}).eq('id',cat.id);
    if(error){ showToast('Rename failed: '+error.message); return; }
    showToast('Renamed'); reload();
  };
  const deleteCategory = async(cat)=>{
    if(cat.protected){ showToast('This category is used by automatic syncing and cannot be deleted'); return; }
    // check if the category has any expenses; if so, deactivate instead of hard delete
    const { count } = await sb.from('expenses').select('id',{count:'exact',head:true}).eq('category_id',cat.id);
    if(count>0){
      if(!confirm(`"${cat.name}" has ${count} expense(s). Hide it from new entries? (Past records are kept.)`)) return;
      const { error } = await sb.from('expense_categories').update({active:false}).eq('id',cat.id);
      if(error){ showToast('Failed: '+error.message); return; }
      showToast('Category hidden'); reload();
    } else {
      if(!confirm(`Delete category "${cat.name}"?`)) return;
      const { error } = await sb.from('expense_categories').delete().eq('id',cat.id);
      if(error){ showToast('Delete failed: '+error.message); return; }
      showToast('Category deleted'); reload();
    }
  };
  const restoreCategory = async(cat)=>{
    await sb.from('expense_categories').update({active:true}).eq('id',cat.id); reload();
  };
  // Reorder categories. Renumbers display_order sequentially after the move so it stays
  // clean even if existing values are null or duplicated. Order drives the P&L line order
  // and the category dropdowns.
  // Shared renumber: place `orderedVisible` first (in the given order), then any items not
  // shown (hidden) after, and write sequential display_order values (only where changed).
  const persistOrder = async(orderedVisible)=>{
    const visIds = new Set(orderedVisible.map(c=>c.id));
    const rest = (meta ? meta.categories : []).filter(c=>!visIds.has(c.id));
    const full = [...orderedVisible, ...rest];
    for(let k=0;k<full.length;k++){
      if(full[k].display_order !== k+1){
        const { error } = await sb.from('expense_categories').update({display_order:k+1}).eq('id',full[k].id);
        if(error){ showToast('Reorder failed: '+error.message); return; }
      }
    }
    reload();
  };
  const moveCategory = async(cat, dir, visibleList)=>{
    const vis = visibleList.slice();
    const i = vis.findIndex(c=>c.id===cat.id);
    const j = dir==='up' ? i-1 : i+1;
    if(i<0 || j<0 || j>=vis.length) return;
    const [it] = vis.splice(i,1);
    vis.splice(j,0,it);
    await persistOrder(vis);
  };
  const dropCategory = async(target, visibleList)=>{
    const id = dragId; setDragId(null);
    if(!id || id===target.id) return;
    const vis = visibleList.slice();
    const from = vis.findIndex(c=>c.id===id);
    const to = vis.findIndex(c=>c.id===target.id);
    if(from<0 || to<0) return;
    const [it] = vis.splice(from,1);
    vis.splice(to,0,it);
    await persistOrder(vis);
  };

  // materialize due entries for the current month up to today
  const generate = async()=>{
    const t = new Date(); const y=t.getFullYear(), m=t.getMonth()+1;
    const start=`${y}-${pad(m)}-01`, today=todayStr();
    const existing = await sb.from('expenses').select('recurring_id,date')
      .eq('corporation_id',corpId).not('recurring_id','is',null).gte('date',start).lte('date',today);
    const have = new Set((existing.data||[]).map(e=>e.recurring_id+'|'+e.date));
    const inserts=[];
    rows.filter(r=>r.active).forEach(r=>{
      for(let d=1; d<=t.getDate(); d++){
        const date=`${y}-${pad(m)}-${pad(d)}`;
        if(r.start_date && date<r.start_date) continue;
        if(r.end_date && date>r.end_date) continue;
        const dow=new Date(y,m-1,d).getDay();
        const targetDom = r.day_of_month===99 ? lastDay(y,m) : Math.min(r.day_of_month, lastDay(y,m));
        const due = r.frequency==='weekly' ? dow===r.day_of_week : d===targetDom;
        if(due && !have.has(r.id+'|'+date)){
          const amt = (r.next_amount!=null && r.next_amount_from && date>=r.next_amount_from) ? Number(r.next_amount) : Number(r.amount);
          inserts.push({corporation_id:corpId, category_id:r.category_id, date,
            amount:amt, payee:r.payee||null, memo:r.name,
            source:'recurring', recurring_id:r.id, entered_by:profile.id});
        }
      }
    });
    if(!inserts.length){ showToast('Nothing to generate (already up to date)'); return; }
    const { error } = await sb.from('expenses').insert(inserts);
    if(error) showToast('Generate failed: '+error.message);
    else showToast(inserts.length+' entries generated');
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head" style={embedded?{marginBottom:14}:{}}>
      <div>{!embedded && <><div className="eyebrow">Recurring</div><h2>Recurring Expenses</h2></>}

      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>

        <span className="wc-title">Expense Categories {meta && meta.categories.filter(c=>c.active).length>0 && <span className="wc-count">{meta.categories.filter(c=>c.active).length}</span>}</span>
        <span className="wc-chev">{catOpen?'▲':'▾'}</span>
      </button>
      {catOpen && (()=>{
        const allCats = (meta ? meta.categories : []);
        const hiddenCount = allCats.filter(c=>!c.active).length;
        const catList = allCats.filter(c=> showHidden ? true : c.active);
        return <div style={{padding:'0 18px 18px'}}>
        <div className="hint" style={{marginTop:0,marginBottom:10}}>Create a category for anything you want as its own line on the P&L, like Accounting, Toast Fee, or Trash Removal.</div>
        <div className="form-row">

          <button className="btn" style={{flex:'0 0 auto'}} onClick={addCategory}>Add Category</button>
        </div>

          {catList.map((c,idx)=><tr key={c.id} draggable

            onDragStart={()=>setDragId(c.id)}
            onDragOver={e=>e.preventDefault()}
            onDrop={()=>dropCategory(c,catList)}
            onDragEnd={()=>setDragId(null)}

            </td>
            <td className="nm">{c.name}
              {c.protected && <span className="badge gold">Auto</span>}
              {!c.active && <span className="badge" style={{background:'var(--panel2)'}}>Hidden</span>}
              {c.investor_group && <span className="faint inv-note" style={{fontSize:11}}> · shown as "{c.investor_group}" to investors</span>}
            </td>
            <td className="act-td" style={{textAlign:'right',whiteSpace:'nowrap'}}>
              {c.active
                ? <>
                    {!c.protected && <button className="btn btn-sm" onClick={()=>renameCategory(c)}>Rename</button>}
                    {!c.protected && <button className="btn btn-sm btn-danger" style={{marginLeft:6}} onClick={()=>deleteCategory(c)}>Delete</button>}
                    {c.protected && <span className="faint" style={{fontSize:12}}>protected</span>}
                  </>
                : <button className="btn btn-sm" onClick={()=>restoreCategory(c)}>Restore</button>}
            </td>
          </tr>)}
        </tbody></table>}
        {hiddenCount>0 && <button className="btn btn-sm cat-hidden-toggle" style={{marginTop:12}} onClick={()=>setShowHidden(s=>!s)}>
          {showHidden ? 'Hide hidden categories' : `Show ${hiddenCount} hidden categor${hiddenCount===1?'y':'ies'}`}
        </button>}
      </div>;
      })()}
    </div>}
    {isOwner && <div className="card wc-card">
      <button className="wc-head" onClick={()=>setRulesOpen(o=>!o)}>
        <span className="wc-title">Automatic P&L Rules {meta && meta.rules.length>0 && <span className="wc-count">{meta.rules.length}</span>}</span>
        <span className="wc-chev">{rulesOpen?'▲':'▾'}</span>
      </button>
      {rulesOpen && <div style={{padding:'0 18px 18px'}}>
        <div className="hint" style={{marginTop:0,marginBottom:10}}>Formula-driven expense lines computed automatically on the P&L (shown with an "Auto" badge under Insights). Read-only here; edited in the database. Variables: ch_&lt;channel&gt; is that revenue channel, cat_&lt;category&gt; is that expense category, total_sales is revenue counted in total.</div>
        {meta && meta.rules.length>0
          ? <table className="t rules-list"><tbody>
              {meta.rules.map(r=><tr key={r.id||r.code}>
                <td className="rule-nm">{r.name} <span className="badge gold">Auto</span></td>
                <td className="mono rule-expr" style={{fontSize:12,color:'var(--text2)'}}>{r.expr}</td>
              </tr>)}
            </tbody></table>
          : <div className="faint">No automatic rules for this store.</div>}
      </div>}
    </div>}
    {isOwner && <div className="card">
      <h3>New Recurring Expense</h3>
      <div className="form-row">
        <input placeholder="Name (e.g. John weekly pay, AD rent)" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <select value={f.category_id} onChange={e=>setF({...f,category_id:e.target.value})}>
          <option value="">Category</option>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input className="w-sm" type="number" step="0.01" placeholder="Amount" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})}/>
      </div>
      <div className="form-row">
        <select className="w-sm" value={f.frequency} onChange={e=>setF({...f,frequency:e.target.value})}>
          <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
        </select>
        {f.frequency==='weekly'
          ? <select className="w-sm" value={f.day_of_week} onChange={e=>setF({...f,day_of_week:e.target.value})}>
              {DOW.map((d,i)=><option key={i} value={i}>{d}</option>)}

        <input placeholder="Memo (optional)" value={f.payee} onChange={e=>setF({...f,payee:e.target.value})}/>

      </div>
    </div>}
    {isOwner && <div className="card">
      <h3>New Installment</h3>
      <div className="hint" style={{marginTop:0,marginBottom:10}}>For something paid over a fixed number of months, like equipment split into 3 payments. It runs monthly and stops automatically after the last payment.</div>
      <div className="form-row">
        <input placeholder="Name (e.g. Fryer, 3-month plan)" value={inst.name} onChange={e=>setInst({...inst,name:e.target.value})}/>
        <select value={inst.category_id} onChange={e=>setInst({...inst,category_id:e.target.value})}>
          <option value="">Category</option>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input className="w-sm" type="number" step="0.01" placeholder="Amount / month" value={inst.amount} onChange={e=>setInst({...inst,amount:e.target.value})}/>
      </div>
      <div className="form-row">
        <div><label className="hint" style={{marginTop:0}}># of months</label>
          <input className="w-sm" type="number" min="1" placeholder="3" value={inst.months} onChange={e=>setInst({...inst,months:e.target.value})}/></div>
        <div><label className="hint" style={{marginTop:0}}>Charge on</label>
          <select className="w-sm" value={inst.day_of_month} onChange={e=>setInst({...inst,day_of_month:e.target.value})}>
            {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>Day {i+1}</option>)}
            <option value="99">Last day</option>
          </select></div>
        <div><label className="hint" style={{marginTop:0}}>Starts</label>
          <input type="date" value={inst.start} onChange={e=>setInst({...inst,start:e.target.value})}/></div>
        <input placeholder="Memo (optional)" value={inst.payee} onChange={e=>setInst({...inst,payee:e.target.value})}/>
        <button className="btn btn-gold" style={{flex:'0 0 auto'}} onClick={addInstallment}>Add</button>
      </div>
      {inst.amount && inst.months && parseInt(inst.months)>=1 && (()=>{
        const n=parseInt(inst.months); const dom=parseInt(inst.day_of_month);
        const sd=new Date((inst.start||todayStr())+'T00:00');
        const domIn=(y,mo)=> dom===99 ? lastDay(y,mo) : Math.min(dom, lastDay(y,mo));
        let fy=sd.getFullYear(), fmo=sd.getMonth()+1;
        if(sd.getDate() > domIn(fy,fmo)){ fmo++; if(fmo>12){fmo=1;fy++;} }
        const first=`${fy}-${pad(fmo)}-${pad(domIn(fy,fmo))}`;
        const lm=new Date(fy,(fmo-1)+(n-1),1); const ly=lm.getFullYear(), lmo=lm.getMonth()+1;
        const last=`${ly}-${pad(lmo)}-${pad(domIn(ly,lmo))}`;
        return <div className="hint" style={{marginTop:4}}>Total over {n} month{n>1?'s':''}: <b>{fmt$(parseFloat(inst.amount||0)*n)}</b> · first charge <b>{first}</b>, last <b>{last}</b></div>;
      })()}
    </div>}
    <div className="card">
      <h3>Registered Recurring Expenses</h3>
      {rows.length===0 ? <div className="faint">None</div> :
      <table className="t t-settings rec-list">        <thead><tr><th>Name</th><th>Category</th><th>Schedule</th><th className="num">Amount</th><th></th></tr></thead>
        <tbody>{rows.map(r=><tr key={r.id} style={{opacity:r.active?1:.45}}>
          <td className="rec-name">{r.name}{r.payee && <span className="faint"> · {r.payee}</span>}
            {r.installment_total && <span className="badge gold" style={{marginLeft:6}}>Installment</span>}</td>
          <td className="rec-cat">{catName(r.category_id)}</td>
          <td className="rec-sched">{r.frequency==='weekly' ? 'Weekly · '+DOW[r.day_of_week] : 'Monthly · '+(r.day_of_month===99?'Last day':'Day '+r.day_of_month)}
            {r.installment_total && <div className="faint" style={{fontSize:11}}>{r.installment_total} payment{r.installment_total>1?'s':''} · {r.start_date} → {r.end_date}</div>}
          </td>
          <td className="num rec-amt">{fmt$(Number(r.amount))}
            {r.next_amount!=null && r.next_amount_from && <div className="faint" style={{fontSize:11}}>→ {fmt$(Number(r.next_amount))} from {r.next_amount_from}</div>}
          </td>
          <td className="rec-act" style={{textAlign:'right',whiteSpace:'nowrap'}}>
            {isOwner && <button className="btn btn-sm" onClick={()=>{ setSched(null); setEdit(edit&&edit.id===r.id?null:{id:r.id, name:r.name, category_id:r.category_id, amount:String(r.amount), frequency:r.frequency, day_of_week:String(r.day_of_week??5), day_of_month:String(r.day_of_month??1), payee:r.payee||''}); }}>Edit</button>}
            {isOwner && <button className="btn btn-sm" style={{marginLeft:6}} onClick={()=>{ setEdit(null); setSched(sched&&sched.id===r.id?null:{id:r.id, amount:r.next_amount??'', from:r.next_amount_from||''}); }}>Schedule raise</button>}
            {isOwner && <button className="btn btn-sm" onClick={()=>toggle(r)} style={{marginLeft:6}}>{r.active?'Pause':'Resume'}</button>}
          </td>
        </tr>)}</tbody>
      </table>}
      {edit && <div className="modal-overlay" onClick={()=>setEdit(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <div className="modal-title">Edit recurring expense</div>
            <button className="modal-x" onClick={()=>setEdit(null)}>✕</button>
          </div>
          <div className="hint" style={{marginTop:0,marginBottom:10}}>Fix the name, category, amount, or the schedule (e.g. wrong frequency or day). This changes the rule going forward; past entries are kept.</div>
          <div className="form-row">
            <input placeholder="Name" value={edit.name} onChange={e=>setEdit({...edit,name:e.target.value})}/>
            <select value={edit.category_id} onChange={e=>setEdit({...edit,category_id:e.target.value})}>

              {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <input className="w-sm" type="number" step="0.01" placeholder="Amount" value={edit.amount} onChange={e=>setEdit({...edit,amount:e.target.value})}/>
          </div>
          <div className="form-row">
            <select className="w-sm" value={edit.frequency} onChange={e=>setEdit({...edit,frequency:e.target.value})}>
              <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
            </select>
            {edit.frequency==='weekly'
              ? <select className="w-sm" value={edit.day_of_week} onChange={e=>setEdit({...edit,day_of_week:e.target.value})}>
                  {DOW.map((d,i)=><option key={i} value={i}>{d}</option>)}
                </select>
              : <select className="w-sm" value={edit.day_of_month} onChange={e=>setEdit({...edit,day_of_month:e.target.value})}>
                  {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>Day {i+1}</option>)}
                  <option value="99">Last day of month</option>
                </select>}
            <input placeholder="Memo (optional)" value={edit.payee} onChange={e=>setEdit({...edit,payee:e.target.value})}/>

          <div style={{display:'flex',gap:8,marginTop:4}}>
            <button className="btn btn-gold btn-sm" onClick={updateRec}>Save changes</button>
            <button className="btn btn-sm btn-danger" onClick={()=>deleteRec(rows.find(x=>x.id===edit.id))}>Delete</button>

      {sched && <div className="modal-overlay" onClick={()=>setSched(null)}>

            <div className="modal-title">Schedule an amount change</div>
            <button className="modal-x" onClick={()=>setSched(null)}>✕</button>
          </div>

            <div><label className="hint" style={{marginTop:0}}>New amount</label>

    </div>
    {toast && <div className="toast">{toast}</div>}

}

// ================= MONTHLY CLOSE =================
function ClosePage({corps, canEditIds, profile, isOwner, preset}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState((preset&&preset.corpId) || (editable[0] && editable[0].id));
  const now = new Date();
  const prevM = now.getMonth()===0 ? {y:now.getFullYear()-1,m:12} : {y:now.getFullYear(),m:now.getMonth()};
  const [y,setY] = useState((preset&&preset.y)||prevM.y);
  const [m,setM] = useState((preset&&preset.m)||prevM.m);
  useEffect(()=>{ if(preset){ setCorpId(preset.corpId); setY(preset.y); setM(preset.m); } },[preset]);
  const [meta,setMeta] = useState(null);
  const [pl,setPl] = useState(null);
  const [close,setClose] = useState(null);
  const [files,setFiles] = useState([]);
  const [notes,setNotes] = useState('');
  const [adj,setAdj] = useState({category_id:'', amount:'', memo:'', reverse:true});
  const [toast,showToast] = useToast();
  const [busy,setBusy] = useState(false);
  const [preview,setPreview] = useState(false);
  const fileRef = useRef();

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    const raw = await loadMonthRaw(corpId,y,m);
    setMeta(mt); setPl(computePL(mt,raw));
    const mc = await sb.from('monthly_close').select('*').eq('corporation_id',corpId).eq('year',y).eq('month',m).maybeSingle();
    setClose(mc.data||null); setNotes(mc.data?(mc.data.notes||''):'');
    if(mc.data){
      const fl = await sb.from('report_files').select('*').eq('monthly_close_id',mc.data.id);
      setFiles(fl.data||[]);
    } else setFiles([]);
  },[corpId,y,m]);
  useEffect(()=>{ reload(); },[reload]);

  const addAdjustment = async()=>{
    if(!adj.category_id||!adj.amount){ showToast('Select a category and enter an amount'); return; }
    const dateEnd = `${y}-${pad(m)}-${pad(lastDay(y,m))}`;
    const { data, error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:adj.category_id, date:dateEnd,
      amount:parseFloat(adj.amount), memo:adj.memo||'Month-end adjustment', adjustment:true,
      source:'manual', entered_by:profile.id }).select().single();
    if(error){ showToast('Failed: '+error.message); return; }
    if(adj.reverse){
      let ny=y, nm=m+1; if(nm>12){nm=1;ny++;}
      const { error:e2 } = await sb.from('expenses').insert({
        corporation_id:corpId, category_id:adj.category_id, date:`${ny}-${pad(nm)}-01`,
        amount:-parseFloat(adj.amount), memo:(adj.memo||'Month-end adjustment')+' auto reversal',
        adjustment:true, reversal_of:data.id, source:'manual', entered_by:profile.id });
      if(e2){ showToast('Reversal failed: '+e2.message); return; }
    }
    setAdj({category_id:'',amount:'',memo:'',reverse:true});
    showToast('Adjustment added'+(adj.reverse?' (with next-month reversal)':''));
    reload();
  };

  const saveClose = async (publish)=>{
    setBusy(true);
    const payload = {
      corporation_id:corpId, year:y, month:m,
      summary: Object.assign({}, close?close.summary:{}, buildSummary(pl)),
      notes: notes||null, updated_at:new Date().toISOString(),
      status: publish?'published':(close?close.status:'draft'),
    };
    if(publish){ payload.published_at=new Date().toISOString(); payload.published_by=profile.id; }
    const { error } = await sb.from('monthly_close').upsert(payload,{onConflict:'corporation_id,year,month'});
    setBusy(false);
    if(error){ showToast('Failed: '+error.message); return; }
    showToast(publish?'Published. Now visible to investors.':'Draft saved'); reload();
  };
  const unpublish = async()=>{
    if(!confirm('Unpublish this report? Investors will no longer see it.')) return;
    await sb.from('monthly_close').update({status:'draft'}).eq('id',close.id);
    showToast('Unpublished'); reload();
  };

  const upload = async e=>{
    const file = e.target.files[0]; if(!file) return;
    if(!close){ showToast('Save a draft first'); return; }
    setBusy(true);
    const path = crypto.randomUUID()+'/'+file.name;
    const { error } = await sb.storage.from('reports').upload(path, file);
    if(error){ setBusy(false); showToast('Upload failed: '+error.message); return; }
    await sb.from('report_files').insert({monthly_close_id:close.id, name:file.name, storage_path:path, uploaded_by:profile.id});
    setBusy(false); if(fileRef.current) fileRef.current.value='';
    showToast('Attached'); reload();
  };
  const removeFile = async f=>{
    if(!confirm('Delete this attachment?')) return;
    await sb.storage.from('reports').remove([f.storage_path]);
    await sb.from('report_files').delete().eq('id',f.id);
    reload();
  };

  const legacy = close && close.summary && close.summary.legacy;
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Monthly Close</div><h2>Monthly Close & Publish</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
        <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
      </div>
    </div>
    {!pl ? <Spinner/> : <div className="grid2">
      <div>
        <div className="card">
          <h3>{monthLabel(y,m)} P&L (live)
            {close && <span className={'badge '+(close.status==='published'?'green':'')}>{close.status==='published'?'Published':'Draft'}</span>}</h3>
          <table className="t"><tbody>
            <tr><td>Total Sales</td><td className="num">{fmt$(pl.totalSales)}</td></tr>
            <tr><td>Total Expenses</td><td className="num">{fmt$(pl.totalExpenses)}</td></tr>
            <tr className="total"><td>Net Profit</td><td className={'num '+(pl.net>=0?'pos':'neg')}>{fmt$(pl.net)} <span className="faint">({fmtPct(pl.margin)})</span></td></tr>
            {pl.dist.map(d=><tr key={d.holder}><td className="muted">{d.holder} ({d.pct}%)</td><td className="num">{fmt$(d.amount)}</td></tr>)}
          </tbody></table>
          {legacy && <div className="hint" style={{marginTop:10}}>This month also has the original board snapshot imported from Excel.</div>}
        </div>
        {isOwner && <div className="card">
          <h3>Month-End Adjustments</h3>
          <div className="hint" style={{marginTop:0,marginBottom:12}}>
            Example: payroll paid early next month that belongs to this month. With auto-reverse on, a negative entry is created on the 1st of next month, so recording the actual payment as usual never double-counts.</div>
          <div className="form-row">
            <select value={adj.category_id} onChange={e=>setAdj({...adj,category_id:e.target.value})}>
              <option value="">Category</option>
              {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <input className="w-sm" type="number" step="0.01" placeholder="Amount" value={adj.amount} onChange={e=>setAdj({...adj,amount:e.target.value})}/>
          </div>
          <div className="form-row">
            <input placeholder="Memo (e.g. payroll due 7/5)" value={adj.memo} onChange={e=>setAdj({...adj,memo:e.target.value})}/>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--text2)',marginBottom:12}}>
            <input type="checkbox" style={{width:'auto'}} checked={adj.reverse} onChange={e=>setAdj({...adj,reverse:e.target.checked})}/>
            Auto-reverse on the 1st of next month
          </label>
          <button className="btn" onClick={addAdjustment}>Add Adjustment (dated last day of month)</button>
        </div>}
      </div>
      <div>
        <div className="card">
          <h3>Notes for Investors</h3>
          <textarea rows="5" placeholder="Summary notes for the month. Shown to investors exactly as written when published." value={notes} onChange={e=>setNotes(e.target.value)}/>
          <hr className="divider"/>
          <h3>Attachments (monthly report PDF, etc.)</h3>
          {files.map(f=><div key={f.id} className="pend"><div className="grow">{f.name}</div>
            {isOwner && <button className="btn btn-sm btn-danger" onClick={()=>removeFile(f)}>Delete</button>}</div>)}
          {isOwner && <input type="file" ref={fileRef} onChange={upload} disabled={busy} style={{marginTop:8}}/>}
          <hr className="divider"/>
          {isOwner ? <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn" disabled={busy} onClick={()=>setPreview(p=>!p)}>{preview?'Hide Preview':'Preview Report'}</button>
            <button className="btn" disabled={busy} onClick={()=>saveClose(false)}>Save Draft</button>
            <button className="btn btn-gold" disabled={busy} onClick={()=>saveClose(true)}>Publish</button>
            {close && close.status==='published' && <button className="btn btn-danger" onClick={unpublish}>Unpublish</button>}
          </div> : <div className="hint">Only the Owner can publish.</div>}
        </div>
      </div>
    </div>}
    {preview && pl && <div style={{marginTop:20}}>
      <div className="hint" style={{marginBottom:10}}>This is exactly how investors will see the report when published. It uses the current live numbers and notes; distribution and ownership are never included.</div>
      <StatementView
        corpName={(editable.find(c=>c.id===corpId)||{}).name||''}
        year={y} month={m}
        summary={buildSummary(pl)} notes={notes}
        files={files.map(f=>({id:f.id, name:f.name}))}
        previewLabel={close && close.status==='published' ? 'Preview · already published' : 'Preview · not yet published'}/>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= INVESTOR PORTAL =================
// Renders one monthly statement in the exact layout investors see. Used by the
// investor portal and by the Close & Publish preview so the owner sees precisely
// what will be published.
function StatementView({corpName, year, month, summary, notes, files, publishedAt, onDownload, previewLabel}){
  const s = summary||{};
  const rev = (s.revenue||[]).filter(x=>x.amount!==0);
  const exp = (s.expenses||[]).filter(x=>x.amount!==0);
  const margin = (s.net_margin!==null && s.net_margin!==undefined) ? s.net_margin : (s.total_sales? s.net_profit/s.total_sales : null);
  return <div className="stmt">
    <div className="stmt-head">
      <div>
        <div className="stmt-corp">{corpName||''}</div>
        <div className="stmt-period">{MONTHS[month-1]} {year} · Monthly Statement</div>
      </div>
      <div className="stmt-badge">{previewLabel ? previewLabel : ('Published '+(publishedAt ? new Date(publishedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''))}</div>
    </div>
    <div className="stmt-summary">
      <div className="stmt-sum-item"><div className="ss-lbl">Total Revenue</div><div className="ss-val">{fmt$(s.total_sales)}</div></div>
      <div className="stmt-sum-item"><div className="ss-lbl">Total Expenses</div><div className="ss-val">{fmt$(s.total_expenses)}</div></div>
      <div className="stmt-sum-item accent"><div className="ss-lbl">Net Profit</div>
        <div className={'ss-val '+((s.net_profit||0)>=0?'pos':'neg')}>{fmt$(s.net_profit)}</div>
        {margin!==null && <div className="ss-margin">{fmtPct(margin)} margin</div>}</div>
    </div>
    {notes && <div className="stmt-notes"><div className="stmt-notes-lbl">Note from HQ</div>{notes}</div>}
    <div className="stmt-cols">
      <div className="stmt-block">
        <div className="stmt-block-h">Revenue</div>
        <table className="stmt-table"><tbody>
          {rev.map((x,i)=><tr key={i}><td>{x.name}</td><td className="num">{fmt$(x.amount)}</td></tr>)}
          <tr className="stmt-tot"><td>Total Revenue</td><td className="num">{fmt$(s.total_sales)}</td></tr>
        </tbody></table>
      </div>
      <div className="stmt-block">
        <div className="stmt-block-h">Expenses</div>
        <table className="stmt-table"><tbody>
          {exp.map((x,i)=><tr key={i}><td>{x.name}{x.auto && <span className="stmt-auto">auto</span>}</td><td className="num">{fmt$(x.amount)}</td></tr>)}
          <tr className="stmt-tot"><td>Total Expenses</td><td className="num">{fmt$(s.total_expenses)}</td></tr>
        </tbody></table>
      </div>
    </div>
    <div className="stmt-net">
      <span>Net Profit for {MONTHS[month-1]} {year}</span>
      <span className={(s.net_profit||0)>=0?'pos':'neg'}>{fmt$(s.net_profit)}</span>
    </div>
    {files && files.length>0 && <div className="stmt-files">
      {files.map(f=><button key={f.id} className="btn btn-sm" onClick={()=>onDownload&&onDownload(f)}>📄 {f.name}</button>)}
    </div>}
  </div>;
}

function InvestorPortal({corps}){
  const [corpId, setCorpId] = useState(corps[0] && corps[0].id);
  const [reports, setReports] = useState(null);

  useEffect(()=>{ if(!corpId) return; let dead=false;
    (async()=>{
      setReports(null);
      const mc = await sb.from('monthly_close').select('*').eq('corporation_id',corpId)
        .eq('status','published').order('year',{ascending:false}).order('month',{ascending:false});
      const rows = mc.data||[];
      const ids = rows.map(r=>r.id);
      let filesBy = {};
      if(ids.length){
        const fl = await sb.from('report_files').select('*').in('monthly_close_id',ids);
        (fl.data||[]).forEach(f=>{ (filesBy[f.monthly_close_id]=filesBy[f.monthly_close_id]||[]).push(f); });
      }
      if(!dead) setReports(rows.map(r=>({...r, files:filesBy[r.id]||[]})));
    })();
    return ()=>{dead=true};
  },[corpId]);

  const download = async f=>{
    const { data, error } = await sb.storage.from('reports').createSignedUrl(f.storage_path, 3600);
    if(data && data.signedUrl) window.open(data.signedUrl,'_blank');
  };

  if(!corps.length) return <div className="card">No corporations available. Contact HQ.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Investor Reports</div><h2>Monthly Reports</h2>
        <div className="sub">Monthly summaries published by Ugly HQ.</div></div>
      <CorpTabs corps={corps} sel={corpId} onSel={setCorpId}/>
    </div>
    {reports===null ? <Spinner/> : reports.length===0 ?
      <div className="card faint">No reports published yet.</div> :
      reports.map(r=>{
        const corp = corps.find(c=>c.id===corpId);
        return <StatementView key={r.id} corpName={corp?corp.name:''} year={r.year} month={r.month}
          summary={r.summary||{}} notes={r.notes} files={r.files} publishedAt={r.published_at} onDownload={download}/>;
      })}
  </div>;
}
