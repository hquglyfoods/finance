// simple SVG trend chart: bars = sales, line = net profit
// pick a "nice" round step so the axis has ~4-5 labelled gridlines
function niceStep(maxV, target){
  const rough = maxV/(target||4);
  const pow = Math.pow(10, Math.floor(Math.log10(rough||1)));
  const candidates = [1,2,2.5,5,10].map(x=>x*pow);
  return candidates.find(c=>c>=rough) || candidates[candidates.length-1];
}
function TrendChart({points}){
  const [sel,setSel] = React.useState(null);
  if(!points.length) return null;
  const W = Math.max(560, points.length*52), H = 210, padL = 46, padR = 10, padB = 26, padT = 14;
  const plotH = H - padB - padT;
  const maxSales = Math.max(1, ...points.map(p=>p.sales));
  const step = niceStep(maxSales, 4);
  const axisMax = Math.ceil(maxSales/step)*step;                // round top up to a gridline
  const barY = v => padT + plotH * (1 - v/axisMax);
  const baseY = padT + plotH;
  const nets = points.map(p=>p.net);
  const maxNet = Math.max(0, ...nets), minNet = Math.min(0, ...nets);
  const netSpan = (maxNet - minNet) || 1;
  const netY = v => padT + plotH * (1 - (v - minNet)/netSpan);
  const bw = 26, gap = (W - padL - padR)/points.length;
  const cx = i => padL + gap*i + gap/2;
  const grid = []; for(let g=0; g<=axisMax+1e-6; g+=step) grid.push(g);
  return <div className="chart-wrap">
    <svg width={W} height={H} onMouseLeave={()=>setSel(null)}>
      {/* horizontal gridlines + $ labels */}
      {grid.map((g,i)=><g key={i}>
        <line x1={padL} x2={W-padR} y1={barY(g)} y2={barY(g)} stroke={i===0?'#E7E4DD':'#F0EEE9'} strokeWidth="1"/>
        <text x={padL-6} y={barY(g)+3} fontSize="9.5" fill="#948B7C" textAnchor="end" fontFamily="IBM Plex Mono">{fmt$k(g)}</text>
      </g>)}
      {minNet<0 && <line x1={padL} x2={W-padR} y1={netY(0)} y2={netY(0)} stroke="#D8D3C9" strokeWidth="1" strokeDasharray="3 3"/>}
      {points.map((p,i)=>{
        const x = cx(i), h = baseY - barY(p.sales), on = sel===i;
        return <g key={i} onPointerDown={()=>setSel(i)} onMouseEnter={()=>setSel(i)} style={{cursor:'pointer'}}>
          <rect x={x-gap/2} y={padT} width={gap} height={plotH} fill="transparent"/>
          <rect x={x-bw/2} y={barY(p.sales)} width={bw} height={Math.max(0,h)} fill={on?'#B08A1E':'#D4B454'} rx="3"/>
          <text x={x} y={H-8} fontSize="10" fill="#948B7C" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>
        </g>;
      })}
      <polyline fill="none" stroke="#2E7D4F" strokeWidth="2" pointerEvents="none"
        points={points.map((p,i)=>`${cx(i)},${netY(p.net)}`).join(' ')}/>
      {points.map((p,i)=><circle key={i} cx={cx(i)} cy={netY(p.net)} r={sel===i?4.5:3} fill={p.net>=0?'#2E7D4F':'#C0392B'} pointerEvents="none"/>)}
      {/* always-on high/low sales markers so the peak and trough read without tapping.
          The in-progress period (current month/year, flagged p.inProgress) is excluded
          so a month that just started can't show up as the "lowest". */}
      {(()=>{ const withData=points.map((p,i)=>({p,i})).filter(o=>o.p.sales>0 && !o.p.inProgress); if(withData.length<2) return null;
        let hi=withData[0], lo=withData[0];
        withData.forEach(o=>{ if(o.p.sales>hi.p.sales)hi=o; if(o.p.sales<lo.p.sales)lo=o; });
        const tag=(o,txt,color)=> sel===o.i ? null : <text key={txt} x={cx(o.i)} y={barY(o.p.sales)-5} fontSize="9" fontWeight="700"
          fill={color} textAnchor="middle" fontFamily="IBM Plex Mono" pointerEvents="none">{fmt$k(o.p.sales)}</text>;
        return <g>{tag(hi,'hi','#B08A1E')}{hi.i!==lo.i && tag(lo,'lo','#B9A98A')}</g>;
      })()}
      {sel!==null && (()=>{ const p=points[sel]; const x=cx(sel); const tw=118, th=42;
        const tx=Math.min(Math.max(x-tw/2,padL), W-padR-tw); const ty=Math.max(padT, barY(p.sales)-th-8);
        return <g pointerEvents="none">
          <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="#2A2620" opacity="0.95"/>
          <text x={tx+10} y={ty+17} fontSize="11" fill="#F4D77E" fontFamily="IBM Plex Mono">Sales {fmt$k(p.sales)}</text>
          <text x={tx+10} y={ty+32} fontSize="11" fill={p.net>=0?'#8FD3AC':'#E88'} fontFamily="IBM Plex Mono">Net {fmt$k(p.net)}</text>
        </g>; })()}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'#D4B454'}}></span>Sales</span>
      <span><span className="sw" style={{background:'#2E7D4F'}}></span>Net profit</span>
      <span className="faint">Tap a bar for values</span>
    </div>
  </div>;
}

// ratio trend chart: payroll % and supplies % over months
function RatioChart({points}){
  const [sel,setSel] = React.useState(null);
  const pts = points.filter(p=>p.payrollPct!==null || p.suppliesPct!==null);
  if(!pts.length) return null;
  const W = Math.max(560, pts.length*52), H = 200, padL=40, padR=10, padB=26, padT=14;
  const vals = pts.flatMap(p=>[p.payrollPct,p.suppliesPct]).filter(v=>v!==null);
  const rawMax = Math.max(0.30, ...vals);
  const maxV = Math.ceil(rawMax/0.05)*0.05, minV = 0;          // round up to a 5% line
  const yOf = v => padT + (H-padB-padT)*(1-(v-minV)/(maxV-minV));
  const gap = (W-padL-padR)/pts.length;
  const cx = i => padL + gap*i + gap/2;
  const line = (key,color)=>{
    const ps = pts.map((p,i)=>p[key]===null?null:`${cx(i)},${yOf(p[key])}`).filter(Boolean);
    return <polyline fill="none" stroke={color} strokeWidth="2" pointerEvents="none" points={ps.join(' ')}/>;
  };
  const dots = (key,color)=> pts.map((p,i)=>p[key]===null?null:
    <circle key={key+i} cx={cx(i)} cy={yOf(p[key])} r={sel===i?4:2.5} fill={color} pointerEvents="none"/>);
  // 5% gridlines
  const grid=[]; for(let g=0; g<=maxV+1e-6; g+=0.05) grid.push(+g.toFixed(2));
  return <div className="chart-wrap">
    <svg width={W} height={H} onMouseLeave={()=>setSel(null)}>
      {grid.map((g,i)=><g key={i}>
        <line x1={padL} x2={W-padR} y1={yOf(g)} y2={yOf(g)} stroke={i===0?'#E7E4DD':'#F0EEE9'} strokeWidth="1"/>
        <text x={padL-6} y={yOf(g)+3} fontSize="9.5" fill="#948B7C" textAnchor="end" fontFamily="IBM Plex Mono">{Math.round(g*100)}%</text>
      </g>)}
      {line('payrollPct','#B08A1E')}
      {line('suppliesPct','#3A6EA5')}
      {dots('payrollPct','#B08A1E')}
      {dots('suppliesPct','#3A6EA5')}
      {/* label the highest AND lowest of each ratio (payroll, supplies) so both read
          without tapping. The in-progress period (p.inProgress) is excluded. */}
      {(()=>{ const hilo=(key)=>{ let hi=null,lo=null; pts.forEach((p,i)=>{ if(p[key]==null||p.inProgress) return;
            if(hi===null||p[key]>pts[hi][key]) hi=i; if(lo===null||p[key]<pts[lo][key]) lo=i; }); return {hi,lo}; };
        const tag=(i,key,color,above)=>{ if(i===null||sel===i) return null;
          return <text key={key+(above?'h':'l')} x={cx(i)} y={yOf(pts[i][key])+(above?-6:12)} fontSize="9" fontWeight="700" fill={color}
            textAnchor="middle" fontFamily="IBM Plex Mono" pointerEvents="none">{fmtPct(pts[i][key])}</text>; };
        const P=hilo('payrollPct'), S=hilo('suppliesPct');
        return <g>
          {tag(P.hi,'payrollPct','#B08A1E',true)}{P.hi!==P.lo && tag(P.lo,'payrollPct','#C9A94E',false)}
          {tag(S.hi,'suppliesPct','#3A6EA5',true)}{S.hi!==S.lo && tag(S.lo,'suppliesPct','#7AA0C8',false)}
        </g>;
      })()}
      {pts.map((p,i)=><g key={i} onPointerDown={()=>setSel(i)} onMouseEnter={()=>setSel(i)} style={{cursor:'pointer'}}>
        <rect x={cx(i)-gap/2} y={padT} width={gap} height={H-padB-padT} fill={sel===i?'rgba(176,138,30,0.05)':'transparent'}/>
        <text x={cx(i)} y={H-8} fontSize="10" fill="#948B7C" textAnchor="middle" fontFamily="IBM Plex Mono">{p.label}</text>
      </g>)}
      {sel!==null && (()=>{ const p=pts[sel]; const x=cx(sel); const tw=120, th=42;
        const tx=Math.min(Math.max(x-tw/2,padL), W-padR-tw); const ty=padT+4;
        return <g pointerEvents="none">
          <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="#2A2620" opacity="0.95"/>
          <text x={tx+10} y={ty+17} fontSize="11" fill="#E7C86A" fontFamily="IBM Plex Mono">Payroll {p.payrollPct!=null?fmtPct(p.payrollPct):'-'}</text>
          <text x={tx+10} y={ty+32} fontSize="11" fill="#8FB4E0" fontFamily="IBM Plex Mono">Supplies {p.suppliesPct!=null?fmtPct(p.suppliesPct):'-'}</text>
        </g>; })()}
    </svg>
    <div className="legend">
      <span><span className="sw" style={{background:'#B08A1E'}}></span>Payroll %</span>
      <span><span className="sw" style={{background:'#3A6EA5'}}></span>Supplies %</span>
      <span className="faint">Tap a point for values</span>
    </div>
  </div>;
}

// trend direction vs previous month: cost ratios going up is bad
function TrendArrow({cur, prev, higherIsBad}){
  if(cur===null||prev===null||prev===undefined) return null;
  const d = cur - prev;
  if(Math.abs(d) < 0.002) return <span className="faint"> →</span>;
  const up = d > 0;
  const bad = higherIsBad ? up : !up;
  return <span className={bad?'neg':'pos'}> {up?'▲':'▼'} {(Math.abs(d)*100).toFixed(1)}pt</span>;
}

function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function YoYDelta({cur, prev, bare, invert}){
  if(prev===null||prev===undefined||Math.abs(prev)<0.01) return <span className="faint">{bare?'—':'no data last year'}</span>;
  const d = (cur-prev)/Math.abs(prev);
  // invert=true for expenses: spending MORE than last year (positive delta) is bad -> red.
  const good = invert ? d<=0 : d>=0;
  return <span className={good?'pos':'neg'}>{d>=0?'+':''}{(d*100).toFixed(1)}%{bare?'':' vs last year'}</span>;
}

// ================= DASHBOARD =================
function Dashboard({corps, canEditIds, presetCorp, isOwner}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(editable[0] && editable[0].id);
  const now = new Date();
  const [y, setY] = useState(now.getFullYear());
  const [m, setM] = useState(now.getMonth()+1);
  const [view, setView] = useState('daily');   // daily | month | year | alltime
  const [yearMode, setYearMode] = useState('1y'); // 1y | 3y  (only used when view==='year')
  const [compareStores, setCompareStores] = useState(false);
  const [meta, setMeta] = useState(null);
  const [loading, setLoading] = useState(true);
  const loadingRef = React.useRef(true);
  React.useEffect(()=>{ loadingRef.current = loading; },[loading]);
  const [refresh, setRefresh] = useState(0);   // bump to reload after edit/delete
  // Refresh data only when the user RETURNS to the app after leaving (tab/app switch),
  // so new data (payroll, expenses booked elsewhere) shows up. We do NOT refresh on a
  // timer while the user is looking at the screen, because that caused a distracting
  // flicker. Only a real visibility change from hidden->visible triggers a refresh.
  useEffect(()=>{
    let last=Date.now();
    const onVisible=()=>{ if(document.visibilityState!=='visible') return; if(loadingRef.current) return;
      const now=Date.now(); if(now-last<15000) return; last=now; setRefresh(x=>x+1); };
    document.addEventListener('visibilitychange', onVisible);
    return ()=>{ document.removeEventListener('visibilitychange', onVisible); };
  },[]);
  // when navigated from a Home store card, focus that store's daily detail
  useEffect(()=>{ if(presetCorp && presetCorp.id){ setCorpId(presetCorp.id); setView('daily'); } },[presetCorp]);
  // If no store is selected yet (e.g. corps loaded after first render), pick the first
  // available one, so the loader can run instead of sitting on a spinner.
  useEffect(()=>{ if(!corpId && editable[0]) setCorpId(editable[0].id); },[editable, corpId]);

  // shared data holders
  const [pl, setPl] = useState(null);
  const [yoy, setYoy] = useState(null);
  const [trend, setTrend] = useState([]);
  const [dayRows, setDayRows] = useState([]);        // daily view
  const [yearMonths, setYearMonths] = useState([]);  // year view: [{m, pl}]
  const [yearMonthsPrev, setYearMonthsPrev] = useState([]); // compare view
  const [yearMonthsPrev2, setYearMonthsPrev2] = useState([]); // 3-year
  const [allTime, setAllTime] = useState(null); // all-time view
  // store comparison: pick up to 3 stores, compare the selected month side by side
  const [cmpIds, setCmpIds] = useState(()=>editable.slice(0,3).map(c=>c.id));
  const [cmpData, setCmpData] = useState(null);
  const [cmpDate, setCmpDate] = useState(()=>todayStr());

  const _loadKeyRef = React.useRef('');
  const _genRef = React.useRef(0);
  useEffect(()=>{
    // If there's no store selected yet, don't sit on a spinner forever.
    if(!corpId){ setLoading(false); return; }
    const gen = ++_genRef.current;          // this run's generation
    const isCurrent = ()=> _genRef.current===gen;   // superseded when a newer run starts
    // Only show the spinner when the actual view changed (store, month, year, view mode).
    // A background refresh (returning to the app) reloads silently so the screen doesn't
    // flicker while the user is looking at it.
    const key = [corpId,y,m,view,yearMode].join('|');
    const silent = (key === _loadKeyRef.current);
    _loadKeyRef.current = key;
    if(!silent) setLoading(true);
    // Safety net: never leave the page stuck on "Loading..." If this is still the latest
    // run after 4s, clear the spinner no matter what (thrown error, slow/hung network).
    const safety = setTimeout(()=>{ if(isCurrent()) setLoading(false); }, 4000);
    // Helper: apply a state setter only if this run hasn't been superseded.
    const ok = ()=> isCurrent();
    (async()=>{
     try{
      const mt = await loadCorpMeta(corpId); if(!ok()) return; setMeta(mt);

      if(view==='month'){
        const [raw, rawLY] = await Promise.all([loadMonthRaw(corpId,y,m), loadMonthRaw(corpId,y-1,m)]);
        if(!ok()) return;
        setPl(computePL(mt,raw));
        // If this is the current month in progress, compare last year only through the
        // same day-of-month (fair same-period YoY), not last year's whole month.
        const _nm=new Date();
        const curMonth=(y===_nm.getFullYear() && m===_nm.getMonth()+1);
        let rawLYcmp=rawLY;
        if(curMonth){
          const cut=`${y-1}-${pad(m)}-${pad(_nm.getDate())}`;
          rawLYcmp={...rawLY, revenue:rawLY.revenue.filter(r=>r.date<=cut), expenses:rawLY.expenses.filter(e=>e.date<=cut)};
        }
        const ply=computePL(mt,rawLYcmp);
        setYoy((ply.totalSales!==0||ply.totalExpenses!==0)?{...ply, samePeriod:curMonth, throughDay:_nm.getDate()}:null);
        // 12-month trend ending this month
        const endD=`${y}-${pad(m)}-${pad(lastDay(y,m))}`; let sy=y,sm=m-11; while(sm<1){sm+=12;sy--;}
        const startD=`${sy}-${pad(sm)}-01`;
        const [rvT,exT,rt]=await Promise.all([
          fetchAllRows(()=>sb.from('daily_revenue').select('date,amount,channel_id,source').eq('corporation_id',corpId).gte('date',startD).lte('date',endD).order('date')),
          fetchAllRows(()=>sb.from('expenses').select('date,amount,category_id,status,source').eq('corporation_id',corpId).gte('date',startD).lte('date',endD).order('date')),
          sb.from('rate_schedule').select('rate_type,rate,effective_from').eq('corporation_id',corpId),
        ]);
        if(!ok()) return;
        const pts=[]; let cy=sy,cm=sm;
        const _n=new Date(), curY=_n.getFullYear(), curM=_n.getMonth()+1;
        for(let i=0;i<12;i++){ const pref=`${cy}-${pad(cm)}`;
          const raw2={revenue:rvT.filter(r=>r.date.startsWith(pref)),expenses:exT.filter(r=>r.date.startsWith(pref)),inputs:[],rates:(rt.data||[]),monthKey:pref};
          const p=computePL(mt,raw2);
          const inProgress=(cy===curY&&cm===curM);
          if(p.totalSales!==0||p.totalExpenses!==0) pts.push({label:pad(cm),sales:p.totalSales,net:p.net,payrollPct:p.payrollPct,suppliesPct:p.suppliesPct,inProgress});
          cm++; if(cm>12){cm=1;cy++;} }
        setTrend(pts);
      }
      else if(view==='daily'){
        const [raw, rawLY] = await Promise.all([loadMonthRaw(corpId,y,m), loadMonthRaw(corpId,y-1,m)]);
        if(!ok()) return;
        setPl(computePL(mt,raw));
        const chBy={}; mt.channels.forEach(c=>chBy[c.id]=c);
        const catBy={}; mt.categories.forEach(c=>catBy[c.id]=c);
        const nowD=new Date(); const curK=`${nowD.getFullYear()}-${pad(nowD.getMonth()+1)}`;
        const buildDays=(rawX, yy)=>{
          const nD=lastDay(yy,m); const days={};
          for(let d=1;d<=nD;d++) days[d]={rev:0,exp:0,items:[],card:0,tips:0,payroll:0};
          const mKey=`${yy}-${pad(m)}`;
          const lockedR=(mKey<curK) && rawX.revenue.some(r=>r.source==='board');
          const lockedE=(mKey<curK) && rawX.expenses.some(e=>e.source==='board'&&e.status==='confirmed');
          const boardRevDates=new Set(rawX.revenue.filter(r=>r.source==='board').map(r=>r.date));
          rawX.revenue.forEach(r=>{ if(lockedR&&r.source!=='board')return; if(!lockedR&&r.source!=='board'&&boardRevDates.has(r.date))return; const ch=chBy[r.channel_id]; if(!ch||!ch.counts_in_total)return;
            const d=parseInt(r.date.slice(8)); if(days[d]){ const amt=Number(r.amount)*Number(ch.total_multiplier||1); days[d].rev+=amt; if(ch.code==='card') days[d].card+=amt; } });
          const boardExpDates=new Set(rawX.expenses.filter(e=>e.source==='board'&&e.status==='confirmed').map(e=>e.date));
          rawX.expenses.forEach(e=>{ if(e.status!=='confirmed')return; const cc=catBy[e.category_id]; if(lockedE&&e.source!=='board'&&isBoardSuperseded(e,cc&&cc.code))return; if(!lockedE&&e.source!=='board'&&isBoardSuperseded(e,cc&&cc.code)&&boardExpDates.has(e.date))return;
            const d=parseInt(e.date.slice(8)); if(days[d]){ days[d].exp+=Number(e.amount);
              if(cc&&cc.code==='tips') days[d].tips+=Number(e.amount);
              if(cc&&cc.code==='payroll') days[d].payroll+=Number(e.amount);
              days[d].items.push({id:e.id, category_id:e.category_id, date:e.date, cat:(catBy[e.category_id]||{}).name||'?', amount:Number(e.amount), payee:e.payee, memo:e.memo, source:e.source, by:e.entered_by, slack_user:e.slack_user}); } });
          return days;
        };
        const cur=buildDays(raw,y), prev=buildDays(rawLY,y-1);
        // Per-day computed rule lines: Credit Card Fee and Other Obligations (WC/SS). These
        // rules are linear, so each day's value uses that day's card sales, tips, and payroll,
        // and the daily values sum to the monthly P&L figure. Shown as read-only "Auto" lines.
        const ccRule=(mt.rules||[]).find(r=>r.code==='cc_fee');
        const obRule=(mt.rules||[]).find(r=>r.code==='other_obligations');
        const dayAuto=(c)=>{
          const vars={ ch_card:c.card, cat_tips:c.tips, cat_payroll:c.payroll, total_sales:c.rev };
          const lines=[];
          if(ccRule){ const a=evalExpr(ccRule.expr,vars); if(a) lines.push({name:ccRule.name, amount:a}); }
          if(obRule){ const a=evalExpr(obRule.expr,vars); if(a) lines.push({name:obRule.name, amount:a}); }
          return lines;
        };
        const nD=lastDay(y,m); const out=[];
        for(let d=1;d<=nD;d++){ const c=cur[d], p=prev[d]||{rev:0,exp:0,items:[]};
          out.push({ d, date:`${y}-${pad(m)}-${pad(d)}`, rev:c.rev, exp:c.exp, items:c.items,
            lyRev:p.rev, lyExp:p.exp, autoLines:dayAuto(c) }); }
        setDayRows(out);
      }
      else if(view==='year'){
        if(yearMode==='3y'){
          const [a,b,c] = await Promise.all([loadYearPL(corpId,mt,y), loadYearPL(corpId,mt,y-1), loadYearPL(corpId,mt,y-2)]);
          if(!ok()) return; setYearMonths(a); setYearMonthsPrev(b); setYearMonthsPrev2(c);
        } else {
          const yr = await loadYearPL(corpId,mt,y); if(!ok()) return; setYearMonths(yr);
        }
      }
      else if(view==='alltime'){
        const at = await loadAllTimePL(corpId,mt); if(!ok()) return; setAllTime(at);
      }
     }catch(e){ if(ok()) console.error('Insights load failed', e); }
     finally{ clearTimeout(safety); if(ok()) setLoading(false); }
    })();
    return ()=>{ clearTimeout(safety); };
  },[corpId,y,m,view,yearMode,refresh]);

  // load side-by-side comparison for the selected stores + chosen period
  // (period is the shared top tab: daily->day, month, year, alltime)
  const cmpPeriod = view==='daily' ? 'day' : view;
  const _cmpKeyRef = React.useRef('');
  const _cmpGenRef = React.useRef(0);
  useEffect(()=>{ if(!compareStores) return;
    const gen = ++_cmpGenRef.current;
    const ok = ()=> _cmpGenRef.current===gen;
    const key = [cmpIds.join(','),y,m,cmpPeriod,cmpDate].join('|');
    const silent = (key === _cmpKeyRef.current);
    _cmpKeyRef.current = key;
    if(!silent) setCmpData(null);
    // Never leave the compare view stuck loading: if still current after 4s, show
    // whatever we have (or an empty state) instead of an endless spinner.
    const safety = setTimeout(()=>{ if(ok()) setCmpData(prev=>prev||[]); }, 4000);
    (async()=>{
     try{
      const ids = cmpIds.slice(0,3);
      // combine an array of monthly PLs into one pl-like object (dollars summed,
      // ratios recomputed from combined catSum so different-sized months are fair)
      const combinePLs = (pls)=>{
        const totalSales = pls.reduce((a,p)=>a+p.totalSales,0);
        const totalExpenses = pls.reduce((a,p)=>a+p.totalExpenses,0);
        const net = pls.reduce((a,p)=>a+p.net,0);
        const catSum = {};
        pls.forEach(p=>{ Object.entries(p.catSum||{}).forEach(([k,v])=>{ catSum[k]=(catSum[k]||0)+v; }); });
        const pay = catSum['payroll']||0;
        const sup = (catSum['supplies']||0)+(catSum['supplies_food']||0)+(catSum['supplies_material']||0)+(catSum['hq_supplies']||0);
        return { totalSales, totalExpenses, net, catSum,
          margin: totalSales? net/totalSales : null,
          payrollPct: totalSales? pay/totalSales : null,
          suppliesPct: totalSales? sup/totalSales : null };
      };
      const out = await Promise.all(ids.map(async id=>{
        const mt = await loadCorpMeta(id);
        const corp = editable.find(c=>c.id===id) || {};
        let pl, lySales=null;
        if(cmpPeriod==='day'){
          pl = await loadDayPL(id, mt, cmpDate);
          // same day last year for context
          const lyDate = (parseInt(cmpDate.slice(0,4))-1)+cmpDate.slice(4);
          const plyD = await loadDayPL(id, mt, lyDate);
          lySales = (plyD.totalSales!==0||plyD.totalExpenses!==0)?plyD.totalSales:null;
        } else if(cmpPeriod==='year'){
          const [cur, prev] = await Promise.all([loadYearPL(id,mt,y), loadYearPL(id,mt,y-1)]);
          pl = combinePLs(cur.map(x=>x.pl));
          const ply = combinePLs(prev.map(x=>x.pl));
          lySales = (ply.totalSales!==0)?ply.totalSales:null;
        } else if(cmpPeriod==='alltime'){
          const at = await loadAllTimePL(id,mt);
          const allMonths = (at.years||[]).flatMap(yr=>yr.months.map(x=>x.pl));
          pl = combinePLs(allMonths);
        } else { // month
          const [raw, rawLY] = await Promise.all([loadMonthRaw(id,y,m), loadMonthRaw(id,y-1,m)]);
          pl = computePL(mt,raw); const ply = computePL(mt,rawLY);
          lySales = (ply.totalSales!==0||ply.totalExpenses!==0)?ply.totalSales:null;
        }
        return { id, code:corp.code, name:corp.name, pl, lySales };
      }));
      if(ok()) setCmpData(out);
     }catch(e){ if(ok()){ console.error('Compare load failed', e); setCmpData([]); } }
     finally{ clearTimeout(safety); }
    })();
    return ()=>{ clearTimeout(safety); };
  },[compareStores, cmpIds, y, m, cmpPeriod, cmpDate, refresh]);

  if(!editable.length) return <div className="card">No corporations available for your account.</div>;

  const VIEWS=[['daily','Daily'],['month','Month'],['year','Year'],['alltime','All-Time']];
  const showPicker = view!=='alltime';
  const toggleCmp = (id)=>{
    setCmpData(null);
    setCmpIds(prev=> prev.includes(id) ? prev.filter(x=>x!==id) : (prev.length>=3 ? prev : [...prev,id]));
  };
  // the shared period picker (month picker / year picker / date input), driven by view
  const periodPicker = !showPicker ? null
    : view==='daily' ? <input type="date" value={cmpDate} onChange={e=>setCmpDate(e.target.value)} style={{padding:'7px 10px',fontSize:14,border:'1px solid var(--border)',borderRadius:8,fontFamily:'inherit'}}/>
    : view==='year' ? <YearPick y={y} onChange={setY}/>
    : <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>;
  // in single-store daily we use the month picker; in compare-daily we use a date.
  const singlePicker = view==='daily' ? <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>
    : view==='year' ? <YearPick y={y} onChange={setY}/>
    : view==='alltime' ? null
    : <MonthPick y={y} m={m} onChange={(a,b)=>{setY(a);setM(b);}}/>;
  const title = compareStores ? 'Compare Stores'
    : view==='daily'?'Daily Breakdown':view==='year'?(yearMode==='3y'?'Three-Year Comparison':'Yearly P&L'):view==='alltime'?'All-Time':'Monthly P&L';
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Insights</div><h2>{title}</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <button className={'cmp-toggle'+(compareStores?' on':'')} onClick={()=>setCompareStores(v=>!v)}>
          <span className="cmp-toggle-ic">⇄</span>{compareStores?'Comparing stores':'Compare stores'}</button>
        {!compareStores && <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>}
        {compareStores ? periodPicker : singlePicker}
      </div>
    </div>
    <div className="viewbar">
      {VIEWS.map(([id,label])=>

      view==='month'   ? <MonthView pl={pl} yoy={yoy} trend={trend} y={y} m={m}/> :

}

function YearPick({y,onChange}){
  const nowY = new Date().getFullYear();
  const years = []; for(let yr=2022; yr<=nowY+1; yr++) years.push(yr);
  return <div style={{display:'flex',alignItems:'center',gap:8}}>

      {years.map(yr=><option key={yr} value={yr}>{yr}</option>)}

// ---- MONTH VIEW (overview + revenue + expense sections) ----
// Generate plain-language findings explaining what changed vs last year.
function analyzeChange(pl, yoy){
  if(!yoy) return [];
  const out=[];
  const pct=(a,b)=> b ? (a-b)/b : null;
  // net profit direction
  const netD=pct(pl.net, yoy.net);
  if(yoy.net!==0){
    if(pl.net>yoy.net) out.push({kind:'good', text:`Net profit up ${fmtPct(Math.abs(netD))} vs last year (${fmt$(yoy.net,0)} → ${fmt$(pl.net,0)}).`});
    else if(pl.net<yoy.net) out.push({kind:'bad', text:`Net profit down ${fmtPct(Math.abs(netD))} vs last year (${fmt$(yoy.net,0)} → ${fmt$(pl.net,0)}).`});
  }
  // margin
  if(pl.margin!=null && yoy.margin!=null){
    const dd=(pl.margin-yoy.margin)*100;
    if(Math.abs(dd)>=0.5) out.push({kind:dd>0?'good':'bad', text:`Net margin ${dd>0?'improved':'fell'} ${Math.abs(dd).toFixed(1)} points (${fmtPct(yoy.margin)} → ${fmtPct(pl.margin)}).`});
  }
  // payroll ratio
  if(pl.payrollPct!=null && yoy.payrollPct!=null){
    const dd=(pl.payrollPct-yoy.payrollPct)*100;
    if(Math.abs(dd)>=1) out.push({kind:dd>0?'bad':'good', text:`Payroll is ${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} as a share of sales (${fmtPct(yoy.payrollPct)} → ${fmtPct(pl.payrollPct)}).`});
  }
  // supplies ratio
  if(pl.suppliesPct!=null && yoy.suppliesPct!=null){
    const dd=(pl.suppliesPct-yoy.suppliesPct)*100;
    if(Math.abs(dd)>=1) out.push({kind:dd>0?'bad':'good', text:`Supplies / food cost is ${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} as a share of sales (${fmtPct(yoy.suppliesPct)} → ${fmtPct(pl.suppliesPct)}).`});
  }
  // channel mix: delivery share and cash share
  const shareOf=(plx, codes)=>{ if(!plx.totalSales) return null;
    const s=plx.channelRows.filter(c=>codes.includes(c.code)).reduce((a,c)=>a+c.amount,0);
    return s/plx.totalSales; };
  const delNow=shareOf(pl,['uber','doordash','grubhub']), delLy=shareOf(yoy,['uber','doordash','grubhub']);
  if(delNow!=null && delLy!=null){ const dd=(delNow-delLy)*100;
    if(Math.abs(dd)>=1.5) out.push({kind:'info', text:`Delivery is ${Math.abs(dd).toFixed(1)} points ${dd>0?'more':'less'} of sales than last year (${fmtPct(delLy)} → ${fmtPct(delNow)}).`}); }
  const cashNow=shareOf(pl,['cash']), cashLy=shareOf(yoy,['cash']);
  if(cashNow!=null && cashLy!=null){ const dd=(cashNow-cashLy)*100;
    if(Math.abs(dd)>=1.5) out.push({kind:'info', text:`Cash is ${Math.abs(dd).toFixed(1)} points ${dd>0?'more':'less'} of sales than last year (${fmtPct(cashLy)} → ${fmtPct(cashNow)}).`}); }
  // biggest expense category movers (by share of sales)
  if(pl.totalSales && yoy.totalSales){
    const lyCat={}; yoy.categoryRows.forEach(c=>lyCat[c.code]=c.amount);
    yoy.ruleRows.forEach(r=>lyCat[r.code]=r.amount);
    const nowRows=[...pl.categoryRows.map(c=>({code:c.code,name:c.name,amount:c.amount})),
                  ...pl.ruleRows.map(r=>({code:r.code,name:r.name,amount:r.amount}))];
    const movers=nowRows.map(c=>{ const lyShare=(lyCat[c.code]||0)/yoy.totalSales; const nowShare=c.amount/pl.totalSales;
      return {name:c.name, dd:(nowShare-lyShare)*100}; })
      .filter(x=>Math.abs(x.dd)>=1 && !['payroll','supplies','supplies_food'].includes(x.name.toLowerCase()))
      .sort((a,b)=>Math.abs(b.dd)-Math.abs(a.dd)).slice(0,2);
    movers.forEach(mv=> out.push({kind:mv.dd>0?'bad':'good',
      text:`${mv.name} is ${Math.abs(mv.dd).toFixed(1)} points ${mv.dd>0?'higher':'lower'} as a share of sales than last year.`}));
  }
  return out;
}

function StoreCompareView({editable, cmpIds, toggleCmp, data, y, m, period, cmpDate}){
  const selectable = editable;
  const sel = (data||[]).filter(Boolean);
  const bestHigh = (vals)=>{ const nums=vals.filter(v=>v!=null); return nums.length?Math.max(...nums):null; };
  const bestLow  = (vals)=>{ const nums=vals.filter(v=>v!=null); return nums.length?Math.min(...nums):null; };
  const maxSales = sel.length ? Math.max(1,...sel.map(s=>s.pl.totalSales)) : 1;

  // combined totals across the selected stores (raw dollars sum; ratios recomputed)
  const payAmt = s => (s.pl.catSum && s.pl.catSum['payroll']) || 0;
  const supAmt = s => { const cs=s.pl.catSum||{}; return (cs['supplies']||0)+(cs['supplies_food']||0)+(cs['supplies_material']||0)+(cs['hq_supplies']||0); };
  const combo = sel.length>1 ? (()=>{
    const sales=sel.reduce((a,s)=>a+s.pl.totalSales,0);
    const exp=sel.reduce((a,s)=>a+s.pl.totalExpenses,0);
    const net=sel.reduce((a,s)=>a+s.pl.net,0);
    const pay=sel.reduce((a,s)=>a+payAmt(s),0);
    const sup=sel.reduce((a,s)=>a+supAmt(s),0);
    return { sales, exp, net, margin: sales? net/sales : null,
      payrollPct: sales? pay/sales : null, suppliesPct: sales? sup/sales : null };
  })() : null;

  // 'best' only where a cross-store comparison is fair. Raw Total Expenses is NOT
  // marked (a bigger store naturally spends more, so "lowest" would be misleading).
  const metrics = [
    {key:'sales',   label:'Total Sales',   get:s=>s.pl.totalSales,    cget:c=>c.sales, fmt:v=>fmt$k(v), best:'high'},
    {key:'exp',     label:'Total Expenses',get:s=>s.pl.totalExpenses, cget:c=>c.exp,   fmt:v=>fmt$k(v), best:null},
    {key:'net',     label:'Net Profit',    get:s=>s.pl.net,           cget:c=>c.net,   fmt:v=>fmt$k(v), best:'high', strong:true},
    {key:'margin',  label:'Net Margin',    get:s=>s.pl.margin,        cget:c=>c.margin, fmt:v=>v==null?'-':fmtPct(v), best:'high'},
    {key:'payroll', label:'Payroll %',     get:s=>s.pl.payrollPct,    cget:c=>c.payrollPct, fmt:v=>v==null?'-':fmtPct(v), best:'low'},
    {key:'supplies',label:'Supplies %',    get:s=>s.pl.suppliesPct,   cget:c=>c.suppliesPct, fmt:v=>v==null?'-':fmtPct(v), best:'low'},
  ];

  const periodLabel = period==='day' ? fmtDateShort(cmpDate) : period==='year' ? `${y}` : period==='alltime' ? 'All-time' : `${MONTHS[m-1]} ${y}`;
  return <div>
    <div className="card">
      <h3>Pick up to 3 stores to compare</h3>
      <div className="hint" style={{marginTop:0,marginBottom:12}}>Comparing {periodLabel}. Tap a store to add or remove it (max 3). Change the period with the tabs above.</div>
      <div className="cmp-chips">
        {selectable.map(c=>{ const on=cmpIds.includes(c.id); const full=cmpIds.length>=3 && !on;
          return <button key={c.id} className={'cmp-chip'+(on?' on':'')+(full?' disabled':'')}
            onClick={()=>{ if(!full) toggleCmp(c.id); }}>{on && <span className="cmp-tick">✓</span>}{c.code}</button>; })}
      </div>
    </div>

    {cmpIds.length===0 ? <div className="card faint">Select at least one store above.</div> :
     data===null ? <Spinner/> :
     sel.length===0 ? <div className="card faint">Couldn't load comparison data. Try again or reselect stores.</div> :
     <>
      {/* headline cards, one per store */}
      <div className={'cmp-cards cmp-n'+sel.length}>
        {sel.map(s=><div className="cmp-card" key={s.id}>
          <div className="cmp-card-code">{s.code}</div>
          <div className="cmp-card-net">
            <div className={'cmp-net-val '+(s.pl.net>=0?'pos':'neg')}>{fmt$k(s.pl.net)}</div>
            <div className="cmp-net-lbl">Net Profit · {s.pl.margin!=null?fmtPct(s.pl.margin):'-'}</div>
          </div>
          <div className="cmp-bar-wrap"><div className="cmp-bar" style={{width:Math.max(3,Math.round(s.pl.totalSales/maxSales*100))+'%'}}></div></div>
          <div className="cmp-card-sales">{fmt$k(s.pl.totalSales)} <span className="faint">sales</span></div>
        </div>)}
      </div>

      {/* side-by-side metric table with best highlighted */}
      <div className="card" style={{overflowX:'auto'}}>
        <table className="cmp-table">
          <thead><tr><th></th>{sel.map(s=><th key={s.id} className="num">{s.code}</th>)}
            {combo && <th className="num cmp-combo-h">All 3</th>}</tr></thead>
          <tbody>
            {metrics.map(mt=>{
              const vals = sel.map(s=>mt.get(s));
              const target = mt.best==='high'?bestHigh(vals):(mt.best==='low'?bestLow(vals):null);
              return <tr key={mt.key} className={mt.strong?'cmp-strong':''}>
                <td className="cmp-mlabel">{mt.label}</td>
                {sel.map((s,i)=>{ const v=vals[i]; const isBest = mt.best && sel.length>1 && v!=null && target!=null && Math.abs(v-target)<1e-9;
                  return <td key={s.id} className={'num '+(isBest?'cmp-best':'')}>{mt.fmt(v)}{isBest && <span className="cmp-star">★</span>}</td>; })}
                {combo && <td className="num cmp-combo">{mt.fmt(mt.cget(combo))}</td>}
              </tr>;
            })}
          </tbody>
        </table>
        <div className="hint" style={{marginTop:10}}>★ marks the best store per line: highest sales, profit, and margin; lowest payroll % and supplies %. (Total expenses is not starred, since a larger store naturally spends more; compare the % ratios instead.){combo && ' The "All 3" column combines the selected stores.'}</div>
      </div>
     </>}
  </div>;
}

// ---- DAILY VIEW (per-day rev/exp/net, vs last year, with expense detail) ----
function DailyView({rows, pl, yoy, y, m, isOwner, categories, onChanged}){
  const [open, setOpen] = useState(null);
  const [revOpen, setRevOpen] = useState(false);   // "Revenue by channel" card, collapsed by default
  const [badgeOpen, setBadgeOpen] = useState(null); // which expense line shows its source badge
  const [editModal, setEditModal] = useState(null); // expense item being edited in a popup
  const [ef, setEf] = useState({amount:'', category_id:'', memo:''});
  const [busy, setBusy] = useState(false);
  const [toast, showToast] = useToast();

  const openEdit = (it)=>{
    setEditModal(it);
    setEf({amount:String(it.amount), category_id:it.category_id||'', memo:it.memo||'', date:it.date||''});
  };
  const saveEdit = async ()=>{
    const amt = sumExpr(ef.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter a valid amount'); return; }
    if(!ef.date){ showToast('Pick a date'); return; }
    setBusy(true);
    const { error } = await sb.from('expenses').update({
      amount:+amt.toFixed(2), category_id:ef.category_id||null, memo:(ef.memo||'').slice(0,300), date:ef.date,
    }).eq('id', editModal.id);
    setBusy(false);
    if(error){ showToast('Save failed: '+error.message); return; }
    setEditModal(null); showToast('Updated'); onChanged && onChanged();
  };
  const delItem = async (it)=>{
    if(!confirm(`Delete this expense?\n${it.cat} · ${fmt$(it.amount)}${it.memo?`\n"${it.memo}"`:''}`)) return;
    setBusy(true);
    const { error } = await sb.from('expenses').delete().eq('id', it.id);
    setBusy(false);
    if(error){ showToast('Delete failed: '+error.message); return; }
    setEditModal(null); showToast('Deleted'); onChanged && onChanged();
  };

  if(!rows.length) return <div className="card faint">No data for {MONTHS[m-1]} {y}.</div>;
  // If we're looking at the current month in progress, compare only through today's
  // day-of-month against last year's SAME days (e.g. on Jul 7, compare Jul 1-7 vs last
  // year's Jul 1-7). Otherwise compare the whole month. This keeps the YoY % fair.
  const _now=new Date();
  const isCurMonth = (y===_now.getFullYear() && m===_now.getMonth()+1);
  const throughDay = isCurMonth ? _now.getDate() : 31;
  const tot=rows.reduce((a,r)=> r.d>throughDay ? a : ({rev:a.rev+r.rev,exp:a.exp+r.exp,lyRev:a.lyRev+r.lyRev,lyExp:a.lyExp+r.lyExp}),{rev:0,exp:0,lyRev:0,lyExp:0});
  const net=tot.rev-tot.exp, lyNet=tot.lyRev-tot.lyExp;
  const cmpLabel = isCurMonth ? `vs ${y-1} (to ${ordinal(throughDay)})` : `vs ${y-1}`;

  // ---- Rule-based insights for the month shown -----------------------------
  // Uses only this month's daily rows (each has rev/exp/items). Kept simple and
  // deterministic: no AI, no extra queries.
  const active = rows.filter(r=> r.d<=throughDay && (r.rev!==0||r.exp!==0));
  const withSales = active.filter(r=>r.rev>0);
  // Best / slowest sales days: marked with a star in the day-by-day list below,
  // not shown as a text line (a big one-off cost on a day is not a real "loss").
  const bestDay = withSales.length>=2 ? withSales.reduce((a,b)=> b.rev>a.rev?b:a).d : null;
  const slowDay = withSales.length>=2 ? withSales.reduce((a,b)=> b.rev<a.rev?b:a).d : null;
  const findings = (()=>{
    const F=[];
    if(!active.length) return F;
    const daysElapsed = active.length;
    const daysInMonth = lastDay(y,m);

    // Cost anomaly: the single largest expense line, flagged only if it's big AND well
    // above that category's typical line (so regular fixed costs like rent don't trip).
    const catTotals={}, catDays={};
    active.forEach(r=> (r.items||[]).forEach(it=>{ const k=it.cat||'?'; catTotals[k]=(catTotals[k]||0)+it.amount; catDays[k]=(catDays[k]||0)+1; }));
    let bigLine=null;
    active.forEach(r=> (r.items||[]).forEach(it=>{ if(!bigLine||it.amount>bigLine.amount) bigLine={...it, d:r.d}; }));
    if(bigLine){
      const catAvg = catTotals[bigLine.cat] / Math.max(1, catDays[bigLine.cat]);
      if(bigLine.amount >= 500 && bigLine.amount >= catAvg*2){
        F.push({kind:'watch', text:`Large ${bigLine.cat} charge of ${fmt$(bigLine.amount,0)} on the ${ordinal(bigLine.d)}, above the usual ${bigLine.cat} line.`});
      }
    }

    // Month-end SALES projection (only mid-current-month). Net is intentionally not
    // projected: expenses don't accrue evenly across the month (rent, payroll, etc.),
    // so a straight-line net projection would be misleading.
    if(isCurMonth && daysElapsed>=3 && daysElapsed<daysInMonth){
      const projRev = tot.rev / daysElapsed * daysInMonth;
      F.push({kind:'info', text:`On this pace, ${MONTHS[m-1]} sales project to about ${fmt$(projRev,0)} by month end.`});
    }
    return F;
  })();

  const FKIND = { good:{ic:'▲',cls:'pos'}, bad:{ic:'▼',cls:'neg'}, watch:{ic:'!',cls:'neg'}, info:{ic:'•',cls:'faint'} };
  return <>
    <div className="kpis kpis-3">
      <div className="kpi"><div className="k-lbl">Sales</div><div className="k-val">{fmt$(tot.rev)}</div>
        <div className="k-sub"><YoYDelta cur={tot.rev} prev={tot.lyRev} bare/><span className="k-cmp">{cmpLabel}</span></div></div>
      <div className="kpi"><div className="k-lbl">Expenses</div><div className="k-val">{fmt$(tot.exp)}</div>
        <div className="k-sub"><YoYDelta cur={tot.exp} prev={tot.lyExp} bare invert/><span className="k-cmp">{cmpLabel}</span></div></div>
      <div className="kpi"><div className="k-lbl">Net</div><div className={'k-val '+(net>=0?'pos':'neg')}>{fmt$(net)}</div>
        <div className="k-sub"><YoYDelta cur={net} prev={lyNet} bare/><span className="k-cmp">{cmpLabel}</span></div></div>
    </div>
    {pl && pl.channelRows && (()=>{
      const chans = pl.channelRows.filter(c=>c.counts_in_total && Number(c.amount)>0)
        .sort((a,b)=>Number(b.amount)-Number(a.amount));
      const chTotal = chans.reduce((a,c)=>a+Number(c.amount),0);
      if(!chans.length) return null;
      return <div className="card rev-break">
        <button className="rev-break-h" onClick={()=>setRevOpen(o=>!o)} aria-expanded={revOpen}>
          <span>Revenue by channel <span className="faint" style={{fontWeight:400}}>{MONTHS[m-1]} {y}</span></span>
          <span className="rev-break-tot">{fmt$(chTotal,0)} <span className={'rev-caret'+(revOpen?' up':'')}>⌄</span></span>
        </button>
        {revOpen && <div className="rev-break-body">
          {chans.map(c=>{ const pct = chTotal? Number(c.amount)/chTotal*100 : 0;
            return <div key={c.id} className="rev-row">
              <div className="rev-row-top"><span className="rev-name">{c.name}</span><span className="rev-amt">{fmt$(Number(c.amount))}</span></div>
              <div className="rev-bar-wrap"><div className="rev-bar" style={{width:pct+'%'}}></div></div>
              <div className="rev-pct">{pct.toFixed(1)}%</div>
            </div>; })}
        </div>}
      </div>;
    })()}
    {findings.length>0 && <div className="card insight-card">
      <h3 style={{marginTop:0}}>What stands out</h3>
      <ul className="insight-list">
        {findings.map((f,i)=><li key={i}><span className={'insight-ic '+(FKIND[f.kind]||FKIND.info).cls}>{(FKIND[f.kind]||FKIND.info).ic}</span><span>{f.text}</span></li>)}
      </ul>
    </div>}
    <div className="card daily-card">
      <h3><span>{MONTHS[m-1]} {y} · Day by Day <span className="faint" style={{fontWeight:400,fontSize:13}}>vs {y-1}</span></span></h3>
      <table className="t daily-t">
        <thead><tr><th>Date</th><th className="num">Sales</th><th className="num faint ly-col">{y-1}</th>
          <th className="num">Expenses</th><th className="num">Net</th><th></th></tr></thead>
        <tbody>
          {rows.map(r=>{ const dnet=r.rev-r.exp; const has=r.rev!==0||r.exp!==0; const isOpen=open===r.d;
            const yy = "'"+String(y-1).slice(2);
            return <React.Fragment key={r.d}>
              <tr className={(()=>{const wd=new Date(r.date+'T00:00').getDay();return wd===0||wd===6?'is-weekend':'';})()} style={{opacity:has?1:0.35}}>
                <td className="mono">{pad(r.d)} {DOW[new Date(r.date+'T00:00').getDay()]}
                  {r.d===bestDay && <span className="day-star best" title="Best sales day">★</span>}
                  {r.d===slowDay && r.d!==bestDay && <span className="day-star slow" title="Slowest sales day">★</span>}
                </td>
                <td className="num mono">{r.rev?<Amt v={r.rev}/>:'-'}
                  {r.lyRev ? <div className="ly-under">{yy} {fmt$(r.lyRev,0)}</div> : null}
                </td>
                <td className="num mono faint ly-col">{r.lyRev?fmt$(r.lyRev,0):'-'}</td>
                <td className="num mono">{r.exp?<Amt v={r.exp}/>:'-'}</td>
                <td className={'num mono '+(dnet>0?'pos':dnet<0?'neg':'')}>{has?<Amt v={dnet}/>:'-'}</td>
                <td className="chev-td">
                  {(r.items.length>0 || (r.autoLines&&r.autoLines.length>0)) && <button className="btn btn-sm" onClick={()=>setOpen(isOpen?null:r.d)}>{isOpen?'▲':'▾'}</button>}
                </td>
              </tr>
              {isOpen && (r.items.length>0 || (r.autoLines&&r.autoLines.length>0)) && <tr><td colSpan={7} style={{background:'var(--panel2)',padding:0}}>
                <div className="exp-detail">
                  {r.items.map((it,i)=>{
                    const key = it.id || (r.d+'-'+i);
                    const showBadge = badgeOpen===key;
                    const note=[it.memo||'', it.payee?`· ${it.payee}`:'', it.slack_user?`· @${it.slack_user}`:''].filter(Boolean).join(' ');
                    return <div key={i} className="exp-line">
                      <div className="exp-line-main">
                        <div className="exp-line-name" onClick={()=>setBadgeOpen(showBadge?null:key)}>
                          <span className="exp-nm">{it.cat}</span>
                          {showBadge && <span className="badge exp-src">{it.source}</span>}
                        </div>
                        {note && showBadge && <div className="exp-line-memo">{note}</div>}
                      </div>
                      <div className="exp-line-amt mono">{fmt$(it.amount)}</div>
                      {isOwner && it.id && <button className="exp-edit-btn" disabled={busy} onClick={()=>openEdit(it)} aria-label="Edit">⋯</button>}
                    </div>;
                  })}
                  {(r.autoLines||[]).map((a,ai)=><div key={'auto'+ai} className="exp-line">
                    <div className="exp-line-main">
                      <div className="exp-line-name">
                        <span className="exp-nm">{a.name}</span>
                        <span className="badge gold" style={{marginLeft:6}}>Auto</span>
                      </div>
                    </div>
                    <div className="exp-line-amt mono">{fmt$(a.amount)}</div>
                  </div>)}
                  {r.autoLines&&r.autoLines.length>0 && <div className="hint" style={{padding:'6px 2px 0'}}>Auto lines are calculated (not entered) and counted in the monthly P&L, not in this day's entered total.</div>}
                </div>
              </td></tr>}
            </React.Fragment>; })}
          <tr className="total"><td>Total</td>
            <td className="num">{fmt$(tot.rev)}{tot.lyRev?<div className="ly-under">{"'"+String(y-1).slice(2)} {fmt$(tot.lyRev,0)}</div>:null}</td>
            <td className="num faint ly-col">{fmt$(tot.lyRev,0)}</td>
            <td className="num">{fmt$(tot.exp)}</td>
            <td className={'num '+(net>=0?'pos':'neg')}>{fmt$(net)}</td><td></td></tr>
        </tbody>
      </table>
      <div className="hint"><span className="day-star best">★</span> best sales day · <span className="day-star slow">★</span> slowest. Tap the arrow on a day to see every expense; tap a name for its source and note{isOwner?'; tap ⋯ to edit or delete':''}.</div>
    </div>
    {editModal && <div className="modal-overlay" onClick={()=>setEditModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">Edit expense</div>
            <div className="faint" style={{fontSize:12.5}}>{editModal.source} entry</div></div>
          <button className="modal-x" onClick={()=>setEditModal(null)}>✕</button>
        </div>
        <label className="hint">Category</label>
        <select className="w-full" style={{width:'100%',marginBottom:10}} value={ef.category_id} onChange={e=>setEf({...ef,category_id:e.target.value})}>
          {(categories||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div style={{flex:1}}><label className="hint">Amount</label>
            <input type="text" inputMode="text" style={{width:'100%'}} placeholder="e.g. 12+15+16" value={ef.amount} onChange={e=>setEf({...ef,amount:e.target.value})}/>
            {String(ef.amount).includes('+') && !isNaN(sumExpr(ef.amount)) && <div className="hint" style={{marginTop:4,color:'var(--gold)'}}>= {fmt$(sumExpr(ef.amount))}</div>}</div>
          <div style={{flex:1}}><label className="hint">Date</label>
            <input type="date" style={{width:'100%'}} value={ef.date} onChange={e=>setEf({...ef,date:e.target.value})}/></div>
        </div>
        <label className="hint">Note</label>
        <input style={{width:'100%',marginBottom:14}} value={ef.memo} onChange={e=>setEf({...ef,memo:e.target.value})} placeholder="Optional note"/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={saveEdit}>Save</button>
          <button className="btn btn-danger" disabled={busy} onClick={()=>delItem(editModal)}>Delete</button>
        </div>
      </div>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </>;
}

// ---- YEAR VIEW (12 months across) ----
function YearView({months, y, yearMode, onYearMode, prev, prev2}){
  const toggle = <div className="cmp-period" style={{marginBottom:16}}>
    <button className={'cmp-per-tab'+(yearMode==='1y'?' on':'')} onClick={()=>onYearMode&&onYearMode('1y')}>1 Year</button>
    <button className={'cmp-per-tab'+(yearMode==='3y'?' on':'')} onClick={()=>onYearMode&&onYearMode('3y')}>3 Years</button>
  </div>;
  if(yearMode==='3y') return <>{toggle}<CompareView cur={months} prev={prev} prev2={prev2} y={y}/></>;
  const tot=months.reduce((a,x)=>({s:a.s+x.pl.totalSales,e:a.e+x.pl.totalExpenses,n:a.n+x.pl.net}),{s:0,e:0,n:0});
  const _nYr=new Date();
  const trendPts=months.filter(x=>x.pl.totalSales!==0||x.pl.totalExpenses!==0)
    .map(x=>({label:pad(x.m),sales:x.pl.totalSales,net:x.pl.net,payrollPct:x.pl.payrollPct,suppliesPct:x.pl.suppliesPct,inProgress:(y===_nYr.getFullYear()&&x.m===_nYr.getMonth()+1)}));
  return <>
    {toggle}
    <div className="kpis kpis-3">
      <div className="kpi"><div className="k-lbl">{y} Sales</div><div className="k-val">{fmt$k(tot.s)}</div></div>
      <div className="kpi"><div className="k-lbl">{y} Expenses</div><div className="k-val">{fmt$k(tot.e)}</div></div>
      <div className="kpi"><div className="k-lbl">{y} Net Profit</div><div className={'k-val '+(tot.n>=0?'pos':'neg')}>{fmt$k(tot.n)}</div>
        <div className="k-sub">Margin {fmtPct(tot.s?tot.n/tot.s:null)}</div></div>
    </div>
    <div className="card"><h3>{y} by Month</h3><TrendChart points={trendPts}/></div>
    <div className="card">
      <h3>{y} Monthly P&L</h3>
      <table className="t ypl-t">
        <thead><tr><th>Month</th><th className="num">Sales</th><th className="num">Expenses</th><th className="num">Net</th><th className="num margin-col">Margin</th></tr></thead>
        <tbody>
          {months.map(x=>{ const has=x.pl.totalSales!==0||x.pl.totalExpenses!==0;
            return <tr key={x.m} style={{opacity:has?1:0.35}}>
              <td>{MONTHS[x.m-1]}</td>
              <td className="num mono">{has?fmt$(x.pl.totalSales,0):'-'}</td>
              <td className="num mono">{has?fmt$(x.pl.totalExpenses,0):'-'}</td>
              <td className={'num mono '+(x.pl.net>=0?'pos':'neg')}>{has?fmt$(x.pl.net,0):'-'}
                {has && x.pl.margin!=null && <div className="cell-margin">{fmtPct(x.pl.margin)}</div>}
              </td>
              <td className="num mono faint margin-col">{has?fmtPct(x.pl.margin):'-'}</td>
            </tr>; })}
          <tr className="total"><td>Total</td><td className="num">{fmt$(tot.s,0)}</td><td className="num">{fmt$(tot.e,0)}</td>
            <td className={'num '+(tot.n>=0?'pos':'neg')}>{fmt$(tot.n,0)}
              <div className="cell-margin">{fmtPct(tot.s?tot.n/tot.s:null)}</div>
            </td><td className="num margin-col">{fmtPct(tot.s?tot.n/tot.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
  </>;
}

// ---- COMPARE VIEW (three years, month by month) ----

  const sum=arr=>arr.reduce((a,x)=>({s:a.s+x.pl.totalSales,e:a.e+x.pl.totalExpenses,n:a.n+x.pl.net}),{s:0,e:0,n:0});
  const tc=sum(cur), tp=sum(prev), tp2=sum(prev2||[]);
  const prevBy={}; prev.forEach(x=>prevBy[x.m]=x.pl);
  const prev2By={}; (prev2||[]).forEach(x=>prev2By[x.m]=x.pl);

  return <>
    <div className="kpis kpis-3">
      <div className="kpi"><div className="k-lbl">{y} Sales</div><div className="k-val">{fmt$k(tc.s)}</div>
        <div className="k-sub"><YoYDelta cur={tc.s} prev={tp.s} bare/> vs {y-1}</div></div>
      <div className="kpi"><div className="k-lbl">{y} Expenses</div><div className="k-val">{fmt$k(tc.e)}</div>
        <div className="k-sub"><YoYDelta cur={tc.e} prev={tp.e} bare/> vs {y-1}</div></div>
      <div className="kpi"><div className="k-lbl">{y} Net</div><div className={'k-val '+(tc.n>=0?'pos':'neg')}>{fmt$k(tc.n)}</div>

    <div className="card">
      <h3>Sales by Month · {y-2}–{y}</h3>
      <MultiYearChart series={[
        has2 && {label:String(y-2), months:prev2, color:'#B4AA98'},
        {label:String(y-1), months:prev, color:'#C9A94E'},
        {label:String(y), months:cur, color:'#B08A1E'},
      ].filter(Boolean)}/>
    </div>
    <div className="card">
      <h3>Annual Totals</h3>
      <table className="t">
        <thead><tr><th>Year</th><th className="num">Sales</th><th className="num">Expenses</th><th className="num">Net</th><th className="num">Margin</th></tr></thead>
        <tbody>
          {has2 && <tr><td>{y-2}</td><td className="num mono">{fmt$(tp2.s,0)}</td><td className="num mono">{fmt$(tp2.e,0)}</td>
            <td className={'num mono '+(tp2.n>=0?'pos':'neg')}>{fmt$(tp2.n,0)}</td><td className="num mono faint">{fmtPct(tp2.s?tp2.n/tp2.s:null)}</td></tr>}
          <tr><td>{y-1}</td><td className="num mono">{fmt$(tp.s,0)}</td><td className="num mono">{fmt$(tp.e,0)}</td>
            <td className={'num mono '+(tp.n>=0?'pos':'neg')}>{fmt$(tp.n,0)}</td><td className="num mono faint">{fmtPct(tp.s?tp.n/tp.s:null)}</td></tr>
          <tr style={{fontWeight:600}}><td>{y}</td><td className="num mono">{fmt$(tc.s,0)}</td><td className="num mono">{fmt$(tc.e,0)}</td>
            <td className={'num mono '+(tc.n>=0?'pos':'neg')}>{fmt$(tc.n,0)}</td><td className="num mono">{fmtPct(tc.s?tc.n/tc.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
    <div className="card">
      <h3>Sales · Month by Month</h3>
      <table className="t">
        <thead><tr><th>Month</th>{has2 && <th className="num faint">{y-2}</th>}<th className="num faint">{y-1}</th><th className="num">{y}</th><th className="num">vs {y-1}</th></tr></thead>
        <tbody>
          {cur.map(x=>{ const p=prevBy[x.m]||{totalSales:0}; const p2=prev2By[x.m]||{totalSales:0};
            const anyv=x.pl.totalSales!==0||p.totalSales!==0||p2.totalSales!==0;
            return <tr key={x.m} style={{opacity:anyv?1:0.35}}>
              <td>{MONTHS[x.m-1].slice(0,3)}</td>
              {has2 && <td className="num mono faint">{fmt$(p2.totalSales,0)}</td>}
              <td className="num mono faint">{fmt$(p.totalSales,0)}</td>
              <td className="num mono">{fmt$(x.pl.totalSales,0)}</td>
              <td className="num"><YoYDelta cur={x.pl.totalSales} prev={p.totalSales}/></td>
            </tr>; })}
          <tr className="total"><td>Total</td>{has2 && <td className="num">{fmt$(tp2.s,0)}</td>}<td className="num">{fmt$(tp.s,0)}</td>
            <td className="num">{fmt$(tc.s,0)}</td><td className="num"><YoYDelta cur={tc.s} prev={tp.s}/></td></tr>
        </tbody>
      </table>
    </div>
  </>;
}

// simple multi-year bar chart (sales by month, grouped)
function MultiYearChart({series}){
  const [sel,setSel] = React.useState(null);
  if(!series.length) return <div className="faint">No data.</div>;
  const max=Math.max(1,...series.flatMap(s=>s.months.map(x=>x.pl.totalSales)));
  const step=niceStep(max,4); const axisMax=Math.ceil(max/step)*step;
  const H=180, W=760, padL=44, padR=8, bw=(W-padL-padR)/12;
  const yOf=v=>H*(1-v/axisMax);
  const grid=[]; for(let g=0; g<=axisMax+1e-6; g+=step) grid.push(g);
  return <div style={{overflowX:'auto'}}>
    <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:'100%',minWidth:640}} onMouseLeave={()=>setSel(null)}>
      {grid.map((g,i)=><g key={i}>
        <line x1={padL} x2={W-padR} y1={yOf(g)} y2={yOf(g)} stroke={i===0?'var(--border)':'#F0EEE9'} strokeWidth="0.7"/>
        <text x={padL-5} y={yOf(g)+3} fill="#948B7C" fontSize="8.5" textAnchor="end" fontFamily="IBM Plex Mono">{fmt$k(g)}</text>
      </g>)}
      {series[0].months.map((_,i)=>{
        const gw=(bw-8)/series.length; const on=sel===i;
        return <g key={i} onPointerDown={()=>setSel(i)} onMouseEnter={()=>setSel(i)} style={{cursor:'pointer'}}>
          <rect x={padL+i*bw} y={0} width={bw} height={H} fill={on?'rgba(176,138,30,0.05)':'transparent'}/>
          {series.map((s,si)=>{
            const v=s.months[i].pl.totalSales; const h=axisMax?v/axisMax*H:0;
            return <rect key={s.label+i} x={padL+i*bw+4+si*gw} y={H-h} width={gw-1} height={h} fill={s.color} rx="1"/>;
          })}
        </g>;
      })}
      {MONTHS.map((mn,i)=><text key={i} x={padL+i*bw+bw/2} y={H+14} fill="var(--text2)" fontSize="9" textAnchor="middle">{mn.slice(0,1)}</text>)}
      {sel!==null && (()=>{ const x=padL+sel*bw+bw/2; const lh=15; const tw=120, th=12+lh*(series.length+1)+6;
        const tx=Math.min(Math.max(x-tw/2,padL),W-padR-tw); const ty=6;
        return <g pointerEvents="none">
          <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="#2A2620" opacity="0.95"/>
          <text x={tx+9} y={ty+18} fontSize="10" fill="#F4D77E" fontFamily="IBM Plex Mono">{MONTHS[sel].slice(0,3)}</text>
          {series.map((s,si)=><text key={s.label} x={tx+9} y={ty+18+(si+1)*lh} fontSize="10" fill="#E8E4DC" fontFamily="IBM Plex Mono">
            {s.label} {fmt$k(s.months[sel].pl.totalSales)}</text>)}
        </g>; })()}
    </svg>
    <div style={{display:'flex',gap:16,marginTop:8,fontSize:12,flexWrap:'wrap'}}>
      {series.map(s=><span key={s.label} style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:12,height:12,background:s.color,borderRadius:2,display:'inline-block'}}></span>{s.label}</span>)}
      <span className="faint">Tap a month for values</span>
    </div>
  </div>;
}

// ---- ALL-TIME VIEW (entire history: growth, trajectory, insights) ----
function AllTimeView({data}){
  if(!data || !data.years.length) return <div className="card faint">No history yet.</div>;
  const years=data.years;
  const life=years.reduce((a,yr)=>({s:a.s+yr.totals.s,e:a.e+yr.totals.e,n:a.n+yr.totals.n}),{s:0,e:0,n:0});
  // only "complete-ish" years for growth (have any data)
  const active=years.filter(yr=>yr.totals.s!==0||yr.totals.e!==0);
  // best / worst by net
  const withData=active.slice();
  const bestYear=withData.reduce((a,b)=>b.totals.n>a.totals.n?b:a, withData[0]);
  const bestSalesYear=withData.reduce((a,b)=>b.totals.s>a.totals.s?b:a, withData[0]);
  // year-over-year sales growth (last full transition)
  const insights=allTimeInsights(active);
  // monthly series across all time for the trend line
  const monthlySeries=[];
  const _nAt=new Date(), _curY=_nAt.getFullYear(), _curM=_nAt.getMonth()+1;
  years.forEach(yr=>yr.months.forEach(mo=>{
    if(mo.pl.totalSales!==0||mo.pl.totalExpenses!==0)
      monthlySeries.push({label:`${String(yr.y).slice(2)}/${pad(mo.m)}`, sales:mo.pl.totalSales, net:mo.pl.net, inProgress:(yr.y===_curY&&mo.m===_curM)});
  }));

  return <>
    <div className="kpis">
      <div className="kpi"><div className="k-lbl">Lifetime Sales</div><div className="k-val">{fmt$k(life.s)}</div>
        <div className="k-sub">{data.firstYear}–{data.lastYear}</div></div>
      <div className="kpi"><div className="k-lbl">Lifetime Net</div><div className={'k-val '+(life.n>=0?'pos':'neg')}>{fmt$k(life.n)}</div>
        <div className="k-sub">Margin {fmtPct(life.s?life.n/life.s:null)}</div></div>
      <div className="kpi"><div className="k-lbl">Best Sales Year</div><div className="k-val">{bestSalesYear?bestSalesYear.y:'-'}</div>
        <div className="k-sub">{bestSalesYear?fmt$k(bestSalesYear.totals.s):''}</div></div>
      <div className="kpi"><div className="k-lbl">Best Profit Year</div><div className="k-val">{bestYear?bestYear.y:'-'}</div>
        <div className="k-sub">{bestYear?fmt$k(bestYear.totals.n):''}</div></div>
    </div>

    {insights.length>0 && <div className="card">
      <h3>The Long View</h3>
      <div className="findings">
        {insights.map((f,i)=><div key={i} className={'finding '+f.kind}><span className="fdot"></span><span>{f.text}</span></div>)}
      </div>
    </div>}

    <div className="card"><h3>Sales & Net · Every Month</h3>
      <TrendChart points={monthlySeries}/>
      <div className="hint">Full history since {data.firstYear}. Bars are monthly sales; the line is monthly net profit.</div>
    </div>

    <div className="card">
      <h3>Year by Year</h3>
      <table className="t">
        <thead><tr><th>Year</th><th className="num">Sales</th><th className="num">Growth</th><th className="num">Expenses</th><th className="num">Net</th><th className="num">Margin</th></tr></thead>
        <tbody>
          {active.map((yr,i)=>{ const prev=i>0?active[i-1]:null;
            return <tr key={yr.y}>
              <td>{yr.y}</td>
              <td className="num mono">{fmt$(yr.totals.s,0)}</td>
              <td className="num">{prev?<YoYDelta cur={yr.totals.s} prev={prev.totals.s}/>:<span className="faint">-</span>}</td>
              <td className="num mono">{fmt$(yr.totals.e,0)}</td>
              <td className={'num mono '+(yr.totals.n>=0?'pos':'neg')}>{fmt$(yr.totals.n,0)}</td>
              <td className="num mono faint">{fmtPct(yr.totals.s?yr.totals.n/yr.totals.s:null)}</td>
            </tr>; })}
          <tr className="total"><td>Lifetime</td><td className="num">{fmt$(life.s,0)}</td><td></td>
            <td className="num">{fmt$(life.e,0)}</td><td className={'num '+(life.n>=0?'pos':'neg')}>{fmt$(life.n,0)}</td>
            <td className="num">{fmtPct(life.s?life.n/life.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
  </>;
}

// long-term plain-language insights across all years
function allTimeInsights(active){
  const out=[];
  if(active.length<2) return out;
  const first=active[0], last=active[active.length-1];
  // Compare on a PER-OPERATING-DAY basis so a partial first year (e.g. opened in
  // December, ~20 days) isn't unfairly compared to a full year. Falls back to totals
  // only if day counts are missing.
  const perDay = yr => (yr.activeDays && yr.activeDays>0) ? yr.totals.s/yr.activeDays : null;
  const fd=perDay(first), ld=perDay(last);
  if(fd && ld && fd>0){
    const mult=ld/fd;
    const detail=`${fmt$(fd,0)}/day → ${fmt$(ld,0)}/day`;
    if(mult>=1.15) out.push({kind:'good', text:`Average daily sales have grown ${mult.toFixed(1)}x since ${first.y} (${detail}).`});
    else if(mult<=0.85) out.push({kind:'bad', text:`Average daily sales are down since ${first.y} (${detail}).`});
    else out.push({kind:'info', text:`Average daily sales have held roughly steady since ${first.y} (${detail}).`});
  }
  // Exclude the current (in-progress) year from year-total comparisons below, since a
  // partial year would break a streak or look like the "worst" year unfairly.
  const curYr=new Date().getFullYear();
  const complete=active.filter(yr=>yr.y!==curYr);
  // consecutive growth streak (by sales), completed years only
  let streak=0;
  for(let i=complete.length-1;i>0;i--){ if(complete[i].totals.s>complete[i-1].totals.s) streak++; else break; }
  if(streak>=2) out.push({kind:'good', text:`Sales have grown ${streak} years in a row.`});
  // margin trend: compare avg margin of first half vs second half (completed years)
  const marg=yr=>yr.totals.s?yr.totals.n/yr.totals.s:0;
  const half=Math.floor(complete.length/2);
  if(half>=1){
    const early=complete.slice(0,half), late=complete.slice(half);
    const am=arr=>arr.length?arr.reduce((a,x)=>a+marg(x),0)/arr.length:0;
    const dd=(am(late)-am(early))*100;
    if(Math.abs(dd)>=1.5) out.push({kind:dd>0?'good':'bad', text:`Net margin is trending ${dd>0?'up':'down'} over time (${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} in recent years).`});
  }
  // best and worst single years
  // best and worst single years (completed years only, so a partial current year can't
  // be flagged as the weakest)
  const pool = complete.length>=2 ? complete : active;
  const best=pool.reduce((a,b)=>b.totals.n>a.totals.n?b:a,pool[0]);
  const worst=pool.reduce((a,b)=>b.totals.n<a.totals.n?b:a,pool[0]);
  if(best.y!==worst.y){
    out.push({kind:'info', text:`Most profitable year was ${best.y} (${fmt$(best.totals.n,0)}); weakest was ${worst.y} (${fmt$(worst.totals.n,0)}).`});
  }
  return out;
}

// ================= ENTRY (Maria) =================
function Entry({corps, canEditIds, profile, presetCorp, presetMode}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useState(presetCorp || (editable[0] && editable[0].id));

  const [meta, setMeta] = useState(null);
  const [dayRev, setDayRev] = useState({});
  const [dayExp, setDayExp] = useState([]);
  const [pending, setPending] = useState([]);
  const [form, setForm] = useState({category_id:'', amount:'', payee:'', memo:'', method:'card'});
  const [mode, setMode] = useState('income');
  useEffect(()=>{ if(presetMode && presetMode.mode) setMode(presetMode.mode); },[presetMode]);
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    setMeta(mt);
    const [rv, ex, pd] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('date',date),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('date',date).eq('status','confirmed').order('created_at',{ascending:false}),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('status','pending').order('date',{ascending:false}),

    const map={}; (rv.data||[]).forEach(r=>map[r.channel_id]=r);

  },[corpId,date]);
  useEffect(()=>{ reload(); },[reload]);

  const saveRev = async (ch, val) => {
    const amount = parseFloat(val)||0;
    const ex = dayRev[ch.id];
    if(ex && Number(ex.amount)===amount) return;
    const { error } = await sb.from('daily_revenue').upsert(
      { corporation_id:corpId, channel_id:ch.id, date, amount, source:'manual', updated_by:profile.id, updated_at:new Date().toISOString() },
      { onConflict:'corporation_id,channel_id,date' });
    if(error) showToast('Save failed: '+error.message); else { showToast(ch.name+' saved'); reload(); }
  };

  const addExp = async () => {
    if(!form.category_id){ showToast('Select a category'); return; }
    if(!form.memo || !form.memo.trim()){ showToast('Enter details for this expense'); return; }
    const amt = sumExpr(form.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter an amount'); return; }
    setBusy(true);
    const { error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:form.category_id, date,
      amount:amt, payee:form.payee||null, memo:form.memo.trim(),
      method:form.method||'card',
      source:'manual', entered_by:profile.id });
    setBusy(false);
    if(error) showToast('Save failed: '+error.message);
    else { setForm({category_id:'',amount:'',payee:'',memo:'',method:form.method}); showToast('Expense saved'); reload(); }
  };
  const delExp = async id => {
    if(!confirm('Delete this expense?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',id);
    if(error) showToast('Delete failed: '+error.message); else reload();
  };
  const [pendCat, setPendCat] = useState({});
  const approvePending = async (p, ok) => {
    if(ok){ const upd = {status:'confirmed'};
      if(pendCat[p.id]) upd.category_id = pendCat[p.id];
      const { error } = await sb.from('expenses').update(upd).eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    else { const { error } = await sb.from('expenses').delete().eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    showToast(ok?'Approved':'Rejected'); reload();
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Daily Entry</div><h2>Daily Entry</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
      </div>
    </div>

    <div className="ie-toggle">
      <button className={'ie-btn income'+(mode==='income'?' on':'')} onClick={()=>setMode('income')}>
        <span className="ie-ic">＋</span> Income
      </button>
      <button className={'ie-btn expense'+(mode==='expense'?' on':'')} onClick={()=>setMode('expense')}>
        <span className="ie-ic">－</span> Expense
      </button>
    </div>

    {pending.length>0 && <div className="card">
      <h3>Slack Pending Approval <span className="badge red">{pending.length}</span></h3>
      {pending.map(p=><div className="pend" key={p.id}>
        <div className="grow">
          <div><span className="mono">{p.date}</span> · {catName(p.category_id)} · <b className="mono">{fmt$(Number(p.amount))}</b></div>
          <div className="faint" style={{fontSize:12.5}}>{p.memo} {p.slack_user && '· @'+p.slack_user}</div>
        </div>
        <select className="btn-sm" style={{width:150,padding:'5px 8px'}} value={pendCat[p.id]||p.category_id}
          onChange={e=>setPendCat({...pendCat,[p.id]:e.target.value})}>

    {mode==='income' &&
      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Revenue
          <label className="date-chip">{fmtDateShort(date)}

              onClick={e=>{ try{ e.target.showPicker&&e.target.showPicker(); }catch(_){} }}/>
          </label>
        </h3>
        <table className="t rev-entry"><tbody>
          {(meta?meta.channels.filter(c=>c.active):[]).map(c=>{
            const row = dayRev[c.id];
            const auto = row && row.source!=='manual' && row.source!=='import';
            const badgeLabel = row ? (
              row.source==='toast_live' ? 'Toast · live' :
              row.source==='toast' ? 'Toast' :
              row.source==='inventory' ? 'Inventory' :
              row.source==='quickbooks' ? 'QuickBooks' : row.source) : '';
            return <tr key={c.id}>
              <td>{c.name} {auto && <span className={'badge '+(row.source==='toast_live'?'gold':'green')}>{badgeLabel}</span>}
                {row && row.verified && <span className="badge gold">Verified</span>}</td>
              <td className="num rev-amt">
                <input type="number" step="0.01" defaultValue={row?Number(row.amount):''} placeholder="0.00"
                  key={c.id+date+(row?row.amount:'')}
                  onBlur={e=>saveRev(c,e.target.value)} style={{textAlign:'right'}}/>
              </td></tr>;
          })}
        </tbody></table>
        <div className="big-total"><span className="bt-l">Sales today</span>
          <span className="bt-v">{fmt$((meta?meta.channels:[]).reduce((a,c)=>{
            const r=dayRev[c.id]; if(!r||!c.counts_in_total) return a;
            return a+Number(r.amount)*Number(c.total_multiplier);},0))}</span></div>
        <div className="hint">Amounts save when you click outside the field. Includes Other Income for grants or catering.</div>
      </div>}

    {mode==='expense' &&
      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Add Expense
          <label className="date-chip">{fmtDateShort(date)}
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              onClick={e=>{ try{ e.target.showPicker&&e.target.showPicker(); }catch(_){} }}/>
          </label>
        </h3>
        <label className="hint" style={{marginTop:0}}>Category</label>
        <select value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})} style={{marginBottom:10}}>
          <option value="">Select a category</option>
          {(meta?meta.categories.filter(c=>c.active):[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <label className="hint" style={{marginTop:0}}>Details <span style={{color:'var(--gold)'}}>*</span></label>
        <input placeholder="What was this for? (required)" value={form.memo}
          onChange={e=>setForm({...form,memo:e.target.value})} style={{marginBottom:10}}/>
        <div className="form-row">
          <div className="fr-col">
            <label className="hint" style={{marginTop:0}}>Amount <span style={{color:'var(--gold)'}}>*</span></label>
            <div className="amt-input">
              <span className="amt-prefix">$</span>
              <input type="text" inputMode="text" placeholder="0.00 or 12+15+16" value={form.amount}
                onChange={e=>setForm({...form,amount:e.target.value})}/>
            </div>
            {String(form.amount).includes('+') && !isNaN(sumExpr(form.amount)) && <div className="hint" style={{marginTop:4,color:'var(--gold)'}}>= {fmt$(sumExpr(form.amount))}</div>}
          </div>
          <div className="fr-col">
            <label className="hint" style={{marginTop:0}}>Payee (optional)</label>
            <input placeholder="Vendor / person" value={form.payee} onChange={e=>setForm({...form,payee:e.target.value})}/>
          </div>
        </div>
        <label className="hint">Paid with</label>
        <div className="method-seg">
          {[['card','Card'],['cash','Cash'],['transfer','Transfer']].map(([v,l])=>
            <button key={v} type="button" className={'method-opt'+(form.method===v?' on':'')}
              onClick={()=>setForm({...form,method:v})}>{l}</button>)}
        </div>
        {form.method==='cash' && <div className="hint" style={{color:'var(--gold-strong)',marginTop:-4}}>Cash expenses reduce what should be in the daily envelope.</div>}
        <button className="btn btn-gold" disabled={busy} onClick={addExp} style={{marginTop:12}}>Save Expense</button>
        <hr className="divider"/>

          <table className="t"><tbody>
            {dayExp.map(e=><tr key={e.id}>
              <td>{catName(e.category_id)}
                {e.source==='recurring' && <span className="badge blue">Recurring</span>}

                {e.source==='quickbooks' && <span className="badge green">QuickBooks</span>}
                {e.source==='inventory' && <span className="badge green">Inventory</span>}
                {e.source==='slack' && <span className="badge blue">Slack</span>}
                {e.adjustment && <span className="badge gold">Adjustment</span>}
                {e.payee && <span className="faint"> · {e.payee}</span>}
                {e.memo && <div className="faint" style={{fontSize:12}}>{e.memo}</div>}</td>
              <td className="num">{fmt$(Number(e.amount))}</td>
              <td style={{width:36,textAlign:'right'}}><button className="btn btn-sm btn-ghost btn-danger" onClick={()=>delExp(e.id)}>✕</button></td>
            </tr>)}
