            </React.Fragment>; })}
          <tr className="total"><td>Total</td>
            <td className="num mono"><Amt v={tot.rev}/>{tot.lyRev?<div className="ly-under">{"'"+String(y-1).slice(2)} {fmt$(tot.lyRev,0)}</div>:null}</td>
            <td className="num mono faint ly-col">{fmt$(tot.lyRev,0)}</td>
            <td className="num mono"><Amt v={tot.exp}/></td>
            <td className={'num mono '+(net>=0?'pos':'neg')}><Amt v={net}/></td><td></td></tr>
        </tbody>
      </table>
      <div className="hint"><span className="day-star best">★</span> best sales day · <span className="day-star slow">★</span> slowest. Tap the arrow on a day to see every expense; tap a name for its source and note{isOwner?'; tap ⋯ to edit or delete':''}.</div>
    </div>
    {editModal && <div className="modal-overlay" onClick={()=>setEditModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">Edit expense</div>
            <div className="faint" style={{fontSize:12.5}}>{editModal.source} entry</div></div>
          <button className="modal-x" onClick={()=>setEditModal(null)}>✕</button>
        </div>
        <label className="hint">Category</label>
        <select className="w-full" style={{width:'100%',marginBottom:10}} value={ef.category_id} onChange={e=>setEf({...ef,category_id:e.target.value})}>
          {(categories||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div style={{flex:1}}><label className="hint">Amount</label>
            <input type="text" inputMode="text" style={{width:'100%'}} placeholder="e.g. 12+15+16" value={ef.amount} onChange={e=>setEf({...ef,amount:e.target.value})}/>

          <div style={{flex:1}}><label className="hint">Date</label>
            <input type="date" style={{width:'100%'}} value={ef.date} onChange={e=>setEf({...ef,date:e.target.value})}/></div>
        </div>
        <label className="hint">Note</label>
        <input style={{width:'100%',marginBottom:14}} value={ef.memo} onChange={e=>setEf({...ef,memo:e.target.value})} placeholder="Optional note"/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={saveEdit}>Save</button>
          <button className="btn btn-danger" disabled={busy} onClick={()=>delItem(editModal)}>Delete</button>
        </div>
      </div>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </>;
}

// ---- YEAR VIEW (12 months across) ----
// Sum a list of monthly P&Ls into one set of expense lines / revenue channels.
// The monthly cards read pl.categoryRows / pl.ruleRows / pl.channelRows; the yearly
// and all-time views hold the same monthly P&Ls, so the breakdown is just those rows
// added up. Nothing is recomputed, so these totals always agree with the P&L tables.
function aggregatePL(pls){
  const cats={}, rules={}, chans={};
  let totalSales=0, totalExpenses=0;
  pls.forEach(pl=>{
    if(!pl) return;
    totalSales += pl.totalSales||0;
    totalExpenses += pl.totalExpenses||0;
    (pl.categoryRows||[]).forEach(c=>{ if(!c.amount) return;
      cats[c.name] = (cats[c.name]||0) + c.amount; });
    (pl.ruleRows||[]).forEach(r=>{ if(!r.amount) return;
      rules[r.name] = (rules[r.name]||0) + r.amount; });
    (pl.channelRows||[]).forEach(c=>{ if(!c.amount) return;
      const k=c.name;
      if(!chans[k]) chans[k]={name:c.name, amount:0, counts_in_total:c.counts_in_total, total_multiplier:c.total_multiplier};
      chans[k].amount += c.amount; });
  });
  const items=[
    ...Object.entries(cats).map(([name,amount])=>({name, amount, auto:false})),
    ...Object.entries(rules).map(([name,amount])=>({name, amount, auto:true})),
  ].filter(i=>i.amount!==0).sort((a,b)=>b.amount-a.amount);
  const channels=Object.values(chans).sort((a,b)=>b.amount-a.amount);
  return { items, channels, totalSales, totalExpenses };
}

// "Where the Money Went" for any period (same layout as the monthly card).
function SpendBreakdown({agg, label}){
  const {items, totalSales, totalExpenses} = agg;
  if(!items.length) return null;
  const maxAmt=Math.max(1,...items.map(i=>i.amount));
  return <div className="card">
    <h3>Where the Money Went · {label}</h3>
    <div className="hint" style={{marginTop:0,marginBottom:14}}>Every expense line, largest first. The bar shows each category's share of total expenses.</div>
    <div className="spendlist">
      {items.map((it,i)=>{
        const pctExp=totalExpenses?it.amount/totalExpenses:0;
        const pctSales=totalSales?it.amount/totalSales:0;
        return <div className="spendrow" key={i}>
          <div className="spendhead">
            <span className="spendname">{it.name}{it.auto && <span className="badge gold" style={{marginLeft:6}}>Auto</span>}</span>
            <span className="spendamt mono">{fmt$(it.amount)}</span>
          </div>
          <div className="spendbar"><div className={'spendbar-fill'+(i<3?' big':'')} style={{width:(it.amount/maxAmt*100)+'%'}}></div></div>
          <div className="spendmeta">{fmtPct(pctExp)} of expenses · {fmtPct(pctSales)} of sales</div>
        </div>;
      })}
    </div>
    <div className="spendtotal">
      <span>Total Expenses</span><span className="mono">{fmt$(totalExpenses)}</span>
    </div>
  </div>;
}

// "Where the Money Came From": the same treatment for revenue channels.
function IncomeBreakdown({agg, label}){
  const {channels, totalSales} = agg;
  if(!channels.length) return null;
  const counted=channels.filter(c=>c.counts_in_total);
  const maxAmt=Math.max(1,...channels.map(c=>Math.abs(c.amount)));
  return <div className="card">
    <h3>Where the Money Came From · {label}</h3>
    <div className="hint" style={{marginTop:0,marginBottom:14}}>Every revenue channel, largest first. The bar shows each channel's share of total sales.</div>
    <div className="spendlist">
      {channels.map((c,i)=>{
        const pct=totalSales?c.amount/totalSales:0;
        return <div className="spendrow" key={i}>
          <div className="spendhead">
            <span className="spendname">{c.name}
              {!c.counts_in_total && <span className="badge" style={{marginLeft:6}}>Excluded</span>}
              {Number(c.total_multiplier)!==1 && c.counts_in_total && <span className="badge" style={{marginLeft:6}}>x{c.total_multiplier}</span>}
            </span>
            <span className="spendamt mono">{fmt$(c.amount)}</span>
          </div>
          <div className="spendbar"><div className={'spendbar-fill income'+(i<3?' big':'')} style={{width:(Math.abs(c.amount)/maxAmt*100)+'%'}}></div></div>
          <div className="spendmeta">{c.counts_in_total ? fmtPct(pct)+' of sales' : 'not counted in total sales'}</div>
        </div>;
      })}
    </div>
    <div className="spendtotal">
      <span>Total Sales</span><span className="mono">{fmt$(totalSales)}</span>
    </div>
  </div>;
}

// ---- CUSTOM VIEW (any month range: from ... to) ----
function CustomView({months, fromY, fromM, toY, toM}){
  if(!months || !months.length) return <div className="card faint">Pick a range to see its P&L.</div>;
  const tot=months.reduce((a,x)=>({s:a.s+x.pl.totalSales,e:a.e+x.pl.totalExpenses,n:a.n+x.pl.net}),{s:0,e:0,n:0});
  const label = (fromY===toY && fromM===toM)
    ? `${MONTHS[fromM-1]} ${fromY}`
    : `${MONTHS[fromM-1]} ${fromY} to ${MONTHS[toM-1]} ${toY}`;
  const withData=months.filter(x=>x.pl.totalSales!==0||x.pl.totalExpenses!==0);
  const trendPts=withData.map(x=>({label:(x.y===fromY&&x.y===toY)?pad(x.m):`${pad(x.m)}/${String(x.y).slice(2)}`,
    sales:x.pl.totalSales,net:x.pl.net,payrollPct:x.pl.payrollPct,suppliesPct:x.pl.suppliesPct}));

  return <>

      <div className="kpi"><div className="k-lbl">Sales</div><div className="k-val"><KVal v={tot.s}/></div>

      <div className="kpi"><div className="k-lbl">Expenses</div><div className="k-val"><KVal v={tot.e}/></div></div>

        <div className="k-sub">Margin {fmtPct(tot.s?tot.n/tot.s:null)}</div></div>
    </div>
    <div className="card"><h3>{label}</h3><TrendChart points={trendPts}/></div>
    <div className="card">
      <h3>Month by Month · {label}</h3>
      <table className="t ypl-t">
        <thead><tr><th>Month</th><th className="num">Sales</th><th className="num">Expenses</th><th className="num">Net</th><th className="num margin-col">Margin</th></tr></thead>
        <tbody>
          {months.map(x=>{ const has=x.pl.totalSales!==0||x.pl.totalExpenses!==0;
            return <tr key={`${x.y}-${x.m}`} style={{opacity:has?1:0.35}}>
              <td>{MONTHS[x.m-1].slice(0,3)} {x.y}</td>
              <td className="num mono">{has?fmt$(x.pl.totalSales,0):'-'}</td>
              <td className="num mono">{has?fmt$(x.pl.totalExpenses,0):'-'}</td>
              <td className={'num mono '+(x.pl.net>=0?'pos':'neg')}>{has?fmt$(x.pl.net,0):'-'}

              </td>
              <td className="num mono faint margin-col">{has?fmtPct(x.pl.margin):'-'}</td>
            </tr>; })}
          <tr className="total"><td>Total</td><td className="num">{fmt$(tot.s,0)}</td><td className="num">{fmt$(tot.e,0)}</td>
            <td className={'num '+(tot.n>=0?'pos':'neg')}>{fmt$(tot.n,0)}
              <div className="cell-margin">{fmtPct(tot.s?tot.n/tot.s:null)}</div>
            </td><td className="num margin-col">{fmtPct(tot.s?tot.n/tot.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
    <IncomeBreakdown agg={agg} label={label}/>
    <SpendBreakdown agg={agg} label={label}/>
  </>;
}

// Month range picker: from (month, year) to (month, year).
// The range stops at the LAST COMPLETED month. The month in progress is deliberately
// not selectable: a part-finished month sitting in a range total makes the whole period
// look like a downturn, and its P&L is not final until the month is closed.
const lastClosedMonth = () => {
  const n=new Date(); let y=n.getFullYear(), m=n.getMonth()+1;
  m--; if(m<1){ m=12; y--; }
  return { y, m };
};
function RangePick({fromY, fromM, toY, toM, onChange}){
  const cap = lastClosedMonth();
  const capIdx = cap.y*12 + cap.m;
  const years = []; for(let yr=2022; yr<=cap.y; yr++) years.push(yr);
  const sel = (val, on, opts) => <select className="mp-sel" value={val} onChange={e=>on(parseInt(e.target.value))}>
    {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>;
  // months only up to the cap when the chosen year IS the cap year
  const mOptsFor = (yr) => MONTHS.map((mn,i)=>({v:i+1,l:mn.slice(0,3)}))
    .filter(o => yr < cap.y || o.v <= cap.m);
  const yOpts = years.map(yr=>({v:yr,l:String(yr)}));
  // keep the range valid: never past the cap, and the end never before the start
  const clamp = (yy,mm)=>{ const i=yy*12+mm; return i>capIdx ? {y:cap.y,m:cap.m} : {y:yy,m:mm}; };
  const set = (fy,fm,ty,tm)=>{
    ({y:fy,m:fm} = clamp(fy,fm));
    ({y:ty,m:tm} = clamp(ty,tm));
    if(ty*12+tm < fy*12+fm){ ty=fy; tm=fm; }
    onChange(fy,fm,ty,tm);
  };
  return <div className="month-pick" style={{gap:6,flexWrap:'wrap'}}>
    <span className="faint" style={{fontSize:12}}>From</span>
    {sel(fromM, v=>set(fromY,v,toY,toM), mOptsFor(fromY))}
    {sel(fromY, v=>set(v,fromM,toY,toM), yOpts)}
    <span className="faint" style={{fontSize:12}}>to</span>
    {sel(toM, v=>set(fromY,fromM,toY,v), mOptsFor(toY))}
    {sel(toY, v=>set(fromY,fromM,v,toM), yOpts)}
  </div>;
}

    <button className={'cmp-per-tab'+(yearMode==='3y'?' on':'')} onClick={()=>onYearMode&&onYearMode('3y')}>3 Years</button>

// ---- COMPARE VIEW (three years, month by month) ----
function CompareView({cur, prev, prev2, y}){
  const sum=arr=>arr.reduce((a,x)=>({s:a.s+x.pl.totalSales,e:a.e+x.pl.totalExpenses,n:a.n+x.pl.net}),{s:0,e:0,n:0});
  const tc=sum(cur), tp=sum(prev), tp2=sum(prev2||[]);
  // Which months of the displayed year are done / running / not yet reached?
  const _n=new Date(), _cy=_n.getFullYear(), _cm=_n.getMonth()+1;
  const monthState=(m)=> y>_cy ? 'future'
    : y<_cy ? 'past'
    : (m<_cm ? 'past' : m===_cm ? 'current' : 'future');
  // The year TOTAL row compares this year against last year over the SAME months only,
  // otherwise a part-finished year always looks like a collapse against a full one.
  const doneMonths=cur.filter(x=>monthState(x.m)!=='future').map(x=>x.m);
  const tpDone=sum((prev||[]).filter(x=>doneMonths.includes(x.m)));
  const prevBy={}; prev.forEach(x=>prevBy[x.m]=x.pl);
  const prev2By={}; (prev2||[]).forEach(x=>prev2By[x.m]=x.pl);
  const has2=(prev2||[]).some(x=>x.pl.totalSales!==0||x.pl.totalExpenses!==0);
  // Three-Year Comparison: show a KPI block per YEAR, not just the current one. Each
  // year gets its own Sales / Expenses / Net, with the delta against the year before it,
  // so all three years are readable side by side instead of only the latest.
  const yearBlocks = [
    has2 ? {yr:y-2, t:tp2, base:null} : null,
    {yr:y-1, t:tp, base:has2?tp2:null},
    {yr:y,   t:tc, base:tp},
  ].filter(Boolean);
  return <>
    {yearBlocks.map(b=>
      <div className="kpis kpis-3" key={b.yr} style={{marginBottom:10}}>
        <div className="kpi"><div className="k-lbl">{b.yr} Sales</div><div className="k-val"><KVal v={b.t.s}/></div>
          {b.base && <div className="k-sub"><YoYDelta cur={b.t.s} prev={b.base.s} bare/> vs {b.yr-1}</div>}</div>
        <div className="kpi"><div className="k-lbl">{b.yr} Expenses</div><div className="k-val"><KVal v={b.t.e}/></div>
          {b.base && <div className="k-sub"><YoYDelta cur={b.t.e} prev={b.base.e} bare/> vs {b.yr-1}</div>}</div>
        <div className="kpi"><div className="k-lbl">{b.yr} Net</div><div className={"k-val "+(b.t.n>=0?"pos":"neg")}><KVal v={b.t.n}/></div>
          <div className="k-sub">Margin {fmtPct(b.t.s?b.t.n/b.t.s:null)}</div></div>
      </div>)}
    <div className="card">
      <h3>Sales by Month · {y-2}–{y}</h3>
      <MultiYearChart series={[
        has2 && {label:String(y-2), months:prev2, color:'#B4AA98'},
        {label:String(y-1), months:prev, color:'#C9A94E'},
        {label:String(y), months:cur, color:'#B08A1E'},
      ].filter(Boolean)}/>
    </div>
    <div className="card">
      <h3>Annual Totals</h3>
      <table className="t">
        <thead><tr><th>Year</th><th className="num">Sales</th><th className="num">Expenses</th><th className="num">Net</th><th className="num">Margin</th></tr></thead>
        <tbody>
          {has2 && <tr><td>{y-2}</td><td className="num mono">{fmt$(tp2.s,0)}</td><td className="num mono">{fmt$(tp2.e,0)}</td>
            <td className={'num mono '+(tp2.n>=0?'pos':'neg')}>{fmt$(tp2.n,0)}</td><td className="num mono faint">{fmtPct(tp2.s?tp2.n/tp2.s:null)}</td></tr>}
          <tr><td>{y-1}</td><td className="num mono">{fmt$(tp.s,0)}</td><td className="num mono">{fmt$(tp.e,0)}</td>
            <td className={'num mono '+(tp.n>=0?'pos':'neg')}>{fmt$(tp.n,0)}</td><td className="num mono faint">{fmtPct(tp.s?tp.n/tp.s:null)}</td></tr>
          <tr style={{fontWeight:600}}><td>{y}</td><td className="num mono">{fmt$(tc.s,0)}</td><td className="num mono">{fmt$(tc.e,0)}</td>
            <td className={'num mono '+(tc.n>=0?'pos':'neg')}>{fmt$(tc.n,0)}</td><td className="num mono">{fmtPct(tc.s?tc.n/tc.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
    <div className="card">
      <h3>Sales · Month by Month</h3>
      <table className="t">
        <thead><tr><th>Month</th>{has2 && <th className="num faint">{y-2}</th>}<th className="num faint">{y-1}</th><th className="num">{y}</th><th className="num">vs {y-1}</th></tr></thead>
        <tbody>
          {cur.map(x=>{ const p=prevBy[x.m]||{totalSales:0}; const p2=prev2By[x.m]||{totalSales:0};
            const anyv=x.pl.totalSales!==0||p.totalSales!==0||p2.totalSales!==0;
            // A month that has not finished yet is not a real comparison: an unstarted
            // month has no sales, which would print as -100% against last year. Show the
            // running month as "in progress" and leave future months blank.
            const st=monthState(x.m);
            return <tr key={x.m} style={{opacity:anyv?1:0.35}}>
              <td>{MONTHS[x.m-1].slice(0,3)}</td>
              {has2 && <td className="num mono faint">{fmt$(p2.totalSales,0)}</td>}
              <td className="num mono faint">{fmt$(p.totalSales,0)}</td>
              <td className="num mono">{st==='future'?'-':fmt$(x.pl.totalSales,0)}</td>
              <td className="num">{
                st==='future'  ? <span className="faint">—</span> :
                st==='current' ? <span className="faint">in progress</span> :
                <YoYDelta cur={x.pl.totalSales} prev={p.totalSales}/>}</td>
            </tr>; })}
          <tr className="total"><td>Total</td>{has2 && <td className="num">{fmt$(tp2.s,0)}</td>}<td className="num">{fmt$(tp.s,0)}</td>
            <td className="num">{fmt$(tc.s,0)}</td><td className="num"><YoYDelta cur={tc.s} prev={tpDone.s}/></td></tr>
        </tbody>
      </table>
    </div>
  </>;
}

// simple multi-year bar chart (sales by month, grouped)
function MultiYearChart({series}){
  const [sel,setSel] = React.useState(null);
  if(!series.length) return <div className="faint">No data.</div>;
  const max=Math.max(1,...series.flatMap(s=>s.months.map(x=>x.pl.totalSales)));
  const step=niceStep(max,4); const axisMax=Math.ceil(max/step)*step;
  const H=180, W=760, padL=44, padR=8, bw=(W-padL-padR)/12;
  const yOf=v=>H*(1-v/axisMax);
  const grid=[]; for(let g=0; g<=axisMax+1e-6; g+=step) grid.push(g);
  return <div style={{overflowX:'auto'}}>
    <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:'100%',minWidth:640}} onMouseLeave={()=>setSel(null)}>
      {grid.map((g,i)=><g key={i}>
        <line x1={padL} x2={W-padR} y1={yOf(g)} y2={yOf(g)} stroke={i===0?'var(--border)':'#F0EEE9'} strokeWidth="0.7"/>
        <text x={padL-5} y={yOf(g)+3} fill="#948B7C" fontSize="8.5" textAnchor="end" fontFamily="IBM Plex Mono">{fmt$k(g)}</text>
      </g>)}
      {series[0].months.map((_,i)=>{
        const gw=(bw-8)/series.length; const on=sel===i;
        return <g key={i} onPointerDown={()=>setSel(i)} onMouseEnter={()=>setSel(i)} style={{cursor:'pointer'}}>
          <rect x={padL+i*bw} y={0} width={bw} height={H} fill={on?'rgba(176,138,30,0.05)':'transparent'}/>
          {series.map((s,si)=>{
            const v=s.months[i].pl.totalSales; const h=axisMax?v/axisMax*H:0;
            return <rect key={s.label+i} x={padL+i*bw+4+si*gw} y={H-h} width={gw-1} height={h} fill={s.color} rx="1"/>;
          })}
        </g>;
      })}
      {MONTHS.map((mn,i)=><text key={i} x={padL+i*bw+bw/2} y={H+14} fill="var(--text2)" fontSize="9" textAnchor="middle">{mn.slice(0,1)}</text>)}
      {sel!==null && (()=>{ const x=padL+sel*bw+bw/2; const lh=15; const tw=120, th=12+lh*(series.length+1)+6;
        const tx=Math.min(Math.max(x-tw/2,padL),W-padR-tw); const ty=6;
        return <g pointerEvents="none">
          <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="#2A2620" opacity="0.95"/>
          <text x={tx+9} y={ty+18} fontSize="10" fill="#F4D77E" fontFamily="IBM Plex Mono">{MONTHS[sel].slice(0,3)}</text>
          {series.map((s,si)=><text key={s.label} x={tx+9} y={ty+18+(si+1)*lh} fontSize="10" fill="#E8E4DC" fontFamily="IBM Plex Mono">
            {s.label} {fmt$k(s.months[sel].pl.totalSales)}</text>)}
        </g>; })()}
    </svg>
    <div style={{display:'flex',gap:16,marginTop:8,fontSize:12,flexWrap:'wrap'}}>
      {series.map(s=><span key={s.label} style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:12,height:12,background:s.color,borderRadius:2,display:'inline-block'}}></span>{s.label}</span>)}
      <span className="faint">Tap a month for values</span>
    </div>
  </div>;
}

// ---- ALL-TIME VIEW (entire history: growth, trajectory, insights) ----
function AllTimeView({data}){
  if(!data || !data.years.length) return <div className="card faint">No history yet.</div>;
  const years=data.years;
  const life=years.reduce((a,yr)=>({s:a.s+yr.totals.s,e:a.e+yr.totals.e,n:a.n+yr.totals.n}),{s:0,e:0,n:0});
  // only "complete-ish" years for growth (have any data)
  const active=years.filter(yr=>yr.totals.s!==0||yr.totals.e!==0);
  // best / worst by net
  const withData=active.slice();
  const bestYear=withData.reduce((a,b)=>b.totals.n>a.totals.n?b:a, withData[0]);
  const bestSalesYear=withData.reduce((a,b)=>b.totals.s>a.totals.s?b:a, withData[0]);
  // year-over-year sales growth (last full transition)
  const insights=allTimeInsights(active);
  // monthly series across all time for the trend line
  const monthlySeries=[];
  const _nAt=new Date(), _curY=_nAt.getFullYear(), _curM=_nAt.getMonth()+1;
  years.forEach(yr=>yr.months.forEach(mo=>{
    if(mo.pl.totalSales!==0||mo.pl.totalExpenses!==0)
      monthlySeries.push({label:`${String(yr.y).slice(2)}/${pad(mo.m)}`, sales:mo.pl.totalSales, net:mo.pl.net, inProgress:(yr.y===_curY&&mo.m===_curM)});
  }));

  return <>
    <div className="kpis">
      <div className="kpi"><div className="k-lbl">Lifetime Sales</div><div className="k-val"><KVal v={life.s}/></div>
        <div className="k-sub">{data.firstYear}–{data.lastYear}</div></div>
      <div className="kpi"><div className="k-lbl">Lifetime Net</div><div className={"k-val "+(life.n>=0?"pos":"neg")}><KVal v={life.n}/></div>
        <div className="k-sub">Margin {fmtPct(life.s?life.n/life.s:null)}</div></div>
      <div className="kpi"><div className="k-lbl">Best Sales Year</div><div className="k-val">{bestSalesYear?bestSalesYear.y:'-'}</div>
        <div className="k-sub">{bestSalesYear?fmt$k(bestSalesYear.totals.s):''}</div></div>
      <div className="kpi"><div className="k-lbl">Best Profit Year</div><div className="k-val">{bestYear?bestYear.y:'-'}</div>
        <div className="k-sub">{bestYear?fmt$k(bestYear.totals.n):''}</div></div>
    </div>

    {insights.length>0 && <div className="card">
      <h3>The Long View</h3>
      <div className="findings">
        {insights.map((f,i)=><div key={i} className={'finding '+f.kind}><span className="fdot"></span><span>{f.text}</span></div>)}
      </div>
    </div>}

    <div className="card"><h3>Sales & Net · Every Month</h3>
      <TrendChart points={monthlySeries}/>
      <div className="hint">Full history since {data.firstYear}. Bars are monthly sales; the line is monthly net profit.</div>
    </div>

    <div className="card">
      <h3>Year by Year</h3>
      <table className="t">
        <thead><tr><th>Year</th><th className="num">Sales</th><th className="num">Growth</th><th className="num">Expenses</th><th className="num">Net</th><th className="num">Margin</th></tr></thead>
        <tbody>
          {active.map((yr,i)=>{ const prev=i>0?active[i-1]:null;
            return <tr key={yr.y}>
              <td>{yr.y}</td>
              <td className="num mono">{fmt$(yr.totals.s,0)}</td>
              <td className="num">{prev?<YoYDelta cur={yr.totals.s} prev={prev.totals.s}/>:<span className="faint">-</span>}</td>
              <td className="num mono">{fmt$(yr.totals.e,0)}</td>
              <td className={'num mono '+(yr.totals.n>=0?'pos':'neg')}>{fmt$(yr.totals.n,0)}</td>
              <td className="num mono faint">{fmtPct(yr.totals.s?yr.totals.n/yr.totals.s:null)}</td>
            </tr>; })}
          <tr className="total"><td>Lifetime</td><td className="num">{fmt$(life.s,0)}</td><td></td>
            <td className="num">{fmt$(life.e,0)}</td><td className={'num '+(life.n>=0?'pos':'neg')}>{fmt$(life.n,0)}</td>
            <td className="num">{fmtPct(life.s?life.n/life.s:null)}</td></tr>
        </tbody>
      </table>
    </div>
    {(()=>{ const label = data.firstYear===data.lastYear ? String(data.lastYear) : `${data.firstYear} to ${data.lastYear}`;
      // The breakdown is aggregated in the database (the monthly P&Ls here carry totals
      // only, on purpose: pulling every daily row is what used to time this view out).
      const agg=data.breakdown;
      if(!agg) return null;
      return <><IncomeBreakdown agg={agg} label={label}/><SpendBreakdown agg={agg} label={label}/></>; })()}
  </>;
}

// long-term plain-language insights across all years
function allTimeInsights(active){
  const out=[];
  if(active.length<2) return out;
  const first=active[0], last=active[active.length-1];
  // Compare on a PER-OPERATING-DAY basis so a partial first year (e.g. opened in
  // December, ~20 days) isn't unfairly compared to a full year. Falls back to totals
  // only if day counts are missing.
  const perDay = yr => (yr.activeDays && yr.activeDays>0) ? yr.totals.s/yr.activeDays : null;
  const fd=perDay(first), ld=perDay(last);
  if(fd && ld && fd>0){
    const mult=ld/fd;
    const detail=`${fmt$(fd,0)}/day → ${fmt$(ld,0)}/day`;
    if(mult>=1.15) out.push({kind:'good', text:`Average daily sales have grown ${mult.toFixed(1)}x since ${first.y} (${detail}).`});
    else if(mult<=0.85) out.push({kind:'bad', text:`Average daily sales are down since ${first.y} (${detail}).`});
    else out.push({kind:'info', text:`Average daily sales have held roughly steady since ${first.y} (${detail}).`});
  }
  // Exclude the current (in-progress) year from year-total comparisons below, since a
  // partial year would break a streak or look like the "worst" year unfairly.
  const curYr=new Date().getFullYear();
  const complete=active.filter(yr=>yr.y!==curYr);
  // consecutive growth streak (by sales), completed years only
  let streak=0;
  for(let i=complete.length-1;i>0;i--){ if(complete[i].totals.s>complete[i-1].totals.s) streak++; else break; }
  if(streak>=2) out.push({kind:'good', text:`Sales have grown ${streak} years in a row.`});
  // margin trend: compare avg margin of first half vs second half (completed years)
  const marg=yr=>yr.totals.s?yr.totals.n/yr.totals.s:0;
  const half=Math.floor(complete.length/2);
  if(half>=1){
    const early=complete.slice(0,half), late=complete.slice(half);
    const am=arr=>arr.length?arr.reduce((a,x)=>a+marg(x),0)/arr.length:0;
    const dd=(am(late)-am(early))*100;
    if(Math.abs(dd)>=1.5) out.push({kind:dd>0?'good':'bad', text:`Net margin is trending ${dd>0?'up':'down'} over time (${Math.abs(dd).toFixed(1)} points ${dd>0?'higher':'lower'} in recent years).`});
  }
  // best and worst single years
  // best and worst single years (completed years only, so a partial current year can't
  // be flagged as the weakest)
  const pool = complete.length>=2 ? complete : active;
  const best=pool.reduce((a,b)=>b.totals.n>a.totals.n?b:a,pool[0]);
  const worst=pool.reduce((a,b)=>b.totals.n<a.totals.n?b:a,pool[0]);
  if(best.y!==worst.y){
    out.push({kind:'info', text:`Most profitable year was ${best.y} (${fmt$(best.totals.n,0)}); weakest was ${worst.y} (${fmt$(worst.totals.n,0)}).`});
  }
  return out;
}

// ================= ENTRY (Maria) =================
function Entry({corps, canEditIds, profile, presetCorp, presetMode, activeCorp, onCorp}){
  const editable = corps.filter(c=>canEditIds.has(c.id));
  const [corpId, setCorpId] = useCorpSelection(editable, activeCorp, onCorp, presetCorp);
  useEffect(()=>{ if(presetCorp) setCorpId(presetCorp); },[presetCorp]);
  const [date, setDate] = useState(todayStr());
  const [meta, setMeta] = useState(null);
  const [dayRev, setDayRev] = useState({});
  const [dayExp, setDayExp] = useState([]);
  const [pending, setPending] = useState([]);
  const [form, setForm] = useState({category_id:'', amount:'', payee:'', memo:'', method:'card'});
  const [mode, setMode] = useState('income');
  useEffect(()=>{ if(presetMode && presetMode.mode) setMode(presetMode.mode); },[presetMode]);
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);

  const reload = useCallback(async()=>{
    if(!corpId) return;
    const mt = await loadCorpMeta(corpId);
    setMeta(mt);
    const [rv, ex, pd] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',corpId).eq('date',date),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('date',date).eq('status','confirmed').order('created_at',{ascending:false}),
      sb.from('expenses').select('*').eq('corporation_id',corpId).eq('status','pending').order('date',{ascending:false}),
    ]);
    // A channel can now hold SEVERAL rows on one day: manual income repeats (two royalty
    // payments, each with its own note), while a sync keeps exactly one. Group them.
    const map={}; (rv.data||[]).forEach(r=>{ (map[r.channel_id]=map[r.channel_id]||[]).push(r); });
    Object.values(map).forEach(list=>list.sort((a,b)=>
      (AUTO_REV_SOURCES.has(b.source)?1:0)-(AUTO_REV_SOURCES.has(a.source)?1:0)   // synced row first
      || String(a.created_at||'').localeCompare(String(b.created_at||''))));
    setDayRev(map); setDayExp(ex.data||[]); setPending(pd.data||[]);
  },[corpId,date]);
  useEffect(()=>{ reload(); },[reload]);

  // Revenue carries a note, the same way an expense does: a one-off income (a royalty
  // payment, a grant, a catering job) is meaningless later as a bare number.
  //
  // Hand-entered income shown as a list under the channel lines, the way expenses are
  // listed: anything with a note, plus any second-or-later entry on a channel.
  const noted = React.useMemo(()=>{
    const out=[];
    Object.values(dayRev||{}).forEach(list=>{
      (list||[]).forEach((r,i)=>{
        if(AUTO_REV_SOURCES.has(r.source)) return;
        if(r.memo || i>0) out.push(r);
      });
    });
    return out.sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||'')));
  },[dayRev]);

  // The inline cell on a channel line. It edits the channel's single row, or creates it.
  // A channel that already holds several entries shows a total instead of a cell, so this
  // is never reached for those.
  const saveRevCell = async (ch, val) => {
    const rows = dayRev[ch.id] || [];
    const amount = parseFloat(val)||0;
    const ex = rows[0];
    if(!ex){
      if(amount<=0) return;                                  // nothing typed: create nothing
      const { error } = await sb.from('daily_revenue').insert({
        corporation_id:corpId, channel_id:ch.id, date, amount,
        source:'manual', updated_by:profile.id, updated_at:new Date().toISOString() });
      if(error) showToast('Save failed: '+error.message); else { showToast(ch.name+' saved'); reload(); }
      return;
    }
    if(Number(ex.amount)===amount) return;                   // unchanged
    const upd = { amount, updated_by:profile.id, updated_at:new Date().toISOString() };
    // Overriding a synced figure by hand makes the row manual, so it is never mistaken
    // for a POS number later.
    if(AUTO_REV_SOURCES.has(ex.source)) upd.source='manual';
    const { error } = await sb.from('daily_revenue').update(upd).eq('id', ex.id);
    if(error) showToast('Save failed: '+error.message); else { showToast(ch.name+' saved'); reload(); }
  };

  // Add / edit an income that carries a note. Several are allowed on HQ and UMMA channels,
  // and on a store's Other Income; other store channels hold one figure a day.
  const [revModal, setRevModal] = useState(null);   // 'add' | the row being edited | null
  const [descOpen, setDescOpen] = useState(null);   // id of the list row whose full description is shown
  const [revForm, setRevForm] = useState({channel_id:'', amount:'', memo:''});

  const saveRevModal = async () => {
    if(!revForm.channel_id){ showToast('Select a channel'); return; }
    const amount = sumExpr(revForm.amount);
    if(isNaN(amount) || amount<=0){ showToast('Enter an amount'); return; }
    const memo = (revForm.memo||'').trim().slice(0,300);
    const ch = (meta?meta.channels:[]).find(c=>c.id===revForm.channel_id);
    const chCode = ch ? ch.code : '';
    setBusy(true);
    let error;
    if(revModal==='add'){
      const existing = dayRev[revForm.channel_id] || [];
      // A store channel that is not Other Income holds ONE figure a day: adding a second
      // would silently split the day's sales across two rows, so update the existing one.
      if(existing.length && !multiRevAllowed(corp?corp.code:'', chCode)){
        ({ error } = await sb.from('daily_revenue')
          .update({ amount:+amount.toFixed(2), memo: memo||null, source:'manual',
            updated_by:profile.id, updated_at:new Date().toISOString() })
          .eq('id', existing[0].id));
      } else {
        ({ error } = await sb.from('daily_revenue').insert({
          corporation_id:corpId, channel_id:revForm.channel_id, date,
          amount:+amount.toFixed(2), memo: memo||null, source:'manual',
          updated_by:profile.id, updated_at:new Date().toISOString() }));
      }
    } else {
      ({ error } = await sb.from('daily_revenue')
        .update({ channel_id:revForm.channel_id, amount:+amount.toFixed(2), memo: memo||null,
          updated_by:profile.id, updated_at:new Date().toISOString() })
        .eq('id', revModal.id));
    }
    setBusy(false);
    if(error){ showToast('Save failed: '+error.message); return; }
    setRevModal(null); showToast(revModal==='add'?'Income added':'Income updated'); reload();
  };

  const delRevRow = async (row) => {
    if(!confirm('Delete this income entry?')) return;
    const { error } = await sb.from('daily_revenue').delete().eq('id', row.id);
    if(error) showToast('Delete failed: '+error.message); else { setRevModal(null); reload(); }
  };

  const addExp = async () => {
    if(!form.category_id){ showToast('Select a category'); return; }
    if(!form.memo || !form.memo.trim()){ showToast('Enter details for this expense'); return; }
    const amt = sumExpr(form.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter an amount'); return; }
    setBusy(true);
    const { error } = await sb.from('expenses').insert({
      corporation_id:corpId, category_id:form.category_id, date,
      amount:amt, payee:form.payee||null, memo:form.memo.trim(),
      method:form.method||'card',
      source:'manual', entered_by:profile.id });
    setBusy(false);
    if(error) showToast('Save failed: '+error.message);
    else { setForm({category_id:'',amount:'',payee:'',memo:'',method:form.method}); showToast('Expense saved'); reload(); }
  };
  const delExp = async id => {
    if(!confirm('Delete this expense?')) return;
    const { error } = await sb.from('expenses').delete().eq('id',id);
    if(error) showToast('Delete failed: '+error.message); else reload();
  };
  // ---- Edit an existing expense (modal, mirrors the Insights day-view editor) ----
  const [editExp, setEditExp] = useState(null);
  const [eForm, setEForm] = useState({category_id:'', amount:'', payee:'', memo:'', method:'', date:''});
  const openEditExp = (e)=>{
    setEditExp(e);
    setEForm({ category_id:e.category_id||'', amount:String(e.amount), payee:e.payee||'',
               memo:e.memo||'', method:e.method||'', date:e.date||date });
  };
  const saveEditExp = async ()=>{
    if(!eForm.category_id){ showToast('Select a category'); return; }
    const amt = sumExpr(eForm.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter a valid amount'); return; }
    if(!eForm.date){ showToast('Pick a date'); return; }
    setBusy(true);
    const upd = { category_id:eForm.category_id, amount:+amt.toFixed(2),
                  payee:(eForm.payee||'').trim()||null, memo:(eForm.memo||'').trim().slice(0,300),
                  date:eForm.date };
    if(eForm.method) upd.method = eForm.method;   // never overwrite a null method with a default
    const { error } = await sb.from('expenses').update(upd).eq('id', editExp.id);
    setBusy(false);
    if(error){ showToast('Save failed: '+error.message); return; }
    setEditExp(null); showToast('Expense updated'); reload();
  };
  const [pendCat, setPendCat] = useState({});
  const approvePending = async (p, ok) => {
    if(ok){ const upd = {status:'confirmed'};
      if(pendCat[p.id]) upd.category_id = pendCat[p.id];
      const { error } = await sb.from('expenses').update(upd).eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    else { const { error } = await sb.from('expenses').delete().eq('id',p.id);
      if(error){ showToast(error.message); return; } }
    showToast(ok?'Approved':'Rejected'); reload();
  };

  const catName = id => { const c=(meta&&meta.categories||[]).find(x=>x.id===id); return c?c.name:'?'; };
  if(!editable.length) return <div className="card">No corporations available for your account.</div>;
  return <div>
    <div className="page-head">
      <div><div className="eyebrow">Daily Entry</div><h2>Daily Entry</h2></div>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <CorpTabs corps={editable} sel={corpId} onSel={setCorpId}/>
      </div>
    </div>

    <div className="ie-toggle">
      <button className={'ie-btn income'+(mode==='income'?' on':'')} onClick={()=>setMode('income')}>
        <span className="ie-ic">＋</span> Income
      </button>
      <button className={'ie-btn expense'+(mode==='expense'?' on':'')} onClick={()=>setMode('expense')}>
        <span className="ie-ic">－</span> Expense
      </button>
    </div>

    {pending.length>0 && <div className="card">
      <h3>Slack Pending Approval <span className="badge red">{pending.length}</span></h3>
      {pending.map(p=><div className="pend" key={p.id}>
        <div className="grow">
          <div><span className="mono">{p.date}</span> · {catName(p.category_id)} · <b className="mono">{fmt$(Number(p.amount))}</b></div>
          <div className="faint" style={{fontSize:12.5}}>{p.memo} {p.slack_user && '· @'+p.slack_user}</div>
        </div>
        <select className="btn-sm" style={{width:150,padding:'5px 8px'}} value={pendCat[p.id]||p.category_id}
          onChange={e=>setPendCat({...pendCat,[p.id]:e.target.value})}>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button className="btn btn-sm btn-gold" onClick={()=>approvePending(p,true)}>Approve</button>
        <button className="btn btn-sm btn-danger" onClick={()=>approvePending(p,false)}>Reject</button>
      </div>)}
    </div>}

    {mode==='income' &&
      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Revenue
          <label className="date-chip">{fmtDateShort(date)}
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              onClick={e=>{ try{ e.target.showPicker&&e.target.showPicker(); }catch(_){} }}/>
          </label>
        </h3>
        {/* One line per channel, as before: name + the day's figure. A channel that holds
            several entries (HQ/UMMA, or a store's Other Income) shows their TOTAL here and
            lists them individually below, the same way expenses are listed. */}
        <table className="t rev-entry"><tbody>
          {(meta?meta.channels.filter(c=>c.active):[]).map(c=>{
            const rows = dayRev[c.id] || [];
            const multi = rows.length>1;
            const single = rows.length===1 ? rows[0] : null;
            const chTotal = rows.reduce((t,r)=>t+Number(r.amount),0);
            const auto = single && AUTO_REV_SOURCES.has(single.source);
            const badgeLabel = single ? (
              single.source==='toast_live' ? 'Toast · live' :
              single.source==='toast' ? 'Toast' :
              single.source==='inventory' ? 'Inventory' :
              single.source==='quickbooks' ? 'QuickBooks' :
              single.source==='board' ? 'Excel' : '') : '';
            return <tr key={c.id}>
              <td>{c.name}
                {auto && badgeLabel && <span className={'badge '+(single.source==='toast_live'?'gold':'green')}>{badgeLabel}</span>}
                {single && single.verified && <span className="badge gold">Verified</span>}
                {multi && <span className="badge">{rows.length} entries</span>}
              </td>
              <td className="num rev-amt">
                {multi
                  ? <span className="mono rev-multi-total">{fmt$(chTotal)}</span>
                  : <input type="number" step="0.01" placeholder="0.00"
                      defaultValue={single?Number(single.amount):''}
                      key={c.id+date+(single?single.id+single.amount:'empty')}
                      onBlur={e=>saveRevCell(c, e.target.value)} style={{textAlign:'right'}}/>}
              </td></tr>;
          })}
        </tbody></table>
        <div className="big-total"><span className="bt-l">Sales today</span>
          <span className="bt-v">{fmt$((meta?meta.channels:[]).reduce((a,c)=>{
            if(!c.counts_in_total) return a;
            const list = dayRev[c.id] || [];
            return a + list.reduce((t,r)=>t+Number(r.amount)*Number(c.total_multiplier),0);},0))}</span></div>
        <div className="hint">Amounts save when you click outside the field.</div>

        {/* Add an income that needs its own note, or a second payment on the same channel. */}
        <button className="btn btn-gold" style={{width:'100%',marginTop:14}}
          onClick={()=>{ setRevForm({channel_id:'', amount:'', memo:''}); setRevModal('add'); }}>
          + Add income with a note
        </button>

        {/* Everything entered by hand today, listed like the expenses below. */}
        {noted.length>0 && <div style={{marginTop:18}}>
          <div className="hint" style={{marginBottom:8}}>Added today</div>
          <table className="t li-table"><tbody>
            {noted.map(row=>{
              const ch=(meta?meta.channels:[]).find(x=>x.id===row.channel_id);
              return <tr key={row.id}>
                <td className="li-cell">
                  <div className="li-name" style={{fontWeight:600}}>{ch?ch.name:'Channel'}</div>
                  {row.memo && <div className={"li-memo"+(descOpen===row.id?" open":"")}
                    onClick={()=>setDescOpen(descOpen===row.id?null:row.id)}>{row.memo}</div>}
                </td>
                <td className="num li-amt">{fmt$(Number(row.amount))}</td>
                <td className="li-act">
                  <button className="btn btn-sm btn-ghost" aria-label="Edit"
                    onClick={()=>{ setRevForm({channel_id:row.channel_id, amount:String(row.amount), memo:row.memo||''}); setRevModal(row); }}>✎</button>
                  <button className="btn btn-sm btn-ghost btn-danger" aria-label="Delete"
                    onClick={()=>delRevRow(row)}>✕</button>
                </td></tr>;
            })}
          </tbody></table>
        </div>}
      </div>}

    {mode==='expense' &&
      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Add Expense
          <label className="date-chip">{fmtDateShort(date)}
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              onClick={e=>{ try{ e.target.showPicker&&e.target.showPicker(); }catch(_){} }}/>
          </label>
        </h3>
        <label className="hint" style={{marginTop:0}}>Category</label>
        <select value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})} style={{marginBottom:10}}>
          <option value="">Select a category</option>
          {(meta?meta.categories.filter(c=>c.active):[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <label className="hint" style={{marginTop:0}}>Details <span style={{color:'var(--gold)'}}>*</span></label>
        <input placeholder="What was this for? (required)" value={form.memo}
          onChange={e=>setForm({...form,memo:e.target.value})} style={{marginBottom:10}}/>
        <div className="form-row">
          <div className="fr-col">
            <label className="hint" style={{marginTop:0}}>Amount <span style={{color:'var(--gold)'}}>*</span></label>
            <div className="amt-input">
              <span className="amt-prefix">$</span>
              <input type="text" inputMode="text" placeholder="0.00 or 12+15+16" value={form.amount}
                onChange={e=>setForm({...form,amount:e.target.value})}/>
            </div>
            {String(form.amount).includes('+') && !isNaN(sumExpr(form.amount)) && <div className="hint" style={{marginTop:4,color:'var(--gold)'}}>= {fmt$(sumExpr(form.amount))}</div>}
          </div>
          <div className="fr-col">
            <label className="hint" style={{marginTop:0}}>Payee (optional)</label>
            <input placeholder="Vendor / person" value={form.payee} onChange={e=>setForm({...form,payee:e.target.value})}/>
          </div>
        </div>
        <label className="hint">Paid with</label>
        <div className="method-seg">
          {[['card','Card'],['cash','Cash'],['transfer','Transfer'],['check','Check']].map(([v,l])=>
            <button key={v} type="button" className={'method-opt'+(form.method===v?' on':'')}
              onClick={()=>setForm({...form,method:v})}>{l}</button>)}
        </div>
        {form.method==='cash' && <div className="hint" style={{color:'var(--gold-strong)',marginTop:-4}}>Cash expenses reduce what should be in the daily envelope.</div>}
        <button className="btn btn-gold" disabled={busy} onClick={addExp} style={{marginTop:12}}>Save Expense</button>
        <hr className="divider"/>
        <h3>Expenses on This Date {dayExp.length>0 && <span className="faint" style={{fontWeight:400}}>{fmt$(dayExp.reduce((a,e)=>a+Number(e.amount),0))}</span>}</h3>
        {dayExp.length===0 ? <div className="faint">No expenses entered.</div> :
          <table className="t li-table"><tbody>
            {dayExp.map(e=><tr key={e.id}>
              <td className="li-cell">
                <div className="li-name">{catName(e.category_id)}
                  {e.source==='recurring' && <span className="badge blue">Recurring</span>}
                  {e.source==='toast' && <span className="badge green">Toast</span>}
                  {e.source==='quickbooks' && <span className="badge green">QuickBooks</span>}
                  {e.source==='inventory' && <span className="badge green">Inventory</span>}
                  {e.source==='slack' && <span className="badge blue">Slack</span>}
                  {e.adjustment && <span className="badge gold">Adjustment</span>}
                </div>
                {(e.payee || e.memo) && <div className={"li-memo"+(descOpen===e.id?" open":"")}
                  onClick={()=>setDescOpen(descOpen===e.id?null:e.id)}>
                  {[e.payee, e.memo].filter(Boolean).join(' · ')}</div>}
              </td>
              <td className="num li-amt">{fmt$(Number(e.amount))}</td>
              <td className="li-act">
                <button className="btn btn-sm btn-ghost" onClick={()=>openEditExp(e)} aria-label="Edit">✎</button>
                <button className="btn btn-sm btn-ghost btn-danger" onClick={()=>delExp(e.id)} aria-label="Delete">✕</button>
              </td>
            </tr>)}
          </tbody></table>}
      </div>}
    {revModal && <div className="modal-overlay" onClick={()=>setRevModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">{revModal==='add'?'Add income':'Edit income'}</div>
            <div className="faint" style={{fontSize:12.5}}>{date}</div></div>
          <button className="modal-x" onClick={()=>setRevModal(null)}>✕</button>
        </div>
        <label className="hint">Channel</label>
        <select style={{width:'100%',marginBottom:10}} value={revForm.channel_id}
          onChange={e=>setRevForm({...revForm, channel_id:e.target.value})}>
          <option value="">Select a channel</option>
          {(meta?meta.channels.filter(c=>c.active):[]).map(c=>
            <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <label className="hint">Amount</label>
        <input type="text" inputMode="text" style={{width:'100%',marginBottom:10}}
          placeholder="0.00 or 12+15+16" value={revForm.amount}
          onChange={e=>setRevForm({...revForm, amount:e.target.value})}/>
        {String(revForm.amount).includes('+') && !isNaN(sumExpr(revForm.amount)) &&
          <div className="hint" style={{marginTop:-6,marginBottom:10,color:'var(--gold)'}}>= {fmt$(sumExpr(revForm.amount))}</div>}
        <label className="hint">Note</label>
        <input style={{width:'100%',marginBottom:14}} maxLength={300}
          placeholder="What was this income?" value={revForm.memo}
          onChange={e=>setRevForm({...revForm, memo:e.target.value})}/>
        {(()=>{ const ch=(meta?meta.channels:[]).find(c=>c.id===revForm.channel_id);
          const has=(dayRev[revForm.channel_id]||[]).length>0;
          if(revModal!=='add' || !ch || !has) return null;
          return multiRevAllowed(corp?corp.code:'', ch.code)
            ? <div className="hint" style={{marginTop:-8,marginBottom:12}}>This channel already has an entry today. This will be added as another one.</div>
            : <div className="hint" style={{marginTop:-8,marginBottom:12,color:'var(--gold)'}}>{ch.name} holds one figure a day, so this will replace today's amount.</div>;
        })()}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={saveRevModal}>Save</button>
          {revModal!=='add' && <button className="btn btn-danger" disabled={busy}
            onClick={()=>delRevRow(revModal)}>Delete</button>}
        </div>
      </div>
    </div>}
    {editExp && <div className="modal-overlay" onClick={()=>setEditExp(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">Edit expense</div>
            <div className="faint" style={{fontSize:12.5}}>{editExp.source} entry</div></div>
          <button className="modal-x" onClick={()=>setEditExp(null)}>✕</button>
        </div>
        <label className="hint">Category</label>
        <select style={{width:'100%',marginBottom:10}} value={eForm.category_id} onChange={e=>setEForm({...eForm,category_id:e.target.value})}>
          <option value="">Select a category</option>
          {(meta?meta.categories:[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div style={{flex:1}}><label className="hint">Amount</label>
            <input type="text" inputMode="text" style={{width:'100%'}} placeholder="0.00 or 12+15+16" value={eForm.amount} onChange={e=>setEForm({...eForm,amount:e.target.value})}/>
            {String(eForm.amount).includes('+') && !isNaN(sumExpr(eForm.amount)) && <div className="hint" style={{marginTop:4,color:'var(--gold)'}}>= {fmt$(sumExpr(eForm.amount))}</div>}
          </div>
          <div style={{flex:1}}><label className="hint">Date</label>
            <input type="date" style={{width:'100%'}} value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})}/></div>
        </div>
        <label className="hint">Details</label>
        <input style={{width:'100%',marginBottom:10}} value={eForm.memo} onChange={e=>setEForm({...eForm,memo:e.target.value})} placeholder="What was this for?"/>
        <label className="hint">Payee (optional)</label>
        <input style={{width:'100%',marginBottom:10}} value={eForm.payee} onChange={e=>setEForm({...eForm,payee:e.target.value})} placeholder="Vendor / person"/>
        <label className="hint">Paid with</label>
        <div className="method-seg" style={{marginBottom:14}}>
          {[['card','Card'],['cash','Cash'],['transfer','Transfer'],['check','Check']].map(([v,l])=>
            <button key={v} type="button" className={'method-opt'+(eForm.method===v?' on':'')}
              onClick={()=>setEForm({...eForm,method:v})}>{l}</button>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={saveEditExp}>Save</button>
          <button className="btn btn-danger" disabled={busy} onClick={()=>{ const id=editExp.id; setEditExp(null); delExp(id); }}>Delete</button>
        </div>
      </div>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

// ================= CASH VERIFICATION =================
// ============ CASH LEDGER (owner / HQ only) ============
// Physical cash on hand per corporation, independent of the P&L revenue ledger. Cash in =
// counted cash / transfers / other. Cash out = deposits, owner draws, bonuses, reimburse,
// transfers, other. An out entry can optionally also post to the P&L as a cash expense with
// a chosen category. Inter-corp transfers just move cash between boxes (paired rows).
const CL_OUT_KINDS = [['cash_expense','Cash expense'],['bank_deposit','Bank deposit'],['owner_draw','Owner draw / distribution'],['bonus','Cash bonus'],['reimburse','Reimburse owner'],['other','Other']];
const CL_IN_KINDS = [['counted_cash','Counted cash'],['other','Other']];
const CL_ALL_KINDS = [...CL_OUT_KINDS, ...CL_IN_KINDS, ['transfer_out','Transfer'],['transfer_in','Transfer'],['opening_balance','Opening balance']];
const clKindLabel = k => { const f = CL_ALL_KINDS.find(x=>x[0]===k); return f ? f[1] : k; };

function CashLedger({corps, canEditIds, profile}){
  const ledgerCorps = corps.filter(c=>canEditIds.has(c.id));
  const corpName = id => { const c = corps.find(x=>x.id===id); return c ? (c.code||c.name) : '?'; };
  const [rows, setRows] = useState(null);
  const [toast, showToast] = useToast();
  const [busy, setBusy] = useState(false);
  const [modal, setModal] = useState(null);      // {mode,...}
  const [storeSel, setStoreSel] = useState('all'); // 'all' | corpId  (which store's ledger)
  const [mode, setMode] = useState('all');         // 'all' | 'transfers' | 'in' | 'out'
  const [period, setPeriod] = useState('all');     // 'all' | 'month' | 'range'
  const [ym, setYm] = useState(todayStr().slice(0,7));  // YYYY-MM for the month view
  const [rStart, setRStart] = useState('');
  const [rEnd, setREnd] = useState('');
  const [q, setQ] = useState('');                  // free-text / amount search
  const [catsByCorp, setCatsByCorp] = useState({});
  const [outTypes, setOutTypes] = useState([]);       // user-defined cash-out types
  const [manageTypes, setManageTypes] = useState(false);
  const [newType, setNewType] = useState('');

  const loadTypes = useCallback(async()=>{
    const { data } = await sb.from('cash_out_types').select('*').order('display_order').order('created_at');
    setOutTypes(data||[]);
  },[]);
  useEffect(()=>{ loadTypes(); },[loadTypes]);
  const addType = async()=>{
    const name = newType.trim(); if(!name) return;
    if([...CL_OUT_KINDS.map(k=>k[1]), ...outTypes.map(t=>t.name)].some(n=>n.toLowerCase()===name.toLowerCase())){ showToast('That type already exists'); return; }
    const ord = outTypes.length ? Math.max(...outTypes.map(t=>t.display_order||0))+1 : 0;
    const { error } = await sb.from('cash_out_types').insert({ name, display_order:ord });
    if(error){ showToast('Add failed: '+error.message); return; }
    setNewType(''); loadTypes();
  };
  const removeType = async(t)=>{
    const { error } = await sb.from('cash_out_types').delete().eq('id', t.id);
    if(error){ showToast('Remove failed: '+error.message); return; }
    loadTypes();
  };

  const reload = useCallback(async()=>{
    const ids = ledgerCorps.map(c=>c.id);
    if(!ids.length){ setRows([]); return; }
    const { data } = await sb.from('cash_ledger').select('*').in('corporation_id', ids)
      .order('date',{ascending:false}).order('created_at',{ascending:false});
    setRows(data||[]);
  },[corps]);
  useEffect(()=>{ reload(); },[reload]);

  const balances = {};
  ledgerCorps.forEach(c=>balances[c.id]=0);
  (rows||[]).forEach(r=>{ if(balances[r.corporation_id]!=null) balances[r.corporation_id] += (r.direction==='in'?1:-1)*Number(r.amount); });

  const loadCats = async(corpId)=>{
    if(!corpId || catsByCorp[corpId]) return;
    const { data } = await sb.from('expense_categories').select('id,name,active').eq('corporation_id',corpId).eq('active',true).order('display_order');
    setCatsByCorp(prev=>({...prev,[corpId]:data||[]}));
  };

  const openModal = (mode)=>{
    const first = (storeSel!=='all' ? storeSel : (ledgerCorps[0] && ledgerCorps[0].id));
    const base = { mode, corp:first, date:todayStr(), amount:'', memo:'' };
    if(mode==='in') base.kind='counted_cash';
    if(mode==='out'){ base.kind='cash_expense'; base.includePL=true; base.category_id=''; loadCats(first); }
    if(mode==='transfer'){ base.from=first; base.to=(ledgerCorps[1]&&ledgerCorps[1].id)||first; }
    if(mode==='opening') base.kind='opening_balance';
    setModal(base);
  };

  const save = async()=>{
    const m = modal;
    // Counted-cash note: the amount is trigger-owned (mirrors the Cash tab count), so this
    // saves the note only. Clearing it stores null, and the trigger no longer overwrites it.
    if(m.mode==='count_note'){
      setBusy(true);
      try{
        const { error } = await sb.from('cash_ledger').update({ memo:(m.memo||'').trim()||null }).eq('id', m.editId);
        if(error) throw error;
        setModal(null); showToast('Note saved'); reload();
      }catch(e){ showToast('Save failed: '+(e.message||e)); }
      setBusy(false);
      return;
    }
    // Opening balance can be negative (a corp may start with a cash deficit). It is a single
    // number (not additive). A negative value is stored as an 'out' row so the balance nets down.
    if(m.mode==='opening'){
      const s = String(m.amount).trim();
      const v = /^-?\d+(\.\d+)?$/.test(s) ? Math.round(parseFloat(s)*100)/100 : NaN;
      if(isNaN(v) || v===0){ showToast('Enter an amount (can be negative)'); return; }
      setBusy(true);
      try{
        if(m.editId){
          const { error } = await sb.from('cash_ledger').update({ corporation_id:m.corp, date:m.date, direction:(v<0?'out':'in'), amount:Math.abs(v), memo:m.memo||null }).eq('id',m.editId);
          if(error) throw error;
        } else {
          const { error } = await sb.from('cash_ledger').insert({ corporation_id:m.corp, date:m.date, direction:(v<0?'out':'in'), kind:'opening_balance', amount:Math.abs(v), memo:m.memo||null, created_by:profile.id });
          if(error) throw error;
        }
        setModal(null); showToast('Saved'); reload();
      }catch(e){ showToast('Save failed: '+(e.message||e)); }
      setBusy(false);
      return;
    }
    const amt = sumExpr(m.amount);
    if(isNaN(amt) || amt<=0){ showToast('Enter an amount'); return; }
    setBusy(true);
    try{
      if(m.mode==='transfer'){
        if(m.from===m.to){ showToast('Pick two different corporations'); setBusy(false); return; }
        if(m.editGroup){
          const { error } = await sb.from('cash_ledger').update({ amount:amt, date:m.date, memo:m.memo||null }).eq('transfer_group', m.editGroup);
          if(error) throw error;
        } else {
          const grp = (typeof crypto!=='undefined' && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now())+Math.random();
          const { error } = await sb.from('cash_ledger').insert([
            { corporation_id:m.from, date:m.date, direction:'out', kind:'transfer_out', amount:amt, counterparty_corp_id:m.to, transfer_group:grp, memo:m.memo||null, created_by:profile.id },
            { corporation_id:m.to, date:m.date, direction:'in', kind:'transfer_in', amount:amt, counterparty_corp_id:m.from, transfer_group:grp, memo:m.memo||null, created_by:profile.id },
          ]);
          if(error) throw error;
        }
      } else if(m.mode==='out'){
        let expense_id = m.editId ? (m.expenseId||null) : null;
        if(m.includePL){
          if(!m.category_id){ showToast('Pick a P&L category'); setBusy(false); return; }
          if(expense_id){
            const { error:e1 } = await sb.from('expenses').update({ corporation_id:m.corp, category_id:m.category_id, date:m.date, amount:amt, memo:(m.memo||clKindLabel(m.kind)) }).eq('id',expense_id);
            if(e1) throw e1;
          } else {
            const { data:exp, error:e1 } = await sb.from('expenses').insert({
              corporation_id:m.corp, category_id:m.category_id, date:m.date, amount:amt,
              memo:(m.memo||clKindLabel(m.kind)), method:'cash', source:'cash_ledger', status:'confirmed', entered_by:profile.id,
            }).select('id').maybeSingle();
            if(e1) throw e1; expense_id = exp && exp.id;
          }
        } else if(expense_id){
          await sb.from('expenses').delete().eq('id',expense_id); expense_id=null;
        }
        if(m.editId){
          const { error } = await sb.from('cash_ledger').update({ corporation_id:m.corp, date:m.date, kind:m.kind, amount:amt, memo:m.memo||null, expense_id }).eq('id',m.editId);
          if(error) throw error;
        } else {
          const { error } = await sb.from('cash_ledger').insert({ corporation_id:m.corp, date:m.date, direction:'out', kind:m.kind, amount:amt, memo:m.memo||null, expense_id, created_by:profile.id });
          if(error) throw error;
        }
      } else { // in
        if(m.editId){
          const { error } = await sb.from('cash_ledger').update({ corporation_id:m.corp, date:m.date, kind:m.kind, amount:amt, memo:m.memo||null }).eq('id',m.editId);
          if(error) throw error;
        } else {
          const { error } = await sb.from('cash_ledger').insert({ corporation_id:m.corp, date:m.date, direction:'in', kind:m.kind, amount:amt, memo:m.memo||null, created_by:profile.id });
          if(error) throw error;
        }
      }
      setModal(null); showToast('Saved'); reload();
    }catch(e){ showToast('Save failed: '+(e.message||e)); }
    setBusy(false);
  };

  const del = async(r)=>{
    if(!confirm('Delete this cash entry?')) return;
    setBusy(true);
    try{
      if(r.transfer_group){ await sb.from('cash_ledger').delete().eq('transfer_group', r.transfer_group); }
      else { if(r.expense_id) await sb.from('expenses').delete().eq('id', r.expense_id); await sb.from('cash_ledger').delete().eq('id', r.id); }
      showToast('Deleted'); reload();
    }catch(e){ showToast('Delete failed: '+(e.message||e)); }
    setBusy(false);
  };

  // The counted-cash row's amount is owned by the Cash tab count, but its NOTE is yours,
  // so a short-day explanation can be added, changed, or cleared here.
  const openCountNote = (r)=>{
    setModal({ mode:'count_note', editId:r.id, corp:r.corporation_id, date:r.date,
      amount:String(r.amount), memo:r.memo||'' });
  };
  // Open the modal pre-filled to edit an existing (manual) row. Auto rows are not editable.
  const openEdit = async(r)=>{
    if(r.auto_source==='cash_count') return;
    if(r.transfer_group){
      const isOut = r.direction==='out';
      setModal({ mode:'transfer', editGroup:r.transfer_group,
        from:(isOut?r.corporation_id:r.counterparty_corp_id), to:(isOut?r.counterparty_corp_id:r.corporation_id),
        amount:String(r.amount), date:r.date, memo:r.memo||'' });
      return;
    }
    if(r.kind==='opening_balance'){
      setModal({ mode:'opening', editId:r.id, corp:r.corporation_id, kind:'opening_balance',
        amount:String(r.direction==='out'?-Number(r.amount):Number(r.amount)), date:r.date, memo:r.memo||'' });
      return;
    }
    if(r.direction==='in'){
      setModal({ mode:'in', editId:r.id, corp:r.corporation_id, kind:r.kind, amount:String(r.amount), date:r.date, memo:r.memo||'' });
      return;
    }
    // out: pull the linked expense's category if any
    let category_id='';
    if(r.expense_id){ try{ const {data}=await sb.from('expenses').select('category_id').eq('id',r.expense_id).maybeSingle(); category_id=(data&&data.category_id)||''; }catch(e){} }
    loadCats(r.corporation_id);
    setModal({ mode:'out', editId:r.id, expenseId:r.expense_id||null, corp:r.corporation_id, kind:r.kind,
      amount:String(r.amount), date:r.date, memo:r.memo||'', includePL:!!r.expense_id, category_id });
  };

  // Net inter-corp lending (transfers only), collapsing reciprocals.
  const lending = ()=>{
    const net = {};
    (rows||[]).filter(r=>r.transfer_group && r.direction==='out' && r.counterparty_corp_id).forEach(r=>{
      const key = r.corporation_id+'>'+r.counterparty_corp_id;
      net[key] = (net[key]||0) + Number(r.amount);
    });
    const seen = new Set(), out = [];
    Object.keys(net).forEach(k=>{
      const [a,b] = k.split('>'); const rev = b+'>'+a;
      if(seen.has(k)||seen.has(rev)) return; seen.add(k); seen.add(rev);
      const n = (net[k]||0) - (net[rev]||0);
      if(Math.abs(n)>=0.005){ if(n>0) out.push({from:a,to:b,amt:n}); else out.push({from:b,to:a,amt:-n}); }
    });
    return out;
  };

  const visRows = (rows||[]).filter(r=>{
    if(storeSel!=='all' && r.corporation_id!==storeSel) return false;
    if(period==='month' && ym){ if(!String(r.date).startsWith(ym)) return false; }
    if(period==='range'){ if(rStart && r.date < rStart) return false; if(rEnd && r.date > rEnd) return false; }
    if(mode==='transfers' && !r.transfer_group) return false;
    if(mode==='in' && !(r.direction==='in' && !r.transfer_group)) return false;
    if(mode==='out' && !(r.direction==='out' && !r.transfer_group)) return false;
    if(q.trim()){
      const hay = [corpName(r.corporation_id), clKindLabel(r.kind), r.memo||'',
        r.counterparty_corp_id?corpName(r.counterparty_corp_id):'',
        String(r.amount), fmt$(Number(r.amount)), r.date].join(' ').toLowerCase();
      if(!hay.includes(q.trim().toLowerCase())) return false;
    }
    return true;
  });
  if(rows===null) return <div className="card"><div className="sub">Loading cash ledger...</div></div>;

  return <div className="card">
    <h3>Cash Ledger <span className="badge gold">Owner</span></h3>
    <div className="sub cash-ledger-desc" style={{marginBottom:12}}>Physical cash on hand per corporation. Separate from the P&L: only "cash out" entries you mark are also booked as expenses. Transfers just move cash between boxes.</div>

    <div className="cash-bal-grid">
      {ledgerCorps.map(c=><div key={c.id} className="cash-bal">
        <div className="cash-bal-name">{c.code||c.name}</div>
        <div className="cash-bal-amt" style={{color:(balances[c.id]||0)<0?'var(--red)':'var(--text)'}}>{fmt$(balances[c.id]||0)}</div>
      </div>)}
    </div>

    <div className="cl-actions">
      <button className="btn btn-sm cl-in" onClick={()=>openModal('in')}>+ Cash in</button>
      <button className="btn btn-sm cl-out" onClick={()=>openModal('out')}>&minus; Cash out</button>
      <button className="btn btn-sm cl-xfer" onClick={()=>openModal('transfer')}>&#8646; Transfer</button>
      <button className="btn btn-sm cl-open" onClick={()=>openModal('opening')}>Opening balance</button>
    </div>

    <div className="cl-seg">
      <span className="seg-lbl">Store</span>
      <button className={storeSel==='all'?'on':''} onClick={()=>setStoreSel('all')}>All</button>
      {ledgerCorps.map(c=><button key={c.id} className={storeSel===c.id?'on':''} onClick={()=>setStoreSel(c.id)}>{c.code||c.name}</button>)}
    </div>

    <div className="cl-seg cl-seg-show">
      <span className="seg-lbl">Show</span>
      <button className={mode==='all'?'on':''} onClick={()=>setMode('all')}>All</button>
      <button className={mode==='in'?'on':''} onClick={()=>setMode('in')}>Income</button>
      <button className={mode==='out'?'on':''} onClick={()=>setMode('out')}>Expense</button>
      <button className={mode==='transfers'?'on':''} onClick={()=>setMode('transfers')}>Transfers</button>
    </div>

    <div className="cl-seg cl-seg-period">
      <span className="seg-lbl">Period</span>
      <button className={period==='all'?'on':''} onClick={()=>setPeriod('all')}>All time</button>
      <button className={period==='month'?'on':''} onClick={()=>setPeriod('month')}>Month</button>
      <button className={period==='range'?'on':''} onClick={()=>setPeriod('range')}>Range</button>
      {period==='month' && <input type="month" value={ym} onChange={e=>setYm(e.target.value)}/>}
      {period==='range' && <><input type="date" value={rStart} onChange={e=>setRStart(e.target.value)}/>
        <span className="seg-lbl" style={{margin:'0 2px'}}>to</span>
        <input type="date" value={rEnd} onChange={e=>setREnd(e.target.value)}/></>}
    </div>

    <div style={{position:'relative',marginBottom:10}}>
      <input style={{width:'100%',paddingRight:30}} placeholder="Search notes, type, corp, or amount (e.g. AI, 165)" value={q} onChange={e=>setQ(e.target.value)}/>
      {q && <button type="button" onClick={()=>setQ('')} aria-label="Clear search" style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:15}}>&#10005;</button>}
    </div>

    {mode==='transfers' && <div className="cash-lending">
      {lending().length===0 ? <div className="faint">No outstanding inter-corp balances.</div>
        : lending().map((l,i)=><div key={i} className="cash-lend-row"><span>{corpName(l.from)} lent {corpName(l.to)}</span><span className="mono">{fmt$(l.amt)}</span></div>)}
    </div>}

    {(mode==='in'||mode==='out') && visRows.length>0 && <div className="cash-lend-row" style={{fontWeight:700,borderBottom:'1px solid var(--border)',paddingBottom:6,marginBottom:8}}>
      <span>{mode==='in'?'Total income':'Total expense'}{storeSel!=='all'?' \u00b7 '+corpName(storeSel):''}</span>
      <span className="mono">{fmt$(visRows.reduce((a,r)=>a+Number(r.amount),0))}</span>
    </div>}

    {visRows.length===0 ? <div className="faint">No entries yet.</div> :
      <table className="t rec-list"><tbody>
        {visRows.map(r=><tr key={r.id}>
          <td className="rec-name">{corpName(r.corporation_id)} &middot; {clKindLabel(r.kind)}
            {r.counterparty_corp_id && <span className="faint"> ({r.direction==='out'?'to ':'from '}{corpName(r.counterparty_corp_id)})</span>}
            {r.expense_id && <span className="badge gold" style={{marginLeft:6}}>P&amp;L</span>}
            {r.auto_source==='cash_count' && <span className="badge" style={{marginLeft:6}}>Auto</span>}
            {r.memo && <div className="faint" style={{fontSize:11}}>{r.memo}</div>}
          </td>
          <td className="rec-cat">{r.date}</td>
          <td className="num rec-amt" style={{color:r.direction==='in'?'var(--green)':'var(--red)'}}>{r.direction==='in'?'+':'\u2212'}{fmt$(Number(r.amount))}</td>
          <td className="rec-act" style={{textAlign:'right'}}>{r.auto_source==='cash_count'
            ? <button className="btn btn-sm" disabled={busy} onClick={()=>openCountNote(r)}>{r.memo?'Note':'+ Note'}</button>
            : <><button className="btn btn-sm" disabled={busy} onClick={()=>openEdit(r)}>Edit</button>
               <button className="btn btn-sm btn-danger" style={{marginLeft:6}} disabled={busy} onClick={()=>del(r)}>&#10005;</button></>}</td>
        </tr>)}
      </tbody></table>}

    {modal && <div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title" style={{textTransform:'capitalize'}}>{modal.mode==='count_note'?'Counted cash note':((modal.editId||modal.editGroup)?'Edit ':'')+(modal.mode==='in'?'cash in':modal.mode==='out'?'cash out':modal.mode==='transfer'?'transfer':'opening balance')}</div>
          <button className="modal-x" onClick={()=>setModal(null)}>✕</button>
        </div>
        {modal.mode==='count_note' ? <>
          <div className="hint" style={{marginBottom:10}}>Counted cash for {modal.date}: <b>{fmt$(Number(modal.amount))}</b>. The amount follows the Cash tab count; add or clear a note here (for example, why the drawer was short).</div>
        </> : modal.mode==='transfer' ? <>
          <label className="hint">From</label>
          <select style={{width:'100%',marginBottom:8}} disabled={!!modal.editGroup} value={modal.from} onChange={e=>setModal({...modal,from:e.target.value})}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
          <label className="hint">To</label>
          <select style={{width:'100%',marginBottom:8}} disabled={!!modal.editGroup} value={modal.to} onChange={e=>setModal({...modal,to:e.target.value})}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
        </> : <>
          <label className="hint">Corporation</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.corp} onChange={e=>{ const v=e.target.value; setModal({...modal,corp:v}); if(modal.mode==='out') loadCats(v); }}>{ledgerCorps.map(c=><option key={c.id} value={c.id}>{c.name||c.code}</option>)}</select>
        </>}
        {modal.mode!=='count_note' && modal.mode==='in' && <><label className="hint">Type</label>
          <select style={{width:'100%',marginBottom:8}} value={modal.kind} onChange={e=>setModal({...modal,kind:e.target.value})}>{CL_IN_KINDS.map(k=><option key={k[0]} value={k[0]}>{k[1]}</option>)}</select></>}
        {modal.mode==='out' && <><label className="hint">Type</label>
          <select style={{width:'100%',marginBottom:6}} value={modal.kind} onChange={e=>{ const k=e.target.value; setModal({...modal, kind:k, includePL: k==='cash_expense' ? true : modal.includePL}); }}>{(()=>{
            const opts=[...CL_OUT_KINDS, ...outTypes.map(t=>[t.name,t.name])];
            if(modal.kind && !opts.some(o=>o[0]===modal.kind)) opts.push([modal.kind, modal.kind]);
            return opts.map(k=><option key={k[0]} value={k[0]}>{k[1]}</option>);
          })()}</select>
          <button type="button" className="btn btn-sm" style={{marginBottom:8}} onClick={()=>setManageTypes(v=>!v)}>{manageTypes?'Done managing types':'Add / remove types'}</button>
          {manageTypes && <div style={{border:'1px solid var(--border-soft)',borderRadius:8,padding:10,marginBottom:8,background:'var(--panel2)'}}>
            <div style={{display:'flex',gap:6,marginBottom:8}}>
              <input style={{flex:1,minWidth:0}} placeholder="New type name" value={newType} onChange={e=>setNewType(e.target.value)}/>
              <button type="button" className="btn btn-sm btn-gold" onClick={addType}>Add</button>
            </div>
            {outTypes.length===0 ? <div className="faint" style={{fontSize:12}}>No custom types yet. Built-in types can't be removed.</div>
              : outTypes.map(t=><div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0'}}>
                  <span>{t.name}</span>
                  <button type="button" className="btn btn-sm btn-danger" onClick={()=>removeType(t)}>&#10005;</button>
                </div>)}
          </div>}</>}
        {modal.mode!=='count_note' && <div className="modal-2col" style={{display:'flex',gap:8,marginBottom:8}}>
          <div style={{flex:1,minWidth:0}}><label className="hint">Amount</label>
            <input type="text" inputMode="text" style={{width:'100%'}} placeholder={modal.mode==='opening'?'e.g. 500 or -500':'0.00'} value={modal.amount} onChange={e=>setModal({...modal,amount:e.target.value})}/></div>
          <div style={{flex:1,minWidth:0}}><label className="hint">Date</label>
            <input type="date" style={{width:'100%'}} value={modal.date} onChange={e=>setModal({...modal,date:e.target.value})}/></div>
        </div>}
        {modal.mode==='out' && <div style={{marginBottom:8}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type="checkbox" checked={!!modal.includePL} onChange={e=>setModal({...modal,includePL:e.target.checked})}/>
            <span className="hint" style={{marginTop:0}}>Also record as a P&amp;L expense</span>
          </label>
          {modal.includePL && <><select style={{width:'100%',marginTop:6}} value={modal.category_id} onChange={e=>setModal({...modal,category_id:e.target.value})}>
            <option value="">Select category...</option>
            {(catsByCorp[modal.corp]||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <div className="hint" style={{marginTop:4}}>Need a different expense category? Add it in Settings &gt; Recurring &gt; Expense Categories.</div></>}
        </div>}
        <label className="hint">Note (optional)</label>
        <input style={{width:'100%',marginBottom:14}} value={modal.memo} onChange={e=>setModal({...modal,memo:e.target.value})} placeholder="Optional note"/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={save}>Save</button>
          <button className="btn" onClick={()=>setModal(null)}>Cancel</button>
        </div>
      </div>
    </div>}
    {toast && <div className="toast">{toast}</div>}
  </div>;
}

function CashPage({corps, canEditIds, profile, isOwner, activeCorp, onCorp}){
  const stores = corps.filter(c=>canEditIds.has(c.id));
  // Coins (anything under a dollar) stay in the register, so a count that's short by less
  // than $1 is treated as fine. Only a shortfall of $1 or more counts as "short".
  const SHORT_TOL = 1;
  const [corpId, setCorpId] = useCorpSelection(stores, activeCorp, onCorp);
  const now = new Date();
  const [y,setY] = useState(now.getFullYear());
  const [m,setM] = useState(now.getMonth()+1);
  const [days, setDays] = useState({});
  const [pickups, setPickups] = useState([]);
  const [pk, setPk] = useState({pickup_date:todayStr(), period_start:'', period_end:'', counted_amount:'', note:''});
  const [toast, showToast] = useToast();
  const [cashChId, setCashChId] = useState(null);
  const [cashExp, setCashExp] = useState({});
  const [pickupOpen, setPickupOpen] = useState(false);
  const [counts, setCounts] = useState({});   // date -> actual counted amount string
  const [cnotes, setCnotes] = useState({});   // date -> note explaining a shortage
  const [editingId, setEditingId] = useState(null);
  const [dayModal, setDayModal] = useState(null);   // {date} when a calendar day is tapped
  const _genRef = React.useRef(0);       // guards against a slow load overwriting a newer one
  const _corpRef = React.useRef(null);   // which store the on-screen data belongs to
  const _ymRef = React.useRef(null);     // which month the on-screen counts/notes belong to

  const reload = useCallback(async()=>{
    if(!corpId){ setDays({}); setPickups([]); setCashExp({}); setCounts({}); setCnotes({}); setCashChId(null); return; }
    // This run's generation. If the store (or month) changes before the awaits below
    // return, a newer run bumps the generation and this stale one must not write state.
    const gen = ++_genRef.current;
    const isCurrent = ()=> _genRef.current===gen;
    const forCorp = corpId;

    const ch = await sb.from('revenue_channels').select('id,code').eq('corporation_id',forCorp).eq('code','cash').maybeSingle();
    if(!isCurrent()) return;
    if(!ch.data){ setCashChId(null); setDays({}); setPickups([]); setCashExp({}); setCounts({}); setCnotes({}); return; }
    const start=`${y}-${pad(m)}-01`, end=`${y}-${pad(m)}-${pad(lastDay(y,m))}`;
    const [rv, pks, cex] = await Promise.all([
      sb.from('daily_revenue').select('*').eq('corporation_id',forCorp).eq('channel_id',ch.data.id).gte('date',start).lte('date',end),
      sb.from('cash_pickups').select('*').eq('corporation_id',forCorp).order('pickup_date',{ascending:false}).limit(10),
      sb.from('expenses').select('date,amount,memo,method,status').eq('corporation_id',forCorp).eq('method','cash').eq('status','confirmed').gte('date',start).lte('date',end),
    ]);
